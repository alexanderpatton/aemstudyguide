{id:102,d:1,sub:"1.F",q:"A THIRA process establishes a capability target of evacuating 25,000 people within 12 hours. The Stakeholder Preparedness Review (SPR) shows current capacity is 14,000 people in 12 hours. What does this 11,000-person gap represent?",opts:["A risk that must be accepted because mitigation is too expensive","A planning assumption that can be noted in the EOP","A capability gap that must be addressed through investment in resources, training, or mutual aid","Evidence that the THIRA target was set too high"],ans:2,exp:"The gap between THIRA targets and SPR current capabilities represents a concrete capability shortfall that must be addressed through investment — additional resources, training, exercises, or mutual aid agreements. This gap-to-investment linkage is the direct output of the THIRA/SPR process.",diff:"intermediate",ctry:"core"},
{id:103,d:1,sub:"1.D",q:"A hospital BIA identifies that its pharmacy dispensing system has an MTD of 4 hours and sets an RTO of 6 hours. What is the problem with this?",opts:["The MTD is too short for a realistic recovery","The RTO exceeds the MTD — this means the system will be down longer than tolerable before it is restored","The BIA should not cover pharmacy systems","There is no problem — RTO and MTD can be equal or the RTO can exceed the MTD"],ans:1,exp:"The RTO must ALWAYS be shorter than the MTD. If the MTD is 4 hours (maximum before unacceptable consequences) and the RTO is 6 hours (target restoration time), the system will experience unacceptable consequences before recovery is achieved. This is a fundamental BIA error that must be corrected.",diff:"advanced",ctry:"core"},
{id:104,d:1,sub:"1.C",q:"An EM office conducts a gap analysis and identifies 22 capability gaps. The next grant cycle opens in 60 days. What is the MOST appropriate approach to the gap list?",opts:["Apply for funding to address all 22 gaps simultaneously","Prioritize gaps using a risk-based matrix and address the highest-priority gaps first, sequencing the rest across future cycles","Present all 22 gaps to council and request emergency budget approval","Wait until the next THIRA cycle before addressing any gaps"],ans:1,exp:"Gap remediation must be prioritized — no jurisdiction can address all gaps simultaneously. A risk-based prioritization matrix (considering life-safety impact, probability, feasibility, and cost) sequences gaps across multiple funding and planning cycles. The 60-day grant timeline is an opportunity to advance the highest-priority items.",diff:"intermediate",ctry:"core"},
{id:105,d:1,sub:"1.B",q:"A municipality's critical infrastructure listing shows 47 assets. A new assessment reveals a private telecommunications tower that provides emergency communications for 3 hospitals has never been included. What action is REQUIRED?",opts:["No action — private facilities are not eligible for CI listings","Add the tower to the CI registry, identify the owner/operator as a key contact, and integrate it into relevant EOP annexes","Notify the federal government that a CI asset was missed","Request the owner to register the tower with provincial authorities"],ans:1,exp:"CI classification is consequence-based, not ownership-based. A tower providing emergency communications for hospitals meets the CI threshold. It must be added to the registry with owner/operator contacts and integrated into communications and health/medical annexes. Missing private-sector CI assets is a common and dangerous gap.",diff:"intermediate",ctry:"core"},
{id:106,d:1,sub:"1.A",q:"An EM director receives a proposal to deploy facial recognition technology at emergency shelters to 'improve security and registration efficiency.' What is the MOST appropriate first response?",opts:["Approve it — any technology that improves efficiency should be adopted","Conduct a structured risk-benefit assessment including: accuracy rates, privacy implications, legal authority, data security, vendor reliability, and community trust impacts before making any decision","Reject it — biometric technology should never be used in emergency management","Refer it to IT department only for a cybersecurity review"],ans:1,exp:"Emerging technology assessment requires a structured, multi-dimensional evaluation before adoption: technical performance (accuracy rates, failure modes), legal authority (is it permitted?), privacy implications (data collection, storage, sharing), cybersecurity, vendor reliability, and community trust — especially in vulnerable shelter populations who may have heightened privacy concerns.",diff:"advanced",ctry:"core"},
// DOMAIN 2 - Preparedness (harder scenarios)
{id:107,d:2,sub:"2.C",q:"An EM coordinator discovers the jurisdiction's EOP flood annex has not been updated in 6 years despite: a new shelter site opening, two mutual aid agreements expiring, and a major flood occurring 18 months ago. What is the CORRECT prioritization for updating the annex?",opts:["Update contact information first, then shelter locations, then mutual aid","Incorporate lessons from the real flood event first — real incident data takes highest priority over administrative updates","Update the mutual aid agreements first since expired agreements create legal liability","All updates are equal priority and should be addressed simultaneously"],ans:1,exp:"Post-incident lessons take priority in plan updates because they reflect real-world gaps validated by an actual event. The 18-month-old flood data represents the most operationally critical information. Expired mutual aid agreements and new shelter locations are important but secondary. Contact updates are the lowest priority.",diff:"advanced",ctry:"core"},
{id:108,d:2,sub:"2.K",q:"A jurisdiction has never conducted any exercises. They want to test whether their mass casualty response plan will work during a real multi-agency incident. What is the CORRECT approach?",opts:["Jump straight to a full-scale exercise — that is the only way to know if the plan works","Begin with a tabletop exercise to validate the plan and identify gaps before committing to operational testing","Begin with a seminar to familiarize staff with the plan, progress to a tabletop, then build toward a functional exercise over 18-24 months","A full-scale exercise is unnecessary — a tabletop is sufficient to validate the plan completely"],ans:2,exp:"HSEEP's progressive approach exists precisely for this situation. A jurisdiction with no exercise history must build capability progressively: seminar (orientation) → workshop (plan development) → tabletop (plan validation) → functional (EOC/multi-agency coordination) → full-scale (operational deployment). Jumping to full-scale with an untested plan risks operational failures and safety issues.",diff:"advanced",ctry:"core"},
{id:109,d:2,sub:"2.B",q:"A COOP plan for a regional health authority identifies 8 essential functions. During an exercise, staff cannot locate the vital records for 3 of those functions and the alternate facility lacks working internet. The exercise is MOST useful because it:",opts:["Demonstrates that the COOP plan is fundamentally flawed and should be rewritten","Validates the plan by confirming the 5 functions that worked correctly","Identifies specific, actionable gaps (vital records location and alternate facility connectivity) that can now be corrected before a real disruption","Suggests the health authority needs a new BIA"],ans:2,exp:"Exercises are designed to find gaps before real events reveal them. Discovering that vital records are inaccessible and the alternate facility lacks connectivity during an exercise is exactly the right outcome — these gaps are now documented, assigned to owners, and can be corrected. This is the HSEEP process working correctly.",diff:"intermediate",ctry:"core"},
{id:110,d:2,sub:"2.F",q:"An EM coordinator is planning the annual EOP review meeting. Which stakeholder group is MOST commonly overlooked but CRITICALLY important to include?",opts:["The fire department","Representatives from organizations serving people with disabilities and other AFN populations","The local media","Private sector business owners"],ans:1,exp:"Organizations serving AFN populations (disability services, elderly care, groups serving non-English speakers, medically dependent individuals) are consistently the most underrepresented group in EM planning processes, yet these populations face the greatest risks and require the most specific planning. Their absence from planning consistently produces plans that fail vulnerable community members.",diff:"intermediate",ctry:"core"},
{id:111,d:2,sub:"2.R",q:"A jurisdiction requires all EOC-designated staff to complete ICS 100 and 200 annually. The EM coordinator proposes requiring ICS 300 for all Section Chiefs. A budget officer argues ICS 300 is 'the same as 200 but longer' and unnecessary. What is the CORRECT response?",opts:["The budget officer is correct — ICS 200 is sufficient for Section Chiefs","ICS 300 covers expanding incidents and the Planning P process — competencies that Section Chiefs exercise and EOC activations require and that ICS 200 does not adequately cover","ICS 300 and 400 are identical courses","All EOC staff should complete ICS 400 regardless of role"],ans:1,exp:"ICS 300 is specifically designed for personnel managing or supporting expanding multi-resource incidents — including the Planning P process for IAP development, which is a core Section Chief function. ICS 200 covers initial single-resource response. For EOC Section Chiefs managing complex multi-agency coordination, ICS 300 is appropriate and distinct from ICS 200.",diff:"advanced",ctry:"core"},
{id:112,d:2,sub:"2.I",q:"A city launches a 72-hour preparedness campaign. Six months later, a survey shows preparedness rates increased from 28% to 34% overall, but remained at 12% in the low-income eastern district where residents are primarily recent immigrants. What does this data require?",opts:["Declare the campaign a success — overall rates improved","Continue the same campaign with higher advertising spend","Design a targeted program for the eastern district using trusted community organizations, multilingual materials, and addressing economic barriers to preparedness (affordability of supplies)","Reduce campaign investment since the demographic that didn't respond is difficult to reach"],ans:2,exp:"A campaign that improves overall rates but fails a specific vulnerable community has produced an inequitable outcome. The data requires a redesigned targeted intervention: partnering with trusted community organizations (not just government channels), providing multilingual materials, and addressing economic barriers (subsidized supply kits). The community that didn't respond is typically the most vulnerable.",diff:"advanced",ctry:"core"},
{id:113,d:2,sub:"2.G",q:"A mutual aid agreement between two municipalities has been in place for 8 years but has never been exercised or reviewed. During an actual flooding event, the assisting municipality sends Type 3 heavy equipment when the requesting municipality needed Type 1. What gap does this reveal?",opts:["The mutual aid agreement is legally invalid due to non-exercise","The agreement lacks specific resource typing requirements — it should specify NIMS resource types in requests and responses","The Type 3 equipment should be accepted since any mutual aid is better than none","The two municipalities should terminate the agreement and negotiate a new one"],ans:1,exp:"This reveals a specificity gap in the mutual aid agreement and request process. Mutual aid requests must specify NIMS resource types (Type 1, 2, 3, etc.) to ensure the receiving jurisdiction gets the exact capability needed. Agreements should also specify the request/response protocol including resource typing. Unexercised agreements commonly reveal these operational gaps when first used.",diff:"advanced",ctry:"core"},
{id:114,d:2,sub:"2.L",q:"An EM office develops 12 pre-scripted messaging templates for various hazards. During a chemical plant explosion, the PIO reaches for the 'industrial incident' template but finds it only covers air quality advisories — not shelter-in-place orders or evacuation instructions. This gap is BEST addressed by:",opts:["Discarding pre-scripted templates and writing all messages in real time","Adding shelter-in-place and evacuation message templates to the industrial incident template set, and reviewing all templates for scenario completeness against the hazard risk assessment","Expanding the PIO team so more people can write real-time messages","Using a generic 'emergency alert' template for all incidents"],ans:1,exp:"Pre-scripted templates must be comprehensive across all anticipated message types for each hazard scenario. A gap analysis comparing templates to likely scenario messaging requirements — using the hazard risk assessment as the guide — should drive template development. The fix is expanding the template library, not abandoning templates.",diff:"intermediate",ctry:"core"},
{id:115,d:2,sub:"2.O",q:"An EM coordinator's weather trigger protocol requires EOC Level 1 activation when Environment Canada issues a Tornado Warning within 100km. A Tornado Warning is issued 85km away at 2:47am. The duty officer is asleep and doesn't check alerts until 7am. What systemic failure does this represent?",opts:["An individual performance failure by the duty officer","A systemic failure in the alerting and notification system — automated monitoring must not depend solely on individual vigilance during overnight hours","A gap in the weather trigger protocol threshold","The duty officer should be terminated"],ans:1,exp:"This is a systemic failure, not an individual failure. Overnight weather monitoring cannot rely solely on individuals manually checking alerts. The system requires automated alert delivery (push notifications, pager systems, automated dialing) that wakes the duty officer when a threshold is crossed. Individual vigilance is unreliable at 2:47am — systems must be designed to compensate.",diff:"advanced",ctry:"Canada"},
{id:116,d:2,sub:"2.S",q:"Research following a major Canadian flood disaster shows that traditional evacuation orders reached only 43% of non-English-speaking residents in the affected area. An EM coordinator wants to apply this research. What is the MOST appropriate application?",opts:["Note the finding in the annual report and flag it for future consideration","Commission a local study to confirm whether the same gap exists in the jurisdiction before taking action","Immediately audit the jurisdiction's alerting systems for language accessibility and develop an action plan to address gaps, using the research as sufficient evidence to act","Present the research to council as evidence that evacuation orders don't work"],ans:2,exp:"Evidence-informed practice means acting on research findings when they reveal plausible local vulnerabilities. Waiting for a local study before acting on clear evidence of a systemic risk to non-English-speaking residents violates the precautionary principle. The research provides sufficient basis to audit current systems and develop improvements.",diff:"advanced",ctry:"Canada"},
// DOMAIN 3 - Mitigation (more questions, better coverage)
{id:117,d:3,sub:"3.C",q:"An EM director wants to make the case for a $1.2M flood berm project to a city council that has historically rejected mitigation investments. Which presentation approach is MOST likely to succeed?",opts:["Present the technical engineering specifications of the berm","Lead with a BCR analysis showing $4.80 in losses avoided per dollar invested, supported by the dollar value of the last three flood events and insurance cost data for affected properties","Present the Sendai Framework and explain Canada's international obligations for DRR","Focus on the number of residents the berm will protect"],ans:1,exp:"Fiscal decision-makers respond to cost-avoidance ROI arguments. A BCR of 4.8:1 expressed in concrete dollar terms, combined with historical loss data from real events in the jurisdiction, makes the most compelling case. Technical specs appeal to engineers; Sendai Framework appeals to policy professionals; resident numbers are compelling but less persuasive than money to budget-focused councils.",diff:"advanced",ctry:"Canada"},
{id:118,d:3,sub:"3.D",q:"A wildfire risk assessment recommends both a defensible space bylaw (requiring 10m cleared zones around homes) and a home ignition resistance retrofit program. The municipality has budget for only one. Which should be prioritized and why?",opts:["The bylaw — regulations are free to implement and affect all properties","The retrofit program — physical changes are more effective than rules","The bylaw — it creates a legal framework that enables future enforcement and applies to all properties, while the retrofit program reaches only participating homeowners. The bylaw should be implemented first with the retrofit program funded in a subsequent cycle","They are equivalent — flip a coin"],ans:2,exp:"The bylaw is the higher-leverage non-structural mitigation tool — it creates legal requirements applying to all properties and costs little to implement. The retrofit program, while valuable, is voluntary and reaches only willing participants. Implementing the bylaw first establishes the framework; the retrofit program complements it in subsequent cycles by addressing the retrofit costs that the bylaw creates for homeowners.",diff:"advanced",ctry:"Canada"},
{id:119,d:3,sub:"3.A",q:"During a major earthquake response, first responders from 6 agencies are operating in the same geographic area. A firefighter from Agency A needs to communicate urgent information to a paramedic from Agency B. They are on different radio systems and cannot communicate directly. This communication failure represents a failure of which preparedness function?",opts:["Training — the responders should have learned each other's radio frequencies","Interoperability planning — the agencies should have pre-established common channels, shared technology, or gateway solutions before the incident","Resource management — more radios should have been ordered","Incident command — the IC should be relaying all messages"],ans:1,exp:"This is a classic interoperability failure — the pre-incident planning and technology investment needed to enable cross-agency communication was not completed. The solution is not training alone but systemic: shared radio channels, gateway technology, common communication protocols, and pre-incident exercises to verify interoperability. Relying on the IC to relay all messages is operationally unsustainable.",diff:"intermediate",ctry:"core"},
{id:120,d:3,sub:"3.B",q:"A city's local mitigation plan includes a project to install backup generators at all 12 public emergency shelters. Three years into the 5-year plan cycle, only 2 generators have been installed. What is the MOST appropriate action?",opts:["Wait for the 5-year update and address the gap then","Accept the shortfall — mitigation timelines are aspirational, not binding","Conduct a mid-cycle review to identify the barriers (budget? procurement? staffing?) and develop a corrective action plan to accelerate implementation before the plan expires","Remove the generator project from the plan to improve the plan's implementation rate statistics"],ans:2,exp:"Mitigation plans require active monitoring and mid-cycle course correction, not just 5-year reviews. When implementation falls significantly behind schedule, a formal review to identify barriers and develop a corrective action plan is required. Removing projects to improve statistics is dishonest and ineffective. Waiting until the 5-year update leaves the vulnerability unaddressed for 2 more years.",diff:"intermediate",ctry:"core"},
{id:121,d:3,sub:"3.E",q:"A mitigation prioritization matrix scores 20 projects. The #1 ranked project (flood buyout in a low-income neighborhood, BCR 6.2) requires 18 months of community engagement before implementation. The #3 ranked project (backup generator for EOC, BCR 3.1) can be implemented in 3 months. What is the BEST approach?",opts:["Implement only the #1 ranked project and wait until it's complete before starting others","Begin community engagement for the #1 project immediately while simultaneously procuring the #3 project — both can be advanced in parallel","Skip the #1 project since it takes too long","Implement the #3 project and abandon the #1 project"],ans:1,exp:"Mitigation projects can and should be advanced in parallel. High-ranking projects requiring long implementation timelines should begin immediately while faster projects are also advanced. Parallel implementation maximizes the use of available resources and funding cycles. Waiting for the #1 project to complete before starting anything else is operationally inefficient.",diff:"advanced",ctry:"core"},
{id:122,d:3,sub:"3.F",q:"A coastal community's risk assessment identifies storm surge as the primary hazard. Which combination of controls MOST comprehensively addresses storm surge risk?",opts:["Build a seawall only","Implement flood zoning regulations only","Seawall upgrades AND updated floodplain zoning AND early warning system AND public education on evacuation routes — addressing structural and non-structural dimensions simultaneously","Conduct annual evacuation drills"],ans:2,exp:"Comprehensive mitigation requires structural controls (seawall) AND non-structural controls (floodplain zoning prevents new development in risk areas; early warning enables timely evacuation; public education ensures residents know what to do). Single-measure approaches leave significant risk reduction potential unrealized. This 4-part combination addresses prevention, protection, preparation, and response.",diff:"intermediate",ctry:"core"},
// DOMAIN 4 - Incident Response (harder, more nuanced)
{id:123,d:4,sub:"4.D",q:"During a major wildfire, the EOC Director receives a call from the mayor demanding to know why the EOC hasn't ordered additional air tankers. The EOC Director's MOST appropriate response is:",opts:["Immediately order the air tankers to satisfy the mayor","Explain that air tanker acquisition is a tactical decision made by the Incident Commander at the ICP — the EOC supports the ICP with resources when requested through the proper channel","Transfer the call to the Operations Section Chief","Tell the mayor that elected officials do not have authority over EOC operations"],ans:1,exp:"This tests EOC vs ICP distinction. Air tanker deployment is a tactical field decision made by the IC at the ICP — not ordered by the EOC. The EOC's role is to support resource requests from the ICP, not to direct tactics. The EOC Director should explain this role distinction to the mayor while confirming the EOC is supporting all IC resource requests.",diff:"advanced",ctry:"core"},
{id:124,d:4,sub:"4.N",q:"At a media briefing during a major industrial incident, a journalist asks 'Are there any fatalities?' The PIO genuinely does not yet know the answer. What is the MOST appropriate response?",opts:["Say 'No fatalities have been confirmed' to avoid alarming the public","Say 'I don't have confirmed information on that right now. We are actively working to assess life safety and I will update you as soon as we have confirmed information.'","Refuse to answer any questions about life safety","End the briefing immediately to avoid speculation"],ans:1,exp:"Honest acknowledgment of information gaps is always preferable to speculation or false reassurance. 'No confirmed fatalities' implies certainty that doesn't exist and could prove false. Refusing to answer damages credibility. The correct response is transparent: acknowledge the question, explain that information is being gathered, and commit to an update. This is the foundation of effective crisis communication.",diff:"advanced",ctry:"core"},
{id:125,d:4,sub:"4.G",q:"An IC has been managing a structure fire for 3 hours when a second major incident — a multi-vehicle highway accident — occurs requiring significant resources. The current IC cannot effectively manage both incidents from the same ICP. What is the CORRECT ICS approach?",opts:["The current IC expands span of control to manage both incidents","Establish a separate ICS organization for the second incident with its own IC, maintaining separate command for each incident","Combine both incidents under Unified Command immediately","Request the EOC to manage the second incident directly"],ans:1,exp:"When two separate incidents cannot be effectively managed from the same ICS organization, they should have separate ICS organizations with separate ICs. This maintains manageable span of control. Area Command can be established above both ICs if they compete for the same resources. Unified Command is for incidents with shared geography/jurisdiction — not for managing two unrelated incidents simultaneously.",diff:"advanced",ctry:"core"},
{id:126,d:4,sub:"4.H",q:"During a flooding event, an EOC receives a request from the field for '5 water rescue teams.' The EOC Logistics Section Chief must respond. What critical information is MISSING from this request that Logistics must obtain before filling it?",opts:["The name of the requesting officer","The NIMS resource type required (Type 1, 2, 3, or 4) — different types have very different capabilities for swift water rescue","The budget code for the mutual aid request","Whether the requesting jurisdiction has its own insurance"],ans:1,exp:"NIMS resource typing exists precisely for this situation. A 'water rescue team' request without a specified type is ambiguous — Type 1 teams handle complex swift water rescue with specialized equipment; Type 4 teams may only handle flat-water or shore-based operations. Sending the wrong type wastes time and may leave the field without needed capability. Logistics must clarify resource type before filling the request.",diff:"advanced",ctry:"core"},
{id:127,d:4,sub:"4.J",q:"An after-action review following a major flood response is scheduled for 3 weeks after demobilization. The emergency manager learns that several field personnel are reluctant to attend because 'people will be blamed for what went wrong.' What action should the EM take BEFORE the AAR?",opts:["Cancel the AAR to avoid conflict","Make attendance mandatory and proceed regardless of concerns","Communicate explicitly that the AAR will follow a no-blame, systems-focused approach; consider appointing an independent facilitator; and establish ground rules at the start of the session","Only invite senior management to reduce the risk of conflict"],ans:2,exp:"Psychological safety is prerequisite to an effective AAR. If participants fear blame, they will not share candid observations, and the AAR will produce incomplete findings. Proactive communication about the no-blame approach, an independent facilitator to signal neutrality, and explicit ground rules address the cultural barrier before it undermines the process. Excluding field personnel eliminates the most operationally valuable perspectives.",diff:"advanced",ctry:"core"},
{id:128,d:4,sub:"4.K",q:"A regional hospital has activated its internal emergency plan following an earthquake. The hospital administrator calls the municipal EM coordinator asking 'What should we do about patients we can't care for?' The MOST appropriate EM coordinator response is:",opts:["Direct the hospital to transfer all patients to the nearest available facility","Provide technical guidance on the provincial patient transfer protocol, connect the hospital administrator with the ESF #8 coordinator, and offer EOC support for resource coordination — while making clear that clinical decisions remain with medical authority","Take over management of the hospital's emergency response","Tell the hospital to call the Ministry of Health directly"],ans:1,exp:"The EM coordinator's role is advisory and coordinative — not operational command over the hospital. The correct response provides technical guidance (protocol knowledge), connects the hospital to the right functional coordination structure (ESF #8 / health authority), and offers EOC resource support — while explicitly respecting that clinical and patient care decisions remain with medical authority.",diff:"advanced",ctry:"Canada"},
{id:129,d:4,sub:"4.L",q:"During a major ice storm, the EOC lifeline status board shows: Energy = Red (43% power), Water = Yellow (boil water advisory), Transportation = Red (major routes closed), Health/Medical = Green (hospitals operational). Resource allocation should FIRST prioritize:",opts:["Transportation — most lifelines depend on route access","Energy — restoring power enables water treatment, hospital backup generators, and traffic signal restoration","Health/Medical — hospitals are at Green status and must be maintained","Water — the boil water advisory affects all residents"],ans:1,exp:"Energy (power) enables cascading restoration of other lifelines. Without power restoration: water treatment may fail, hospitals will exhaust generator fuel, traffic signals remain dark, and emergency communications weaken. Power at 43% affecting critical facilities triggers the highest priority. Transportation and water restoration efforts also depend on having power for equipment and treatment. Health/Medical at Green means hospitals are managing — energy enables continued Green status.",diff:"advanced",ctry:"core"},
{id:130,d:4,sub:"4.O",q:"On day 4 of a 120-hour flood response, the EOC Director observes that her most experienced Planning Section Chief is making errors, snapping at colleagues, and has worked 16-hour shifts for 3 consecutive days. The Section Chief insists he is 'fine and can push through.' What must the EOC Director do?",opts:["Accept the Section Chief's self-assessment and allow him to continue","Relieve him for mandatory rest immediately, regardless of his objection — fatigue management is a duty of care, not a personal choice","Reduce his responsibilities to less critical tasks while allowing him to remain on shift","Have him evaluated by a medical officer before deciding"],ans:1,exp:"Fatigue management is a command responsibility — not a personal choice for individual staff. An experienced leader who is making errors and showing behavioral changes after excessive hours is demonstrating documented signs of fatigue impairment. The EOC Director has a duty of care to relieve him for mandatory rest. The Section Chief's self-assessment is invalid — fatigued individuals consistently overestimate their own performance.",diff:"advanced",ctry:"core"},
{id:131,d:4,sub:"4.F",q:"The EOC produces a SITREP at 1400h stating: 'Power restored to approximately 60% of affected residences. We expect full restoration by midnight tonight.' At 2300h, full restoration has not occurred. What is the MOST important lesson for the next SITREP?",opts:["Apologize for the error in the 1400h SITREP","Remove power restoration timeline estimates from SITREPs entirely","Update the actual restoration percentage with current data and, if providing new timelines, qualify them explicitly as estimates based on current utility projections rather than confirmed commitments","Do not issue a SITREP until power is fully restored"],ans:2,exp:"SITREPs must be factual. Restoration timelines provided as firm commitments that prove false damage credibility. The correct lesson is to qualify future timeline estimates explicitly ('Utility estimates restoration by X, subject to field conditions') rather than presenting estimates as commitments. Removing timelines entirely reduces the SITREP's decision-support value. Apologies are appropriate but insufficient without process change.",diff:"intermediate",ctry:"core"},
{id:132,d:4,sub:"4.E",q:"During a major incident, an elected official posts speculative and inaccurate information about the incident on their personal social media, attributing it to 'government sources.' This reaches 40,000 followers before the PIO notices. What is the MOST appropriate immediate response?",opts:["Issue a formal complaint to the elected official's party leadership","Post a correction on official channels immediately, brief the elected official directly with correct information and a request to correct their post, and include elected officials in the next JIC briefing cycle","Ignore it — social media misinformation is impossible to correct","Have the elected official's post removed by the platform"],ans:1,exp:"This requires both a public correction and a private diplomatic response. The immediate priority is correcting the public record on official channels. Briefing the elected official directly (not publicly criticizing them) and providing correct information — while requesting a correction — addresses the source. Including elected officials in the regular JIC briefing cycle prevents future gaps from creating this dynamic again.",diff:"advanced",ctry:"core"},
{id:133,d:4,sub:"4.I",q:"The first unit to arrive at a reported structure collapse finds a 6-story building partially collapsed with unknown number of occupants. The unit officer establishes initial incident command. What is the FIRST priority action?",opts:["Request a USAR team immediately","Conduct a rapid life-safety assessment of the perimeter and establish an exclusion zone — protecting rescuers from secondary collapse before any rescue operations begin","Begin immediately searching for survivors in the rubble","Set up a unified command with all responding agencies"],ans:1,exp:"Life-safety priority applies to responders too. Secondary collapse is the leading cause of responder fatalities in structural collapse incidents. The first action is a perimeter assessment and exclusion zone establishment to protect responders. Rescue operations begin only after the rescue environment is assessed as survivable. Requesting USAR and unified command are important but not the FIRST action.",diff:"advanced",ctry:"core"},
// DOMAIN 5 - Recovery (more questions)
{id:134,d:5,sub:"5.B",q:"A municipality suffers a major tornado. The total eligible response and recovery costs are $18M. The province's per-capita DFAA threshold is calculated at $2.5M. How much does the federal government contribute under DFAA?",opts:["$18M (100% of all costs)","$13.95M (90% of $15.5M above the $2.5M threshold)","$9M (50% of total costs)","$16.2M (90% of total costs)"],ans:1,exp:"DFAA formula: Province pays 100% of the first $2.5M (below threshold). Costs above threshold = $18M - $2.5M = $15.5M. Federal covers 90% of above-threshold costs = $15.5M × 0.90 = $13.95M. Province pays $2.5M + ($15.5M × 0.10) = $2.5M + $1.55M = $4.05M. Total federal contribution = $13.95M.",diff:"advanced",ctry:"Canada"},
{id:135,d:5,sub:"5.D",q:"During a community recovery planning meeting 6 weeks after a major flood, government representatives present a draft recovery plan. Community members object, saying the plan prioritizes downtown commercial reconstruction over rebuilding affordable housing destroyed in the flood, which affected primarily low-income renters. The MOST appropriate response by the EM coordinator is:",opts:["Proceed with the government plan — EM professionals have the technical expertise to make recovery decisions","Acknowledge the community's priorities as valid and substantive, pause the formal plan approval process, and organize additional community engagement sessions specifically with affected renters before finalizing priorities","Note the concerns in the meeting minutes and proceed with the plan","Refer the housing issue to the social services department"],ans:1,exp:"Community-led recovery is not just a process principle — it has direct equity implications. A plan that prioritizes commercial recovery over the housing needs of the most affected residents (low-income renters who lost their homes) fails the equity test. The EM coordinator should acknowledge the gap as substantive, pause for additional targeted engagement, and revise priorities based on community input. Proceeding without this step produces a plan that doesn't serve those most in need.",diff:"advanced",ctry:"core"},
{id:136,d:5,sub:"5.H",q:"A jurisdiction requests a federal disaster declaration following a major earthquake. The federal government's first requirement before processing the declaration is:",opts:["A full economic impact study","A completed Preliminary Damage Assessment (PDA) jointly conducted by local, provincial, and federal officials","Payment of a processing fee","A formal request from the Head of State"],ans:1,exp:"A PDA is required before a disaster declaration because the declaration triggers federal financial assistance — the federal government needs documented evidence of the nature, extent, and cost of damage to justify the declaration and determine the appropriate level of assistance. The PDA is always a prerequisite to a declaration request.",diff:"intermediate",ctry:"core"},
{id:137,d:5,sub:"5.G",q:"Five days after a major chemical spill, a municipal government issues a reentry order for most affected areas but excludes a 3-block zone around the spill site. Residents of the excluded zone argue they have a 'right to return to their property.' The EM coordinator's position should be:",opts:["Allow residents to sign waivers and return immediately","The reentry order reflects current safety evidence — the 3-block exclusion zone remains until air and soil quality testing confirms contaminant levels below established health thresholds. Rights to property do not supersede obligations to protect life safety.","Allow daytime access only with residents required to wear respirators","Expand the exclusion zone further to be safe"],ans:1,exp:"Safety evidence — not political or legal pressure — must gate reentry decisions. The right to property exists, but it does not override the government's obligation to protect life safety. Residents cannot waive the government's obligation to confirm safety. Waivers are legally and ethically insufficient for chemical contamination scenarios. The correct position is clear, evidence-based, and compassionate — explaining the testing requirements and timeline.",diff:"advanced",ctry:"core"},
{id:138,d:5,sub:"5.I",q:"An AAR following a major response identifies that the EOC's resource tracking system failed during peak operations, forcing manual processes. The Improvement Plan assigns the 'technology fix' to the IT department with a 90-day deadline. Six months later, the system still isn't fixed. What should the EM coordinator do?",opts:["Accept that IT departments have competing priorities and move on","Re-open the Improvement Plan item, escalate it to senior leadership, set a new deadline with explicit consequences for non-completion, and identify a manual backup protocol as an interim measure","Remove the item from the Improvement Plan since it's clearly not achievable","Procure a replacement system without IT involvement"],ans:1,exp:"Improvement Plan items that miss deadlines require escalation and re-engagement, not acceptance or abandonment. The EM coordinator should reopen the item, involve senior leadership to remove organizational barriers, set a revised deadline with accountability, and implement an interim manual solution that eliminates the operational risk while the long-term fix is completed. Incomplete IPs from real incidents leave known vulnerabilities in place.",diff:"advanced",ctry:"core"},
{id:139,d:5,sub:"5.E",q:"A county is preparing a debris removal Scope of Work for DFAA reimbursement. The Public Works Director wants to include a 15% contingency in the cost estimate 'just in case.' What is the MOST appropriate guidance?",opts:["Include the 15% contingency — it is standard practice in construction contracts","Use only documented cost estimates based on actual quantities and established unit prices. Contingencies not tied to specific documented risks may be disallowed in a DFAA audit.","Double the contingency to 30% to ensure all costs are covered","Remove cost estimates entirely and invoice based on actual costs after the work is complete"],ans:1,exp:"DFAA/grant auditors require documented, justifiable cost estimates. A generic percentage contingency without specific risk justification is commonly disallowed. Cost estimates must be based on: estimated quantities (documented), established unit prices (market rates or historical data), and specific known risk items (documented). An across-the-board contingency that isn't tied to specific identified risks creates audit liability.",diff:"advanced",ctry:"Canada"},
{id:140,d:5,sub:"5.C",q:"Following a major earthquake, the EOC lifeline status board shows water treatment at Yellow (degraded) with a boil water advisory affecting 80,000 residents. The primary constraint is a failed 480V electrical transformer at the treatment plant. What is the MOST efficient recovery action?",opts:["Wait for the utility company to restore permanent power","Deploy a temporary large-scale generator to restore treatment plant operations while permanent power repair proceeds in parallel","Issue bottled water to all 80,000 residents as an alternative","Establish water distribution points only in the most affected neighborhoods"],ans:1,exp:"This is a cascading failure scenario: earthquake → power failure → water treatment failure → public health risk. The most efficient solution is deploying a generator to restore water treatment operations (serving 80,000 people from one action) while permanent power repair continues in parallel. Bottled water distribution for 80,000 people is logistically massive and only addresses symptoms. Distribution points help but don't restore the system.",diff:"advanced",ctry:"core"},
{id:141,d:5,sub:"5.K",q:"A disaster case manager is working with a family of 5 who lost their home. The family speaks limited English and the primary earner is undocumented. The case manager discovers they are eligible for several recovery programs but are afraid to apply due to immigration status concerns. What is the MOST appropriate action?",opts:["Explain that undocumented individuals are not eligible for any government programs","Respect their decision not to apply and close the case","Clarify which specific programs do and don't have immigration status requirements, connect them with a legal aid organization specializing in immigrant rights, and document their needs in the LTRG unmet needs register regardless of program eligibility","Report the family's immigration status to appropriate authorities"],ans:2,exp:"Disaster recovery case management requires navigating complex eligibility landscapes and addressing barriers. Many disaster assistance programs (Red Cross, NGO programs, certain federal programs) do not have immigration status requirements. The case manager's role is to accurately assess eligibility, address the fear barrier through information and legal aid connection, and document unmet needs that may be addressed through other channels. Reporting immigration status is both outside the EM role and counterproductive to recovery.",diff:"advanced",ctry:"core"},
// DOMAIN 6 - Technologies (more depth)
{id:142,d:6,sub:"6.A",q:"A municipality's mass notification system has 18,000 registered opt-in users out of a total population of 95,000. During a tornado warning, the opt-in system sends alerts to registered users. What critical gap does this reveal?",opts:["The opt-in system is sufficient — 18,000 notifications is adequate for a municipality","The opt-in system alone fails to reach 81% of residents. WEA (which reaches all mobile devices) and other alerting channels must be integrated to achieve jurisdictional coverage.","The municipality should expand the opt-in database to 30,000 before relying on it","The opt-in system should be replaced with WEA entirely"],ans:1,exp:"An opt-in system reaching 19% of the population is inadequate for life-safety warnings. Effective emergency alerting requires layered systems: WEA (reaches all capable mobile devices, no registration) + opt-in MNS (richer messages to registered users) + outdoor sirens + broadcast media. No single channel reaches everyone. The WEA gap (not activated alongside the opt-in system) is the critical failure here.",diff:"advanced",ctry:"core"},
{id:143,d:6,sub:"6.B",q:"An EM office is selecting between two incident management platforms. Platform A has more features and a lower annual cost but is hosted entirely in a cloud that requires internet connectivity. Platform B has fewer features and higher cost but has offline capability and local server options. For EM use, which platform should be recommended?",opts:["Platform A — more features and lower cost always wins","Platform B — offline capability is non-negotiable for EM systems that must operate when disasters disrupt internet connectivity","Either platform is acceptable — backup systems can compensate","Platform A with a verbal commitment from the vendor to add offline capability in a future update"],ans:1,exp:"For life-safety EM systems, offline capability is a non-negotiable requirement. Disasters routinely disrupt internet connectivity — the exact scenario when the incident management system is most needed. Platform A fails the primary test for EM technology. Vendor promises of future offline capability are not contractual commitments. Higher cost for operational reliability is justified in EM technology investment.",diff:"intermediate",ctry:"core"},
{id:144,d:6,sub:"6.E",q:"An EM coordinator receives a threat intelligence report indicating that ransomware groups are actively targeting municipal government networks across the province. The MOST appropriate immediate action is:",opts:["Forward the report to the IT department and consider it addressed","Brief the EOC Director and senior leadership, verify that all critical EM systems have current offline backups, confirm that the cyber incident response plan is current and staff are aware of it, and request IT to verify patch status of critical systems","Issue a public warning about the ransomware threat","Wait to see if the jurisdiction is actually targeted before taking action"],ans:1,exp:"Threat intelligence requires proactive response, not reactive waiting. When a credible threat is identified, EM must: brief leadership (they need to know), verify backup status (the primary recovery tool), confirm the cyber incident response plan is current, and coordinate with IT on patch status. These are all achievable immediately without waiting for confirmation that the jurisdiction is targeted. Early action is always preferred.",diff:"advanced",ctry:"Canada"},
{id:145,d:6,sub:"6.C",q:"A new GIS-based damage assessment tool has been procured, configured, and is ready for deployment. Training has been scheduled for 3 weeks before the next major exercise. The exercise is the first planned opportunity to use the tool operationally. What is the RISK with this implementation timeline?",opts:["There is no risk — training before the exercise is the correct sequence","Three weeks is insufficient for staff to achieve proficiency on a new tool before using it in an operational exercise setting. Errors and confusion during the exercise will undermine both the exercise objectives and confidence in the tool.","The tool should be used in the exercise without training to identify what training is needed","The exercise should be cancelled until the tool is fully mastered"],ans:1,exp:"Technology implementation timing must allow sufficient time for proficiency development before operational use. Three weeks for a complex GIS tool is likely insufficient — staff will be learning the interface during the exercise rather than using it effectively. The solution is either: delay the tool deployment to the next exercise cycle, or extend training to 8-12 weeks before the exercise with supervised practice sessions. Operational exercises require operational proficiency, not learning.",diff:"advanced",ctry:"core"},
// DOMAIN 7 - Administration (harder scenarios)
{id:146,d:7,sub:"7.O",q:"An EM coordinator discovers that a colleague submitted a grant report claiming training hours that were not actually delivered, in order to meet a grant performance requirement and avoid having to return funding. What does the IAEM Code of Ethics require?",opts:["Report the falsification to the grant funder and organizational leadership, even though it implicates a colleague","Discuss it with the colleague and give them a chance to correct the report before reporting","Stay out of it — it is not your grant and not your responsibility","Report it anonymously only, to protect the colleague"],ans:0,exp:"The IAEM Code of Ethics creates an affirmative duty to report ethical violations, not merely avoid personal violations. Grant falsification is fraud — a serious violation of Integrity and Personal Responsibility principles. The Code requires reporting to appropriate authorities (grant funder and organizational leadership), not covering for colleagues. This is explicitly tested in AEM ethics scenarios: passive observation of fraud is not compliant with the Code.",diff:"advanced",ctry:"core"},
{id:147,d:7,sub:"7.D",q:"An EM office receives a $400,000 federal preparedness grant. The grant agreement specifies that funds must be used for 'training and exercises only.' The EM coordinator's jurisdiction has an urgent need to replace a failed generator at the EOC. Can grant funds be used for the generator?",opts:["Yes — EOC readiness is directly related to preparedness","Yes — the grant officer will understand given the emergency need","No — grant funds must be used only for eligible purposes as defined in the grant agreement. Using training/exercise funds for a generator would be an ineligible expenditure subject to audit finding and potential repayment.","Yes, if the EM coordinator documents a rationale connecting the generator to exercise readiness"],ans:2,exp:"Grant funds must be used only for eligible purposes as defined in the grant agreement. This is non-negotiable. 'Training and exercises' grants do not cover equipment purchases. Using them for an EOC generator would be an ineligible expenditure — creating an audit finding requiring repayment of the misused funds. The correct solution is to find another funding source for the generator (base budget, capital budget, different grant) and keep the preparedness grant for its intended purpose.",diff:"advanced",ctry:"core"},
{id:148,d:7,sub:"7.H",q:"A new provincial EM act comes into force requiring all municipalities to submit updated Emergency Management Programs to the province within 18 months. The EM coordinator's current program was last reviewed 3 years ago and has several documented gaps. What is the MOST appropriate response?",opts:["Submit the existing program immediately to demonstrate compliance","Wait until month 17 of the 18-month window to complete the most comprehensive update possible","Begin an immediate structured review and update process, developing a project plan that delivers a substantially updated program within the 18-month window with appropriate stakeholder engagement","Request an extension from the province before beginning any work"],ans:2,exp:"A legislative compliance deadline with a documented program that has known gaps requires immediate action. The 18-month window is a planning timeline, not a delay authorization. Beginning immediately with a structured project plan ensures sufficient time for quality stakeholder engagement, plan drafting, review, and legal adoption before the deadline. Waiting until month 17 risks inadequate time for the process and produces a lower-quality submission.",diff:"intermediate",ctry:"Canada"},
{id:149,d:7,sub:"7.A",q:"An EM coordinator has two staff members — one senior (15 years experience) with no succession plan and one junior (2 years experience) who is developing well. The senior staff member announces retirement in 8 months. What is the MOST critical immediate action?",opts:["Immediately post the senior position for external recruitment","Begin accelerated knowledge transfer and succession development for the junior staff member while also initiating a recruitment process — both tracks simultaneously","Wait until the senior staff member gives formal notice before taking action","Redistribute the senior staff member's responsibilities across remaining staff"],ans:1,exp:"Succession planning requires parallel action: accelerated knowledge transfer (the senior's institutional knowledge must be documented and transferred before they leave) AND parallel recruitment (the junior may not be ready to fully assume the role in 8 months). Waiting for formal notice wastes time. Redistributing without a succession plan creates a capability gap. Both tracks — transfer and recruitment — must run simultaneously from the moment the retirement is announced.",diff:"advanced",ctry:"core"},
{id:150,d:7,sub:"7.C",q:"An EM office's Q3 budget report shows: $340,000 spent of a $420,000 annual budget (81%), with $65,000 in signed purchase orders outstanding. The remaining 4 months of the fiscal year include a planned exercise costing $35,000. Is the office within budget?",opts:["Yes — $80,000 remaining is sufficient","No — $340K spent + $65K encumbered = $405K committed, leaving only $15K uncommitted against a $35K exercise — the office is $20,000 short","Yes — purchase orders don't count against the budget until paid","The office needs more information before determining budget status"],ans:1,exp:"Committed spending = $340K spent + $65K encumbered (signed POs) = $405K. Remaining uncommitted = $420K - $405K = $15K. Planned exercise = $35K. Shortfall = $35K - $15K = $20K. The office is $20K short for the planned exercise. Encumbrances count against the budget when the PO is signed — waiting until payment is a common and dangerous budget management error.",diff:"advanced",ctry:"core"},
{id:151,d:7,sub:"7.F",q:"An EM coordinator is hired by a new municipality. She discovers the office has no written SOPs for any of its 12 primary functions — all procedures are in staff heads. Six months into the role, a key staff member is suddenly hospitalized for 3 months. This scenario BEST illustrates:",opts:["A training gap — staff should be cross-trained","A documentation gap — undocumented procedures create institutional fragility that manifests as crisis when key individuals are unavailable","A staffing gap — more employees are needed","A leadership gap — the previous coordinator should have built the team differently"],ans:1,exp:"This is a documentation/institutional knowledge gap. When procedures exist only in individual staff heads, the organization is one departure/absence away from operational crisis. The sudden hospitalization exposed what was a pre-existing structural vulnerability. SOPs exist to transfer institutional knowledge from individuals to the organization, ensuring operational continuity regardless of personnel changes.",diff:"intermediate",ctry:"core"},
{id:152,d:7,sub:"7.Q",q:"A COOP exercise reveals that when the alternate facility is activated, staff cannot access the organization's financial system to process payroll. This represents a gap in which COOP element?",opts:["Succession of authority","Vital records and systems access at the alternate facility","Alternate facility selection","Devolution planning"],ans:1,exp:"Access to critical systems (financial systems, HR, emergency databases) at the alternate facility is a vital records and systems access gap. COOP requires that all critical systems be accessible from alternate facilities — including account credentials, VPN access, software licenses, and connectivity. Discovering this in an exercise is the correct outcome; discovering it during a real activation when payroll can't be processed is an avoidable failure.",diff:"intermediate",ctry:"core"},
{id:153,d:7,sub:"7.E",q:"An EM coordinator prepares an annual budget request for an additional FTE (full-time equivalent staff member). The finance department's standard question is 'What is the return on this investment?' The MOST compelling answer frames the additional FTE as:",opts:["A compliance requirement — the EM Act requires adequate staffing","Additional capacity to deliver more exercises and training — improving overall program quality","A risk reduction investment: the cost of one FTE ($95,000/year) is a fraction of the estimated $2.3M in additional recovery costs the jurisdiction incurred in the last disaster due to insufficient EM capacity","A professional development opportunity for the organization"],ans:2,exp:"Finance departments respond to quantified cost-avoidance arguments. Framing one FTE's salary ($95K) against $2.3M in attributable disaster recovery costs makes an ROI case of approximately 24:1. Compliance framing ('we must') creates adversarial dynamics. Quality improvement arguments are abstract. The direct cost-avoidance comparison is the most persuasive to a budget-focused audience.",diff:"advanced",ctry:"core"},
// DOMAIN 8 - Professional Development (more depth)
{id:154,d:8,sub:"8.A",q:"An EM professional has held their AEM certification for 3 years and is now eligible to apply for CEM. They have 5 years of EM experience, have completed required training hours, but have zero documented contributions to the profession. What does this mean for their CEM application?",opts:["They can apply and the contributions requirement will be waived given their experience","They cannot complete a successful CEM application without documented contributions to the profession — this is a required element, not optional","They can substitute additional training hours for the contributions requirement","They should apply anyway and explain the gap in a cover letter"],ans:1,exp:"Contribution to the profession is a non-waivable requirement for CEM certification — it cannot be substituted by experience or additional training hours. Contributions include: publishing, teaching/training others, mentoring, serving on professional committees, presenting at conferences, and similar activities. Without documented contributions, the CEM application is incomplete regardless of experience and training hours.",diff:"intermediate",ctry:"core"},
{id:155,d:8,sub:"8.H",q:"An EM professional wants to count their day-to-day incident management work during a major flood response toward their AEM professional development hours. According to IAEM requirements, this:",opts:["Qualifies — incident management is professional development","Does not qualify — performing standard job duties during incidents is not considered professional development for AEM/CEM purposes","Qualifies if the incident was declared a federal disaster","Qualifies if the EM professional was in a leadership role"],ans:1,exp:"IAEM's professional development requirements distinguish between performing job duties and deliberate learning activities. Managing an incident response is professional experience (which contributes to the experience requirements) but it is NOT professional development. Professional development requires deliberate learning activities: courses, conferences, academic study, research, writing. The distinction matters for tracking recertification requirements.",diff:"intermediate",ctry:"core"},
{id:156,d:8,sub:"8.C",q:"An EM coordinator's annual stakeholder analysis identifies that they have never formally engaged with the local Indigenous Emergency Management coordinator, despite the Indigenous community's territory being adjacent to the jurisdiction and facing shared hazards. What does this represent and what is the appropriate response?",opts:["A low-priority gap — Indigenous EM is a provincial responsibility","A significant equity and operational gap. Initiate direct relationship-building with the Indigenous EM coordinator, explore opportunities for joint planning, shared exercises, and mutual aid, and incorporate Indigenous traditional knowledge into hazard assessments where appropriate.","The Indigenous community should initiate contact if they want coordination","A gap that requires a formal government-to-government agreement before any coordination can occur"],ans:1,exp:"Failure to engage with Indigenous EM coordinators on shared hazards represents both an equity gap (Indigenous communities face disproportionate disaster risk) and an operational gap (shared hazards require coordinated response). Indigenous traditional knowledge is also increasingly recognized as valuable in hazard assessment. Proactive relationship-building is the correct response. Waiting for them to initiate, or requiring formal agreements before any coordination, creates unnecessary barriers.",diff:"advanced",ctry:"Canada"},
{id:157,d:8,sub:"8.D",q:"An EM professional receives a call at 6pm from a peer coordinator in a neighboring municipality asking an urgent question about requesting provincial mutual aid — outside of working hours. The MOST professionally appropriate response is:",opts:["Answer during working hours only — professional boundaries are important","Answer the call — peer networks exist precisely for rapid information sharing during urgent situations, and this is a core operational benefit of professional relationship-building","Forward to the duty officer — this is an operational matter","Charge a consulting fee for after-hours professional advice"],ans:1,exp:"Professional peer networks provide their most direct value in exactly this scenario — rapid, informal information sharing during urgent situations. A peer asking a technical question about mutual aid protocols at 6pm is a legitimate professional interaction that a strong professional network enables. Rigid availability limits or commercializing peer assistance undermines the network's operational value. This is why professional relationship-building is a documented AEM competency.",diff:"intermediate",ctry:"core"},
{id:158,d:8,sub:"8.I",q:"An experienced EM coordinator develops an innovative approach to multi-agency EOC coordination that significantly improved response efficiency in her jurisdiction. The MOST impactful way to contribute this to the profession is:",opts:["Document it internally and apply it in her own jurisdiction only","Write it up as a case study or article for the Journal of Emergency Management, present it at an IAEM conference, and share the methodology with peer coordinators through her professional network","Tell colleagues about it informally","Submit it to her supervisor for inclusion in the annual report"],ans:1,exp:"Subject matter service to the profession means making knowledge available to the broader EM community — not just using it internally. Publishing in a professional journal, presenting at conferences, and actively sharing through peer networks creates the widest professional impact. Internal documentation is important for the organization; professional contribution requires dissemination beyond the organization.",diff:"intermediate",ctry:"core"},
// ADVANCED INTEGRATION - Multi-domain scenarios
{id:159,d:2,sub:"2.K",q:"An EM office has the following exercise history: a tabletop in 2021, a functional exercise in 2022, and now plans a full-scale exercise in 2023. After the full-scale exercise, the AAR identifies 15 improvement items. What should happen to these items in relation to the NEXT exercise cycle?",opts:["The next exercise should test completely new capabilities unrelated to the improvement items","The next exercise cycle should be designed to specifically test whether the improvement items from the full-scale exercise have been corrected — exercises validate improvements, not just identify them","The improvement items are complete once the AAR is filed","A new THIRA should be completed before planning the next exercise"],ans:1,exp:"The exercise-AAR-improvement-re-test cycle is the core of the HSEEP model. Improvement items from one exercise should be incorporated into the design of subsequent exercises to verify that corrections were effective. An exercise program that identifies problems but never tests whether they're fixed has no closed loop. The improvement validation function of exercises is as important as the gap identification function.",diff:"advanced",ctry:"core"},
{id:160,d:4,sub:"4.Q",q:"An EM coordinator is assigned as EOC Director during a complex multi-agency incident. After 18 hours, she realizes the incident has grown beyond what she has personally managed before. She is unsure about the protocol for requesting provincial assistance. What is the MOST professional response?",opts:["Conceal the uncertainty and make her best guess","Transfer EOC Director responsibility to someone else immediately","Acknowledge the uncertainty to the Deputy EOC Director, immediately consult the EOP and provincial assistance protocols, and contact the provincial EM office directly to clarify the process — transparent knowledge-seeking under pressure is professional, not a weakness","Request a recess in EOC operations until the protocol can be researched"],ans:2,exp:"Competent professionals acknowledge knowledge gaps and seek authoritative information rather than guessing on matters with serious consequences. The IAEM Code of Ethics (Awareness principle) explicitly requires EM professionals to 'recognize and acknowledge personal capabilities and limitations.' Consulting the EOP, seeking guidance from the provincial EM office, and involving the Deputy Director are all appropriate and professional responses. Concealing uncertainty leads to errors.",diff:"advanced",ctry:"Canada"},
{id:161,d:7,sub:"7.O",q:"During a disaster recovery operation, an EM coordinator's supervisor instructs her to sign a grant report certifying that all 500 required training hours were delivered, when actual records show only 340 hours were completed. The supervisor says 'Just sign it — everyone does this with grant reporting.' What must the EM coordinator do?",opts:["Sign the report — supervisor instructions must be followed","Sign the report but note her objection privately","Refuse to sign the false certification, document the instruction received, and report it to the appropriate authority (internal audit, grant oversight body, or legal counsel)","Resign from the position"],ans:2,exp:"Signing a false grant certification is fraud — a violation of Integrity and Personal Responsibility in the IAEM Code of Ethics, and potentially a criminal offense. The fact that a supervisor instructed it does not make it acceptable or legal. The Code requires refusing to participate in unethical conduct and reporting violations. 'Everyone does this' is not a defense in an audit. The EM coordinator must refuse, document the pressure, and report through appropriate channels.",diff:"advanced",ctry:"core"},
{id:162,d:1,sub:"1.E",q:"A risk assessment places a pandemic influenza scenario in the 'high probability, high consequence' quadrant. An EM coordinator argues this drives the need for a specific pandemic annex to the EOP. A skeptical council member says 'We just went through COVID — we don't need to plan for another pandemic for decades.' The MOST accurate response is:",opts:["The council member is correct — COVID-19 significantly reduced pandemic probability for the foreseeable future","Risk assessment determines planning priorities, not event recency. The high-probability/high-consequence classification means pandemic planning should be maintained and updated — COVID-19 experience actually provides richer data to inform the annex.","The annex can be simplified since COVID showed people know how to handle pandemics","Reduce pandemic priority in the risk matrix to reflect post-COVID 'immunity' in the population"],ans:1,exp:"Risk matrix classifications are based on hazard characteristics, not event recency or political fatigue. The pandemic probability hasn't decreased because COVID-19 occurred — if anything, post-COVID data has improved our understanding of what a real pandemic plan must address. The council member's reasoning reflects 'it just happened so it won't happen again' bias — a documented cognitive error in risk assessment. The correct position is evidence-based, not recency-biased.",diff:"advanced",ctry:"core"},
{id:163,d:5,sub:"5.F",q:"A municipality holds 4 community recovery meetings after a major flood. Meeting 1 attracts 240 attendees who are primarily property owners with significant losses. Meeting 4 attracts 12 attendees and the EM coordinator proposes cancelling future meetings due to 'low attendance.' What does the attendance data MOST likely indicate?",opts:["Community interest in recovery planning has declined and meetings should end","The meeting format is not reaching the residents who most need recovery support — renters, non-English speakers, and those who have already been displaced to distant locations may not be attending","The recovery is complete and no further engagement is needed","Attendance of 12 is statistically representative and sufficient"],ans:1,exp:"Declining attendance at traditional meetings typically indicates the format is failing to reach the most marginalized and most affected residents — not that community interest has declined. Displaced residents, renters, and non-English speakers face the greatest barriers to traditional meeting attendance. The solution is adaptive engagement: mobile outreach, partnerships with community organizations, multilingual formats, and going to where displaced residents are now located.",diff:"advanced",ctry:"core"},
{id:164,d:3,sub:"3.C",q:"A provincial government offers cost-sharing for local mitigation projects at 60% provincial / 40% local. A municipality cannot afford the 40% local share for an $800,000 flood mapping project. What options should the EM coordinator explore?",opts:["Decline the grant — if they can't afford the match they shouldn't apply","Apply for the grant anyway and figure out the match later","Explore stacking funding sources: federal mitigation grants (NDMP), infrastructure grants, reserve funds, or a multi-year budget commitment to assemble the local share from multiple sources","Request the province to change the cost-sharing formula"],ans:2,exp:"Grant matching requirements are common; the solution is often funding stacking — combining multiple grant sources, local budget allocations, and reserve funds to assemble the required match. The EM coordinator should explore: NDMP federal contribution + provincial grant + local budget phased over 2 years. Many jurisdictions successfully fund mitigation projects through multi-source stacking. Declining eligible grants because the match seems difficult abandons risk reduction funding.",diff:"advanced",ctry:"Canada"},
{id:165,d:2,sub:"2.P",q:"An EM coordinator has maintained strong relationships with the municipal fire department, public works, and hospital for 7 years. A new large distribution center opens in the jurisdiction employing 1,200 people and handling large quantities of lithium batteries. What stakeholder action is REQUIRED?",opts:["No action — private sector facilities manage their own emergencies","Add the distribution center to the stakeholder register, initiate a relationship with their safety manager, assess the lithium battery storage as a potential CI/hazard, and explore whether a hazmat annex update or MOU is warranted","Wait until the distribution center requests EM assistance","Conduct an annual survey of all industrial facilities in the jurisdiction"],ans:1,exp:"A new facility storing large quantities of lithium batteries (a fire and hazmat hazard) represents both a new stakeholder and a potential new CI/hazard. The Whole Community approach requires proactive engagement with the private sector. The EM coordinator should initiate a relationship with their safety manager, assess the hazard profile, update CI listings if warranted, and consider whether the hazmat annex needs updating. Waiting for them to come to you is reactive, not proactive.",diff:"intermediate",ctry:"core"},
{id:166,d:6,sub:"6.D",q:"Six months after delivering initial training on a new EOC management platform, the EM coordinator conducts a skills assessment and finds that staff retention rates are: Section Chiefs 78%, General Staff 54%, Administrative Staff 31%. What does this pattern indicate and what should the response be?",opts:["The overall average (54%) is acceptable and no action is needed","The pattern shows skill decay inversely proportional to how frequently the role uses the system. Administrative staff likely use the system least and have the worst retention. Role-specific refresher training targeting the lowest-retention groups, combined with regular practice opportunities, is required.","All staff should repeat the full initial training program","The platform is too complex and should be replaced"],ans:1,exp:"The retention pattern (highest retention in roles with most frequent use) is consistent with the use-it-or-lose-it principle of skill retention. The solution is role-targeted refreshers for administrative staff (lowest retention) and incorporating regular practice into exercises for all groups. Repeating full initial training is inefficient when role-specific refreshers and practice integration are more effective and efficient interventions.",diff:"advanced",ctry:"core"},
{id:167,d:4,sub:"4.C",q:"During a major flood response, the IC requests that the EOC coordinate a $2.1M emergency purchase of temporary pumping equipment from a vendor not on the pre-qualified vendor list. The EM coordinator knows the procurement rules require competitive bids for purchases over $75,000. What is the CORRECT action?",opts:["Approve the purchase — life safety justifies bypassing procurement rules","Apply the emergency procurement provisions available in most jurisdictions that allow expedited sole-source procurement when documented as an emergency necessity, while ensuring the decision is documented with rationale for post-event audit review","Refuse the purchase until a competitive process can be completed","Make the purchase but do not document it to avoid audit scrutiny"],ans:1,exp:"Most jurisdictions have emergency procurement provisions specifically for this scenario. The correct action applies these provisions: sole-source procurement is permitted when competitive process is not possible given time constraints, documented as emergency necessity. The critical difference is DOCUMENTATION — the emergency rationale must be recorded to justify the exception in post-event audit. Never conceal procurement decisions; document them thoroughly with rationale.",diff:"advanced",ctry:"core"},
{id:168,d:8,sub:"8.B",q:"An EM coordinator is invited to present to a legislative committee about the jurisdiction's emergency management program. During the Q&A, a legislator asks a question for which the EM coordinator doesn't know the accurate answer. What is the MOST appropriate response?",opts:["Provide a best-guess answer to avoid appearing uninformed","Say 'I don't have that specific data with me today. I will research the accurate answer and provide it in writing within 5 business days.'","Deflect the question by redirecting to a topic you do know well","Acknowledge uncertainty but provide a rough estimate"],ans:1,exp:"Accuracy and integrity are non-negotiable when providing information to legislators. Providing inaccurate information to a legislative committee — even well-intentioned guesses — can have serious policy consequences and damages professional credibility when the error is discovered. 'I'll research and follow up in writing' is the professional, ethical, and practically safest response. Legislators respect accuracy over false confidence.",diff:"intermediate",ctry:"core"},
{id:169,d:5,sub:"5.A",q:"A community that suffered a major tornado 8 months ago has a Long-Term Recovery Group meeting monthly. Attendance has declined from 32 organizations at month 1 to 11 organizations at month 8. The EM coordinator should interpret this as:",opts:["A sign the LTRG is no longer needed and should be dissolved","Likely normal evolution — organizations whose specific services are no longer needed drop off as recovery progresses, while those addressing ongoing needs remain. Review remaining unmet needs against the attending organizations to confirm the LTRG composition is appropriate for the current recovery phase.","A failure of the LTRG coordination function","Evidence that recovery is complete"],ans:1,exp:"LTRG attendance naturally evolves as recovery progresses — organizations addressing acute needs (emergency shelter, food) step back as those needs are met, while organizations addressing long-term needs (housing, economic recovery, mental health) remain. Declining attendance is not inherently problematic. The EM coordinator should verify that organizations addressing remaining unmet needs are still present and that the drop-off reflects completed needs, not abandonment of remaining survivors.",diff:"advanced",ctry:"core"},
{id:170,d:7,sub:"7.G",q:"An EM team has operated together for 2 years without any structured reflection or team building. The EM coordinator notices that two section chiefs have developed a pattern of circumventing each other rather than collaborating, and staff are reluctant to share concerns in team meetings. What does this indicate and what should be done?",opts:["Normal team dynamics — EM is a stressful profession and some tension is unavoidable","The team has developed an absence of psychological safety that is affecting operational effectiveness. Structured team reflection, explicit team norms, and possibly facilitated conflict resolution for the section chiefs are needed.","Performance management action should be taken against the section chiefs immediately","The team should be reorganized to separate the conflicting section chiefs"],ans:1,exp:"The described behaviors — circumvention between peers, reluctance to share concerns openly — are classic indicators of absent psychological safety. In EM contexts, this has operational consequences: staff don't report problems until they escalate, coordination fails between sections, and innovation is suppressed. The intervention requires both systemic (team norms, structured reflection) and specific (facilitated resolution between the section chiefs) approaches.",diff:"advanced",ctry:"core"},
// MORE DOMAIN 2 HARD SCENARIOS
{id:171,d:2,sub:"2.J",q:"A coastal municipality is developing a new tsunami evacuation annex. The planning team consists of: EM coordinator, fire chief, police chief, public works director, and hospital administrator. A community member observes that no one from the waterfront fishing community — the highest-risk population — is at the table. What does this require?",opts:["The planning team is appropriately constituted with professional expertise","Immediately expand the planning team to include representatives from the waterfront fishing community and other high-risk residential groups. CPG 101 requires that those who will execute and experience the plan participate in its development.","Conduct a separate consultation process after the plan is drafted","Send a draft plan to fishing community representatives for comment before adoption"],ans:1,exp:"CPG 101's collaborative planning team principle requires including those who will execute AND experience the plan. The fishing community is the highest-risk population for this specific hazard — their knowledge of waterfront geography, local practices, communication networks, and specific vulnerabilities is essential to a realistic tsunami evacuation plan. Post-draft 'consultation' is inadequate; participation in the planning process is required.",diff:"advanced",ctry:"core"},
