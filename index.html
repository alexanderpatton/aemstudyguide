{id:258,d:5,sub:"5.H",q:"A Rapid Damage Assessment (RDA) is PRIMARILY conducted by:",opts:["Federal officials who are mobilized after a presidential declaration","Local emergency management and first responders in the first 24-72 hours after an incident","Insurance adjusters contracted by the state","National Guard units under state activation"],ans:1,exp:"RDA is a local function conducted by local EM and first responders in the immediate post-incident period (24-72 hours). It serves life-safety purposes — identifying the scale of the disaster and priority response needs. The PDA (Preliminary Damage Assessment) comes later and involves multi-government teams to support a declaration request.",diff:"intermediate",ctry:"core"},
{id:259,d:5,sub:"5.I",q:"An Improvement Plan item from a real incident AAR remains unaddressed 12 months after the incident. What is the MOST appropriate action?",opts:["Close the item and document it as 'unable to complete'","Escalate to senior leadership with a revised timeline and specific consequence for continued non-completion, while implementing interim measures if the gap creates ongoing risk","Reopen it in the next exercise design as something to test","Extend the deadline by another 12 months"],ans:1,exp:"Stale Improvement Plan items require escalation — not closure, extension, or transfer to exercise planning. The escalation should include: a revised timeline, assignment to a senior accountable leader, specific consequences for continued non-completion, and interim risk mitigation if the unaddressed gap creates ongoing operational vulnerability.",diff:"intermediate",ctry:"core"},
{id:260,d:5,sub:"5.J",q:"A Disaster Recovery Center (DRC) is MOST effective when:",opts:["Located in the EOC building for convenience","Located in the affected community with extended hours, multilingual services, and multiple agencies co-located for one-stop assistance","Operated exclusively by government agencies without NGO participation","Open only during business hours to maintain cost efficiency"],ans:1,exp:"DRC effectiveness is maximized when: physically located in or near the affected community (reducing transportation barriers), provides extended/weekend hours (reducing time barriers), offers multilingual services (reducing language barriers), and co-locates multiple agencies (reducing complexity for survivors). DRCs that are inconvenient or inaccessible fail their most vulnerable users.",diff:"intermediate",ctry:"core"},
// DOMAIN 6 - Technologies
{id:261,d:6,sub:"6.A",q:"Under Canada's National Public Alerting System (NPAS), which organization is responsible for issuing official emergency alerts to the public?",opts:["The federal government through Public Safety Canada","Authorized alerting authorities (provincial/territorial EM offices, police, Environment Canada) using the CAP-CP standard","Individual municipalities","Telecommunications providers"],ans:1,exp:"Under NPAS, alerts are issued by authorized alerting authorities — provincial and territorial emergency management offices, police services, Environment Canada (for weather), and other designated authorities — using the CAP-CP standard. The federal government does not issue all alerts; authority is distributed among recognized alerting organizations.",diff:"intermediate",ctry:"Canada"},
{id:262,d:6,sub:"6.E",q:"The CISA Cyber Essentials Starter Kit recommends which of the following as the FIRST step for a government organization beginning to improve its cybersecurity posture?",opts:["Purchase advanced threat detection software","Implement Multi-Factor Authentication (MFA) on all accounts","Hire a dedicated cybersecurity staff member","Conduct an annual penetration test"],ans:1,exp:"CISA's Cyber Essentials identifies MFA as the foundational first step — it is the single highest-impact, lowest-cost cybersecurity measure available to government organizations. MFA prevents the majority of account compromise attacks. Advanced software, dedicated staff, and penetration testing are important but are built on the MFA foundation.",diff:"beginner",ctry:"core"},
{id:263,d:6,sub:"6.B",q:"IS-922.A (Applications of GIS for Emergency Management) identifies which GIS function as MOST valuable during active incident response?",opts:["Long-term land use planning","Real-time mapping of incident boundaries, resource locations, and affected populations to support situational awareness and resource deployment decisions","Historical analysis of past disaster impacts","Building permit tracking"],ans:1,exp:"IS-922 identifies real-time situational mapping as the highest-value GIS function during active incident response — displaying incident boundaries, resource locations, damage assessment data, and population exposure in real time to support decision-making. Long-term planning and historical analysis are important GIS functions but are not the primary value during active response.",diff:"intermediate",ctry:"core"},
{id:264,d:6,sub:"6.C",q:"When implementing a new emergency notification system, what does 'User Acceptance Testing' (UAT) specifically verify?",opts:["That the system's code meets technical specifications","That end users can successfully perform their real-world tasks using the system before it goes live","That the system meets the vendor's stated performance benchmarks","That the system is approved by the purchasing authority"],ans:1,exp:"UAT verifies that end users can successfully perform their actual work tasks using the system — it tests the user experience, not just technical specifications. Vendor benchmarks are validated in technical testing (earlier in implementation). UAT is the final validation gate before go-live, catching workflow and usability issues that technical testing misses.",diff:"intermediate",ctry:"core"},
{id:265,d:6,sub:"6.D",q:"Research on technology training retention in emergency management contexts shows that proficiency is BEST maintained through:",opts:["A single comprehensive training event at system deployment","Certification testing that must be passed before system access is granted","Regular practice through integration into exercises, with role-specific refresher training","Annual training recertification regardless of use frequency"],ans:2,exp:"Training retention research consistently shows that proficiency is maintained through regular practice in context — integrating the system into exercises creates realistic practice opportunities that reinforce skills. Annual recertification without interim practice produces the same use-it-or-lose-it degradation that single-event training creates. Frequency and context of practice matter more than formal recertification cycles.",diff:"intermediate",ctry:"core"},
// DOMAIN 7 - Administration
{id:266,d:7,sub:"7.O",q:"The IAEM Code of Ethics principle of 'Commitment' requires emergency managers to:",opts:["Commit to completing all assigned tasks regardless of ethical concerns","Be dedicated to public safety and the public good, prioritizing community welfare in all professional decisions","Commit to a specific number of professional development hours per year","Follow all supervisor instructions without question"],ans:1,exp:"The Commitment principle in the IAEM Code of Ethics requires dedication to public safety and the public good — placing community welfare above personal interests, organizational pressures, and political considerations. It does not mean uncritically following instructions or accepting all assigned tasks regardless of their ethical implications.",diff:"intermediate",ctry:"core"},
{id:267,d:7,sub:"7.D",q:"Grant records must typically be retained for how many years under US federal grant requirements?",opts:["3 years","5 years","7 years","10 years"],ans:0,exp:"US federal grant requirements (2 CFR Part 200) generally require grant records to be retained for 3 years from the date of final expenditure report submission. Some records (property records, equipment) have longer retention periods. Canadian federal grant programs have similar requirements that vary by program — typically 6-7 years.",diff:"advanced",ctry:"core"},
{id:268,d:7,sub:"7.Q",q:"ISO 22301, referenced as an international standard for Business Continuity Management Systems, is most closely aligned with which Canadian standard?",opts:["NFPA 1600","CSA Z1600","CSA Z462","NIMS"],ans:1,exp:"CSA Z1600 (Emergency and Continuity Management Program) is Canada's standard that aligns most closely with ISO 22301 (Business Continuity Management Systems). Both provide frameworks for building comprehensive continuity programs. NFPA 1600 is the equivalent US standard. All three are aligned in their core requirements.",diff:"intermediate",ctry:"Canada"},
{id:269,d:7,sub:"7.A",q:"An EM office's Individual Development Plan (IDP) for each staff member should include:",opts:["Only training required for current role","Training goals, career milestones, skill development targets, and timeline — linked to both individual aspirations and organizational capability needs","Only certifications required by provincial legislation","Annual performance ratings only"],ans:1,exp:"An effective IDP is forward-looking and links individual professional goals with organizational needs. It includes: training goals (short and long-term), career milestones, specific skill development targets, and realistic timelines. IDPs that only address current role requirements fail to develop future organizational capability.",diff:"beginner",ctry:"core"},
{id:270,d:7,sub:"7.C",q:"In public sector financial management, 'encumbrances' are:",opts:["Funds transferred from one budget line to another","Funds reserved for a known future expense through a signed purchase order or contract commitment","Unspent funds at the end of the fiscal year","Emergency reserve funds held for disaster response"],ans:1,exp:"Encumbrances are funds reserved for known future expenses through signed commitments (purchase orders, contracts) where the expense has not yet been paid. Encumbrances must be tracked against the budget as if already spent to prevent over-commitment. Failure to track encumbrances is a common source of budget overruns.",diff:"intermediate",ctry:"core"},
{id:271,d:7,sub:"7.E",q:"The most effective budget advocacy framing for an EM program investment, according to professional practice, is:",opts:["Citing legislative requirements that mandate the investment","Comparing the investment cost to potential avoided losses (cost-avoidance framing)","Describing the activities that will be performed with the funds","Referencing what similar jurisdictions invest per capita"],ans:1,exp:"Cost-avoidance framing — comparing investment cost to potential avoided losses — is the most effective advocacy approach with budget-focused decision-makers. It speaks in financial terms they use daily. Legislative requirements create adversarial framing; activity descriptions are abstract; peer comparisons are relevant but less compelling than direct ROI.",diff:"intermediate",ctry:"core"},
{id:272,d:7,sub:"7.F",q:"The difference between a Policy and a Standard Operating Procedure (SOP) in program documentation is:",opts:["Policies are longer and more detailed than SOPs","A Policy states the 'what and why' (intent and direction); an SOP specifies the 'how' (step-by-step execution)","SOPs are signed by elected officials; policies are signed by the EM director","Policies are external documents; SOPs are internal"],ans:1,exp:"Policy = strategic direction, 'what we will do and why' — signed by organizational leadership, relatively brief. SOP = operational instruction, 'exactly how we will do it, in what sequence, by whom' — detailed step-by-step procedures. Both are needed: the policy authorizes and directs; the SOP operationalizes. Confusing the two levels leads to either over-detailed policies or under-specified procedures.",diff:"intermediate",ctry:"core"},
{id:273,d:7,sub:"7.H",q:"Under the Transportation of Dangerous Goods Act in Canada, an Emergency Response Assistance Plan (ERAP) is required for:",opts:["All shipments of any dangerous good by any mode","Shipments of specific high-hazard dangerous goods that require specialized emergency response capability beyond standard first responder resources","All road shipments of liquids","Any dangerous goods shipment crossing a provincial border"],ans:1,exp:"ERAPs are required for specific high-hazard dangerous goods under the TDG Act — those where the emergency response requires specialized capability (beyond standard fire/EMS), such as certain toxics, explosives, radioactive materials. The ERAP must be pre-approved by Transport Canada and provides emergency responders with expert guidance and specialized resources.",diff:"advanced",ctry:"Canada"},
{id:274,d:7,sub:"7.I",q:"For a presentation to elected officials about emergency preparedness funding, the MOST effective structural approach is:",opts:["Chronological — build to the conclusion at the end","Problem-Solution — describe the problem in detail before offering solutions","Bottom-Line Up Front (BLUF) — lead with the recommendation, then provide supporting evidence","Narrative — tell a story about a past disaster to build emotional investment"],ans:2,exp:"Bottom-Line Up Front (BLUF) is the recommended structure for executive and elected official presentations. Elected officials are time-constrained and need the 'so what' immediately. Leading with the recommendation (what you need and why) and following with supporting evidence matches how decision-makers process information. Chronological and narrative approaches bury the key message.",diff:"intermediate",ctry:"core"},
{id:275,d:7,sub:"7.J",q:"During a crisis media briefing, a journalist asks a question that is outside the EM coordinator's area of expertise. The MOST professional response is:",opts:["Provide a best-guess answer to avoid appearing uninformed","Say 'That's a good question' and redirect to a topic you know well","Acknowledge the question falls outside your expertise, commit to obtaining accurate information and following up, and direct the journalist to the appropriate expert","Decline to answer any further questions"],ans:2,exp:"Acknowledging the limits of your expertise and committing to follow up is the most professional and credible response. Guessing risks providing false information that damages credibility when corrected. Deflecting with flattery ('good question') is transparently evasive. Cutting off questions damages the media relationship. Transparency about knowledge limits actually builds credibility.",diff:"intermediate",ctry:"core"},
{id:276,d:7,sub:"7.K",q:"A briefing note prepared for a provincial minister following a major flood should be approximately how long, according to government writing standards?",opts:["10-15 pages covering all details","5-7 pages with full technical appendices","1-3 pages with a clear recommendation, supported by key facts","30+ pages documenting all response activities"],ans:2,exp:"Government briefing notes for ministers are typically 1-3 pages — structured for quick reading by time-constrained officials. They follow BLUF structure: issue (1-2 sentences), background (key facts only), analysis (brief), recommendation (clear and specific). Technical appendices may be attached but the main note must be scannable in 2-3 minutes.",diff:"intermediate",ctry:"Canada"},
{id:277,d:7,sub:"7.M",q:"Under COOP planning standards, vital records that must be accessible during alternate facility operations include:",opts:["The organization's entire document archive","Only financial records","Documents essential to resuming critical functions: emergency plans, legal authorities, personnel records, system access credentials, and key contracts","Only documents less than 5 years old"],ans:2,exp:"Vital records are the specific documents essential to resuming PMEFs during COOP activation: emergency plans and procedures, legal authorities and delegations, personnel contact information, IT system access credentials, key contracts and agreements, and financial account information. Not the entire archive — only what is needed to resume critical functions.",diff:"intermediate",ctry:"core"},
{id:278,d:7,sub:"7.N",q:"NIMS resource typing uses a 4-level scale where Type 1 resources are:",opts:["The minimum acceptable capability for mutual aid deployment","The most capable resources with the largest capacity and highest specifications","Entry-level resources suitable for training exercises only","Resources that require federal authorization to deploy"],ans:1,exp:"In NIMS resource typing, Type 1 = most capable (largest capacity, highest specifications, most experienced personnel). Type 4 = least capable (minimum standards). This standardized scale enables precise mutual aid requests — 'Send a Type 1 Urban Search and Rescue team' communicates exact capability requirements without ambiguity.",diff:"beginner",ctry:"core"},
{id:279,d:7,sub:"7.P",q:"A pre-qualified vendor list for emergency debris removal should include which critical requirement to ensure performance during actual disasters?",opts:["Vendor must have offices within the jurisdiction","Vendor must guarantee the lowest per-unit price","Contract must include disaster-activation provisions with callout response times, resource availability commitments, and penalties for non-performance","Vendor must be family-owned and operated"],ans:2,exp:"Pre-qualified vendor contracts for emergency services must include disaster-activation provisions that go beyond normal service terms: specific callout response times (e.g., 4-hour mobilization), resource availability commitments during widespread regional disasters, and enforceable penalties for non-performance. A contract without these provisions fails to address the specific operational requirements of disaster activation.",diff:"advanced",ctry:"core"},
{id:280,d:7,sub:"7.G",q:"Research on high-performing emergency management teams consistently identifies which characteristic as MOST predictive of effective performance under pressure?",opts:["High individual technical expertise of team members","Psychological safety — the shared belief that the team is safe for interpersonal risk-taking","Strict hierarchical authority with clear chain of command","Long tenure together as a team"],ans:1,exp:"Google's Project Aristotle (2012) and subsequent EM-specific research consistently identify psychological safety — the belief that team members can speak up, raise concerns, and report errors without punishment — as the top predictor of team performance. Technical expertise, hierarchy, and tenure all matter, but psychological safety enables the information sharing and learning that high performance requires.",diff:"advanced",ctry:"core"},
// DOMAIN 8 - Professional Development
{id:281,d:8,sub:"8.A",q:"To apply for the AEM certification, which of the following is a mandatory requirement?",opts:["Completion of a university degree in emergency management","Active IAEM membership at the time of application","A minimum of 5 years of full-time EM experience","Completion of all FEMA IS courses listed in the exam blueprint"],ans:1,exp:"Active IAEM membership is a mandatory requirement for AEM certification — not a university degree (a combination of education and experience can substitute), not 5 years of experience (AEM has lower experience requirements than CEM), and not completion of all FEMA courses (though many are strongly recommended). IAEM membership is non-negotiable.",diff:"beginner",ctry:"core"},
{id:282,d:8,sub:"8.H",q:"Which of the following activities does NOT qualify as professional development for AEM/CEM recertification purposes?",opts:["Attending an EM conference and completing three workshops","Completing five FEMA IS online courses","Managing a major incident response as Incident Commander","Completing a university course in public administration"],ans:2,exp:"Managing an incident response is professional experience (contributing to the experience requirement) but is NOT professional development. Professional development requires deliberate learning activities: courses, conferences, academic study, research, publishing, or other activities where the primary purpose is skill or knowledge acquisition.",diff:"intermediate",ctry:"core"},
{id:283,d:8,sub:"8.I",q:"To qualify as 'subject matter service to the profession' for CEM recertification, an activity must:",opts:["Be completed during working hours","Contribute expertise back to the emergency management profession through teaching, writing, research, mentoring, or professional service — not just performing job duties","Be formally endorsed by IAEM headquarters","Generate revenue for the professional's employer"],ans:1,exp:"Subject matter service means giving expertise back to the profession: publishing articles, teaching courses, mentoring early-career professionals, serving on professional committees, or facilitating exercises for peer professionals. Performing job duties — even highly skilled ones — does not qualify. The contribution must extend beyond the individual's own organization.",diff:"intermediate",ctry:"core"},
{id:284,d:8,sub:"8.B",q:"Building proactive legislative relationships before emergencies occur primarily benefits EM programs by:",opts:["Satisfying a compliance requirement under the Emergency Management Act","Enabling faster disaster declarations, more informed resource decisions, and legislators who actively advocate for EM programs when needed","Generating positive media coverage for the EM program","Fulfilling the IAEM Code of Ethics community engagement requirement"],ans:1,exp:"Pre-established legislative relationships produce concrete operational benefits: legislators who understand EM can process declarations faster, make better-informed resource decisions, and become active advocates for EM funding. The relationship investment before disasters pays dividends during them.",diff:"intermediate",ctry:"core"},
{id:285,d:8,sub:"8.C",q:"According to professional EM practice, stakeholder relationship management should occur:",opts:["Only during active incident response when coordination is needed","Primarily in the preparedness phase through planning committees and exercises","Continuously — before, during, and after emergencies — as an ongoing relationship investment","Only when grant funding requires documented stakeholder engagement"],ans:2,exp:"Effective stakeholder relationship management is continuous — not event-triggered. Pre-event relationships determine coordination quality during incidents. Post-event relationships maintain community trust and enable learning. Relationships that exist only during incidents are transactional, not collaborative, and fail when speed and trust matter most.",diff:"beginner",ctry:"core"},
{id:286,d:8,sub:"8.D",q:"The operational value of a strong professional peer network in EM is BEST demonstrated by:",opts:["Access to conference discounts and professional publications","The ability to make direct calls to peers for rapid information sharing during incidents — faster than formal channels","Eligibility for peer review processes in professional publications","Access to job postings in the EM field"],ans:1,exp:"The most direct operational value of professional networks is the ability to make direct, informal peer calls during incidents for rapid information sharing. These calls bypass formal mutual aid request processes — providing advance notice, expert input, or resource information in minutes versus hours. This is why networking is a documented professional competency, not just a career benefit.",diff:"intermediate",ctry:"core"},
{id:287,d:8,sub:"8.E",q:"Participation in developing or updating a standard such as CSA Z1600 qualifies for which AEM/CEM recertification category?",opts:["Professional development only","Subject matter service to the profession only","Both professional development AND subject matter service — IAEM permits crediting in both categories","Neither — standards work is a volunteer activity that does not qualify"],ans:2,exp:"IAEM permits crediting standards development participation in both categories: as professional development (learning from peer expertise and current research) and as subject matter service (contributing expertise to advance the profession). Standards development is one of the most recognized forms of professional contribution in the EM community.",diff:"intermediate",ctry:"Canada"},
{id:288,d:8,sub:"8.F",q:"A community of practice in emergency management is BEST described as:",opts:["A formal committee established by government regulation","A group of EM professionals who share a professional concern or passion and learn together through regular interaction","A social club for EM professionals","A formal training program with structured curriculum"],ans:1,exp:"A community of practice is an informal but deliberate learning community — EM professionals who share common concerns, challenges, or interests and who interact regularly to share knowledge, solve problems, and improve their practice. CoPs are not formally regulated, not purely social, and not structured curriculum programs. They are characterized by voluntary participation and peer learning.",diff:"beginner",ctry:"core"},
{id:289,d:8,sub:"8.G",q:"When an EM professional represents their agency at a legislative committee hearing, what responsibility does this create?",opts:["Freedom to share personal opinions about government policy","Responsibility to accurately represent the agency's official positions, protect sensitive information, and maintain professional conduct that reflects on the organization","Freedom to commit organizational resources without consultation","No special responsibility beyond general professional conduct"],ans:1,exp:"Agency representation creates specific responsibilities: accurately representing official positions (not personal opinions), protecting sensitive or legally protected information, maintaining professional conduct that reflects on the organization's credibility, and not making commitments beyond your authority. The individual becomes the organization's face in that forum.",diff:"intermediate",ctry:"core"},
{id:290,d:8,sub:"8.H",q:"CRHNet (Canadian Risk and Hazards Network) is BEST described as:",opts:["A federal government emergency management coordinating body","A professional network connecting academics, practitioners, and policy-makers in Canadian emergency management and disaster risk reduction","A certification body offering EM credentials in Canada","A research funding agency for disaster-related studies"],ans:1,exp:"CRHNet is a professional network — not a government body, certification authority, or research funder — that connects academics, practitioners, and policy-makers working in Canadian EM and DRR. It hosts an annual symposium, supports emerging professionals through its committees, and facilitates knowledge exchange between research and practice.",diff:"intermediate",ctry:"Canada"},
// MORE CROSS-DOMAIN AND APPLIED QUESTIONS
{id:291,d:2,sub:"2.F",q:"Emergency Support Function #15 in the US National Response Framework covers:",opts:["Public Safety and Security","Public Works and Engineering","External Affairs (public information, media, and community outreach)","Volunteers and Donations Management"],ans:2,exp:"ESF #15 covers External Affairs — coordinating public information, media relations, and community outreach functions during incidents. This ESF houses the Joint Information Center (JIC) functions at the federal level. Know the key ESFs: #1 Transportation, #2 Communications, #6 Mass Care, #8 Public Health, #9 Search & Rescue, #13 Public Safety, #15 External Affairs.",diff:"intermediate",ctry:"USA"},
{id:292,d:4,sub:"4.G",q:"In ICS, a 'Strike Team' is defined as:",opts:["A specialized team used for offensive tactical operations","A set of resources of the same kind and type with common communications and a designated leader","A multi-agency rapid response team for critical incidents","A combination of mixed resources assembled for a specific task"],ans:1,exp:"A Strike Team = same-kind, same-type resources (e.g., 5 Type 1 engine companies). A Task Force = mixed resources (different kinds/types combined for a specific task). Both have common communications and a designated leader. This distinction is directly testable on the AEM exam.",diff:"intermediate",ctry:"core"},
{id:293,d:2,sub:"2.B",q:"Under IS-1300, the three phases of COOP activation are:",opts:["Alert, Response, Recovery","Initiation, Operations, Termination","Activation/Relocation (0-12 hours), Alternate Operations (up to 30 days), Reconstitution (return to primary)","Identification, Declaration, Restoration"],ans:2,exp:"IS-1300 defines three COOP phases: Phase 1 Activation/Relocation (first 12 hours — activate plan, notify staff, relocate if needed), Phase 2 Alternate Operations (up to 30 days — conduct PMEFs from alternate location), Phase 3 Reconstitution (return to primary facility and restore full operations).",diff:"intermediate",ctry:"core"},
{id:294,d:5,sub:"5.B",q:"Canada's DFAA provides federal assistance for which of the following costs?",opts:["Normal operating costs of provincial government departments","Costs of rebuilding private sector infrastructure destroyed by a disaster","Emergency response costs not covered by other programs, such as evacuation costs and restoration of essential public services","Pre-disaster mitigation projects to reduce future flood risk"],ans:2,exp:"DFAA covers: emergency response costs not covered elsewhere (evacuation, temporary shelter), costs of returning residents, repair/replacement of essential public infrastructure, and restoration of essential government services. It does NOT cover: normal operating costs, private sector losses, mitigation projects (NDMP), or costs already covered by insurance.",diff:"intermediate",ctry:"Canada"},
{id:295,d:3,sub:"3.D",q:"Canada's Emergency Management Strategy for Canada (2019) identifies which as a priority area for federal EM investment?",opts:["Military response capability","Climate change adaptation and disaster risk reduction","International peacekeeping","Federal employee training only"],ans:1,exp:"Canada's Emergency Management Strategy (2019) explicitly identifies climate change adaptation and disaster risk reduction as a priority investment area, reflecting the growing recognition that climate change is fundamentally altering the Canadian hazard landscape. The strategy aligns with the Sendai Framework priorities.",diff:"intermediate",ctry:"Canada"},
{id:296,d:6,sub:"6.A",q:"The Alert Ready system in Canada is the national wireless emergency alerting system that uses which technology to reach mobile phones without prior registration?",opts:["SMS text messaging to registered contacts","Cell Broadcast technology — sending alerts to all compatible devices in a geographic area simultaneously","Email distribution to registered users","Automated telephone calls to landlines"],ans:1,exp:"Alert Ready uses Cell Broadcast technology — the same as US WEA — which sends messages to ALL compatible mobile devices in a specific geographic area simultaneously, without requiring prior registration. This is distinct from opt-in SMS systems. Alert Ready activations appear as distinctive audio/vibration alerts on compatible devices.",diff:"intermediate",ctry:"Canada"},
{id:297,d:7,sub:"7.H",q:"Alberta's Emergency Management Act requires municipalities to develop and maintain emergency management programs including:",opts:["Only an EOP — no other requirements","Emergency plans, a committee of council, and designation of a Director of Emergency Management","Military readiness plans","Regional coordination agreements with all neighboring municipalities"],ans:1,exp:"Alberta's Emergency Management Act (and similar provincial legislation) requires municipalities to: develop and maintain emergency plans, establish an emergency management committee of council, and designate a Director of Emergency Management. These are minimum statutory requirements; effective programs go beyond these minimums.",diff:"intermediate",ctry:"Canada"},
{id:298,d:1,sub:"1.E",q:"The Public Safety Canada Risk Management Guide for Critical Infrastructure Sectors recommends a risk assessment process that includes which four steps?",opts:["Identify, Analyze, Evaluate, Treat","Plan, Do, Check, Act","Prevent, Protect, Mitigate, Respond","Assess, Categorize, Prioritize, Report"],ans:0,exp:"The Public Safety Canada Risk Management Guide for CI Sectors follows the internationally recognized four-step risk management process: Identify risks → Analyze risks (probability and consequence) → Evaluate and prioritize risks → Treat risks (mitigate, transfer, accept). This framework is aligned with ISO 31000 and CSA Z1600.",diff:"advanced",ctry:"Canada"},
{id:299,d:2,sub:"2.C",q:"The Federal Emergency Response Plan (FERP) in Canada is BEST described as:",opts:["Canada's equivalent of a local EOP for the federal government","The federal plan that coordinates how the federal government responds to emergencies — including how it supports provincial/territorial requests for federal assistance","A plan that replaces provincial emergency plans during federal declarations","A training manual for federal emergency managers"],ans:1,exp:"The FERP is Canada's federal-level emergency response plan — coordinating the response activities of federal departments and agencies, and defining how the federal government responds to and supports provincial/territorial requests for federal assistance. It operationalizes the Emergency Management Act at the federal response level.",diff:"intermediate",ctry:"Canada"},
{id:300,d:4,sub:"4.M",q:"Voluntary Organizations Active in Disaster (VOADs) coordinate their activities primarily through:",opts:["Formal government contracts that specify their roles","A national VOAD council and local/regional VOAD chapters that facilitate coordination among member organizations","UN humanitarian coordination mechanisms","Federal grants that specify required coordination activities"],ans:1,exp:"VOADs coordinate through the national VOAD council (National VOAD in the US) and local/regional VOAD chapters. This coordination mechanism is largely self-organized — VOADs are not primarily government-contracted, though they often work alongside government structures. The VOAD coordination model prevents duplication and gaps in NGO service delivery.",diff:"intermediate",ctry:"core"}
];

// TRUE / FALSE QUESTIONS (100 questions)
// ============================================================
const TF_QUESTIONS = [
// Domain 1
{id:"tf1",d:1,sub:"1.F",q:"The THIRA process should only be completed once and remains valid indefinitely until a major incident occurs.",ans:false,exp:"THIRA should be updated at minimum every 3 years, and also after significant events, major changes in hazards, or significant changes in community resources. It is not a one-time activity.",src:"CPG 201",diff:"beginner",ctry:"core"},
{id:"tf2",d:1,sub:"1.E",q:"Risk = Probability × Consequence is the standard formula used in emergency management risk assessments.",ans:true,exp:"Risk = Probability × Consequence is the standard EM risk formula. Vulnerability and exposure influence consequence, and threat relates to probability, but the core 2-factor model is foundational to EM risk assessment.",src:"IS-230.E",diff:"beginner",ctry:"core"},
{id:"tf3",d:1,sub:"1.D",q:"The Recovery Time Objective (RTO) must always be longer than the Maximum Tolerable Downtime (MTD).",ans:false,exp:"The RTO must always be SHORTER than the MTD. If the RTO exceeds the MTD, the function will experience unacceptable consequences before it is restored. Setting RTO > MTD is a fundamental BIA error.",src:"IS-1300 / FEMA BIA Guide",diff:"beginner",ctry:"core"},
{id:"tf4",d:1,sub:"1.B",q:"Critical Infrastructure classification in Canada is based on the consequences of disruption, not on whether the facility is government-owned.",ans:true,exp:"CI classification is consequence-based — not ownership-based. A privately owned data center hosting 911 systems for multiple municipalities meets the CI threshold. Public Safety Canada's Risk Management Guide for CI Sectors confirms this approach.",src:"Risk Management Guide for CI Sectors (Canada)",diff:"intermediate",ctry:"Canada"},
{id:"tf5",d:1,sub:"1.C",q:"An Improvement Plan item from an exercise is considered complete once it is documented in the After Action Report.",ans:false,exp:"An Improvement Plan item is complete only when the corrective action has been implemented and verified — not just documented. IP items must be assigned to responsible parties with deadlines and tracked to completion.",src:"IS-120.C HSEEP",diff:"beginner",ctry:"core"},
{id:"tf6",d:1,sub:"1.F",q:"In Canada, the Hazard, Risk, and Vulnerability Analysis (HRVA) serves a similar function to the US THIRA process.",ans:true,exp:"The HRVA is Canada's equivalent of the US THIRA — both processes identify hazards, assess probability and consequence, evaluate community vulnerability, and produce a risk profile that drives planning priorities.",src:"Public Safety Canada Emergency Management Planning Guide",diff:"intermediate",ctry:"Canada"},
{id:"tf7",d:1,sub:"1.D",q:"A Business Impact Analysis (BIA) should be completed AFTER the Continuity of Operations Plan (COOP) is written.",ans:false,exp:"The BIA must always be completed BEFORE writing the COOP plan. The BIA identifies critical functions and sets MTD/RTO/RPO, which are the inputs that drive all COOP planning decisions. Writing a COOP without a BIA produces a plan without a factual foundation.",src:"IS-1300",diff:"beginner",ctry:"core"},
{id:"tf8",d:1,sub:"1.A",q:"When evaluating emerging technology for emergency management use, reliability during internet and power outages should be the first evaluation criterion.",ans:true,exp:"For life-safety EM systems, reliability under adverse conditions (degraded internet, power outages) is the non-negotiable first criterion. Technology that fails during disasters — exactly when it is most needed — provides false security regardless of its normal-operations performance.",src:"IS-2200 / General EM Technology Practice",diff:"intermediate",ctry:"core"},
// Domain 2
{id:"tf9",d:2,sub:"2.K",q:"According to HSEEP, a Tabletop Exercise deploys actual personnel and equipment to simulate field operations.",ans:false,exp:"A Tabletop Exercise is a DISCUSSION-BASED exercise — participants talk through a scenario at a table. No personnel or equipment are physically deployed. Full-Scale Exercises deploy actual resources; Functional Exercises deploy EOC staff but not field resources.",src:"IS-120.C HSEEP",diff:"beginner",ctry:"core"},
{id:"tf10",d:2,sub:"2.C",q:"According to CPG 101, Emergency Operations Plans should be considered complete once they have been formally adopted by the governing authority.",ans:false,exp:"CPG 101 explicitly states that EOPs are living documents — they are never 'done.' Plans must be maintained through regular reviews, exercises, and post-incident updates. Formal adoption marks a milestone, not completion.",src:"CPG 101 v2",diff:"beginner",ctry:"core"},
{id:"tf11",d:2,sub:"2.R",q:"ICS 300 and ICS 400 are available as self-paced online courses through FEMA's Independent Study program.",ans:false,exp:"ICS 300 and ICS 400 are INSTRUCTOR-LED courses that cannot be completed as self-paced online programs. They require in-person or instructor-facilitated delivery. Only ICS 100 and ICS 200 are available as online self-paced courses.",src:"FEMA ICS Course Information",diff:"beginner",ctry:"core"},
{id:"tf12",d:2,sub:"2.E",q:"IS-2200 identifies EOC operational readiness as requiring four elements: Forms, People, Plans, and Technology.",ans:true,exp:"IS-2200 explicitly defines EOC operational readiness as requiring all four elements: Forms, People, Plans, and Technology. A gap in any one element means the EOC is not fully ready, regardless of the status of the other three.",src:"IS-2200",diff:"beginner",ctry:"core"},
{id:"tf13",d:2,sub:"2.K",q:"HSEEP requires the After Action Report/Improvement Plan to be completed within 60 days of an exercise.",ans:false,exp:"HSEEP requires the AAR/IP to be completed within 90 days of an exercise — not 60 days. This timeline is directly specified in HSEEP doctrine and is commonly tested on the AEM exam.",src:"IS-120.C HSEEP",diff:"intermediate",ctry:"core"},
{id:"tf14",d:2,sub:"2.G",q:"Under EMAC, the SENDING state retains legal and financial responsibility for its own deployed personnel.",ans:true,exp:"Under EMAC, the sending state retains legal and financial responsibility for its own personnel (workers' compensation, employment benefits, liability). The receiving state directs the work and reimburses costs. This liability structure is pre-established by EMAC and enables rapid deployment without lengthy legal negotiations.",src:"EMAC Framework",diff:"intermediate",ctry:"USA"},
{id:"tf15",d:2,sub:"2.B",q:"'Devolution' in COOP planning refers to reducing the scope of an EM program during budget cuts.",ans:false,exp:"Devolution is the pre-planned transfer of statutory authority and responsibility from primary to alternate personnel when primary staff are incapacitated. It is a COOP mechanism — not a budget or program reduction. It ensures essential functions continue when key personnel are unavailable.",src:"IS-1300",diff:"intermediate",ctry:"core"},
{id:"tf16",d:2,sub:"2.F",q:"Emergency Support Function #8 in the US National Response Framework covers Public Health and Medical Services.",ans:true,exp:"ESF #8 covers Public Health and Medical Services, led by the Department of Health and Human Services (HHS). This is one of the most commonly tested ESF facts on the AEM exam.",src:"National Response Framework",diff:"beginner",ctry:"USA"},
{id:"tf17",d:2,sub:"2.I",q:"The FEMA Whole Community approach limits emergency management planning to government agencies that have formal legal EM responsibilities.",ans:false,exp:"The Whole Community approach explicitly EXPANDS participation beyond government to include: individuals, families, NGOs, private sector, faith communities, and all levels of government. It rejects the government-only model of EM planning.",src:"A Whole Community Approach to Emergency Management (FEMA)",diff:"beginner",ctry:"core"},
{id:"tf18",d:2,sub:"2.J",q:"CPG 101 requires that the first step in developing a new EOP is forming a collaborative planning team.",ans:true,exp:"CPG 101's 6-step planning process begins with forming a collaborative planning team. A plan developed without multi-agency, multi-stakeholder collaboration lacks the accuracy, buy-in, and operational realism needed for effective execution.",src:"CPG 101 v2",diff:"beginner",ctry:"core"},
{id:"tf19",d:2,sub:"2.D",q:"The Emergency Operations Center (EOC) is responsible for commanding all field operations during an incident.",ans:false,exp:"The EOC's primary function is COORDINATION — providing strategic support, resource coordination, information management, and policy guidance. Field operations are COMMANDED at the Incident Command Post (ICP). EOC ≠ ICP is the most frequently tested concept on the AEM exam.",src:"IS-2200",diff:"beginner",ctry:"core"},
{id:"tf20",d:2,sub:"2.G",q:"EMAC has been ratified by all 50 US states, the District of Columbia, and US territories.",ans:true,exp:"EMAC (Emergency Management Assistance Compact) has been ratified by all 50 US states, the District of Columbia, Puerto Rico, the US Virgin Islands, and Guam — making it a truly national mutual aid system.",src:"EMAC Framework",diff:"intermediate",ctry:"USA"},
{id:"tf21",d:2,sub:"2.O",q:"Environment Canada's 'Tornado Watch' means a tornado is currently occurring and immediate action is required.",ans:false,exp:"A Tornado WATCH means conditions are favorable for tornado development — be prepared. A Tornado WARNING means a tornado has been sighted or indicated by radar and action is required NOW. The watch/warning distinction is fundamental to weather-triggered EM actions.",src:"Environment Canada Alert Terminology",diff:"beginner",ctry:"Canada"},
{id:"tf22",d:2,sub:"2.R",q:"ICS was originally developed in the early 1970s in response to coordination failures during California wildfires.",ans:true,exp:"ICS was developed through Operation FIRESCOPE in the early 1970s following catastrophic southern California wildfires where the primary problems were management failures: lack of common terminology, unclear command authority, inability to coordinate across agencies. ICS emerged directly from these failures.",src:"IS-100.C",diff:"beginner",ctry:"core"},
{id:"tf23",d:2,sub:"2.M",q:"A multi-jurisdictional EOP should only be developed when two jurisdictions share a single elected government.",ans:false,exp:"Multi-jurisdictional EOPs are developed when adjacent jurisdictions face common hazards and share resources — not when they share elected government. They eliminate duplication in planning, build pre-event relationships, and enable coordinated response across jurisdictional boundaries.",src:"CPG 101 v2",diff:"intermediate",ctry:"core"},
{id:"tf24",d:2,sub:"2.S",q:"Evidence-informed emergency management requires conducting original local research before implementing any program changes based on external research findings.",ans:false,exp:"Evidence-informed practice applies available evidence to local decisions — adapting findings to local context without requiring original research first. Waiting for local studies before acting on clear external evidence can leave known vulnerabilities unaddressed. The Fort McMurray wildfire AARs, for example, provide applicable lessons for all Canadian jurisdictions.",src:"Research application principles in EM",diff:"intermediate",ctry:"core"},
{id:"tf25",d:2,sub:"2.N",q:"A Gantt chart is a project management tool that shows tasks plotted against a timeline with dependencies identified.",ans:true,exp:"A Gantt chart is a bar chart showing project tasks on the vertical axis and time on the horizontal axis, with task duration bars and dependency links identified. It is the most common project scheduling tool used in EM project management.",src:"Project Management Applied to EM",diff:"beginner",ctry:"core"},
// Domain 3
{id:"tf26",d:3,sub:"3.C",q:"FEMA research shows that every $1 invested in hazard mitigation saves approximately $6 in future disaster costs.",ans:true,exp:"FEMA research (including the 2019 National Institute of Building Sciences study) found that federally funded mitigation investments save approximately $6 for every $1 invested. This 6:1 BCR is widely cited in mitigation advocacy.",src:"FEMA Mitigation Investment Research / NIBS 2019",diff:"intermediate",ctry:"core"},
{id:"tf27",d:3,sub:"3.F",q:"Local mitigation plans in the US must be updated every 5 years to maintain FEMA grant eligibility.",ans:true,exp:"The Disaster Mitigation Act of 2000 and FEMA's Local Mitigation Planning Handbook require local mitigation plans to be updated every 5 years. Jurisdictions with expired plans lose eligibility for HMGP and PDM funding.",src:"Local Mitigation Planning Handbook / Disaster Mitigation Act 2000",diff:"beginner",ctry:"core"},
{id:"tf28",d:3,sub:"3.D",q:"The Sendai Framework for Disaster Risk Reduction is a legally binding international treaty.",ans:false,exp:"The Sendai Framework is a voluntary, non-binding agreement between UN member states — not a legally binding treaty. This is a distinction tested on the AEM exam. All UN member states are signatories, but implementation is voluntary and not subject to international legal enforcement.",src:"Sendai Framework 2015-2030",diff:"intermediate",ctry:"core"},
{id:"tf29",d:3,sub:"3.D",q:"The Sendai Framework replaced the Hyogo Framework for Action when it was adopted in 2015.",ans:true,exp:"The Sendai Framework for Disaster Risk Reduction 2015-2030 was adopted at the 3rd UN World Conference on DRR in March 2015 in Sendai, Japan, replacing the Hyogo Framework for Action 2005-2015.",src:"Sendai Framework 2015-2030",diff:"beginner",ctry:"core"},
{id:"tf30",d:3,sub:"3.B",q:"Canada's DFAA (Disaster Financial Assistance Arrangements) provides federal funding for mitigation projects to prevent future disasters.",ans:false,exp:"DFAA funds disaster RESPONSE and RECOVERY costs — not mitigation. Mitigation projects are funded through Canada's National Disaster Mitigation Program (NDMP). Confusing DFAA and NDMP is a common error and a frequently tested distinction.",src:"DFAA Program / NDMP Program (Public Safety Canada)",diff:"beginner",ctry:"Canada"},
{id:"tf31",d:3,sub:"3.C",q:"A Benefit-Cost Ratio (BCR) of 0.8 indicates a cost-effective mitigation project eligible for HMGP funding.",ans:false,exp:"A BCR must exceed 1.0 to indicate a cost-effective project eligible for HMGP funding. A BCR of 0.8 means only $0.80 in benefits for every $1 invested — the costs exceed the benefits. FEMA requires a positive BCR (>1.0) for HMGP project eligibility.",src:"Local Mitigation Planning Handbook / HMGP Program",diff:"beginner",ctry:"core"},
{id:"tf32",d:3,sub:"3.A",q:"Standard BCR calculations can systematically undervalue mitigation benefits for low-income communities because they are based on property values and economic productivity.",ans:true,exp:"This equity concern is explicitly acknowledged in FEMA guidance and academic research. Standard BCR calculations based on property values and economic productivity produce lower scores in low-income areas, even when those areas face the greatest vulnerability. FEMA now encourages equity-adjusted prioritization.",src:"Local Mitigation Planning Handbook / FEMA Equity Guidance",diff:"advanced",ctry:"core"},
{id:"tf33",d:3,sub:"3.F",q:"Building codes that require earthquake-resistant construction are an example of structural mitigation.",ans:false,exp:"Building CODES are an example of NON-STRUCTURAL mitigation (regulatory/policy). STRUCTURAL mitigation is the physical construction itself — the retrofitted building. The code requirement is non-structural; building or retrofitting a structure to meet the code is structural.",src:"IS-393.B / Local Mitigation Planning Handbook",diff:"intermediate",ctry:"core"},
{id:"tf34",d:3,sub:"3.B",q:"Canada's FireSmart program is primarily a structural mitigation program that physically modifies existing homes.",ans:false,exp:"FireSmart Canada is a non-structural mitigation program — it uses community education, home assessments, and defensible space guidance. Physical modifications by homeowners may result from FireSmart assessments, but the program itself is educational and advisory (non-structural).",src:"FireSmart Canada / Natural Resources Canada",diff:"intermediate",ctry:"Canada"},
// Domain 4
{id:"tf35",d:4,sub:"4.D",q:"The Emergency Operations Center (EOC) and the Incident Command Post (ICP) perform the same function but are located in different buildings.",ans:false,exp:"The EOC and ICP perform DIFFERENT functions — not the same function in different locations. EOC = COORDINATION (strategic support, resources, policy guidance). ICP = COMMAND (tactical, on-scene operations). These are fundamentally different roles in an incident management structure.",src:"IS-2200 / NIMS",diff:"beginner",ctry:"core"},
{id:"tf36",d:4,sub:"4.H",q:"In NIMS resource typing, Type 4 resources are the most capable and have the highest specifications.",ans:false,exp:"Type 1 resources are the MOST capable; Type 4 are the LEAST capable. This is commonly confused. Remember: 1 = highest capability, 4 = lowest/minimum capability. Type 1 water rescue teams, for example, handle complex swift-water operations; Type 4 handle simpler environments.",src:"NIMS 2017",diff:"beginner",ctry:"core"},
{id:"tf37",d:4,sub:"4.N",q:"During a crisis media briefing, speculating about the likely cause of an incident when the cause is unknown is an acceptable way to demonstrate transparency.",ans:false,exp:"Speculation during crisis communications is never acceptable. It can prove false and severely damage credibility. The correct approach: acknowledge what is known, acknowledge what is not yet known, and commit to providing updates when confirmed information is available.",src:"IS-242.C Effective Communication",diff:"beginner",ctry:"core"},
{id:"tf38",d:4,sub:"4.G",q:"The Planning P in ICS describes the process for developing Incident Action Plans across operational periods.",ans:true,exp:"The Planning P (P-Process) is the ICS operational planning cycle for developing IAPs. It cycles from notification through incident brief, planning meetings, IAP preparation, approval, operations briefing, and execution — repeating each operational period.",src:"IS-200.C",diff:"beginner",ctry:"core"},
{id:"tf39",d:4,sub:"4.F",q:"A Situation Report (SITREP) should include speculation about likely future incident developments to help decision-makers plan.",ans:false,exp:"SITREPs are FACTUAL documents — they describe what IS happening, what HAS been done, and what IS needed. They do not speculate about future developments. Speculation in SITREPs can lead to poor decisions based on unverified information.",src:"IS-2200 / ICS Forms Booklet",diff:"beginner",ctry:"core"},
{id:"tf40",d:4,sub:"4.J",q:"A formal After Action Review conducted after a real incident should primarily focus on identifying and publishing individual performance failures.",ans:false,exp:"AARs should be SYSTEMS-FOCUSED, not blame-focused. They examine what happened, why it happened (systemic factors), and how systems and processes can be improved. Blame-focused AARs create psychological safety problems that prevent honest participation and undermine future improvement.",src:"IS-120.C HSEEP / AAR Best Practices",diff:"beginner",ctry:"core"},
{id:"tf41",d:4,sub:"4.I",q:"Life-safety is always the first priority in emergency response, taking precedence over property protection, environmental protection, and economic considerations.",ans:true,exp:"Life-safety is always Priority 1 in emergency response — this is a foundational principle of ICS and all major EM frameworks. Property, environment, and economic considerations are all secondary to protecting human life.",src:"IS-100.C / NIMS 2017",diff:"beginner",ctry:"core"},
{id:"tf42",d:4,sub:"4.E",q:"The Joint Information Center (JIC) and the Joint Information System (JIS) are the same thing.",ans:false,exp:"JIS (Joint Information System) is the STRUCTURE/CONCEPT for coordinating public information across agencies. JIC (Joint Information Center) is the PHYSICAL LOCATION where JIS functions are performed. JIS is the system; JIC is a facility. They are related but distinctly different.",src:"NIMS 2017",diff:"intermediate",ctry:"core"},
{id:"tf43",d:4,sub:"4.O",q:"NIMS recommends a maximum of 12-hour shifts during extended incident operations to manage responder fatigue.",ans:true,exp:"NIMS guidance recommends a maximum 12-hour shift during extended operations. Beyond 12 hours, cognitive performance degrades significantly, increasing error rates. Fatigue management is a command responsibility.",src:"NIMS 2017",diff:"beginner",ctry:"core"},
{id:"tf44",d:4,sub:"4.A",q:"A Common Operating Picture (COP) is a shared situational awareness of ongoing and developing situations maintained across agencies.",ans:true,exp:"A COP is the shared, real-time situational awareness maintained across agencies during an incident — typically displayed through incident management systems. It enables coordinated decision-making by ensuring all key players have the same operational picture.",src:"NIMS 2017 / IS-2200",diff:"beginner",ctry:"core"},
{id:"tf45",d:4,sub:"4.L",q:"According to FEMA's Community Lifelines framework, Food, Water, and Shelter are three separate lifelines.",ans:false,exp:"Food, Water, and Shelter are grouped as ONE combined lifeline — there are 7 lifelines total, not 9. This is a commonly tested detail. The 7 lifelines: Safety & Security; Food/Water/Shelter; Health & Medical; Energy; Communications; Transportation; Hazardous Material.",src:"Community Lifelines Implementation Toolkit",diff:"intermediate",ctry:"core"},
{id:"tf46",d:4,sub:"4.R",q:"Canada's Alert Ready system reaches mobile phones without requiring prior registration by the user.",ans:true,exp:"Alert Ready uses Cell Broadcast technology, which reaches ALL compatible mobile devices in a geographic area without registration. This is distinct from opt-in notification systems that require users to sign up before receiving alerts.",src:"National Public Alerting System / Alert Ready",diff:"intermediate",ctry:"Canada"},
{id:"tf47",d:4,sub:"4.G",q:"In ICS, a Division is used to divide an incident geographically, while a Group is used to divide an incident by function.",ans:true,exp:"Division = geographic separation (e.g., Division Alpha covers the north sector). Group = functional separation (e.g., Medical Group, Rescue Group). Both report to the Operations Section Chief. This distinction is directly tested on ICS competency questions.",src:"IS-100.C",diff:"intermediate",ctry:"core"},
{id:"tf48",d:4,sub:"4.H",q:"Under NIMS, the Safety Officer has the authority to stop unsafe operations without first obtaining the Incident Commander's approval.",ans:true,exp:"The Safety Officer is the only ICS position with authority to stop unsafe operations immediately without IC approval. This authority reflects the critical importance of responder safety — waiting for IC approval could cost lives in an imminent safety emergency.",src:"IS-100.C / NIMS 2017",diff:"intermediate",ctry:"core"},
// Domain 5
{id:"tf49",d:5,sub:"5.B",q:"Under Canada's DFAA, the federal government covers 100% of all eligible provincial disaster costs.",ans:false,exp:"DFAA covers 90% of eligible costs ABOVE the per-capita threshold. The province pays 100% of costs below the threshold plus 10% of costs above it. There is always a provincial cost-share component under DFAA.",src:"DFAA Program (Public Safety Canada)",diff:"beginner",ctry:"Canada"},
{id:"tf50",d:5,sub:"5.D",q:"The 'Build Back Better' principle means communities should spend more money on recovery than the original disaster caused in damage.",ans:false,exp:"Build Back Better means using the recovery opportunity to IMPROVE resilience — stronger codes, relocated facilities, upgraded infrastructure — not simply spending more money. It is about quality and resilience of recovery, not financial scale.",src:"NDRF / Sendai Framework",diff:"beginner",ctry:"core"},
{id:"tf51",d:5,sub:"5.C",q:"According to FEMA's Community Lifelines framework, Energy (Power and Fuel) is typically the first lifeline prioritized for restoration because it enables other lifelines.",ans:true,exp:"Energy/power is typically prioritized first because it enables restoration of all other lifelines — water treatment plants, hospitals, communications infrastructure, and transportation signals all need electricity. This cascading dependency makes power the foundational lifeline.",src:"Community Lifelines Implementation Toolkit",diff:"intermediate",ctry:"core"},
{id:"tf52",d:5,sub:"5.H",q:"A Preliminary Damage Assessment (PDA) is conducted solely by local officials to document damage costs.",ans:false,exp:"A PDA is a JOINT assessment conducted by local, state/provincial, AND federal officials together. The multi-government nature of the PDA is what gives it credibility to support a disaster declaration request. Local-only assessments may be conducted but do not fulfill the PDA requirement.",src:"NDRF / Disaster Declaration Process",diff:"intermediate",ctry:"core"},
{id:"tf53",d:5,sub:"5.G",q:"Disaster reentry decisions should be based on safety assessment evidence — not on time elapsed since the disaster or community demand for access.",ans:true,exp:"Reentry authorization must be based on verified safety conditions — structural assessment, hazmat clearance as needed, utility safety confirmation. Time elapsed and community pressure are not safety evidence. Premature reentry based on demand rather than safety creates secondary casualties.",src:"ATC-20 / EM Reentry Practice",diff:"intermediate",ctry:"core"},
{id:"tf54",d:5,sub:"5.F",q:"Declining attendance at Long-Term Recovery Group meetings always indicates that recovery is complete and the LTRG should be dissolved.",ans:false,exp:"Declining LTRG attendance typically reflects natural evolution — organizations whose specific services are no longer needed step back while those addressing remaining needs stay engaged. The EM coordinator should verify that remaining unmet needs are matched to participating organizations before dissolving the LTRG.",src:"NDRF / LTRG Best Practices",diff:"intermediate",ctry:"core"},
{id:"tf55",d:5,sub:"5.A",q:"The NDRF identifies 6 Recovery Support Functions.",ans:true,exp:"The NDRF identifies 6 RSFs: Community Planning and Capacity Building, Economic, Health and Social Services, Housing, Infrastructure Systems, and Natural and Cultural Resources. Each has a federal coordinating agency.",src:"National Disaster Recovery Framework 2nd Edition",diff:"beginner",ctry:"core"},
{id:"tf56",d:5,sub:"5.E",q:"A generic percentage contingency (e.g., 15%) added to a debris removal Scope of Work is routinely eligible for DFAA/federal grant reimbursement.",ans:false,exp:"Generic contingencies not tied to specific documented risks are commonly disallowed in DFAA and FEMA PA audits. Cost estimates must be based on actual quantities, established unit prices, and specific documented risk items. An across-the-board contingency without justification creates audit liability.",src:"DFAA / FEMA PA Program",diff:"advanced",ctry:"Canada"},
// Domain 6
{id:"tf57",d:6,sub:"6.A",q:"The Common Alerting Protocol (CAP) is a Canada-specific standard developed by Public Safety Canada.",ans:false,exp:"CAP is an INTERNATIONAL open standard — not Canada-specific. It was developed through international standards bodies and is used globally. Canada's NPAS uses the CAP-CP (Canadian Profile) adaptation, and the US uses CAP in IPAWS. Both are implementations of the international CAP standard.",src:"CAP Standard / NPAS Documentation",diff:"intermediate",ctry:"core"},
{id:"tf58",d:6,sub:"6.E",q:"CISA's Cyber Essentials identifies Multi-Factor Authentication (MFA) as the most foundational cybersecurity measure for government organizations.",ans:true,exp:"CISA's Cyber Essentials Starter Kit explicitly identifies MFA as the foundational first step — it is the single highest-impact, lowest-cost cybersecurity measure available. MFA prevents the majority of account compromise attacks.",src:"CISA Cyber Essentials Starter Kit",diff:"beginner",ctry:"core"},
{id:"tf59",d:6,sub:"6.B",q:"Emergency management technology systems should be evaluated primarily based on the number of features they offer.",ans:false,exp:"EM technology must be evaluated primarily on reliability under adverse conditions (degraded internet, power outages), interoperability with existing systems, and suitability for life-safety operations. Feature count is a secondary criterion; a feature-rich system that fails during disasters is operationally worthless.",src:"General EM Technology Evaluation Practice",diff:"beginner",ctry:"core"},
{id:"tf60",d:6,sub:"6.A",q:"An opt-in emergency notification system that reaches 20% of residents is sufficient as the sole public alerting method for life-safety warnings.",ans:false,exp:"An opt-in system reaching only 20% of residents is grossly insufficient as the sole alerting method for life-safety warnings. Effective alerting requires layered systems: WEA/Cell Broadcast (reaches all compatible devices) + opt-in MNS + outdoor warning sirens + broadcast media. No single channel reaches everyone.",src:"NPAS / IPAWS / Alerting Best Practices",diff:"intermediate",ctry:"core"},
// Domain 7
{id:"tf61",d:7,sub:"7.O",q:"The IAEM Code of Ethics applies only to certified CEM holders, not to all IAEM members.",ans:false,exp:"The IAEM Code of Ethics applies to ALL IAEM members — not just those holding CEM or AEM certifications. Any IAEM member is bound by the Code as a condition of membership.",src:"IAEM Code of Ethics",diff:"beginner",ctry:"core"},
{id:"tf62",d:7,sub:"7.O",q:"The IAEM Code of Ethics creates a duty to REPORT ethical violations, not just to avoid personally committing them.",ans:true,exp:"The Code of Ethics creates an affirmative duty to report observed ethical violations — not merely a personal obligation to avoid violations. An EM professional who witnesses fraud, misrepresentation, or other ethical violations is required to report them through appropriate channels.",src:"IAEM Code of Ethics",diff:"intermediate",ctry:"core"},
{id:"tf63",d:7,sub:"7.D",q:"Under US federal grant requirements (2 CFR Part 200), grant records must generally be retained for 3 years from the date of final expenditure report submission.",ans:true,exp:"2 CFR Part 200 (Uniform Guidance) generally requires grant records to be retained for 3 years from the date of the final expenditure report. Some records (property records, litigation) have longer retention requirements. Canadian federal grants have similar retention requirements.",src:"2 CFR Part 200 Uniform Guidance",diff:"advanced",ctry:"USA"},
{id:"tf64",d:7,sub:"7.Q",q:"ISO 22301 is the international standard for Business Continuity Management Systems.",ans:true,exp:"ISO 22301 is the international standard for BCMS. Canada's CSA Z1600 and NFPA 1600 (US) are national standards aligned with ISO 22301. The DRI Canada's Professional Practices for Business Continuity also align with these standards.",src:"ISO 22301 / CSA Z1600 / DRI Canada Professional Practices",diff:"intermediate",ctry:"core"},
{id:"tf65",d:7,sub:"7.H",q:"CSA Z1600 provides a framework for Emergency and Continuity Management Programs in Canada.",ans:true,exp:"CSA Z1600 (Emergency and Continuity Management Program) is the Canadian standard providing a framework for organizations to develop, implement, and maintain comprehensive EM and continuity programs. It is Canada's equivalent of NFPA 1600 and aligns with ISO 22301.",src:"CSA Z1600",diff:"beginner",ctry:"Canada"},
{id:"tf66",d:7,sub:"7.H",q:"Canada's Transportation of Dangerous Goods Act requires Emergency Response Assistance Plans (ERAPs) for all dangerous goods shipments.",ans:false,exp:"ERAPs are required only for specific HIGH-HAZARD dangerous goods where the emergency response requires specialized capability beyond standard first responder resources. Not all dangerous goods require ERAPs — only those specifically designated under TDG regulations.",src:"Transportation of Dangerous Goods Act (Canada)",diff:"advanced",ctry:"Canada"},
{id:"tf67",d:7,sub:"7.C",q:"Signed purchase orders (encumbrances) count against the budget as soon as they are signed — not when payment is made.",ans:true,exp:"Encumbrances must be tracked against the budget immediately upon signing — not at payment. This prevents over-commitment of budget. An EM coordinator who tracks only paid expenses, not signed POs, risks committing more funds than the budget allows.",src:"Public Sector Financial Management Principles",diff:"intermediate",ctry:"core"},
{id:"tf68",d:7,sub:"7.G",q:"Research consistently identifies psychological safety as the most important predictor of high-performing emergency management team performance.",ans:true,exp:"Research on team performance (including Google's Project Aristotle and EM-specific studies) consistently identifies psychological safety — the belief that team members can speak up and report errors without punishment — as the top predictor of team effectiveness, particularly in high-stakes environments.",src:"IS-240.C / Team Performance Research",diff:"advanced",ctry:"core"},
// Domain 8
{id:"tf69",d:8,sub:"8.A",q:"Active IAEM membership is a mandatory requirement for both the AEM and CEM certification applications.",ans:true,exp:"Active IAEM membership is non-waivable for both AEM and CEM applications — it is not substitutable with experience, training hours, or other credentials. IAEM membership is required at the time of application.",src:"IAEM AEM/CEM Certification Requirements",diff:"beginner",ctry:"core"},
{id:"tf70",d:8,sub:"8.H",q:"Managing an incident as Incident Commander qualifies as professional development hours for AEM/CEM recertification.",ans:false,exp:"Managing incidents is professional EXPERIENCE — it contributes to the experience requirement for CEM but is NOT counted as professional development. Professional development requires deliberate learning activities: courses, conferences, academic study, research, writing, or other activities where skill/knowledge acquisition is the primary purpose.",src:"IAEM AEM/CEM Certification Requirements",diff:"intermediate",ctry:"core"},
{id:"tf71",d:8,sub:"8.I",q:"Attending a professional conference as a participant qualifies as 'subject matter service to the profession' for CEM recertification.",ans:false,exp:"Attending a conference as a PARTICIPANT qualifies as professional DEVELOPMENT — not subject matter service. Subject matter service requires giving expertise BACK to the profession: presenting at the conference, serving on its committee, writing for its publications, or mentoring other attendees. Consumption of professional development ≠ contribution to the profession.",src:"IAEM CEM Certification Requirements",diff:"intermediate",ctry:"core"},
{id:"tf72",d:8,sub:"8.A",q:"CRHNet (Canadian Risk and Hazards Network) is Canada's national emergency management regulatory authority.",ans:false,exp:"CRHNet is a professional network — not a regulatory authority. It connects academics, practitioners, and policy-makers working in Canadian EM and DRR. Public Safety Canada is the federal regulatory/coordination body for EM in Canada.",src:"CRHNet About",diff:"intermediate",ctry:"Canada"},
{id:"tf73",d:8,sub:"8.C",q:"Emergency management stakeholder relationships should be actively maintained only during and after incidents when coordination is required.",ans:false,exp:"Stakeholder relationships must be maintained CONTINUOUSLY — before, during, and after emergencies. Pre-incident relationships determine the speed and quality of coordination during incidents. Relationships maintained only during incidents are transactional and lack the trust needed for effective emergency coordination.",src:"IS-242.C / Whole Community Approach",diff:"beginner",ctry:"core"},
{id:"tf74",d:8,sub:"8.H",q:"Participation in developing or updating the CSA Z1600 standard qualifies as both professional development and subject matter service to the profession for AEM/CEM recertification.",ans:true,exp:"IAEM permits crediting standards development participation in both categories: professional development (learning from peer expertise) and subject matter service (contributing expertise to the profession). Standards development is one of the most recognized forms of professional contribution.",src:"IAEM CEM Certification Requirements",diff:"intermediate",ctry:"Canada"},
{id:"tf75",d:8,sub:"8.D",q:"Professional peer networks in EM provide their most direct operational value by enabling faster informal information sharing during incidents than formal mutual aid channels.",ans:true,exp:"This is a core documented benefit of professional networks in EM — peer calls provide information in minutes versus hours compared to formal mutual aid request processes. This is why professional networking is a documented competency, not just a career benefit.",src:"IS-240.C / Professional Network Research",diff:"intermediate",ctry:"core"},
// More cross-domain
{id:"tf76",d:1,sub:"1.F",q:"The Stakeholder Preparedness Review (SPR) establishes capability targets for a jurisdiction.",ans:false,exp:"The THIRA establishes capability targets. The SPR (Stakeholder Preparedness Review) MEASURES current capability levels against those targets. The gap between THIRA targets and SPR current levels drives preparedness investment. SPR measures; THIRA targets.",src:"CPG 201",diff:"intermediate",ctry:"core"},
{id:"tf77",d:4,sub:"4.B",q:"The Planning Section Chief is responsible for monitoring ongoing tactical operations during an incident.",ans:false,exp:"The OPERATIONS Section Chief monitors and manages ongoing tactical operations. The Planning Section Chief is responsible for collecting information, developing IAPs, and planning for future operational periods. These are distinct functions in ICS.",src:"IS-200.C / NIMS 2017",diff:"intermediate",ctry:"core"},
{id:"tf78",d:2,sub:"2.K",q:"A Drill is an operations-based exercise that tests a single specific operation or function.",ans:true,exp:"A Drill is an operations-based exercise that tests ONE specific operation (e.g., testing a mass notification system, evacuating a building, conducting a hoseline deployment). It does not test multiple functions simultaneously — that is a Functional Exercise.",src:"IS-120.C HSEEP",diff:"beginner",ctry:"core"},
{id:"tf79",d:5,sub:"5.A",q:"Individual Assistance (IA) and Public Assistance (PA) are the same FEMA program.",ans:false,exp:"IA (Individual Assistance) helps individual disaster survivors with housing and other personal needs. PA (Public Assistance) helps governments and eligible NGOs with response costs and infrastructure rebuilding. They are completely different programs with different eligibility, application processes, and funding structures.",src:"NDRF / FEMA Programs",diff:"beginner",ctry:"core"},
{id:"tf80",d:3,sub:"3.C",q:"Canada's National Disaster Mitigation Program (NDMP) funds both pre-disaster mitigation projects and post-disaster recovery costs.",ans:false,exp:"NDMP funds PRE-DISASTER mitigation projects ONLY — flood mapping, structural mitigation, community resilience projects. Post-disaster recovery costs are funded through the DFAA. These are completely separate programs for completely different purposes.",src:"NDMP Program (Public Safety Canada)",diff:"intermediate",ctry:"Canada"},
{id:"tf81",d:4,sub:"4.D",q:"Unified Command in ICS is used when multiple agencies or jurisdictions with overlapping authority must manage the same incident.",ans:true,exp:"Unified Command is used when an incident involves multiple agencies or jurisdictions that each have legal authority over aspects of the incident. UC allows them to establish shared objectives, a single IAP, and a unified command structure without surrendering agency authority.",src:"IS-100.C / NIMS 2017",diff:"beginner",ctry:"core"},
{id:"tf82",d:6,sub:"6.C",q:"User Acceptance Testing (UAT) should be conducted by software developers to verify technical specifications before system deployment.",ans:false,exp:"UAT is conducted by END USERS — not developers — to verify that they can successfully perform their real work tasks using the system. Developer testing (unit testing, integration testing) verifies technical specifications. UAT is the user validation gate before go-live.",src:"Technology Implementation Best Practices",diff:"intermediate",ctry:"core"},
{id:"tf83",d:7,sub:"7.F",q:"A Policy document in an EM program describes the step-by-step procedures for executing a specific operational task.",ans:false,exp:"A Policy states the 'what and why' — organizational intent and direction. An SOP (Standard Operating Procedure) describes the 'how' — step-by-step execution procedures. Both are needed: policy authorizes; SOP operationalizes.",src:"Program Documentation Best Practices",diff:"beginner",ctry:"core"},
{id:"tf84",d:2,sub:"2.B",q:"The concept of 'devolution' in COOP is triggered only when the primary EOC is physically destroyed.",ans:false,exp:"Devolution is triggered whenever primary staff are INCAPACITATED — not just when a facility is destroyed. Staff incapacitation could result from: illness during a pandemic, injury, legal incapacity, or any other scenario where primary officials cannot perform their functions.",src:"IS-1300",diff:"advanced",ctry:"core"},
{id:"tf85",d:5,sub:"5.J",q:"Disaster Recovery Centers (DRCs) are most effective when located in government buildings for security and administrative convenience.",ans:false,exp:"DRCs are most effective when located IN or near the affected community — not in government buildings for administrative convenience. Location in the community reduces transportation barriers. Co-locating multiple agencies provides one-stop assistance. Extended hours address time barriers.",src:"NDRF / DRC Best Practices",diff:"intermediate",ctry:"core"},
{id:"tf86",d:1,sub:"1.D",q:"The Recovery Point Objective (RPO) measures how quickly a system must be restored after a disruption.",ans:false,exp:"RPO measures the maximum acceptable DATA LOSS in time — 'how much data can we afford to lose?' The Recovery Time Objective (RTO) measures how quickly the system must be RESTORED. RPO drives backup frequency; RTO drives recovery procedures.",src:"FEMA BIA Guide / IS-1300",diff:"intermediate",ctry:"core"},
{id:"tf87",d:4,sub:"4.G",q:"In ICS, Task Forces consist of same-kind, same-type resources, while Strike Teams consist of mixed resource types.",ans:false,exp:"This is reversed. Strike Teams = same-kind, same-type resources (e.g., 5 Type 1 engine companies). Task Forces = mixed resources combined for a specific task. Both have common communications and a designated leader.",src:"IS-100.C / NIMS 2017",diff:"intermediate",ctry:"core"},
{id:"tf88",d:3,sub:"3.D",q:"The Sendai Framework's Priority 4 is 'Enhancing disaster preparedness for effective response and to Build Back Better in recovery.'",ans:true,exp:"Sendai Priority 4 is 'Enhancing disaster preparedness for effective response, and to Build Back Better in recovery, rehabilitation, and reconstruction.' This is also where the 'Build Back Better' principle originated in international DRR discourse.",src:"Sendai Framework 2015-2030",diff:"intermediate",ctry:"core"},
{id:"tf89",d:7,sub:"7.H",q:"Alberta's Emergency Management Act requires every municipality to designate a Director of Emergency Management.",ans:true,exp:"Alberta's EMA (and similar provincial legislation across Canada) requires municipalities to designate a Director of Emergency Management and establish an emergency management committee of council. These are statutory minimum requirements.",src:"Alberta Emergency Management Act",diff:"intermediate",ctry:"Canada"},
{id:"tf90",d:8,sub:"8.A",q:"IAEM's AEM certification requires fewer years of emergency management experience than the CEM certification.",ans:true,exp:"AEM is designed for early-career EM professionals who may not yet have sufficient experience for CEM. AEM has lower experience requirements. CEM requires more documented EM work experience, training hours, and contributions to the profession.",src:"IAEM AEM/CEM Certification Requirements",diff:"beginner",ctry:"core"},
{id:"tf91",d:2,sub:"2.F",q:"ESF #13 in the US National Response Framework covers Public Safety and Security.",ans:true,exp:"ESF #13 covers Public Safety and Security — coordinating law enforcement, protective services, and public safety resources during incidents. Key ESF numbers to know: #6 Mass Care, #8 Public Health/Medical, #13 Public Safety, #15 External Affairs.",src:"National Response Framework",diff:"intermediate",ctry:"USA"},
{id:"tf92",d:4,sub:"4.N",q:"The Joint Information System (JIS) is the physical building where public information staff coordinate during major incidents.",ans:false,exp:"The JIS (Joint Information System) is the STRUCTURE/CONCEPT for coordinating public information. The JIC (Joint Information Center) is the PHYSICAL FACILITY where JIS functions are performed. JIS is the system; JIC is the location.",src:"NIMS 2017",diff:"intermediate",ctry:"core"},
