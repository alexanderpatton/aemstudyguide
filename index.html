"6.C":{title:"Implement Technology Solutions",what:"Implementation goes beyond purchasing — it includes configuration, system integration, data migration, user training, process adaptation, acceptance testing, go-live support, and handover to operations. Poor implementation is the most common cause of technology failure in EM contexts.",keys:[["User Acceptance Testing (UAT)","End users test the system against real-world scenarios before go-live. Catches usability issues that technical testing misses. Required before any EM system goes operational."],["System Integration","Connecting new technology to existing systems (databases, alerting platforms, GIS, CAD) so data flows automatically without duplication."],["Change Management","Managing the human side of technology implementation: communicating changes, training users, addressing resistance, building adoption."]],tip:"Technology implementation is a PROJECT — plan with milestones, testing, training, and a rollback plan. The most common failure mode is insufficient training and change management after deployment."},
"6.D":{title:"Provide End-User Training on Technology",what:"Technology is only as effective as the people using it. End-user training must be role-specific, scenario-based, repeated regularly, and supplemented with job aids. Training on EM technology should be integrated into EOC activation exercises to create realistic practice.",keys:[["Role-Based Training","Different roles need different system knowledge. The PIO needs different mass notification training than the Logistics Chief. One-size-fits-all training is ineffective."],["Job Aid","Quick reference document (card, poster) helping users perform tasks without memorizing procedures. Especially valuable for infrequently used systems."],["Exercise Integration","Building technology use into exercises creates practice opportunities that sustain skills better than classroom training alone."]],tip:"Technology training must be role-specific AND repeated. The most common failure: one-time training that is forgotten by the time the system is needed in an actual incident. Exercises are the best refresher."},
"6.E":{title:"Coordinate Cybersecurity Measures",what:"EM systems and CI increasingly depend on digital networks vulnerable to cyberattacks. EMs coordinate cybersecurity awareness, implement basic cyber hygiene, ensure incident response plans address cyber threats, and work with CISA/relevant authorities on cyber threat intelligence and response.",keys:[["Cyber Incident Response Plan","An EOP annex addressing how the jurisdiction responds to significant cybersecurity incidents — who is notified, what systems are isolated, how operations continue manually."],["MFA (Multi-Factor Authentication)","CISA's Cyber Essentials identifies MFA as the most foundational cybersecurity measure. Significantly reduces account compromise risk."],["Offline Backup","Critical data (EOP, contact lists, resource inventories) must be backed up in printed and encrypted offline formats — accessible when online systems are compromised or unavailable."]],tip:"Cybersecurity in EM means BOTH protecting systems AND having plans for when systems fail. Cyber Essentials key elements: MFA, patch regularly, back up offline, train staff. MFA is most commonly tested as 'most foundational.'"},
"7.A":{title:"Manage Internal Staff",what:"EM offices must attract, develop, retain, and manage skilled staff. This includes recruitment, performance management, professional development planning, succession planning, and maintaining a healthy workplace culture — especially managing the occupational stress unique to EM work.",keys:[["Occupational Stress Injury (OSI)","Psychological harm from work-related stress — PTSD, depression, burnout. Emergency managers have elevated risk due to chronic exposure to trauma, high-stakes decisions, and irregular hours."],["Succession Planning","Identifying and developing future leaders to ensure continuity when key staff leave. Essential for small EM offices with deep institutional knowledge held by few individuals."],["Individual Development Plan (IDP)","Personalized plan for each staff member mapping training goals, career milestones, and skill development. Tool for structured professional growth."]],tip:"Staff management in EM includes occupational health — the psychological toll of the work is real and must be proactively managed. Wellness programs, peer support, and workload management are the correct systemic responses."},
"7.B":{title:"Manage Daily Operations",what:"Between emergencies, EM offices run on daily operations: maintaining plans and systems, managing grant programs, coordinating with partners, monitoring threats, conducting training, and advancing preparedness projects. Daily operations ensure the office is ready when an emergency occurs.",keys:[["Duty Officer System","Rotating on-call arrangement ensuring a trained EM professional is available 24/7/365 to receive notifications and initiate response actions."],["Operations Calendar","Year-long plan mapping: exercise schedule, training events, plan review milestones, grant reporting deadlines, and partner coordination meetings."],["Standard Operating Procedures (SOPs)","Written instructions for routine and emergency tasks — step-by-step, with clear roles, decision criteria, and escalation paths. Must be documented, not just known by key staff."]],tip:"Daily operations management is about sustained readiness between events. The preparedness work done daily is what enables effective response when incidents occur."},
"7.C":{title:"Manage Internal Budgets",what:"EM budgets require planning, monitoring, and reporting across multiple funding streams — base budget, grants, emergency accounts. EMs must understand budget cycles, fiscal reporting, cost allocation, and the documentation needed to support reimbursement claims.",keys:[["Encumbrance","Funds reserved for known future expenses (signed purchase orders) not yet paid. Tracking encumbrances prevents over-commitment of budget."],["Cost Allocation","Distributing shared expenses across multiple programs/funding sources in proportion to use. Required for multi-funded EM offices."],["Budget Justification","Narrative explaining and supporting a budget request, linking resources to program objectives and identified needs."]],tip:"Budget management requires understanding both public sector finance (budget cycles, appropriations) AND grant management (eligible costs, reporting, audit requirements). Know that encumbrances count against budget."},
"7.D":{title:"Prepare Grant Applications or Manage Grants",what:"Grant funding is a major resource source for EM programs. Grant management is a complex compliance function: competitive applications, managing approved grants to eligible use requirements, tracking expenditures, submitting reports, and preparing for audits.",keys:[["NOFO (Notice of Funding Opportunity)","Public announcement of a funding opportunity with eligibility criteria, application requirements, evaluation criteria, and deadlines."],["Cost-Share Requirement","Many grants require the recipient to contribute a percentage of total project cost (e.g., 75/25 federal/local). Local share must come from eligible non-federal sources."],["Audit Readiness","Documentation, processes, and records organized and current so a regulatory or grant audit can be conducted efficiently. Original receipts are required for all claimed expenses."]],tip:"Grant management is a COMPLIANCE function. Key elements: eligible costs, procurement requirements, reporting deadlines, original receipt retention, and audit documentation. Missing receipts = unreimbursable expenses."},
"7.E":{title:"Advocate for Program Resources",what:"EM programs are chronically under-resourced. Effective advocacy makes the case in decision-maker language: risk reduction, cost avoidance, legal liability, and return on investment. Building relationships with elected officials and finance directors is as important as the technical case.",keys:[["Value Proposition","Clear statement of EM program value — framed as risk reduction, cost avoidance, legal compliance, and community resilience. Not as activity reports."],["BCR as Advocacy Tool","Benefit-Cost Ratio translates mitigation investment into ROI language. 'A $400K investment would have prevented $3.2M in damage' resonates with finance-focused decision-makers."],["Coalition Building","Allies (fire chief, hospital CEO, chamber of commerce) who reinforce the EM resource case from their own authority. Increases credibility and political support."]],tip:"Advocate in the audience's language. For elected officials: risk and safety. For finance directors: cost avoidance and ROI. For the public: safety and preparedness. Tailor the message to the decision-maker."},
"7.F":{title:"Create Program Documentation",what:"Program documentation includes policies, procedures, standards, job descriptions, training guides, and operational manuals. Clear documentation ensures consistency, enables onboarding, supports audits, and provides legal protection for decisions made during emergencies.",keys:[["Policy","High-level statement of intent guiding decisions — the 'what and why.'"],["Procedure (SOP)","Step-by-step description of how a specific task is performed — 'who does what, in what order.'"],["Standard","A specific requirement or benchmark that must be met — often referencing CSA Z1600, NFPA 1600, ISO 22301, or other external standards."]],tip:"Documentation is both quality management AND risk management. In an emergency, the EM office may be under scrutiny — well-documented procedures demonstrate professionalism and protect against liability."},
"7.G":{title:"Facilitate Team Building Activities",what:"EM teams must function effectively under extreme stress — this requires trust, clear roles, good communication, and mutual support built through deliberate team-building. This includes joint exercises, after-action discussions, social connection activities, and creating a culture of psychological safety.",keys:[["Psychological Safety","Team environment where members feel safe to speak up, ask questions, raise concerns, and report errors without fear. Foundation of high-performing, learning organizations."],["Team Cohesion","Degree to which team members bond and support each other — especially under stress. Built through shared experiences and deliberate activities."],["Peer Support Program","Trained colleagues providing emotional support to team members experiencing occupational stress. Especially important following major events."]],tip:"Team building is deliberate capacity building — not just social events. Psychological safety is increasingly recognized as the foundation of high-performing EM teams and is an increasingly tested concept."},
"7.H":{title:"Maintain Program Compliance",what:"EM programs operate under a complex web of legislation, regulations, standards, and agreements. In Canada: Emergency Management Act, TDG Act, provincial EM legislation, CSA Z1600, DFAA requirements, grant conditions. Non-compliance creates legal and financial risk.",keys:[["Compliance Calendar","Schedule of ALL regulatory filing deadlines, grant reporting dates, plan review requirements, and audit dates. Proactive management of compliance obligations."],["Emergency Management Act (Canada)","Primary federal EM legislation (2007) defining ministerial responsibilities, Public Safety Minister's role, and federal-provincial coordination framework."],["CSA Z1600","Canadian standard for Emergency and Continuity Management Programs — compliance framework for comprehensive EM programs."]],tip:"Know key legislation by country: Canada = EMA, TDG Act, provincial EM acts, CSA Z1600. US = Stafford Act, PKEMRA, NRF. NZ = CDEM Act 2002. Australia = AIDR frameworks. Compliance is tested in scenario questions."},
"7.I":{title:"Design Presentations",what:"EMs present to diverse audiences: council chambers, community meetings, conferences, training classes, and media briefings. Effective presentations are audience-appropriate, well-organized, visually clear, and tied to an action goal. Design principle: one main message per slide, visuals over text.",keys:[["Bottom-Line Up Front (BLUF)","Lead with the conclusion/recommendation, then provide supporting evidence. Effective for executive audiences who need the 'so what' immediately."],["Universal Design","Designing presentations accessible to all: vision/hearing impairments, varying literacy, different languages. Required for public-facing EM communications."],["Data Visualization","Charts, maps, and infographics make complex information immediately understandable. Risk maps and damage charts are common EM visualization tools."]],tip:"Presentation design questions test communication principles — not software skills. Know your audience, lead with the key message, support with evidence. For elected officials: BLUF always."},
"7.J":{title:"Deliver Presentations",what:"Delivery is distinct from design. Effective delivery includes: commanding attention from the opening, maintaining message discipline under questioning, handling Q&A confidently, adapting to audience response, and managing time. Crisis communication delivery under media pressure is a critical EM skill.",keys:[["Media Briefing","Structured presentation to journalists: opening statement + prepared key messages + Q&A. Message discipline under questioning is the critical skill."],["Message Discipline","Consistently returning to key messages, especially under aggressive media questioning. The 'broken record' technique — acknowledge the question, redirect to key messages."],["Plain Language","Delivered at a listening level accessible to the general public — no jargon, no acronyms, clear action guidance. FEMA communication standard."]],tip:"Message discipline under pressure: acknowledge → inform → direct → refer. Decline to speculate. Maintain composure. Return to key messages when questioned off-topic. This applies to all public presentations."},
"7.K":{title:"Prepare Correspondence for Public/Elected Officials",what:"EMs prepare briefing notes, situation reports, emergency declarations, budget requests, grant letters, and policy memos for elected officials. Writing for officials requires precision, appropriate format, brevity, and clear recommendations — they need information they can act on quickly.",keys:[["Briefing Note","Short (1-3 page) document providing a decision-maker with background, key considerations, and a recommended course of action. Bottom-line up front."],["Executive Summary","Concise overview (1 page) of a longer document highlighting key findings, recommendations, and actions required."],["Ministerial Format (Canada)","Written communications to ministers follow specific Privy Council Office / Treasury Board formats and approval chains."]],tip:"Write for decision-makers: bottom-line up front, specific timelines, costs, and authorities needed. Avoid passive voice. Be concise — officials are time-constrained. Government writing should be formal but not obscure."},
"7.L":{title:"Prepare Annual Reports",what:"Annual reports communicate the EM program's activities, achievements, challenges, and plans to elected officials, partner agencies, grant funders, and the public. They demonstrate accountability, justify resources, and build the case for continued investment.",keys:[["Performance Metrics","Quantifiable measures: exercises conducted, training hours, plans updated, response activations, mutual aid requests, grant funding secured."],["Outcome vs Output","Output = activities (12 training sessions). Outcome = impact (98% of EOC staff now ICS-certified). Reports must emphasize OUTCOMES — what changed, not just what was done."],["Resource Justification","Annual reports should contain a forward-looking resource request linked to identified gaps and planned activities."]],tip:"Annual reports are ACCOUNTABILITY and ADVOCACY documents. Output (what you did) matters less than outcomes (what changed). Decision-makers want to know: what did the investment achieve?"},
"7.M":{title:"Maintain Archived Critical Documentation",what:"Critical documents — EOPs, AARs, grant records, exercise reports, mutual aid agreements, declarations, incident documentation — must be maintained in organized, accessible, and secure archives with specified retention periods and backup copies.",keys:[["Records Retention Schedule","Policy specifying how long each document type must be retained: grant records typically 7 years; incident records may be subject to FOI requests."],["Vital Records","Documents essential to resuming critical functions: EOP, contact lists, legal authorities, insurance policies. Must be duplicated and accessible at an alternate location."],["COOP Records Management","Vital records must be duplicated, stored off-site, and accessible during disruption — not only in the primary office."]],tip:"Grant records = 7-year retention requirement. Vital records = must have off-site backup. Incident records may be subject to FOI. Records management has serious legal implications — not just administrative housekeeping."},
"7.N":{title:"Maintain Resource Inventories",what:"Resource inventories provide a current, accurate picture of available EM resources — equipment, facilities, personnel qualifications, supplies, and agreements. Inventories must be regularly VERIFIED — not just documented. An inventory listing a broken resource creates false confidence.",keys:[["Physical Verification","Semi-annual physical check of all inventoried equipment — confirming operational status, not just existence. Paper lists become outdated quickly."],["NIMS Resource Typing","Standardized categorization (Type 1-4) enabling precise mutual aid requests. Type 1 = most capable. Include type in all inventory records."],["Just-in-Time Resources","Resources not pre-positioned but requestable on short notice — vendor contracts, pre-identified suppliers, mutual aid partners. Must be in inventory with current contact information."]],tip:"Inventories must be VERIFIED — not just listed. A paper inventory listing a non-functional resource creates dangerous false confidence. Physical verification is a program standard."},
"7.O":{title:"Apply Code of Ethics & Professional Conduct",what:"The IAEM Code of Ethics establishes 7 principles: Awareness, Commitment, Confidentiality, Fairness, Integrity, Personal Responsibility, and Respect. Applying the code means making decisions aligned with these principles under pressure, reporting ethical violations, and modeling professional behavior.",keys:[["IAEM Code — 7 Principles","Awareness | Commitment | Confidentiality | Fairness | Integrity | Personal Responsibility | Respect. When ethics scenarios arise on the exam, Integrity + Fairness most commonly drive the correct answer."],["Conflict of Interest","Situation where personal interests could improperly influence official decisions. Must be declared and managed per organizational policy."],["Ethical Decision-Making","When facing ethical pressure: identify the ethical issue → apply the Code → document the situation → maintain the standard → report if required."]],tip:"Ethics questions present scenarios with competing pressures. ALWAYS: follow transparent process, document interactions, report violations, maintain integrity. Even when it is politically difficult. Especially when it is politically difficult."},
"7.P":{title:"Manage Vendors",what:"EM programs rely on vendors for equipment maintenance, technology services, training, consulting, and disaster recovery contracts. Vendor management includes procurement, contract management, performance monitoring, and ensuring vendors can deliver under disaster conditions — not just normal ones.",keys:[["Service Level Agreement (SLA)","Contract defining vendor performance metrics, response times, penalties for non-performance, and disaster activation provisions. Must include disaster-mode operation requirements."],["Pre-Qualified Vendor List","Pre-screened and approved vendors for emergency procurement — enabling faster contracting after a disaster. Pre-qualify debris removal and emergency housing contractors before they are needed."],["Vendor Performance Monitoring","Quarterly review of SLA compliance. Annual testing of disaster-activated vendors through exercises."]],tip:"Pre-event contracting is essential — procurement rules don't disappear in disasters. Pre-qualified vendor lists and pre-positioned contracts enable faster, compliant emergency procurement."},
"7.Q":{title:"Perform Business Continuity Planning Duties",what:"BCP ensures critical functions continue during disruptions — natural disasters, cyber incidents, pandemics, or facility loss. The BIA drives the BCP; the plan is tested through exercises; RTOs define success. For government EM offices, COOP is the public sector equivalent.",keys:[["BCP Sequence","BIA → identify critical functions → set MTD/RTO/RPO → design recovery strategies → document BCP → exercise → maintain. BIA FIRST, always."],["ISO 22301 / CSA Z1600","International standard (ISO 22301) and Canadian adaptation (CSA Z1600) for Business Continuity Management Systems. Provides the framework for comprehensive BCP."],["BCP vs EOP","BCP = individual organization continuity. EOP = community-wide emergency response. Different scope, different audiences, but mutually supporting."]],tip:"Know the BCP sequence: BIA → critical functions → MTD/RTO/RPO → recovery strategies → document → exercise → maintain. This exact sequence is tested on the AEM exam."},
"8.A":{title:"Participate in Professional Organizations",what:"Professional organizations — IAEM, CRHNet, regional EM associations — advance the profession through standards, education, research, and advocacy. Participation provides access to training, certification, networking, and best practices. IAEM membership is required for AEM/CEM certification.",keys:[["IAEM","International Association of Emergency Managers — primary professional organization for EM practitioners globally. Offers AEM/CEM certifications, publications, conferences, and chapters. MEMBERSHIP REQUIRED for AEM application."],["CRHNet","Canadian Risk and Hazards Network — professional network connecting academics, practitioners, and policy-makers in Canadian EM and DRR."],["Chapter Participation","Regional IAEM chapters provide local networking, training, and professional development. Active chapter participation counts toward AEM/CEM contribution requirements."]],tip:"IAEM membership is REQUIRED for AEM/CEM applications — not optional. Know the difference between AEM (entry-level) and CEM (advanced). Know types of activities that count as 'contributions to the profession.'"},
"8.B":{title:"Liaise with Community Members",what:"EMs maintain relationships with legislators, elected officials, community organizations, and the public. Pre-established relationships enable effective advocacy, ensure community priorities inform plans, and build trust that facilitates cooperation during emergencies.",keys:[["Legislative Engagement","Proactive communication with legislators educating them on EM issues, advocating for resources, and ensuring they understand the EM program's role before an emergency occurs."],["Community Advisory Committee","Standing body of community representatives providing input on EM plans, programs, and priorities — integrating diverse community perspectives into EM decision-making."],["Why It Matters Operationally","Pre-established legislative relationships = faster disaster declarations, better funding advocacy, and legislators who actively support EM programs."]],tip:"Legislative liaison is STRATEGIC — relationships built before emergencies mean faster, more supportive responses during them. This is a professional competency, not just a political obligation."},
"8.C":{title:"Manage Stakeholder Relationships",what:"Stakeholder relationship management is ongoing and strategic — identifying stakeholders, understanding their interests, maintaining regular communication, resolving conflicts, and building mutual trust. The annual stakeholder analysis identifies gaps to proactively address.",keys:[["Stakeholder Analysis","Identifies all stakeholders, assesses influence/interest levels, and determines appropriate engagement strategies for each. Conducted annually."],["Conflict Resolution","Skills and processes for identifying and resolving disagreements between stakeholders. Essential in multi-agency EM coordination — conflict is inevitable; unresolved conflict is avoidable."],["Relationship Gap Risk","A neglected relationship with a key partner creates coordination vulnerability — most dangerous when revealed during an actual incident."]],tip:"Identified relationship gaps must be PROACTIVELY addressed — the stakeholder analysis exists to catch them before incidents reveal them. Direct engagement is more effective than administrative remedies."},
"8.D":{title:"Build Professional Networks",what:"A strong professional network provides subject matter expertise, peer support, job opportunities, research access, and the informal communication channels that supplement formal protocols during incidents. Building a network requires deliberate investment — conferences, associations, publishing, mentoring.",keys:[["Peer Network Value","Peer relationships provide faster information than formal channels during incidents. A direct call to a trusted peer precedes the formal mutual aid request by hours."],["Mentoring","Both mentoring others and being mentored are networking activities that build relationships and advance the profession."],["Online Professional Communities","LinkedIn, IAEM Connect, and other platforms extend professional networks beyond geographic limitations."]],tip:"Professional networks are OPERATIONAL ASSETS — not just career tools. Peer relationships enable faster information sharing, better mutual aid coordination, and more effective regional response."},
"8.E":{title:"Participate in External Working Groups",what:"EMs contribute to the profession through working groups — standards development committees, government advisory bodies, professional association committees, research collaborations, and multi-jurisdictional planning groups. This fulfills the 'contribution to the profession' requirement for AEM/CEM.",keys:[["Standards Development","Contributing to CSA Z1600, NFPA 1600, or ISO 22301 updates is both subject matter service AND professional development."],["Advisory Bodies","Formal committees advising government or organizations on specific topics. Provincial and federal EM advisory committees are common participation venues."],["Multi-Jurisdictional Planning","Working groups developing shared plans or protocols for regional EM — regional flood response groups, mass casualty planning committees."]],tip:"Working group participation is both SUBJECT MATTER SERVICE (contributing) AND PROFESSIONAL DEVELOPMENT (learning). IAEM allows crediting in both categories for standards development work."},
"8.F":{title:"Network with Other Emergency Management Professionals",what:"Ongoing peer networking builds relationships, shared knowledge, and trust that make inter-agency coordination work. This includes peer networks, provincial/state EM forums, first responder councils, and online communities of practice.",keys:[["Community of Practice (CoP)","Group of people sharing a professional concern who learn together through regular interaction. EM communities of practice: online forums, regional networks, professional associations."],["Peer Review","Other professionals reviewing plans, procedures, or training materials — providing expert feedback and promoting cross-jurisdictional learning."],["Site Visits / Exchanges","Visiting another jurisdiction's EM office to observe practices and share lessons. Practical peer networking and learning."]],tip:"Peer networking creates operational value. Strong peer relationships = faster mutual aid, better information sharing, more effective regional coordination."},
"8.G":{title:"Represent Agency at External Events",what:"EMs represent their agency at conferences, training events, community meetings, inter-agency exercises, legislative hearings, and public education forums. Representation builds agency credibility, shares knowledge, and fulfills community accountability obligations.",keys:[["Agency Ambassador Role","When representing the agency, the EM speaks for the organization — consistency with official positions, appropriate disclosure management, and professional conduct are required."],["Conference Presentation","Presenting at professional conferences is BOTH representation AND subject matter service — it advances the profession while building agency reputation."],["Public Education Delivery","Delivering preparedness messaging to community organizations fulfills both the representation function and the preparedness mission."]],tip:"Representing the agency requires preparation: know your agency's positions, protect sensitive information, conduct yourself as a reflection of your organization's professionalism."},
"8.H":{title:"Engage in Professional Development Activities",what:"Continuous learning is required for AEM/CEM recertification — documented professional development hours including training courses, conferences, webinars, independent study, journal reading, academic coursework, and writing. IAEM requires documented PD activities for recertification.",keys:[["AEM/CEM Recertification","Requires documented professional development hours and evidence of contribution to the profession within the certification period."],["FEMA IS Program","200+ free self-paced courses — major source of documented PD hours for AEM/CEM applications and recertification."],["Academic Credentials","Degree programs in emergency management (Diploma, BEM, MEM) provide credit-bearing professional development — NAIT Diploma in Disaster & Emergency Management is one such program."]],tip:"Know what counts as PD (training, conferences, webinars, coursework, writing) vs what does NOT count (routine job duties, incident responses, annual EOP reviews). The distinction is directly tested."},
"8.I":{title:"Provide Subject Matter Service to the Profession",what:"Subject matter service — contributing expertise back through teaching, writing, mentoring, research, and service on professional bodies — is a formal AEM/CEM requirement. This reflects IAEM's philosophy that EM professionals have a collective responsibility to advance the profession.",keys:[["Publication","Contributing to professional literature: journal articles, conference papers, practice guides, or blog posts. Sharing knowledge with the broader EM community."],["Instructor/Facilitator","Developing and delivering training for other EM professionals — ICS courses, conference workshops, university guest lectures."],["Professional Service","Volunteer service to professional bodies: committee membership, peer reviewing applications/papers, mentoring, serving on IAEM exam development committees."]],tip:"Subject matter SERVICE means giving expertise BACK to the profession — not just consuming it. Publishing, teaching, mentoring, and committee service all qualify. Attending conferences as a participant does NOT qualify as service."}
};

{
  id: "is235",
  title: "IS-235.C: Emergency Planning",
  org: "FEMA",
  url: "https://training.fema.gov/is/courseoverview.aspx?code=is-235.c",
  embedUrl: "https://training.fema.gov/EMIWeb/IS/IS235c/curriculum/index.htm",

  priority: "Essential",
  overview: "IS-235 teaches the CPG 101 planning process in depth — how to develop, maintain, and exercise Emergency Operations Plans. This is the primary reference for Domain 2 planning competencies.",
  keyFacts: [
    "CPG 101 (Comprehensive Preparedness Guide 101) is the foundation for EOP development.",
    "The CPG 101 six-step planning process: (1) Form a collaborative planning team, (2) Understand the situation, (3) Determine goals and objectives, (4) Plan development, (5) Plan preparation, review, and approval, (6) Plan implementation and maintenance.",
    "An EOP has three plan components: Basic Plan, Functional Annexes, and Hazard-Specific Appendices.",
    "The Basic Plan describes the jurisdiction's overall emergency management program and policies.",
    "Functional Annexes describe HOW the jurisdiction will perform a specific function (mass care, evacuation, public information) regardless of hazard.",
    "Hazard-Specific Appendices address unique aspects of particular hazards.",
    "Plans must be reviewed and updated at minimum annually.",
    "Plans should also be updated after: real incidents, exercises, changes in laws/hazards/resources, or significant organizational changes.",
    "A collaborative planning team must include representatives from all relevant agencies and organizations.",
    "Planning assumptions are conditions believed to be true that justify planning decisions.",
    "Planning factors are data points used to calculate resource requirements (e.g., one shelter manager per 500 shelter residents).",
    "The Concept of Operations (CONOPS) section describes who does what in what sequence under whose authority.",
    "The plan should describe the legal authorities for emergency actions.",
    "A multi-jurisdictional plan is developed collaboratively by two or more jurisdictions facing common hazards.",
    "Plans must address Access and Functional Needs (AFN) populations explicitly.",
    "Plan development involves: collecting data, analyzing data, developing alternatives, selecting a course of action, and writing the plan.",
    "Plans are coordinated with adjacent jurisdictions and higher levels of government before adoption.",
    "Tabletop exercises are an efficient way to test plan validity without full resource deployment.",
    "Plans that are never exercised are rarely executed effectively during actual emergencies."
  ],
  testableQA: [
    {q:"What are the 6 steps of the CPG 101 planning process?", a:"(1) Form collaborative planning team, (2) Understand the situation, (3) Determine goals and objectives, (4) Plan development, (5) Plan preparation/review/approval, (6) Implementation and maintenance."},
    {q:"What are the three components of an EOP?", a:"Basic Plan, Functional Annexes, and Hazard-Specific Appendices."},
    {q:"What does a Functional Annex describe?", a:"How the jurisdiction will perform a specific function (e.g., mass care, evacuation) regardless of the type of hazard."},
    {q:"What is a planning assumption?", a:"A condition believed to be true that justifies a specific planning decision."},
    {q:"How often must an EOP be reviewed at minimum?", a:"Annually. Also after real incidents, exercises, changes in laws/hazards/resources, or organizational changes."},
    {q:"What must plans explicitly address regarding populations?", a:"Access and Functional Needs (AFN) populations who may need additional assistance."},
    {q:"What is the purpose of the Concept of Operations (CONOPS) in an EOP?", a:"Describes who does what, in what sequence, under whose authority — the 'how' of plan execution."},
    {q:"What is a multi-jurisdictional plan?", a:"A plan developed collaboratively by two or more jurisdictions that face common hazards and share resources."},
    {q:"Why is the collaborative planning team critical?", a:"It ensures all relevant agencies contribute their perspective and resources, produces buy-in, and results in a more realistic, actionable plan."},
    {q:"What is the first step in the CPG 101 planning process?", a:"Form a collaborative planning team. A plan written without stakeholder input lacks buy-in and important operational knowledge."}
  ],
  blueprintLinks: ["2.C","2.J","2.M","2.F","2.G"],
  examTip: "Memorize the 6-step CPG 101 process in order. Know the 3 plan components. Know that plans must be reviewed annually AND after incidents/exercises/changes. The collaborative team is ALWAYS the first step."
},
{
  id: "is2200",
  title: "IS-2200: Basic Emergency Operations Center Functions",
  org: "FEMA",
  url: "https://training.fema.gov/is/courseoverview.aspx?code=IS-2200",
  embedUrl: "https://training.fema.gov/EMIWeb/IS/IS2200/curriculum/index.htm",
  domains: [2,4],
  timeHours: 3,
  priority: "Essential",
  overview: "IS-2200 defines the EOC — its purpose, structure, activation, and operational functions. This is the primary source for EOC-related questions in Domains 2 and 4, including the famous Forms+People+Plans+Technology readiness formula.",
  keyFacts: [
    "The Emergency Operations Center (EOC) is the physical or virtual location where the coordination of information and resources to support incident management takes place.",
    "EOC primary functions: collecting and analyzing information, supporting resource coordination, coordinating between agencies, supporting situational awareness, and coordinating public information.",
    "EOC operational readiness requires four elements: Forms, People, Plans, and Technology — ALL four must be in place.",
    "EOC activation levels are tiered — jurisdictions define their own levels (commonly Level 1 = minimal, Level 3 = full activation).",
    "The EOC does NOT command field operations — it COORDINATES and SUPPORTS field operations managed at the ICP.",
    "The EOC and ICP maintain a clear communication relationship — the EOC provides resource support and policy guidance; the ICP executes tactical operations.",
    "EOC organizational structures can follow: ICS structure, departmental/agency structure, or ESF structure.",
    "Most common EOC organizational model is the ESF model, grouping functions by Emergency Support Function.",
    "A Virtual EOC (VEOC) enables remote coordination — useful when physical gathering is not possible.",
    "EOC staff must be trained in their specific EOC roles — generic ICS training is not sufficient.",
    "Position-specific checklists reduce cognitive load and prevent procedural omissions during activations.",
    "Situation Reports (SITREPs) are produced at regular intervals to maintain shared situational awareness.",
    "WebEOC is the most widely used incident management system for EOC operations.",
    "EOC deactivation must be planned and orderly — including documentation, after-action requirements, and resource release.",
    "The EOC is distinct from a Fusion Center (which focuses on intelligence/information sharing for prevention).",
    "EOC supply inventories must be maintained to support 72-hour self-sufficient operations.",
    "Call-down lists and activation procedures must be current and tested through exercises.",
    "EOC staff welfare during extended activations includes: shift scheduling (max 12 hours), rest areas, food, and mental health support."
  ],
  testableQA: [
    {q:"What are the four elements of EOC operational readiness?", a:"Forms, People, Plans, and Technology. ALL four must be in place for the EOC to be operationally ready."},
    {q:"What is the PRIMARY function of the EOC?", a:"Coordination of information and resources to support incident management — NOT command of field operations."},
    {q:"What is the relationship between the EOC and the ICP?", a:"The EOC provides coordination, resources, and policy guidance. The ICP executes tactical, on-scene operations. They communicate continuously but have distinct roles."},
    {q:"What are the three EOC organizational structures?", a:"ICS structure, Departmental/Agency structure, or ESF (Emergency Support Function) structure."},
    {q:"What is a Virtual EOC?", a:"An EOC that enables remote coordination by staff who are not physically co-located — using technology platforms to share information and coordinate resources."},
    {q:"How long should EOC supply inventories support self-sufficient operations?", a:"72 hours minimum."},
    {q:"What is the maximum recommended shift length during extended EOC activations?", a:"12 hours, after which staff must rest."},
    {q:"What does WebEOC provide?", a:"A web-based incident management platform for real-time crisis data sharing, resource tracking, and incident documentation across agencies."},
    {q:"What is a Fusion Center and how does it differ from an EOC?", a:"A Fusion Center focuses on intelligence and information sharing for threat prevention. An EOC coordinates response and recovery operations. They are different facilities with different functions."},
    {q:"Why are position-specific checklists important in the EOC?", a:"They reduce cognitive load and prevent procedural omissions during high-stress activations — research shows even experienced professionals make more errors without checklists."}
  ],
  blueprintLinks: ["2.D","2.E","2.H","4.B","4.D","4.R"],
  examTip: "IS-2200 content is directly tested. Memorize: EOC = COORDINATE not command. Forms+People+Plans+Technology = readiness. EOC ≠ ICP. 12-hour max shifts. 72-hour supply inventory."
},
{
  id: "cpg101",
  title: "Developing and Maintaining EOPs (CPG 101 v2)",
  org: "FEMA",
  url: "https://www.fema.gov/sites/default/files/2020-05/CPG_101_V2_30NOV2010_FINAL_508.pdf",
  embedUrl: null,
  domains: [2],
  timeHours: 4,
  priority: "Essential",
  overview: "CPG 101 is the gold standard for EOP development. It defines the planning process, plan structure, and maintenance requirements that underpin most Domain 2 questions. IS-235 teaches it; this is the source document.",
  keyFacts: [
    "CPG 101 Version 2 (2010) is the current definitive guidance for EOP development and maintenance.",
    "An EOP is a plan that assigns responsibility for carrying out specific actions that protect and support a jurisdiction during an emergency.",
    "Plans should be developed for the jurisdiction's most likely and most dangerous hazards.",
    "The collaborative planning process begins with a Planning Team, not with drafting text.",
    "Planning is a process, not just a document — the process of developing plans is as valuable as the plans themselves.",
    "An EOP's Basic Plan is the umbrella document — it should not duplicate content in annexes.",
    "Functional Annexes are written for those who execute functions — not for general public audiences.",
    "Hazard-Specific Appendices address unique aspects of particular hazards and supplement the Basic Plan.",
    "Support Annexes provide guidance on administrative functions that support all operations.",
    "Plans must include: Purpose, Scope, Situation Overview, Concept of Operations, Organization and Assignment of Responsibilities, Direction Control and Coordination, Information Collection and Dissemination, Communications, Administration and Finance, Plan Development and Maintenance.",
    "Authorities and references section identifies the legal basis for emergency actions.",
    "Plans must be accessible — written clearly, avoiding jargon, and available to all who need them.",
    "The plan validation process includes: peer review, legal review, and exercise-based validation.",
    "Plans are formally adopted by the appropriate authority (mayor, council, governing board).",
    "After adoption, plans are distributed to all participating agencies and organizations.",
    "Plan maintenance includes: annual review, post-incident review, post-exercise review, and change management.",
    "Plans are living documents — they should never be considered 'done.'",
    "Coordination with adjacent jurisdictions during plan development prevents gaps and duplication.",
    "Plans must address the full spectrum of likely incidents, not just the most catastrophic scenarios."
  ],
  testableQA: [
    {q:"What is the difference between the Basic Plan and Functional Annexes in an EOP?", a:"Basic Plan = overall program, policies, and coordination framework. Functional Annexes = how specific functions (mass care, evacuation, public information) are performed."},
    {q:"What are Support Annexes in an EOP?", a:"Documents providing guidance on administrative functions that support all emergency operations — such as financial management, volunteer management, or legal authority."},
    {q:"When must an EOP be reviewed and updated?", a:"Annually at minimum. Also after: real incidents, exercises that reveal gaps, changes in laws/regulations/hazards, significant organizational changes, and changes in resources or capabilities."},
    {q:"Why is the planning PROCESS as important as the plan DOCUMENT?", a:"The process builds relationships, shared understanding, and stakeholder buy-in that are essential for effective execution. Plans developed in isolation by one person lack these critical elements."},
    {q:"What does the Concept of Operations (CONOPS) section of an EOP describe?", a:"Who does what, in what sequence, under whose authority — the operational 'how' of plan execution."},
    {q:"What must be included in an EOP's Authorities and References section?", a:"The legal basis for emergency actions — statutes, regulations, executive orders, and agreements that authorize the actions described in the plan."},
    {q:"How are EOPs formally adopted?", a:"By the appropriate authority for the jurisdiction — mayor, council, governing board, or other designated official — through a formal adoption process."},
    {q:"What does CPG 101 say about plans being 'done'?", a:"Plans are never 'done.' They are living documents requiring continuous maintenance, exercise-based validation, and regular updates."},
    {q:"Why must plans be coordinated with adjacent jurisdictions?", a:"To prevent gaps (where no one is responsible) and duplication (where two jurisdictions plan to use the same resource), and to enable seamless coordination at jurisdictional boundaries."},
    {q:"What is a Hazard-Specific Appendix?", a:"A supplement to the EOP Basic Plan and relevant Functional Annexes that addresses unique aspects of a particular hazard — such as specific pre-incident actions, unique resource requirements, or special authorities."}
  ],
  blueprintLinks: ["2.C","2.J","2.M"],
  examTip: "Know all plan components: Basic Plan + Functional Annexes + Hazard-Specific Appendices + Support Annexes. Know the 6-step CPG 101 process. Plans are living documents — never 'done.'"
},
{
  id: "nims",
  title: "National Incident Management System (NIMS) 2017",
  org: "FEMA",
  url: "https://www.fema.gov/sites/default/files/2020-07/fema_nims_doctrine-2017.pdf",
  embedUrl: null,
  domains: [2,4],
  timeHours: 4,
  priority: "Essential",
  overview: "NIMS 2017 is the foundational doctrine for all-hazards incident management in the United States. It defines ICS, resource management, and multi-agency coordination. Canada's ICS framework is closely aligned. Large portions of Domains 2 and 4 draw from NIMS concepts.",
  keyFacts: [
    "NIMS provides a common, nationwide approach to enable government, private-sector, and nongovernmental organizations to work seamlessly to prevent, protect against, mitigate, respond to, and recover from incidents.",
    "NIMS has three components: Resource Management, Command and Coordination, and Communications and Information Management.",
    "Resource Management includes: resource typing, credentialing, inventorying, requesting, deploying, and tracking resources.",
    "NIMS Resource Typing: Type 1 = most capable; Type 4 = least capable. Standardized across all jurisdictions.",
    "Credentialing is the process of verifying personnel qualifications and authorizing access to incidents.",
    "The National Qualification System (NQS) provides a framework for qualifying and credentialing EM personnel.",
    "Command and Coordination includes: ICS, EOCs, MAC Groups, and the Joint Information System (JIS).",
    "The Joint Information System (JIS) provides the structure for coordinating public information activities.",
    "The Joint Information Center (JIC) is the physical location where JIS functions are performed.",
    "Multi-Agency Coordination (MAC) Groups are composed of senior officials authorized to commit resources.",
    "Communications must be: interoperable, reliable, scalable, portable, and resilient.",
    "Common terminology, modular organization, management by objectives, span of control, and resource tracking are core ICS principles.",
    "Incident Facilities include: ICP, Staging Area, Base, Camp, Helibase, and Helispot.",
    "Staging Area is where resources are kept while awaiting assignment — managed by the Staging Area Manager who reports to Operations.",
    "The Base is where primary logistics functions are coordinated and administered.",
    "NIMS requires all personnel to be trained to the ICS level appropriate for their role.",
    "ICS 100 and 200 are required for all personnel. ICS 300 is required for supervisors. ICS 400 is required for C&G Staff.",
    "The National Preparedness System links all NIMS components to the National Preparedness Goal.",
    "NIMS is applicable to all hazards, all jurisdictions, all sizes of incidents.",
    "Adoption of NIMS is required for jurisdictions receiving certain federal preparedness grants."
  ],
  testableQA: [
    {q:"What are the three components of NIMS?", a:"Resource Management, Command and Coordination, and Communications and Information Management."},
    {q:"In NIMS resource typing, what does Type 1 represent?", a:"The most capable resource — largest, best equipped, most experienced."},
    {q:"What is the difference between JIS and JIC?", a:"JIS (Joint Information System) = the structure/concept for coordinating public information. JIC (Joint Information Center) = the physical location where JIS functions are performed."},
    {q:"What is a MAC Group?", a:"Multi-Agency Coordination Group — senior officials from multiple agencies authorized to commit resources and make policy decisions during major incidents."},
    {q:"What are the five required communications characteristics in NIMS?", a:"Interoperable, reliable, scalable, portable, and resilient."},
    {q:"What ICS facility is where resources are kept while awaiting assignment?", a:"Staging Area — managed by the Staging Area Manager who reports to the Operations Section Chief."},
    {q:"What is the difference between a Base and a Camp in ICS?", a:"Base = primary logistics functions coordinated and administered. Camp = temporary facility providing services and support to remote field operations."},
    {q:"What is credentialing in NIMS?", a:"The process of verifying personnel qualifications and authorizing their access to incidents to ensure resources have verified, not just claimed, capabilities."},
    {q:"When is NIMS adoption required?", a:"For jurisdictions receiving certain federal preparedness grants (all jurisdictions receiving FEMA preparedness grants must implement NIMS)."},
    {q:"What are the core ICS principles in NIMS?", a:"Common terminology, modular organization, management by objectives, span of control, resource tracking, establishment and transfer of command, unified command, chain of command and unity of command."}
  ],
  blueprintLinks: ["2.F","2.G","4.D","4.G","4.H","4.M","4.Q"],
  examTip: "Know the 3 NIMS components. Know the JIS vs JIC distinction. Know resource typing (Type 1 = most capable). Know incident facilities (ICP, Staging Area, Base, Camp). Know that NIMS adoption is required for federal grants."
},
{
  id: "is120",
  title: "IS-120.C: An Introduction to Exercises",
  org: "FEMA",
  url: "https://training.fema.gov/is/courseoverview.aspx?code=is-120.c",
  embedUrl: "https://training.fema.gov/EMIWeb/IS/IS120c/curriculum/index.htm",
  domains: [2],
  timeHours: 2,
  priority: "High",
  overview: "IS-120 introduces the HSEEP (Homeland Security Exercise and Evaluation Program) framework — the standard for designing, conducting, and evaluating exercises. Domain 2.K is almost entirely based on HSEEP concepts.",
  keyFacts: [
    "HSEEP (Homeland Security Exercise and Evaluation Program) is the national framework for EM exercises.",
    "Exercises validate plans, policies, procedures, and capabilities — they do not validate personnel personally.",
    "The HSEEP progressive approach: Seminars → Workshops → Tabletop Exercises → Games → Drills → Functional Exercises → Full-Scale Exercises.",
    "Discussion-Based Exercises: Seminars, Workshops, Tabletop Exercises, and Games. Focus on policies, plans, and procedures.",
    "Operations-Based Exercises: Drills, Functional Exercises, and Full-Scale Exercises. Test actual operational capabilities.",
    "A Seminar is an informal discussion led by a presenter — typically used to orient participants to new plans or procedures.",
    "A Workshop is similar to a seminar but focuses on producing a product (a plan section, a procedure, a checklist).",
    "A Tabletop Exercise (TTX) is a facilitated discussion where participants walk through a scenario — the most common and cost-effective exercise type.",
    "A Drill tests a single, specific operation or function (e.g., testing a mass notification system, evacuating a building).",
    "A Functional Exercise tests multiple functions simultaneously in an EOC environment without field deployment.",
    "A Full-Scale Exercise involves actual deployment of personnel and equipment — the most resource-intensive.",
    "An Exercise Design Team should include representatives from all participating agencies.",
    "Exercise objectives must be measurable and based on identified capability gaps.",
    "Evaluation is built into every exercise — evaluators observe and document performance against objectives.",
    "After Action Report (AAR) documents exercise findings: strengths observed and areas for improvement.",
    "The Improvement Plan (IP) converts AAR findings into specific, assigned corrective actions with deadlines.",
    "AAR/IP must be completed within 90 days of the exercise.",
    "A Master Scenario Events List (MSEL) is the script that drives exercise events and injects.",
    "Exercise injects are scenario events introduced to prompt participant actions.",
    "Exercise control (EXCON) manages the exercise scenario and injects during operations-based exercises."
  ],
  testableQA: [
    {q:"What are the seven exercise types in the HSEEP progressive approach?", a:"Seminars, Workshops, Tabletop Exercises, Games, Drills, Functional Exercises, Full-Scale Exercises."},
    {q:"What is the difference between discussion-based and operations-based exercises?", a:"Discussion-based (Seminars, Workshops, TTX, Games) = focus on plans/procedures through facilitated discussion. Operations-based (Drills, Functional, Full-Scale) = deploy actual personnel and resources to test operational capability."},
    {q:"What exercise type tests a single specific operation without full deployment?", a:"A Drill — tests one specific function (e.g., testing the mass notification system, emergency evacuation of a building)."},
    {q:"What exercise type tests multiple EOC functions simultaneously without field deployment?", a:"A Functional Exercise — most appropriate for testing EOC coordination capability."},
    {q:"What is a Master Scenario Events List (MSEL)?", a:"The chronological script of scenario events and injects that drive exercise activities during an operations-based exercise."},
    {q:"What is an exercise inject?", a:"A scenario event introduced by exercise control (EXCON) to prompt specific participant actions and test targeted capabilities."},
    {q:"What must an After Action Report (AAR) document?", a:"Strengths observed during the exercise AND areas for improvement — organized by exercise objective."},
    {q:"What does the Improvement Plan (IP) do?", a:"Converts AAR findings into specific corrective actions assigned to responsible parties with completion deadlines. Must be tracked."},
    {q:"Within how many days must an AAR/IP be completed after an exercise?", a:"90 days."},
    {q:"What is the primary purpose of exercises in emergency management?", a:"To validate plans, policies, procedures, and capabilities — identifying gaps that can be corrected before a real incident."}
  ],
  blueprintLinks: ["2.K","2.E","2.A"],
  examTip: "Know the 7 exercise types and the discussion-based vs operations-based distinction. Know that Functional = EOC without field deployment. Know the AAR/IP requirement and 90-day timeline."
},
{
  id: "is1300",
  title: "IS-1300: Introduction to Continuity of Operations",
  org: "FEMA",
  url: "https://training.fema.gov/is/courseoverview.aspx?code=IS-1300",
  embedUrl: "https://training.fema.gov/EMIWeb/IS/IS1300/curriculum/index.htm",
  domains: [2,7],
  timeHours: 2,
  priority: "High",
  overview: "IS-1300 introduces COOP planning for government agencies — defining essential functions, alternate facilities, succession, vital records, and devolution. Directly supports Domain 2.B and 7.Q.",
  keyFacts: [
    "Continuity of Operations (COOP) ensures that essential functions continue during a wide range of emergencies.",
    "COOP planning is different from emergency response planning — COOP focuses on the organization's ability to continue its mission, not on community-wide response.",
    "The Business Impact Analysis (BIA) is always completed before writing the COOP plan.",
    "Primary Mission-Essential Functions (PMEFs) are the functions an organization must continue during any emergency.",
    "Essential supporting activities are functions that are necessary to support PMEFs.",
    "Maximum Tolerable Downtime (MTD) is the longest a PMEF can be disrupted before consequences become unacceptable.",
    "Recovery Time Objective (RTO) is the target restoration time — must be shorter than the MTD.",
    "Succession of authority pre-designates who assumes leadership if primary officials are unavailable.",
    "Orders of succession must: be pre-designated, address multiple simultaneous losses, and be documented.",
    "Devolution transfers authority to alternate personnel when primary staff are incapacitated.",
    "Alternate facilities provide backup locations when primary facilities are unavailable.",
    "Alternate facilities must be: far enough away to not be affected by the same incident, equipped with necessary systems, and known to all relevant staff.",
    "Vital records are documents essential to resuming critical functions: contracts, legal authorities, financial records, system backups.",
    "Vital records must be duplicated and stored at alternate locations — not just in the primary facility.",
    "Interoperable communications at alternate facilities are essential for COOP.",
    "COOP plans must be exercised regularly to validate they work as intended.",
    "Reconstitution is the process of returning to normal operations after COOP activation.",
    "Phase 1 (Activation/Relocation): first 12 hours — activate plan, notify staff, relocate if needed.",
    "Phase 2 (Alternate Operations): up to 30 days — conduct PMEFs from alternate location.",
    "Phase 3 (Reconstitution): return to primary facility and restore full operations."
  ],
  testableQA: [
    {q:"What is COOP and how does it differ from EOP?", a:"COOP ensures an organization's essential functions continue during emergencies. EOP addresses community-wide emergency response. COOP is organization-focused; EOP is community-focused."},
    {q:"What are Primary Mission-Essential Functions (PMEFs)?", a:"The functions an organization must continue during any emergency — identified through the BIA as critical to the organization's mission."},
    {q:"What is devolution in COOP?", a:"The transfer of statutory authority and responsibility from primary to alternate personnel when primary staff are incapacitated. Pre-planned and automatic."},
    {q:"What are the three phases of COOP activation?", a:"Phase 1: Activation/Relocation (first 12 hours). Phase 2: Alternate Operations (up to 30 days). Phase 3: Reconstitution (return to normal)."},
    {q:"What are vital records?", a:"Documents essential to resuming critical functions — contracts, legal authorities, financial records, personnel records, system backups. Must be duplicated and stored off-site."},
    {q:"What must an alternate facility provide?", a:"A backup location equipped with necessary systems and communications, far enough from the primary facility to be unaffected by the same incident, and known to all relevant staff."},
    {q:"What is reconstitution?", a:"The process of transitioning from alternate operations back to normal primary facility operations after the emergency has passed."},
    {q:"Why must vital records be stored off-site?", a:"To ensure they are accessible if the primary facility is damaged, destroyed, or inaccessible during the same emergency that activated the COOP plan."},
    {q:"What is the relationship between MTD and RTO?", a:"MTD (Maximum Tolerable Downtime) is the absolute maximum disruption before unacceptable consequences. RTO (Recovery Time Objective) is the target restoration time — must always be shorter than MTD."},
    {q:"Who pre-designates succession of authority?", a:"The organization's leadership, prior to any emergency — succession must address multiple simultaneous losses and be formally documented in the COOP plan."}
  ],
  blueprintLinks: ["2.B","7.Q","1.D"],
  examTip: "Know BIA before COOP. Know MTD > RTO (RTO must be shorter). Know the 3 COOP phases. Know devolution vs succession. Vital records must be off-site."
},
{
  id: "ndrf",
  title: "National Disaster Recovery Framework (NDRF) 2nd Edition",
  org: "FEMA",
  url: "https://www.fema.gov/sites/default/files/2020-06/national_disaster_recovery_framework_2nd.pdf",
  embedUrl: null,
  domains: [5],
  timeHours: 3,
  priority: "High",
  overview: "The NDRF defines how the nation coordinates recovery from disasters. It introduces Recovery Support Functions, community-led recovery principles, and the Build Back Better concept. Primary reference for Domain 5.",
  keyFacts: [
    "The NDRF provides a flexible structure that enables disaster recovery by defining roles and responsibilities and fostering coordination among all stakeholders.",
    "Six Recovery Support Functions (RSFs): Community Planning and Capacity Building, Economic, Health and Social Services, Housing, Infrastructure Systems, and Natural and Cultural Resources.",
    "RSFs are coordinating structures — not operational programs. They bring together agencies with common functions to coordinate recovery.",
    "The RSF coordinator works with the local government and community to support recovery planning and resource coordination.",
    "Local governments have primary responsibility for recovery. State governments support local governments. Federal government supports states when needed.",
    "Community-led recovery means affected residents and local organizations are active participants in planning and decision-making — not just recipients of services.",
    "Build Back Better means recovery efforts should improve community resilience, not just restore pre-disaster conditions.",
    "A Local Disaster Recovery Manager (LDRM) coordinates local recovery across all RSFs.",
    "The Federal Disaster Recovery Coordinator (FDRC) coordinates federal recovery support when presidential disaster declarations are issued.",
    "A Recovery Support Strategy identifies goals, objectives, and actions for each RSF and guides coordinated federal recovery support.",
    "Short-term recovery begins during the response phase (first days to weeks) and includes: restoring essential services, debris removal, temporary housing.",
    "Long-term recovery (months to years) includes: permanent housing, economic redevelopment, infrastructure rebuilding.",
    "Individual Assistance (IA) programs help disaster survivors with housing and other needs.",
    "Public Assistance (PA) programs help governments and eligible non-profits with response costs and rebuilding.",
    "Hazard Mitigation Grant Program (HMGP) is available after presidential declarations to fund mitigation projects.",
    "Voluntary Organizations Active in Disaster (VOADs) provide critical recovery services — Red Cross, Salvation Army, Habitat for Humanity, Team Rubicon.",
    "Long-Term Recovery Groups (LTRGs) are community coalitions coordinating unmet needs with available resources.",
    "The National Disaster Housing Strategy guides disaster housing assistance from emergency shelters to permanent housing.",
    "Recovery must address all community members equitably — with deliberate outreach to vulnerable populations.",
    "After Action Reviews (AARs) following real disasters improve future recovery programs."
  ],
  testableQA: [
    {q:"What are the six Recovery Support Functions (RSFs) in the NDRF?", a:"Community Planning and Capacity Building, Economic, Health and Social Services, Housing, Infrastructure Systems, and Natural and Cultural Resources."},
    {q:"What is a Recovery Support Function (RSF)?", a:"A coordinating structure that brings together agencies with common recovery functions to share information, identify gaps, and coordinate assistance."},
    {q:"What does 'Build Back Better' mean in the NDRF context?", a:"Recovery efforts should improve community resilience, not just restore pre-disaster conditions — through stronger codes, relocated facilities, and improved infrastructure."},
    {q:"What is the role of a Local Disaster Recovery Manager (LDRM)?", a:"Coordinates local recovery efforts across all Recovery Support Functions and serves as the primary local point of contact for state and federal recovery support."},
    {q:"What is the difference between Individual Assistance and Public Assistance?", a:"Individual Assistance (IA) = programs helping individual disaster survivors with housing and other needs. Public Assistance (PA) = programs helping governments and eligible non-profits with response costs and rebuilding."},
    {q:"What is community-led recovery?", a:"A recovery approach that centers affected residents and local organizations in planning and decision-making, ensuring recovery reflects community values and priorities rather than external decisions."},

var quizFormat = 'full';
function setFormat(fmt, el) {
  quizFormat = fmt;
  document.querySelectorAll('[id^="fmt-"]').forEach(e => { e.style.border = '1px solid #e2e8f0'; e.style.background = ''; });
  el.style.border = '2px solid #0f2d4a'; el.style.background = '#e8f0f8';
  document.getElementById('domainPickRow').style.display = fmt === 'domain' ? 'block' : 'none';
}

function startQuiz() {
  const countryFilter = document.getElementById('quizCountry').value;
  const domainFilter = document.getElementById('quizDomain') ? document.getElementById('quizDomain').value : '';
  let pool = allQ.filter(q => countryFilter === 'all' || q.ctry === 'core');
  if (domainFilter && quizFormat === 'domain') pool = pool.filter(q => q.d == domainFilter);
  pool = shuffle(pool);
  let selected;
  if (quizFormat === 'full') selected = pool.slice(0, 100);
  else if (quizFormat === 'mini') selected = pool.slice(0, 20);
  else if (quizFormat === 'domain') selected = pool.slice(0, Math.min(pool.length, 25));
  else if (quizFormat === 'weighted') {
    selected = [];
    DOMAINS.forEach(d => {
      const n = Math.round(d.weight / 2);
      const dq = pool.filter(q => q.d === d.id).slice(0, n);
      selected.push(...dq);
    });
    selected = shuffle(selected).slice(0, 50);
  }
  if (!selected || selected.length === 0) {
    document.getElementById('quizArea').innerHTML = '<p style="color:#b91c1c;padding:20px;font-size:14px;font-family:sans-serif">No questions match your filters. Try adjusting your selection.</p>';
    return;
  }
  quizQ = selected; quizIdx = 0; quizCorrect = 0;
  quizDomainScores = {};
  DOMAINS.forEach(d => { quizDomainScores[d.id] = { correct: 0, total: 0 }; });
  renderQuestion();
}

function renderQuestion() {
  const el = document.getElementById('quizArea');
  if (quizIdx >= quizQ.length) { renderScore(); return; }
  const q = quizQ[quizIdx];
  const d = DOMAINS.find(x => x.id === q.d);
  const pct = Math.round((quizIdx / quizQ.length) * 100);
  el.innerHTML = `
    <div class="q-prog">
      <span>${quizIdx + 1} / ${quizQ.length}</span>
      <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
      <span style="color:#1a6b3c">${quizCorrect} correct</span>
    </div>
    <div class="qcard">
      <div class="qmeta">
        <span class="qtag dom">Domain ${q.d}: ${d ? d.name.substring(0,28)+'...' : ''}</span>
        <span class="qtag dif">${q.diff}</span>
        <span class="qtag dom" style="background:#f0fdf4;color:#166534">${q.sub}</span>
        ${q.ctry !== 'core' ? `<span class="qtag ctry">${q.ctry}</span>` : ''}
      </div>
      <div class="qtext">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o, i) => `<button class="opt" onclick="answer(${i})" id="opt-${i}">
          <span class="opt-lt">${'ABCD'[i]}</span>
          <span>${o}</span>
        </button>`).join('')}
      </div>
      <div class="expl" id="expl">${q.exp}</div>
    </div>`;
}

function answer(sel) {
  const q = quizQ[quizIdx];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const isRight = sel === q.ans;
  if (isRight) { quizCorrect++; quizDomainScores[q.d].correct++; }
  quizDomainScores[q.d].total++;
  document.getElementById('opt-' + sel).classList.add(isRight ? 'correct' : 'incorrect');
  if (!isRight) document.getElementById('opt-' + q.ans).classList.add('reveal');
  document.getElementById('expl').classList.add('show');
  setTimeout(() => { quizIdx++; renderQuestion(); }, 2800);
}

function renderScore() {
  const el = document.getElementById('quizArea');
  const pct = Math.round((quizCorrect / quizQ.length) * 100);
  const wrong = quizQ.length - quizCorrect;
  const grade = pct >= 80 ? '🎉 Excellent!' : pct >= 70 ? '✅ Good work — you\'re on track.' : pct >= 60 ? '📖 Getting there — keep studying.' : '📚 Need more review — focus on weak domains.';
  const domBreakdown = DOMAINS.map(d => {
    const s = quizDomainScores[d.id];
    if (!s || s.total === 0) return '';
    const p = Math.round((s.correct / s.total) * 100);
    const color = p >= 70 ? '#1a6b3c' : p >= 50 ? '#92400e' : '#b91c1c';
    return `<div class="ds-card">
      <div class="ds-name">D${d.id}: ${d.name.substring(0, 30)}</div>
      <div class="ds-bar-bg"><div class="ds-bar" style="width:${p}%;background:${color}"></div></div>
      <div class="ds-pct" style="color:${color}">${p}% (${s.correct}/${s.total})</div>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="score-card">
      <div class="score-big">${pct}%</div>
      <div class="score-lbl">${quizCorrect} correct of ${quizQ.length} questions</div>
      <p style="font-size:15px;font-family:sans-serif;color:#1a202c;margin-top:10px">${grade}</p>
      <div class="score-row">
        <div class="sstat good"><div class="sn">${quizCorrect}</div><div class="sl">Correct</div></div>
        <div class="sstat bad"><div class="sn">${wrong}</div><div class="sl">Incorrect</div></div>
        <div class="sstat"><div class="sn">${quizQ.length}</div><div class="sl">Total</div></div>
      </div>
      ${domBreakdown ? `<div style="margin-top:22px;text-align:left"><div style="font-size:13px;font-weight:700;color:#0f2d4a;margin-bottom:10px">Performance by Domain</div><div class="domain-score-grid">${domBreakdown}</div></div>` : ''}
      <div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-p" onclick="renderQuizSetup();startQuiz()">Retake Exam</button>
        <button class="btn-o" onclick="renderQuizSetup()">Change Format</button>
        <button class="btn-o" onclick="nav('learn',null)">Review Learn Content</button>
      </div>
    </div>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- SPACED REPETITION ENGINE ----------
const SR_INTERVALS = [1, 3, 7, 14, 30]; // days

function getSRData() {
  try {
    const s = localStorage.getItem('aem_sr');
    return s ? JSON.parse(s) : {};
  } catch(e) { return {}; }
}

function saveSRData(d) {
  try { localStorage.setItem('aem_sr', JSON.stringify(d)); } catch(e) {}
}

function srResult(cardId, knew) {
  const sr = getSRData();
  const today = Math.floor(Date.now() / 86400000);
  if (!sr[cardId]) sr[cardId] = { interval: 0, nextReview: today, streak: 0 };
  const card = sr[cardId];
  if (knew) {
    card.streak = (card.streak || 0) + 1;
    const nextInterval = SR_INTERVALS[Math.min(card.streak, SR_INTERVALS.length - 1)];
    card.interval = nextInterval;
    card.nextReview = today + nextInterval;
  } else {
    card.streak = 0;
    card.interval = 1;
    card.nextReview = today + 1;
  }
  sr[cardId] = card;
  saveSRData(sr);
}

function getDueCards(domainFilter) {
  const sr = getSRData();
  const today = Math.floor(Date.now() / 86400000);
  let cards = domainFilter === 'all' ? [...FLASHCARDS] : FLASHCARDS.filter(c => c.dom == domainFilter);
  const due = cards.filter(c => {
    const data = sr[c.t];
    return !data || data.nextReview <= today;
  });
  return due.length > 0 ? due : cards.filter(c => {
    const data = sr[c.t];
    return !data || (data.nextReview - today) <= 3;
  }).slice(0, 10);
}

function getCardStats() {
  const sr = getSRData();
  const today = Math.floor(Date.now() / 86400000);
  const total = FLASHCARDS.length;
  const seen = Object.keys(sr).length;
  const due = FLASHCARDS.filter(c => { const d = sr[c.t]; return !d || d.nextReview <= today; }).length;
  const mastered = FLASHCARDS.filter(c => { const d = sr[c.t]; return d && d.streak >= 4; }).length;
  return { total, seen, due, mastered };
}
