<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEM Exam Prep Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;color:#1a202c;min-height:100vh;font-size:15px}
header{background:#0f2d4a;color:#fff;padding:0}
.hdr-inner{max-width:1100px;margin:0 auto;padding:18px 24px 0}
.hdr-brand{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.shield{width:42px;height:42px;background:#d4570a;border-radius:50% 50% 40% 40%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand-text h1{font-size:19px;font-weight:700}
.brand-text p{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.05em;text-transform:uppercase}
nav{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.1);overflow-x:auto}
.nb{background:none;border:none;color:rgba(255,255,255,.6);padding:11px 16px;cursor:pointer;font-size:13px;border-bottom:3px solid transparent;white-space:nowrap;transition:.15s}
.nb:hover{color:#fff;background:rgba(255,255,255,.06)}
.nb.active{color:#fff;border-bottom-color:#d4570a}
.ctry-bar{background:#1a4570;border-bottom:1px solid rgba(255,255,255,.1)}
.ctry-inner{max-width:1100px;margin:0 auto;padding:9px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctry-label{font-size:12px;color:rgba(255,255,255,.6)}
.ctry-sel{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;border-radius:7px;font-size:13px;cursor:pointer}
.ctry-sel option{background:#1a4570}
.rcount{font-size:12px;color:rgba(255,255,255,.45)}
main{max-width:1100px;margin:0 auto;padding:24px}
.panel{display:none}.panel.active{display:block}
.eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#d4570a;margin-bottom:5px}
.ptitle{font-size:22px;font-weight:700;color:#0f2d4a;margin-bottom:3px}
.psub{font-size:14px;color:#718096;margin-bottom:22px}
/* Cards */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:15px;position:relative;overflow:hidden;cursor:pointer;transition:.15s}
.card:hover{border-color:#0f2d4a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card .wbar{position:absolute;top:0;left:0;height:3px;background:#d4570a}
.card .wt{font-size:11px;color:#d4570a;font-weight:700;margin-bottom:3px}
.card h3{font-size:14px;font-weight:700;color:#0f2d4a;margin-bottom:5px}
.card .sc{font-size:12px;color:#718096}
.card .cbtn{margin-top:10px;font-size:12px;color:#0f2d4a;background:#e8f0f8;border:none;border-radius:6px;padding:5px 10px;cursor:pointer}
/* Hero */
.hero{background:#0f2d4a;color:#fff;border-radius:12px;padding:28px;margin-bottom:24px;display:flex;gap:28px;flex-wrap:wrap}
.hero-t{flex:1;min-width:220px}
.hero-t h2{font-size:24px;margin-bottom:8px}
.hero-t p{font-size:14px;color:rgba(255,255,255,.7);line-height:1.7}
.hero-stats{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.hstat .n{font-size:28px;font-weight:700}
.hstat .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.5)}
/* QS cards */
.qs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:26px}
.qsc{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;cursor:pointer;transition:.15s}
.qsc:hover{border-color:#0f2d4a;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.qsc .qi{width:34px;height:34px;border-radius:8px;background:#e8f0f8;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:9px}
.qsc h3{font-size:14px;font-weight:700;color:#0f2d4a;margin-bottom:3px}
.qsc p{font-size:12px;color:#718096}
/* Resources */
.rcat{margin-bottom:26px}
.rcat-title{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#4a5568;border-bottom:1px solid #e2e8f0;padding-bottom:7px;margin-bottom:11px}
.ritem{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:11px 14px;display:flex;align-items:flex-start;gap:11px;margin-bottom:7px}
.orgtag{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:#e8f0f8;color:#0f2d4a;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.rname{font-size:14px;font-weight:600;color:#0f2d4a;margin-bottom:2px}
.rlink{font-size:12px;color:#d4570a;text-decoration:none}
.rlink:hover{text-decoration:underline}
.rnote{font-size:11px;color:#718096;margin-top:2px}
/* Learn */
.dom-hdr{background:#0f2d4a;color:#fff;padding:18px 22px;border-radius:12px;margin-bottom:16px}
.dom-hdr h2{font-size:19px;margin-bottom:4px}
.dom-hdr p{font-size:13px;color:rgba(255,255,255,.65)}
.sub-item{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:13px 16px;cursor:pointer;margin-bottom:9px;transition:.15s}
.sub-item:hover{border-color:#0f2d4a}
.sub-code{font-size:11px;font-weight:700;color:#d4570a;font-family:monospace;margin-bottom:3px}
.sub-text{font-size:14px;color:#0f2d4a}
.learn-body{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:20px;margin-top:10px;display:none}
.learn-body.open{display:block}
.learn-body h4{font-size:15px;font-weight:700;color:#0f2d4a;margin:14px 0 7px;font-family:system-ui}
.learn-body h4:first-child{margin-top:0}
.learn-body p{font-size:14px;line-height:1.7;margin-bottom:10px;color:#1a202c}
.kc{background:#e8f0f8;border-left:3px solid #0f2d4a;padding:9px 13px;border-radius:0 6px 6px 0;font-size:13px;margin-bottom:8px;line-height:1.6}
.kc strong{color:#0f2d4a}
.tip{background:#fdf0e8;border-left:3px solid #d4570a;padding:9px 13px;border-radius:0 6px 6px 0;font-size:13px;margin-top:4px;line-height:1.6}
.tip strong{color:#d4570a}
.spinner-wrap{text-align:center;padding:32px;font-size:13px;color:#718096}
.spinner{width:26px;height:26px;border:3px solid #e2e8f0;border-top-color:#0f2d4a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Quiz */
.quiz-ctrl{display:flex;gap:11px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
select.fsel{background:#fff;border:1px solid #e2e8f0;padding:8px 12px;border-radius:8px;font-size:13px;color:#1a202c;cursor:pointer}
.btn-p{background:#0f2d4a;color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-p:hover{background:#1a4570}
.btn-o{background:#fff;color:#0f2d4a;border:1px solid #e2e8f0;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-o:hover{border-color:#0f2d4a}
.q-prog{font-size:13px;color:#718096;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.prog-out{flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.prog-in{height:100%;background:#d4570a;border-radius:3px;transition:width .3s}
.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:22px;margin-bottom:18px}
.qmeta{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap}
.qtag{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.qtag.dom{background:#e8f0f8;color:#0f2d4a}
.qtag.dif{background:#fffbeb;color:#92400e}
.qtag.ctry{background:#e8f5ed;color:#1a6b3c}
.qtext{font-size:17px;font-weight:600;color:#0f2d4a;margin-bottom:16px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:#f7f8fa;border:1.5px solid #e2e8f0;padding:12px 15px;border-radius:8px;cursor:pointer;font-size:14px;text-align:left;display:flex;gap:11px;align-items:flex-start;transition:.15s}
.opt:hover{border-color:#0f2d4a;background:#e8f0f8}
.opt.correct{background:#e8f5ed;border-color:#1a6b3c}
.opt.incorrect{background:#fef2f2;border-color:#b91c1c}
.opt.reveal{background:#e8f5ed;border-color:#1a6b3c}
.opt-lt{font-weight:700;color:#718096;width:18px;flex-shrink:0}
.opt.correct .opt-lt{color:#1a6b3c}
.opt.incorrect .opt-lt{color:#b91c1c}
.opt.reveal .opt-lt{color:#1a6b3c}
.expl{margin-top:15px;padding:13px;background:#e8f0f8;border-radius:8px;border-left:3px solid #0f2d4a;font-size:14px;color:#0f2d4a;line-height:1.6;display:none}
.expl.show{display:block}
.score-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:32px;text-align:center}
.score-big{font-size:54px;font-weight:700;color:#0f2d4a;line-height:1}
.score-lbl{font-size:14px;color:#718096;margin-top:4px}
.score-row{display:flex;gap:18px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.sstat{text-align:center}
.sstat .sn{font-size:24px;font-weight:700}
.sstat .sl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#718096}
.sstat.good .sn{color:#1a6b3c}
.sstat.bad .sn{color:#b91c1c}
.domain-score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:20px;text-align:left}
.ds-card{background:#f7f8fa;border-radius:8px;padding:12px}
.ds-card .ds-name{font-size:12px;font-weight:600;color:#0f2d4a;margin-bottom:6px}
.ds-bar-bg{background:#e2e8f0;border-radius:3px;height:6px;margin-bottom:4px}
.ds-bar{background:#d4570a;border-radius:3px;height:6px;transition:width .5s}
.ds-pct{font-size:12px;color:#718096}
/* Flashcards */
.fc-container{perspective:1000px;margin-bottom:18px}
.fc{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:38px 24px;text-align:center;min-height:190px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.1s}
.fc:active{transform:scale(.99)}
.fc-face{position:absolute;top:13px;left:15px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#718096}
.fc-text{font-size:17px;font-weight:600;color:#0f2d4a;line-height:1.5}
.fc.flipped{background:#0f2d4a}
.fc.flipped .fc-text{color:#fff;font-size:14px;font-weight:400;line-height:1.7}
.fc.flipped .fc-face{color:rgba(255,255,255,.45)}
.fc-domain{font-size:12px;color:#718096;text-align:center;margin-bottom:14px}
.fc-nav{display:flex;gap:10px;align-items:center;justify-content:center}
/* Domain detail */
.dom-detail{margin-top:16px}
.dom-detail .sub-list{display:flex;flex-direction:column;gap:8px}
.dom-detail .sub-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px 15px}
.dom-detail .sub-card .sc2{font-size:11px;font-weight:700;color:#d4570a;font-family:monospace;margin-bottom:3px}
.dom-detail .sub-card .st2{font-size:14px;color:#0f2d4a}
/* Study guide */
.sg-section{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:16px}
.sg-section h3{font-size:16px;font-weight:700;color:#0f2d4a;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #e2e8f0}
.sg-section p,.sg-section li{font-size:14px;line-height:1.7;color:#1a202c;margin-bottom:8px}
.sg-section ul,.sg-section ol{padding-left:20px}
.sg-section .tip2{background:#fdf0e8;border-left:3px solid #d4570a;padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;margin-top:10px}
@media(max-width:600px){main{padding:14px}.hero{padding:18px}nav{overflow-x:auto}.nb{padding:11px 11px;font-size:12px}}
</style>
</head>

const QUESTIONS=[
// DOMAIN 1 - Risk Management (6.45%)
{id:1,d:1,sub:"1.F",q:"What is the correct 4-step sequence of the THIRA process?",opts:["Identify threats → Give context → Establish capability targets → Apply results","Conduct risk assessment → Identify gaps → Set targets → Fund mitigation","Assess vulnerabilities → Map hazards → Write plans → Exercise","Review prior incidents → Survey stakeholders → Draft THIRA → Submit"],ans:0,exp:"CPG 201 defines the 4-step THIRA: (1) Identify threats and hazards, (2) Give context via realistic scenarios, (3) Establish capability targets, (4) Apply results to planning. This sequence is directly tested on the AEM exam.",diff:"intermediate",ctry:"core"},
{id:2,d:1,sub:"1.D",q:"Which term describes the longest period a function can be disrupted before consequences become unacceptable?",opts:["Recovery Time Objective (RTO)","Maximum Tolerable Downtime (MTD)","Recovery Point Objective (RPO)","Business Continuity Window (BCW)"],ans:1,exp:"MTD is the absolute maximum disruption time before unacceptable consequences occur. The RTO (targeted restoration time) must always be shorter than the MTD. RPO measures data loss tolerance in time, not function restoration.",diff:"intermediate",ctry:"core"},
{id:3,d:1,sub:"1.E",q:"The fundamental risk formula used in emergency management is:",opts:["Risk = Hazard × Resources","Risk = Probability × Consequence","Risk = Vulnerability × Exposure","Risk = Threat × Impact × Time"],ans:1,exp:"Risk = Probability × Consequence is the foundational formula. Vulnerability and exposure influence consequence; threat is related to probability — but the core 2-factor model is most widely used and tested.",diff:"beginner",ctry:"core"},
{id:4,d:1,sub:"1.C",q:"After an exercise identifies three capability gaps, what is the correct NEXT step?",opts:["Immediately procure resources to fill gaps","Document gaps in an Improvement Plan with owners and timelines","Update the EOP to remove functions that revealed gaps","Report gaps to provincial government and await instructions"],ans:1,exp:"Gaps from exercises must be captured in an Improvement Plan (IP) with specific corrective actions, responsible parties, and completion timelines. Procurement may be one corrective action but the IP is the required management tool first.",diff:"beginner",ctry:"core"},
{id:5,d:1,sub:"1.B",q:"FEMA's 7 Community Lifelines are BEST described as:",opts:["Categories of federal grants after a presidential declaration","Essential services whose stabilization enables all other aspects of society to function","The five mission areas of the National Preparedness Goal","Critical infrastructure sectors regulated by DHS"],ans:1,exp:"The 7 lifelines: Safety & Security, Food/Water/Shelter, Health & Medical, Energy, Communications, Transportation, Hazardous Material. Restoring lifelines is the organizing framework for response and recovery — not a grant category.",diff:"beginner",ctry:"core"},
{id:6,d:1,sub:"1.A",q:"When evaluating a new AI-powered situational awareness platform, which factor is MOST critical to assess?",opts:["The vendor's marketing case studies","Interoperability with existing systems and behavior during connectivity failures","Cost compared to the current annual budget","Number of other jurisdictions using the platform"],ans:1,exp:"For EM technology, interoperability and resilience under degraded conditions are non-negotiable operational requirements. Cost is secondary. Vendor testimonials and adoption rates are not reliable primary evaluation criteria for life-safety systems.",diff:"intermediate",ctry:"core"},
{id:7,d:1,sub:"1.F",q:"In Canada, the THIRA-equivalent risk assessment process is commonly called:",opts:["Preliminary Damage Assessment (PDA)","Hazard, Risk, and Vulnerability Analysis (HRVA)","Emergency Management Planning Guide Assessment","Provincial Capability Assessment"],ans:1,exp:"Canada uses the HRVA (Hazard, Risk, and Vulnerability Analysis) as its risk assessment framework — identifying hazards, assessing probability and consequence, evaluating vulnerability, and producing a risk profile that drives planning priorities.",diff:"intermediate",ctry:"Canada"},
{id:8,d:1,sub:"1.D",q:"A hospital identifies that its patient scheduling system must be restored within 2 hours of any disruption. This 2-hour target is the:",opts:["Maximum Tolerable Downtime (MTD)","Recovery Time Objective (RTO)","Recovery Point Objective (RPO)","System Availability Target (SAT)"],ans:1,exp:"The 2-hour restoration TARGET is the RTO. The MTD is the absolute maximum before consequences are unacceptable — the RTO must be shorter than the MTD. RPO measures acceptable data loss in time, not restoration time.",diff:"intermediate",ctry:"core"},
// DOMAIN 2 - Preparedness (21.65%)
{id:9,d:2,sub:"2.K",q:"An EM coordinator wants to validate EOC multi-agency coordination capability. Which exercise type is MOST appropriate?",opts:["Seminar","Workshop","Tabletop Exercise","Functional Exercise"],ans:3,exp:"A Functional Exercise deploys actual EOC personnel in a simulated environment, testing coordination processes without full field deployment. It's the most appropriate for validating EOC coordination. A Full-Scale would also test this but requires more resources.",diff:"intermediate",ctry:"core"},
{id:10,d:2,sub:"2.K",q:"The HSEEP progressive approach to exercises begins with which type?",opts:["Full-Scale Exercise","Functional Exercise","Tabletop Exercise","Seminar"],ans:3,exp:"HSEEP's progression: Seminars → Workshops → Tabletop Exercises → Games → Drills → Functional → Full-Scale. Discussion-based exercises (first four types) build knowledge and plans; operations-based exercises (last three) test operational capability.",diff:"beginner",ctry:"core"},
{id:11,d:2,sub:"2.C",q:"According to CPG 101, how often must an Emergency Operations Plan be reviewed at minimum?",opts:["Every 6 months","Annually","Every 4 years","Only after a major incident"],ans:1,exp:"CPG 101 requires annual EOP review at minimum. Plans should also be updated after major incidents, exercises that reveal gaps, significant changes in hazards/resources, and staffing changes. EOPs are living documents.",diff:"beginner",ctry:"core"},
{id:12,d:2,sub:"2.R",q:"Which ICS course is designed for Command and General Staff in complex incidents and is NOT available as a self-paced online course?",opts:["ICS 100","ICS 200","ICS 300","ICS 400"],ans:3,exp:"ICS 400 is instructor-led only (no self-paced online version), for Command and General Staff in complex incidents. ICS 100 & 200 are available online. ICS 300 is also instructor-led — for expanding incidents. Both 300 and 400 require in-person delivery.",diff:"intermediate",ctry:"core"},
{id:13,d:2,sub:"2.B",q:"What is the FIRST step in developing a Continuity of Operations Plan (COOP)?",opts:["Select an alternate facility","Conduct a Business Impact Analysis (BIA)","Write the succession of authority","Identify vital records"],ans:1,exp:"The BIA is always the first step — it identifies which functions are critical, what disruption impact would be, and sets Recovery Time Objectives. All other COOP elements (alternate facilities, succession, vital records, recovery strategies) flow from BIA findings.",diff:"intermediate",ctry:"core"},
{id:14,d:2,sub:"2.G",q:"What is the PRIMARY advantage of pre-established Mutual Aid Agreements over informal resource sharing?",opts:["They guarantee faster physical delivery","They pre-authorize sharing and resolve liability, command authority, and reimbursement in advance","They provide lower costs for borrowed resources","They are required by federal law"],ans:1,exp:"MAAs pre-resolve the administrative questions that would delay emergency resource sharing: liability protection, command authority (receiving jurisdiction directs), reimbursement rates, and authorization. These decisions cannot be negotiated during a disaster.",diff:"intermediate",ctry:"core"},
{id:15,d:2,sub:"2.I",q:"Which population must be explicitly included in community preparedness program design?",opts:["Business owners who may lose revenue","Access and Functional Needs (AFN) populations with greater barriers","Elected officials who need to understand program value","Media representatives who communicate messages"],ans:1,exp:"Whole Community preparedness requires explicit attention to AFN populations — individuals with disabilities, limited English proficiency, elderly, medically dependent — who face greater risks AND greater barriers to preparedness. AFN inclusion is a program requirement, not optional.",diff:"intermediate",ctry:"core"},
{id:16,d:2,sub:"2.J",q:"According to CPG 101, the FIRST step in designing a new EOP is:",opts:["Draft the basic plan document","Form a collaborative planning team","Conduct a tabletop exercise","Review the previous plan version"],ans:1,exp:"CPG 101's 6-step process begins with forming a collaborative planning team. A plan written without stakeholder input lacks buy-in, perspective, and the information needed for a realistic, actionable plan. All other steps follow from this foundation.",diff:"beginner",ctry:"core"},
{id:17,d:2,sub:"2.E",q:"An EOC readiness check shows backup comms working, systems updated, supplies stocked — but 3 of 12 EOC positions have no trained backup. What is the correct assessment?",opts:["EOC is fully ready — equipment and systems are operational","Critical gap — people are a core component of EOC readiness","EOC should be declared non-operational until all positions are covered","Acceptable if the 3 positions are lower-priority"],ans:1,exp:"IS-2200 defines EOC readiness as Forms + People + Plans + Technology. A gap in trained personnel is a critical gap regardless of equipment status. All four elements must be ready. People readiness is not secondary to technology.",diff:"intermediate",ctry:"core"},
{id:18,d:2,sub:"2.L",q:"What is the PRIMARY benefit of pre-scripted public messaging templates?",opts:["Eliminate the need for a trained PIO","Enable rapid, consistent, pre-approved messaging in the high-pressure early phase of an incident","Satisfy media obligations without real-time updates","Prevent the need for JIC activation"],ans:1,exp:"Templates enable 15-minute release turnaround with consistent, pre-approved messaging during the critical early incident period. They do not replace PIOs or JICs — they give PIOs a pre-approved framework. Real-time facts still need to be inserted.",diff:"beginner",ctry:"core"},
{id:19,d:2,sub:"2.F",q:"Which principle BEST describes the Whole Community approach to emergency management?",opts:["EM office coordinates response; other agencies follow its direction","EM is most effective when government, NGOs, private sector, and individuals ALL actively participate","Only government agencies have formal EM responsibilities","NGOs and private sector are supplemental, activated only during declarations"],ans:1,exp:"FEMA's Whole Community approach: effective EM requires active participation from individuals, families, NGOs, private sector, faith communities, and all levels of government. This is a foundational philosophy tested throughout the AEM exam.",diff:"beginner",ctry:"core"},
{id:20,d:2,sub:"2.O",q:"An EM duty officer sees an Environment Canada Tornado Watch for a county 80 km away. What is the MOST appropriate immediate action?",opts:["Activate EOC to full capacity","Take no action — the watch is in another county","Review the pre-established weather trigger protocol and implement appropriate readiness actions","Issue a public warning for the whole jurisdiction"],ans:2,exp:"A watch (conditions favorable) in a neighboring area triggers pre-established readiness actions per protocol — not full activation. Full activation and public warnings are for imminent threats. Ignoring adjacent threats is poor situational awareness.",diff:"intermediate",ctry:"Canada"},
{id:21,d:2,sub:"2.R",q:"ICS 300 differs from ICS 200 in that ICS 300 is designed for:",opts:["All personnel requiring any ICS knowledge","Supervisors managing initial single-resource responses","Personnel managing or supporting expanding, multi-resource incidents","Command and General Staff in the most complex incidents"],ans:2,exp:"ICS 200 = supervisors in initial, single-resource responses. ICS 300 = expanding incidents requiring multiple resources and organizational structures — typically activated for Type 3 incidents. ICS 300 is instructor-led, not self-paced online.",diff:"intermediate",ctry:"core"},
{id:22,d:2,sub:"2.H",q:"EOC position checklists are BEST described as tools that:",opts:["Replace formal training on EOC procedures","Reduce cognitive load and prevent omissions during high-stress activations","Serve primarily as audit documentation","Are only needed for rarely-used positions"],ans:1,exp:"Aviation and surgical research confirms that checklists reduce errors even for experienced professionals under stress. EOC checklists serve ALL positions, complement training (not replace it), and have primary operational value, not just audit value.",diff:"intermediate",ctry:"core"},
{id:23,d:2,sub:"2.A",q:"An EM office is managing 6 concurrent projects with limited staff. Which tool is MOST useful for tracking task ownership and deadlines?",opts:["A comprehensive risk register","A RACI matrix and Gantt charts for each project","A detailed cost-benefit analysis","A stakeholder engagement log"],ans:1,exp:"RACI matrices (Responsible, Accountable, Consulted, Informed) clarify who owns each task; Gantt charts provide scheduling with dependencies. Together they address the specific challenge of multi-project management with limited staff.",diff:"intermediate",ctry:"core"},
{id:24,d:2,sub:"2.Q",q:"An EM coordinator discovers 40% of EOC staff have never completed ICS 300. The MOST appropriate first step is:",opts:["Immediately remove those staff from the EOC roster","Conduct a Training Needs Assessment to prioritize and plan training","Schedule all 40% for ICS 300 in the next 30 days","Report the gap to provincial EM and await guidance"],ans:1,exp:"A Training Needs Assessment is the correct first step — it confirms the gap, identifies root causes (budget? scheduling?), and produces a prioritized training plan. Immediate removal undermines staffing; scheduling without assessment may not be feasible.",diff:"intermediate",ctry:"core"},
{id:25,d:2,sub:"2.N",q:"The PRIMARY purpose of a Work Breakdown Structure (WBS) in EM project management is:",opts:["To satisfy a grant reporting requirement","To decompose project scope into components that can be assigned, scheduled, and tracked","To provide a public-facing summary of activities","To establish the project budget"],ans:1,exp:"The WBS breaks total project scope into smaller, manageable deliverables assigned to responsible parties, with scheduling and tracking. While it informs budget and reporting, its primary purpose is scope decomposition and accountability.",diff:"beginner",ctry:"core"},
{id:26,d:2,sub:"2.P",q:"An EM coordinator's stakeholder analysis reveals the relationship with a new hospital EM manager has been neglected for 6 months. The MOST appropriate proactive response is:",opts:["Wait until the next scheduled stakeholder meeting","Schedule a direct meeting with the new manager to rebuild the relationship now","Assign a junior staff member to manage the hospital relationship","Require the hospital to formally recommit to the MOU"],ans:1,exp:"Identified relationship gaps must be proactively addressed before an incident reveals them. Direct relationship-building between coordinators is the most effective approach. Delegating to junior staff or administrative remedies substitute process for actual relationship work.",diff:"intermediate",ctry:"core"},
{id:27,d:2,sub:"2.B",q:"'Devolution' in COOP planning means:",opts:["Transfer of jurisdiction from municipal to provincial authority","Transfer of statutory authority from primary to alternate personnel when primary staff are incapacitated","Reduction in scope of an EM program during budget cuts","Handoff of incident command between ICs"],ans:1,exp:"Devolution is a specific COOP element: when primary personnel are unavailable, authority automatically transfers to pre-designated alternates via a succession list. This is pre-planned and automatic — distinct from normal succession planning.",diff:"advanced",ctry:"core"},
{id:28,d:2,sub:"2.S",q:"After reviewing Fort McMurray wildfire research showing social media provided better situational awareness than official channels, the MOST appropriate response is:",opts:["Discourage social media use in EM to maintain information control","Systematically review and update current social media monitoring protocols based on this evidence","Note the finding but continue with established protocols","Brief elected officials and await policy direction"],ans:1,exp:"Evidence-informed practice means changing practice based on evidence. Research findings should trigger systematic review and update of protocols — not just noting, not waiting. This is the core principle of competency 2.S.",diff:"intermediate",ctry:"Canada"},
// DOMAIN 3 - Mitigation (6.24%)
{id:29,d:3,sub:"3.C",q:"A flood barrier project costs $500,000 and has a Benefit-Cost Ratio (BCR) of 3.8. What does this mean?",opts:["The project will cost $3.8M over its lifetime","For every dollar invested, $3.80 in future flood damage is avoided","The project is 3.8% more cost-effective than alternatives","The project has a 3.8-year payback period"],ans:1,exp:"BCR = benefits (losses avoided) ÷ cost. BCR of 3.8 means $3.80 avoided for every $1 invested. BCR > 1.0 = cost-effective. FEMA requires positive BCR for HMGP project eligibility. This ROI language resonates with elected officials.",diff:"intermediate",ctry:"core"},
{id:30,d:3,sub:"3.B",q:"Which BEST describes the difference between structural and non-structural mitigation?",opts:["Structural costs more; non-structural is cheaper","Structural = physical modifications to the built environment; non-structural = policies, regulations, education, warning systems","Structural is required by law; non-structural is optional","Structural applies to buildings; non-structural applies to natural environments"],ans:1,exp:"Structural mitigation = physical changes (levees, building retrofits). Non-structural = policies and processes (zoning bylaws, building codes, early warning systems, public education). Both are essential to a comprehensive mitigation strategy.",diff:"beginner",ctry:"core"},
{id:31,d:3,sub:"3.E",q:"A community has 25 mitigation projects but can only fund 5. The BEST prioritization approach is:",opts:["Fund the 5 cheapest to demonstrate program efficiency","Use a scoring matrix considering risk reduction potential, cost-benefit, equity, and feasibility","Fund projects in politically supported geographic areas","Select projects targeting the highest-probability hazards only"],ans:1,exp:"Mitigation prioritization requires a multi-criteria approach: risk reduction potential, BCR, equity impact, and technical feasibility. Political factors should not drive selection. A scoring matrix ensures defensible, evidence-based decisions.",diff:"intermediate",ctry:"core"},
{id:32,d:3,sub:"3.F",q:"A community risk assessment identifies earthquake as a moderate hazard. The MOST comprehensive set of controls includes:",opts:["Seismic retrofit program only","Public education campaign only","Seismic retrofit standards AND building codes (structural) PLUS education AND early warning (non-structural)","Focus on evacuation planning since structural damage cannot be prevented"],ans:2,exp:"Comprehensive mitigation requires both structural (seismic retrofits, updated building codes) and non-structural (public education, early warning, land use regulations) controls. Single-category approaches leave significant risk reduction opportunities on the table.",diff:"intermediate",ctry:"core"},
{id:33,d:3,sub:"3.A",q:"After a major incident, an AAR finds that fire and police could not communicate directly for 6 hours due to incompatible radio systems. This represents:",opts:["A training gap","A resource gap","An interoperability gap","A planning gap"],ans:2,exp:"Interoperability gaps occur when agencies cannot communicate due to incompatible technologies, frequencies, or protocols. This is one of the most commonly cited AAR findings from major incidents. Solutions include gateway technology, shared channels, or a common radio system.",diff:"beginner",ctry:"core"},
{id:34,d:3,sub:"3.D",q:"Which international framework establishes 4 priorities for disaster risk reduction from 2015 to 2030?",opts:["Hyogo Framework","Paris Agreement","Sendai Framework for Disaster Risk Reduction","IAEM Strategic Plan"],ans:2,exp:"The Sendai Framework (2015-2030) has 4 priorities: (1) Understanding disaster risk, (2) Strengthening DRR governance, (3) Investing in DRR for resilience, (4) Enhancing disaster preparedness for response. It replaced the 2005-2015 Hyogo Framework.",diff:"beginner",ctry:"core"},
{id:35,d:3,sub:"3.C",q:"Which Canadian program provides grant funding for flood mapping, infrastructure mitigation, and community resilience projects?",opts:["Disaster Financial Assistance Arrangements (DFAA)","National Disaster Mitigation Program (NDMP)","Public Safety Canada Emergency Management Fund","Emergency Management Planning Grant"],ans:1,exp:"The NDMP funds mitigation projects — flood risk mapping, structural mitigation, community resilience initiatives. DFAA is for recovery costs AFTER a declared disaster, not for mitigation. This Canadian distinction is frequently tested.",diff:"intermediate",ctry:"Canada"},
// DOMAIN 4 - Incident Response (20.24%)
{id:36,d:4,sub:"4.D",q:"During a major flood, the EOC is activated. What is the PRIMARY function of the EOC?",opts:["Commanding all field operations and directing responders","Coordinating information, resources, and policy support for field operations","Serving as the Incident Command Post","Replacing the Incident Commander during large-scale events"],ans:1,exp:"The EOC's function is COORDINATION — providing strategic support, resource coordination, information management, and policy guidance. The ICP handles tactical, on-scene command. EOC ≠ ICP. This is the most frequently tested distinction on the AEM exam.",diff:"beginner",ctry:"core"},
{id:37,d:4,sub:"4.G",q:"The 'Planning P' in ICS refers to:",opts:["A physical checklist posted in the Planning Section","The cyclical process for developing Incident Action Plans each operational period","A specific ICS form for documenting planning assumptions","A FEMA training standard for planning officers"],ans:1,exp:"The Planning P (P-Process) is the ICS operational planning cycle: notification → initial response → IC/UC → incident brief → planning meetings → IAP preparation → approval → operations briefing → execute → assess → repeat. It drives IAP development.",diff:"intermediate",ctry:"core"},
{id:38,d:4,sub:"4.F",q:"A situation report (SITREP) should primarily contain:",opts:["Speculation about future developments to help decision-makers plan","Factual information about current status, actions taken, and immediate needs","Public relations messaging to maintain community confidence","Comprehensive history of all incident decisions"],ans:1,exp:"SITREPs are factual documents: what is happening now, what has been done, what is needed, what comes next. No speculation, no PR function. They are operational communication tools for decision-makers, produced at regular intervals.",diff:"beginner",ctry:"core"},
{id:39,d:4,sub:"4.H",q:"In NIMS resource typing, Type 1 designates:",opts:["The minimum capability level for mutual aid deployment","The least capable resource in the typing system","The most capable resource — largest, best equipped, most experienced","A resource that requires special training before deployment"],ans:2,exp:"Type 1 = MOST capable (Type 4 = least capable). Standardized typing enables precise mutual aid requests — 'Send a Type 1 water rescue team' communicates exact capability requirements across all jurisdictions without ambiguity.",diff:"beginner",ctry:"core"},
{id:40,d:4,sub:"4.J",q:"The correct sequence for post-incident debriefing is:",opts:["Formal AAR only → Improvement Plan → track progress","Hot debrief (immediate) → Warm debrief (days) → Formal AAR (weeks) → IP → track progress","Improvement Plan → formal AAR → hot debrief","Wait 30 days for full information → single comprehensive debrief → IP"],ans:1,exp:"Progressive debrief sequence: hot debrief (captures fresh observations immediately after) → warm debrief (key staff, within days) → formal AAR (all stakeholders, weeks later) → Improvement Plan with assigned actions → ongoing tracking.",diff:"intermediate",ctry:"core"},
{id:41,d:4,sub:"4.N",q:"During an industrial fire, a false social media rumor claims the fire has spread to a residential area. The MOST appropriate PIO response is:",opts:["Ignore it — official channels are more credible","Post a correction on official social media channels with accurate information immediately","Wait for confirmed information to avoid amplifying the rumor","Forward to the Incident Commander for decision"],ans:1,exp:"Misinformation must be addressed quickly and proactively. Post a correction on official channels immediately. Ignoring allows the rumor to spread; 'avoiding amplification' is a documented crisis comms failure mode. The PIO owns this responsibility.",diff:"intermediate",ctry:"core"},
{id:42,d:4,sub:"4.I",q:"In all incident responses, which priority is ALWAYS ranked first?",opts:["Protection of property","Life safety","Environmental protection","Economic stability"],ans:1,exp:"Life safety is always the first priority — protecting human life takes absolute precedence over property, environment, and economic considerations. This is the foundational principle of ICS and all EM frameworks globally.",diff:"beginner",ctry:"core"},
{id:43,d:4,sub:"4.E",q:"A Joint Information Center (JIC) is BEST described as:",opts:["A database where agencies share incident data","A physical location where public information staff from multiple agencies coordinate to release consistent information","A call center for public questions about an incident","The same as a Joint Information System (JIS)"],ans:1,exp:"The JIC is the physical location. The JIS (Joint Information System) is the broader structure/concept. They are related but NOT identical — JIS is the system; JIC is one of its physical components. This distinction is tested on the AEM exam.",diff:"intermediate",ctry:"core"},
{id:44,d:4,sub:"4.L",q:"A power outage causes a water treatment pump failure, which triggers a boil water advisory, which leads to increased hospital demand. This is an example of:",opts:["Multi-agency response escalation","Cascading effects from an initial service disruption","A complex incident requiring Unified Command","Critical infrastructure failure requiring federal assistance"],ans:1,exp:"Cascading effects are secondary and tertiary impacts from an initial disruption — each failure triggering another. Understanding cascades is critical for lifeline prioritization and restoration planning.",diff:"intermediate",ctry:"core"},
{id:45,d:4,sub:"4.O",q:"During a 96-hour EOC activation, two staff are making repeated errors after 18-hour shifts. The MOST appropriate action is:",opts:["Recognize their dedication and encourage them to push through","Immediately relieve them and implement mandatory 12-hour shifts with rest periods","Issue a formal performance warning","Assign them lower-priority tasks only"],ans:1,exp:"Fatigue management is a duty of care requirement. NIMS guidance recommends maximum 12-hour shifts during extended operations. Errors under fatigue are predictable and preventable. Performance warnings for fatigue-related errors are inappropriate and counterproductive.",diff:"intermediate",ctry:"core"},
{id:46,d:4,sub:"4.Q",q:"An IC receives a delegation of authority with a $50,000 financial limit. Costs are approaching $48,000. The MOST appropriate action is:",opts:["Continue until the limit is hit, then stop","Proactively notify the agency administrator of the approaching limit and request expanded authorization","Transfer command to an IC with higher authority","Stop all resource acquisition immediately"],ans:1,exp:"When approaching delegation limits, the IC proactively notifies the agency administrator and seeks expanded authority. Stopping operations or transferring command without consultation creates operational gaps and communication failures.",diff:"advanced",ctry:"core"},
{id:47,d:4,sub:"4.K",q:"During a major earthquake response, the EM coordinator advises the provincial EM office on requesting federal assistance. This is an example of:",opts:["Incident command","EOC coordination","Technical guidance as a subject matter expert","Resource management"],ans:2,exp:"Providing technical guidance means using specialized EM knowledge to advise others. The EM coordinator acts as an SME in their area of expertise — an advisory function, distinct from command or coordination.",diff:"intermediate",ctry:"Canada"},
{id:48,d:4,sub:"4.M",q:"Which ICS position is the PRIMARY point of contact for representatives from assisting and cooperating agencies?",opts:["Public Information Officer (PIO)","Liaison Officer (LOFR)","Safety Officer","Operations Section Chief"],ans:1,exp:"The Liaison Officer (LOFR) coordinates with representatives from assisting and cooperating agencies. PIO handles public information; Safety Officer monitors hazards; Operations Section executes tactical work. LOFR is an agency coordination role.",diff:"intermediate",ctry:"core"},
{id:49,d:4,sub:"4.R",q:"During EOC activation, all internet connections fail, taking down WebEOC and the mass notification system. What does this require?",opts:["Suspend EOC operations until connectivity is restored","Activate manual backup systems — physical boards, radio communications, printed directories","Contact the technology vendor and await repair","Transfer EOC functions to a virtual EOC"],ans:1,exp:"Manual backup systems must be pre-established and immediately activatable when technology fails. Physical status boards, radio nets, and printed resources are the backup layer. A virtual EOC also requires internet — which has failed. Technology failure is expected and planned for.",diff:"intermediate",ctry:"core"},
{id:50,d:4,sub:"4.P",q:"FEMA's Crisis Counseling Program (CCP) primarily provides:",opts:["Physical rehabilitation for injured first responders","Short-term mental health crisis counseling for disaster survivors and first responders","Long-term psychiatric hospitalization for severely affected individuals","Physical health triage and emergency medical services"],ans:1,exp:"The CCP provides short-term mental health crisis counseling — not long-term psychiatric care or physical health services. It supports both disaster survivors and first responders experiencing acute stress. This is distinct from clinical mental health treatment by health authorities.",diff:"intermediate",ctry:"core"}
];


const QUESTIONS2=[
// DOMAIN 5 - Recovery (11.14%)
{id:51,d:5,sub:"5.B",q:"Under Canada's DFAA, the federal government covers what percentage of eligible provincial disaster costs ABOVE the per-capita threshold?",opts:["50%","75%","90%","100%"],ans:2,exp:"DFAA: federal government covers 90% of eligible costs above the per-capita threshold. The province pays 100% of costs below the threshold plus 10% of costs above it. DFAA covers response/recovery — NOT mitigation projects (that's NDMP).",diff:"intermediate",ctry:"Canada"},
{id:52,d:5,sub:"5.H",q:"What is the PRIMARY purpose of a Preliminary Damage Assessment (PDA)?",opts:["Assess structural safety of individual buildings for reentry","Document disaster impacts and costs to support a formal disaster declaration request","Identify recovery priorities for the Long-Term Recovery Group","Provide insurance companies with loss estimates"],ans:1,exp:"A PDA is a joint local/state-provincial/federal assessment documenting the nature, extent, and cost of damage to support a formal disaster declaration request. Structural safety is assessed by the RDA. The LTRG uses PDA data but that is not the PDA's primary purpose.",diff:"intermediate",ctry:"core"},
{id:53,d:5,sub:"5.D",q:"The 'Build Back Better' principle in disaster recovery means:",opts:["Completing recovery faster than previous rebuilding timelines","Rebuilding infrastructure more resilient than pre-disaster conditions, incorporating mitigation into recovery","Spending more money on recovery than the disaster cost","Prioritizing economic recovery over physical infrastructure"],ans:1,exp:"Build Back Better means using the recovery opportunity to improve resilience — stronger building codes, relocated facilities out of hazard zones, upgraded infrastructure. It's not about speed or spending more; it's about ensuring the rebuilt community is less vulnerable.",diff:"beginner",ctry:"core"},
{id:54,d:5,sub:"5.D",q:"Recovery planning after a major tornado should be primarily:",opts:["Completed by government EM staff only to ensure technical accuracy","Community-led with affected residents actively participating in planning","Completed within 2 weeks to demonstrate rapid government response","Focused exclusively on physical infrastructure restoration"],ans:1,exp:"Recovery must be community-led — centering affected residents ensures recovery reflects community priorities, builds trust, and produces sustainable outcomes. Government expertise supports but cannot replace community voice. Build Back Better extends beyond infrastructure to social and economic resilience.",diff:"intermediate",ctry:"core"},
{id:55,d:5,sub:"5.G",q:"Which condition MUST be met before authorizing Phase 2 reentry to a flood-damaged area (residents retrieving medications, 1-hour limit)?",opts:["48 hours have passed since flood waters receded","A safety assessment confirms structural safety of routes and buildings in the Phase 2 area","The majority of residents have requested access","The media has been briefed on the reentry plan"],ans:1,exp:"Reentry authorization must be based on verified safety conditions — a structural safety assessment confirming routes are passable and buildings are safe enough for limited access. Time elapsed alone is not sufficient. Resident demand and media briefing do not gate reentry.",diff:"intermediate",ctry:"core"},
{id:56,d:5,sub:"5.I",q:"A 28-item after-action report is finalized after a major wildfire. What is the MOST important next step?",opts:["File the AAR with the provincial EM office","Assign each item to a responsible party with a completion deadline and establish a tracking system","Present findings to council to justify next year's budget","Conduct a second exercise within 30 days"],ans:1,exp:"An AAR without implementation tracking is just a report. Converting findings into an Improvement Plan (IP) with assigned owners, specific deadlines, and a tracking mechanism is the critical next step. Without accountability, improvement items simply accumulate.",diff:"beginner",ctry:"core"},
{id:57,d:5,sub:"5.C",q:"Using FEMA's Lifelines framework, which lifeline typically receives FIRST restoration priority because it enables all others?",opts:["Transportation","Communications","Energy (Power & Fuel)","Food/Water/Shelter"],ans:2,exp:"Energy (power) typically receives priority because it enables restoration of all other lifelines — water treatment plants, hospitals, communications infrastructure all need power. However, lifelines are not rigidly sequenced; immediate life-safety needs in health/medical may take precedence in specific situations.",diff:"advanced",ctry:"core"},
{id:58,d:5,sub:"5.A",q:"Four weeks after a tornado, the most important coordination mechanism for long-term recovery is:",opts:["Keeping the EOC activated at full capacity","Establishing a Long-Term Recovery Group (LTRG) with government, NGOs, faith organizations, and private sector","Transferring all recovery functions to the provincial/federal government","Implementing a media blackout to allow recovery without pressure"],ans:1,exp:"The LTRG is the cornerstone of long-term recovery — coordinating unmet needs with available resources from all sectors, avoiding duplication and gaps. Keeping the EOC active is resource-intensive and inappropriate for the recovery phase. Local capacity and knowledge must be retained.",diff:"intermediate",ctry:"core"},
{id:59,d:5,sub:"5.F",q:"Community engagement after a flood shows elderly residents — who suffered the greatest displacement — are underrepresented at meetings. The MOST appropriate response is:",opts:["Proceed with engaged participants who are available","Design additional outreach for elderly residents including home visits, phone surveys, and transportation assistance","Reduce the number of meetings to improve overall attendance","Appoint a single elderly representative to speak for the whole group"],ans:1,exp:"Equity in recovery requires proactive outreach to remove barriers. Home visits, phone surveys, transportation, and accessible venues address the specific barriers elderly residents face. Proceeding without them produces plans that fail to serve the most vulnerable — those most affected.",diff:"intermediate",ctry:"core"},
{id:60,d:5,sub:"5.K",q:"A disaster case manager works with a 75-year-old flood survivor with mobility limitations who cannot navigate government websites for DFAA assistance. The MOST appropriate approach is:",opts:["Direct the client to the government website and phone number","Provide printed information and let the client apply when ready","Actively assist with the application, make calls on the client's behalf, and follow up until assistance is confirmed","Refer to a community organization and consider the case managed"],ans:2,exp:"Active case management means navigating complex systems on behalf of vulnerable clients — completing applications, following up on claims, and advocating when problems arise. Passive information-provision may work for clients with full capacity, but for this client, active assistance is the appropriate standard of care.",diff:"intermediate",ctry:"Canada"},
{id:61,d:5,sub:"5.E",q:"Which element is MOST critical in a debris removal Scope of Work (SOW) for grant reimbursement eligibility?",opts:["A narrative describing the severity of the event","Specific quantities (estimated cubic yardage), collection zones, disposal sites, and unit pricing","Letters of support from elected officials","Photographs of the debris fields"],ans:1,exp:"Grant-eligible SOWs must be specific and verifiable: exact quantities, defined work areas, approved disposal locations, and reasonable unit pricing. Vague SOWs lead to grant denials and contract disputes. Photos and political support are supplementary; technical SOW detail enables reimbursement.",diff:"intermediate",ctry:"core"},
{id:62,d:5,sub:"5.B",q:"What is the difference between DFAA (Canada) and HMGP (US) regarding their primary purpose?",opts:["Both fund mitigation projects exclusively","DFAA funds disaster recovery costs; HMGP funds mitigation projects after a declared disaster","DFAA funds mitigation; HMGP funds recovery","Both provide individual assistance to disaster survivors"],ans:1,exp:"DFAA (Canada) = federal-provincial cost sharing for disaster response and RECOVERY costs. HMGP (US Hazard Mitigation Grant Program) = funds MITIGATION projects after a presidential disaster declaration. Neither provides direct individual assistance (that is covered by separate programs).",diff:"advanced",ctry:"Canada"},
// DOMAIN 6 - Technologies (5.01%)
{id:63,d:6,sub:"6.A",q:"Canada's National Public Alerting System (NPAS) uses which standard for distributing emergency alert messages?",opts:["NATO Alert Protocol","Common Alerting Protocol — Canadian Profile (CAP-CP)","Emergency Alert System (EAS)","IPAWS"],ans:1,exp:"Canada's NPAS uses CAP-CP (Common Alerting Protocol — Canadian Profile) to distribute emergency alerts simultaneously across multiple channels. The US uses IPAWS with CAP format. EAS is a US broadcast alerting system. CAP is the international standard; NPAS and IPAWS are systems that use it.",diff:"intermediate",ctry:"Canada"},
{id:64,d:6,sub:"6.E",q:"CISA's Cyber Essentials Starter Kit identifies which measure as the MOST foundational cybersecurity protection?",opts:["Hiring a dedicated cybersecurity officer","Multi-Factor Authentication (MFA) for all system access","Annual cybersecurity audits","Encrypting all public-facing communications"],ans:1,exp:"CISA's Cyber Essentials explicitly identifies MFA as foundational — it significantly reduces account compromise risk with minimal cost. The Cyber Essentials framework is an AEM exam resource; know its core elements: MFA, patch regularly, back up data, train staff.",diff:"beginner",ctry:"core"},
{id:65,d:6,sub:"6.B",q:"When evaluating a new incident management technology, which factor is MOST critical for EM contexts?",opts:["Number of features offered","Performance and reliability when internet connectivity is degraded or unavailable","Cost compared to current software","Ease of use for non-technical staff"],ans:1,exp:"EM technology must function under disaster conditions — which often include degraded internet, power outages, and network congestion. A platform that fails when needed most is worse than no platform. Reliability under adverse conditions is the non-negotiable first criterion.",diff:"intermediate",ctry:"core"},
{id:66,d:6,sub:"6.A",q:"What distinguishes a Wireless Emergency Alert (WEA) from an opt-in mass notification system?",opts:["WEA is more accurate; opt-in reaches more people","WEA is broadcast to all capable devices in a geographic area without registration; opt-in requires prior enrollment","WEA is faster; opt-in is more reliable","WEA is limited to federal emergencies; opt-in can be used for any local event"],ans:1,exp:"WEA uses cell broadcast technology — messages go to all capable devices in the geographic area, no registration required. Opt-in systems require residents to enroll in advance and typically have lower penetration rates. Each has different use cases and limitations.",diff:"intermediate",ctry:"core"},
{id:67,d:6,sub:"6.C",q:"During implementation of a new resource tracking system, 'User Acceptance Testing' (UAT) means:",opts:["Testing system security against cyberattacks","End users testing the system against real-world EM scenarios before go-live to identify remaining issues","Testing vendor customer support responsiveness","Verifying the system meets technical contract specifications"],ans:1,exp:"UAT is the final pre-launch phase where actual end users test the system using real-work scenarios. It catches usability issues and workflow problems that technical testing misses. It is the users' formal sign-off before the system becomes operational.",diff:"intermediate",ctry:"core"},
{id:68,d:6,sub:"6.E",q:"A staff member clicks a phishing email and provides their WebEOC login credentials. The MOST appropriate IMMEDIATE response is:",opts:["Warn the staff member not to do it again","Immediately disable the compromised account, change system passwords, notify IT and the CIRT, and assess data accessed","Send a staff-wide phishing awareness email","File an incident report and await IT department guidance"],ans:1,exp:"A compromised credential is an active security incident requiring immediate containment: disable the account, change passwords, notify IT and the CIRT, assess scope. Acting immediately limits damage. Warnings and emails are follow-up education, not incident response. Waiting delays critical containment.",diff:"intermediate",ctry:"core"},
{id:69,d:6,sub:"6.D",q:"Six months after deploying a new incident management system, staff are not using it consistently. Investigation shows training was delivered once with no refreshers. The MOST effective corrective action is:",opts:["Issue a mandatory use policy with consequences for non-compliance","Implement role-specific refresher training and integrate the system into all future exercises","Replace the system with an easier option","Hire a technology trainer for one-on-one coaching"],ans:1,exp:"Role-specific refresher training plus integration into exercises creates sustainable competency — exercises provide realistic practice that reinforces skills better than classroom training alone. Mandatory policies address compliance, not competence. Replacing the system doesn't address the training root cause.",diff:"intermediate",ctry:"core"},
// DOMAIN 7 - Administration (18.73%)
{id:70,d:7,sub:"7.O",q:"An elected official pressures the EM coordinator to direct contracts to a politically connected vendor who did not win the competitive bid. According to the IAEM Code of Ethics, the CORRECT response is:",opts:["Comply to maintain political relationships critical for future budget requests","Follow the competitive bid results, document the pressure received, and report to supervisors and legal counsel","Negotiate a compromise splitting the work between vendors","Consult the winning vendor before making any decision"],ans:1,exp:"The IAEM Code of Ethics (Integrity + Fairness) requires following transparent, competitive procurement. The correct response: maintain the process, document the interaction, report it. Compliance with unethical pressure or political compromise both violate the Code. This scenario tests 7.O specifically.",diff:"advanced",ctry:"core"},
{id:71,d:7,sub:"7.D",q:"A grant is awarded at $300,000 with a 25% local cost-share requirement. What is the minimum local contribution?",opts:["$75,000","$100,000","$225,000","$300,000"],ans:1,exp:"If the grant covers 75% and local covers 25%, total project cost = $300,000 ÷ 0.75 = $400,000. Local match = $400,000 - $300,000 = $100,000. A 75/25 split means total project is $400,000; local contributes $100,000.",diff:"intermediate",ctry:"core"},
{id:72,d:7,sub:"7.H",q:"In Canada, which legislation establishes federal emergency management responsibilities and the Minister of Public Safety's role?",opts:["Canada Emergency Management Act","Public Safety Canada Act","Federal Emergency Response Act","Transportation of Dangerous Goods Act"],ans:0,exp:"The Emergency Management Act (2007) is the primary federal EM legislation in Canada. It defines ministerial responsibilities, the Public Safety Minister's role, and the framework for federal-provincial coordination. The TDG Act governs dangerous goods transport — related but separate.",diff:"intermediate",ctry:"Canada"},
{id:73,d:7,sub:"7.C",q:"An EM office has spent $80,000 of its $120,000 equipment budget and has $45,000 in signed purchase orders outstanding. The remaining uncommitted budget is:",opts:["$40,000","$0","−$5,000 (over budget)","$75,000"],ans:2,exp:"Committed = $80,000 spent + $45,000 encumbered (signed POs) = $125,000. Budget = $120,000. The office is $5,000 over budget. Encumbrances (signed POs) must be tracked against the budget as if already spent to prevent over-commitment.",diff:"advanced",ctry:"core"},
{id:74,d:7,sub:"7.Q",q:"The correct sequence for Business Continuity Planning is:",opts:["Write the BCP → conduct BIA → test with exercises","Conduct BIA → identify critical functions → set MTD/RTO/RPO → design recovery strategies → document BCP → exercise → maintain","Test with exercises → write BCP → conduct BIA","Identify critical functions → conduct BIA → test → write BCP"],ans:1,exp:"The BCP sequence: BIA (identifies critical functions and impacts) → set MTD/RTO/RPO → design recovery strategies → document BCP → exercise to validate → maintain. BIA is ALWAYS the foundation. This sequence is directly tested on the AEM exam.",diff:"intermediate",ctry:"core"},
{id:75,d:7,sub:"7.H",q:"The CSA Z1600 standard provides guidance on:",opts:["Safe transportation of dangerous goods","Emergency and continuity management programs for organizations","Personal protective equipment for first responders","Environmental assessment for emergency facilities"],ans:1,exp:"CSA Z1600 'Emergency and Continuity Management Program' is the Canadian standard for comprehensive EM programs — equivalent to NFPA 1600 and aligned with ISO 22301. It provides the framework organizations use to build and assess their EM programs.",diff:"intermediate",ctry:"Canada"},
{id:76,d:7,sub:"7.E",q:"When advocating for EM program budget increases to fiscally-focused councillors, which argument is MOST persuasive?",opts:["The EM office has not had a pay increase in 3 years","A $400,000 mitigation investment would have prevented $3.2M in damage from last year's event","The EM coordinator has a professional obligation under the IAEM Code of Ethics","Other comparable municipalities invest more per capita in EM"],ans:1,exp:"Cost-avoidance and ROI arguments resonate most with fiscally-focused decision-makers. The $400K preventing $3.2M in damage is an 8:1 return — expressed in financial language councils understand. Salary, ethical obligations, and peer comparisons are less persuasive in budget contexts.",diff:"intermediate",ctry:"core"},
{id:77,d:7,sub:"7.A",q:"Two experienced EM staff are considering leaving due to burnout after multiple major incidents. The MOST proactive response is:",opts:["Offer financial incentives to retain them","Implement a comprehensive wellness program including peer support, mandatory incident rest periods, and workload management","Reassign them to lower-stress administrative roles","Thank them for their service and begin recruiting replacements"],ans:1,exp:"Occupational stress injury (OSI) in EM is a serious workforce issue. The most effective response is systemic: wellness programs, peer support, and workload management address root causes. Financial incentives alone don't address burnout; reassignment treats symptoms, not causes.",diff:"intermediate",ctry:"core"},
{id:78,d:7,sub:"7.N",q:"An EM inventory lists a Type 2 water rescue boat, but physical inspection reveals the engine has been out of service for 18 months. This illustrates:",opts:["A minor administrative discrepancy","A critical readiness gap — paper inventories are insufficient without physical verification","A Type 2 classification error","A training gap in boat operation"],ans:1,exp:"Physical verification of resource inventories is mandatory — paper lists are unreliable without validation. An inventory listing a non-functional resource creates false confidence in capabilities that don't exist, which is worse than having no inventory at all.",diff:"beginner",ctry:"core"},
{id:79,d:7,sub:"7.F",q:"The duty officer protocol for an EM office exists only in the head of the senior duty officer and has never been documented. This creates:",opts:["No significant risk — experienced staff don't need written protocols","Loss of institutional knowledge if that officer leaves, and inconsistent protocol application by others","A compliance violation resulting in grant funding loss","Administrative inefficiency but no operational risk"],ans:1,exp:"Undocumented procedures create operational risk: if the experienced officer leaves or is unavailable, critical knowledge is lost. Other staff may apply the protocol inconsistently. Documentation is essential for institutional continuity, consistent application, and training new staff.",diff:"beginner",ctry:"core"},
{id:80,d:7,sub:"7.K",q:"A briefing note prepared for a mayor about an active flood should be structured:",opts:["Chronologically — start with when the flood began and narrate to present","Bottom-line up front — lead with current status and decisions needed, followed by supporting background","Comprehensively — cover all details before making recommendations","As Q&A — list anticipated questions with pre-drafted answers"],ans:1,exp:"Writing for elected officials: bottom-line up front (BLUF). Lead with the key message, current status, and decision required, then provide supporting detail. Elected officials are time-constrained — they need the 'so what' immediately. Chronological narratives bury the key message.",diff:"intermediate",ctry:"core"},
{id:81,d:7,sub:"7.L",q:"An annual report should emphasize OUTCOMES rather than outputs. Which of these is an OUTCOME?",opts:["Delivered 12 training sessions to 145 participants","Conducted 3 tabletop exercises","Household preparedness rates increased from 28% to 41% following the public education campaign","Updated the EOP flood annex"],ans:2,exp:"Outcomes measure what CHANGED as a result of activities. Increased preparedness rates represent actual change in community resilience. Outputs (training delivered, exercises conducted, EOP updated) describe activities performed. Decision-makers care about outcomes — return on investment.",diff:"intermediate",ctry:"core"},
{id:82,d:7,sub:"7.D",q:"A grant requires quarterly financial reports with original receipts. An EM coordinator has been filing reports but not retaining all original receipts. The MOST immediate concern is:",opts:["The quarterly reports may not have been filed on time","Ineligibility for reimbursement of undocumented expenses and potential audit findings requiring repayment","The grant may not cover activities as described","Staff need training on grant reporting software"],ans:1,exp:"Missing original receipts creates direct audit risk — grant auditors require documentation of all claimed expenses. Undocumented expenses may be found ineligible, requiring repayment. This is the most immediate and serious consequence. Immediate action: reconstruct documentation and consult finance and the grant officer.",diff:"advanced",ctry:"core"},
{id:83,d:7,sub:"7.G",q:"Which of the following BEST describes psychological safety in an EM team context?",opts:["Ensuring the EOC building meets all fire safety codes","A team environment where members feel safe to speak up, ask questions, and report errors without fear of punishment","Providing adequate personal protective equipment during field operations","Mandatory rest periods during extended incident operations"],ans:1,exp:"Psychological safety means team members can raise concerns, report mistakes, and ask questions without fear — it is the foundation of high-performing, learning organizations. Research consistently identifies psychological safety as the top predictor of team effectiveness, especially in high-stakes EM contexts.",diff:"intermediate",ctry:"core"},
// DOMAIN 8 - Professional Development (10.54%)
{id:84,d:8,sub:"8.A",q:"Which certification is IAEM's entry-level emergency management credential?",opts:["CEM (Certified Emergency Manager)","AEM (Associate Emergency Manager)","CPEM (Certified Professional Emergency Manager)","PEM (Professional Emergency Manager)"],ans:1,exp:"AEM (Associate Emergency Manager) is IAEM's entry-level credential for professionals early in their EM career. CEM is the advanced certification requiring more documented experience, training hours, and contributions to the profession. Both require IAEM membership.",diff:"beginner",ctry:"core"},
{id:85,d:8,sub:"8.H",q:"Which of the following qualifies as a professional development activity for AEM/CEM recertification?",opts:["Completing assigned incident reports during a major response","Attending an IAEM regional conference and completing 3 workshops","Conducting a routine annual EOP review","Managing grant reimbursement claims"],ans:1,exp:"Professional development for AEM/CEM includes training courses, conferences, webinars, academic coursework, and writing/publishing. Routine job duties (incident reports, EOP reviews, grant management) are standard job performance — NOT professional development.",diff:"intermediate",ctry:"core"},
{id:86,d:8,sub:"8.I",q:"Which activity BEST qualifies as 'providing subject matter service to the profession'?",opts:["Attending an EM conference as a participant","Performing incident command duties during a wildfire","Writing and publishing an article in the Journal of Emergency Management","Completing 5 FEMA IS courses in a single year"],ans:2,exp:"Subject matter service means giving expertise BACK to the profession: publishing, teaching, mentoring, serving on professional committees, or facilitating exercises for peers. Attending conferences, performing job duties, and completing training are professional development — not service to the profession.",diff:"intermediate",ctry:"core"},
{id:87,d:8,sub:"8.D",q:"During a major flood, an EM coordinator makes a direct call to a peer in a neighboring municipality to get advance warning about a mutual aid resource request. This demonstrates the value of:",opts:["Formal mutual aid agreements","Professional peer networks providing faster informal information channels","Good social skills","Inter-agency exercises"],ans:1,exp:"Peer networks provide faster informal information than formal processes — the peer call happens before the formal mutual aid request goes through official channels. This is a direct operational benefit of deliberate professional relationship-building. Networks are operational assets, not just career tools.",diff:"intermediate",ctry:"core"},
{id:88,d:8,sub:"8.C",q:"An EM coordinator has not communicated with the regional hospital's EM manager in 8 months. A multi-casualty incident then occurs. The MOST likely consequence is:",opts:["No significant consequence — official channels work regardless of relationships","Delayed coordination, misaligned expectations, and reduced trust at the exact moment when fast cooperation is most needed","The hospital will refuse to participate in the response","Provincial EM will step in to coordinate directly with the hospital"],ans:1,exp:"Strong pre-event relationships directly determine speed and quality of coordination during events. Neglected relationships result in: delayed communication, unclear expectations, misaligned priorities, and reduced trust — precisely when fast, seamless cooperation is most critical.",diff:"intermediate",ctry:"core"},
{id:89,d:8,sub:"8.E",q:"Participation in the development of CSA Z1600 standard updates qualifies as:",opts:["Professional development activity (consuming knowledge)","Subject matter service to the profession (contributing expertise)","Both professional development AND subject matter service","Neither — standards development is a government function"],ans:2,exp:"Standards development participation is both: (a) subject matter service — contributing expertise to advance the profession, and (b) professional development — learning through exposure to current research and peer expertise. IAEM allows crediting standards work in both categories for recertification.",diff:"intermediate",ctry:"Canada"},
{id:90,d:8,sub:"8.B",q:"The PRIMARY purpose of maintaining proactive relationships with legislators before a disaster is:",opts:["To ensure positive media coverage during incidents","Pre-established relationships mean legislators respond faster and more supportively during emergencies and advocate for EM resources","To satisfy the professional development requirement for AEM recertification","To comply with the IAEM Code of Ethics stakeholder engagement requirement"],ans:1,exp:"Legislative relationships have direct operational and resource implications. Pre-established relationships mean: faster disaster declaration processes, better understanding of EM needs, and legislators who advocate for adequate EM funding — both before and after disasters.",diff:"intermediate",ctry:"core"},
// MIXED SCENARIOS - Advanced Integration Questions
{id:91,d:2,sub:"2.K",q:"An exercise after-action report notes: 'EOC staff demonstrated excellent use of the ICS Planning P during operational period transitions.' This indicates:",opts:["Staff could describe the Planning P in a written test","EOC staff successfully executed the IAP development cycle in a real exercise environment","The exercise scenario specifically tested the Planning P","Staff had all completed ICS 300 before the exercise"],ans:1,exp:"An AAR noting strength in using the Planning P in exercise indicates practical application — not just theoretical knowledge. This is the purpose of exercises: validating that training has translated into operational skill. The strength demonstrates the investment in ICS training was worthwhile.",diff:"intermediate",ctry:"core"},
{id:92,d:4,sub:"4.B",q:"An EOC Operations Section Chief during a flood is MOST appropriately engaged in:",opts:["Reading the morning news to understand community impact","Receiving hourly field reports, tracking resource deployment on GIS, and briefing the EOC Director every 2 hours","Checking the 48-hour weather forecast","Reviewing plans for the next operational period"],ans:1,exp:"Monitoring on-going operations is active and real-time: receiving field reports, tracking resource status, maintaining situational awareness, and regular leadership briefings. Reading news is media monitoring; weather checking is threat monitoring; reviewing next-period plans is Planning Section work.",diff:"beginner",ctry:"core"},
{id:93,d:2,sub:"2.G",q:"EMAC (Emergency Management Assistance Compact) in the US enables:",opts:["Federal funding for state EM programs","All 50 states to share resources across state lines during disasters through a standardized legal framework","A mutual aid protocol for international resource sharing","A certification program for multi-state EM coordinators"],ans:1,exp:"EMAC is the national interstate compact enabling rapid resource sharing across all 50 US states, DC, and territories. It pre-resolves legal, liability, command, and reimbursement questions that would otherwise delay interstate resource sharing.",diff:"intermediate",ctry:"USA"},
{id:94,d:4,sub:"4.G",q:"Which ICS section is responsible for providing facilities, services, and material to support incident operations?",opts:["Operations Section","Planning Section","Logistics Section","Finance/Administration Section"],ans:2,exp:"Logistics provides facilities, services, and material: ordering/tracking resources, communications equipment, base/camp operations, food and medical services for personnel. Operations does the work; Logistics enables Operations. Finance/Admin tracks costs.",diff:"beginner",ctry:"core"},
{id:95,d:3,sub:"3.E",q:"A local mitigation plan committee scores 30 projects and finds the top-ranked projects are all in wealthy neighborhoods, while flood-prone low-income areas score lower due to lower property values reducing the BCR. This raises concerns about:",opts:["Mathematical errors in the scoring matrix","An equity gap — standard BCR calculations can systematically undervalue mitigation in low-income communities","The projects in wealthy areas being automatically more worthy","The matrix being weighted too heavily toward technical feasibility"],ans:1,exp:"Standard BCR calculations are based on property values and economic productivity — both lower in disadvantaged areas — leading to systematic undervaluation of mitigation benefits for low-income communities. FEMA and Canadian EM guidance now explicitly call for equity adjustments in mitigation prioritization.",diff:"advanced",ctry:"core"},
{id:96,d:5,sub:"5.G",q:"Following a chemical spill, which ADDITIONAL clearance beyond structural safety is required before residential reentry?",opts:["A media briefing confirming the incident is resolved","Air quality monitoring confirming contaminant levels are below established hazardous thresholds","Signed waivers from returning residents acknowledging residual risk","Council approval for the reentry authorization"],ans:1,exp:"Chemical spill reentry requires hazmat clearance in addition to structural safety — air quality monitoring must confirm atmospheric contaminants are below health thresholds. Structural safety alone is insufficient when chemical contamination is involved. Waivers do not substitute for safety verification.",diff:"intermediate",ctry:"core"},
{id:97,d:2,sub:"2.E",q:"The four core elements of EOC operational readiness per IS-2200 are:",opts:["Staff, Equipment, Communication, Protocols","Forms, People, Plans, Technology","Activation, Operations, Deactivation, Documentation","Command, Operations, Logistics, Finance"],ans:1,exp:"IS-2200 defines EOC readiness as Forms + People + Plans + Technology. ALL four must be functional — a gap in any element means the EOC is not fully operationally ready. This is one of the most directly tested frameworks from the IS-2200 resource.",diff:"beginner",ctry:"core"},
{id:98,d:7,sub:"7.H",q:"An EM program compliance calendar should track which of the following?",opts:["Staff birthdays and office events","EOP review deadlines, grant reporting dates, training currency requirements, and audit schedules","Only externally imposed regulatory deadlines","Only grant-related compliance requirements"],ans:1,exp:"A compliance calendar tracks ALL compliance obligations: regulatory review deadlines, grant reporting dates (multiple grants may have different schedules), staff training currency requirements, audit dates, and legislatively required plan updates. Missing any creates legal and financial risk.",diff:"beginner",ctry:"core"},
{id:99,d:1,sub:"1.B",q:"A new private data center hosts 911 dispatch systems for 4 municipalities. This facility should be classified as:",opts:["A standard commercial facility requiring no special EM treatment","Critical infrastructure requiring inclusion in the CI registry with a designated contact and integration into relevant EOP annexes","A low-risk facility since it is not government-owned","A federal facility managed under federal CI programs only"],ans:1,exp:"CI classification is based on CONSEQUENCE of disruption — not ownership. A facility hosting 911 systems for multiple municipalities has severe potential impact on life-safety services and must be in the CI registry. Private ownership does not exempt facilities from CI classification if the consequence threshold is met.",diff:"advanced",ctry:"core"},
{id:100,d:4,sub:"4.A",q:"An EM duty officer sees an Environment Canada Special Weather Statement about a potential significant winter storm 4–5 days away. The MOST appropriate immediate action is:",opts:["Activate the EOC to Level 2 and notify all partner agencies","Review and update the winter weather trigger protocol, notify key partners for awareness, and increase monitoring frequency","Take no action until the event is 24 hours away and certainty is higher","Issue a public warning about the potential storm"],ans:1,exp:"A Special Weather Statement 4-5 days out triggers pre-event readiness actions — not full activation. Review trigger protocols, notify key partners for situational awareness, increase monitoring frequency, and consider pre-positioning resources. Full activation and public warnings are reserved for higher-certainty, imminent events.",diff:"intermediate",ctry:"Canada"}
];


const QUESTIONS3=[
// DOMAIN 1 - Risk Management (more advanced)
{id:101,d:1,sub:"1.E",q:"During a risk assessment, a jurisdiction identifies a dam failure scenario with LOW probability but CATASTROPHIC consequence affecting 50,000 people. A lightning strike scenario has HIGH probability but MINOR consequence. Which statement BEST guides the planning response?",opts:["Only plan for the lightning strike — it is the most likely event","Only plan for the dam failure — it has the worst outcome","Both require planning: the dam failure drives catastrophic planning protocols; lightning drives routine operational readiness","Prioritize whichever hazard the community is most afraid of"],ans:2,exp:"Both probability AND consequence drive planning. High-probability/low-consequence hazards drive operational readiness and routine procedures. Low-probability/catastrophic-consequence hazards drive catastrophic incident planning, even with minimal mitigation investment. Ignoring either dimension creates planning gaps.",diff:"advanced",ctry:"core"},
