{t:"THIRA (4 Steps)",d:"(1) Identify threats & hazards → (2) Give context (worst-reasonable scenario) → (3) Establish capability targets → (4) Apply results to planning. Required for BSIR grant programs. Canada equivalent = HRVA.",dom:1},
{t:"Maximum Tolerable Downtime (MTD)",d:"The ABSOLUTE LONGEST a function can be disrupted before consequences become unacceptable. The RTO must ALWAYS be shorter than the MTD. Set during the BIA process.",dom:1},
{t:"Recovery Time Objective (RTO)",d:"The TARGET time within which a function must be restored after disruption. Must be shorter than MTD. Established during the BIA.",dom:1},
{t:"Recovery Point Objective (RPO)",d:"Maximum acceptable DATA LOSS measured in time (e.g., cannot lose more than 4 hours of transaction data). Drives backup frequency. Distinct from RTO which measures restoration time.",dom:1},
{t:"Risk Formula",d:"Risk = Probability × Consequence. Vulnerability and exposure influence consequence; threat relates to probability. The 2-factor model is most widely tested.",dom:1},
{t:"HRVA (Canada)",d:"Hazard, Risk, and Vulnerability Analysis — Canada's THIRA equivalent. Produces a risk profile ranking hazards by probability and consequence. Drives planning priorities at provincial and municipal level.",dom:1},
{t:"BCR (Benefit-Cost Ratio)",d:"BCR = Benefits (losses avoided) ÷ Cost of mitigation project. BCR > 1.0 = cost-effective. FEMA requires BCR > 1.0 for HMGP projects. Research shows average BCR of 6:1 for EM mitigation.",dom:3},
{t:"PDCA Cycle",d:"Plan → Do → Check → Act. Continuous improvement cycle in EM programs. 'Check' identifies gaps; 'Act' implements improvements. Tied directly to program gap analysis competency 1.C.",dom:1},
{t:"EOC vs ICP — THE KEY DISTINCTION",d:"EOC = Emergency Operations Center = COORDINATION (strategic support, resources, policy). ICP = Incident Command Post = ON-SCENE COMMAND (tactical operations). DIFFERENT locations, DIFFERENT functions. Most tested AEM distinction.",dom:4},
{t:"ICS 100 / 200 / 300 / 400",d:"100 = Everyone (self-paced online). 200 = Supervisors, initial response (self-paced online). 300 = Expanding incidents, tactical roles (INSTRUCTOR-LED ONLY). 400 = Complex incidents, Command & General Staff (INSTRUCTOR-LED ONLY).",dom:2},
{t:"Planning P (P-Process)",d:"ICS planning cycle for IAP development: notification → initial response → IC/UC → incident brief → planning meetings → IAP prep → approval → ops briefing → execute → assess → REPEAT each operational period.",dom:4},
{t:"EOC Readiness = Forms + People + Plans + Technology",d:"IS-2200's four elements. ALL four must be functional. A gap in ANY element = EOC is NOT fully ready. This formula is directly tested. People readiness is as important as technology.",dom:2},
{t:"HSEEP Progressive Exercise Approach",d:"Discussion-based: Seminars → Workshops → Tabletop Exercises → Games. Operations-based: Drills → Functional Exercises → Full-Scale Exercises. Discussion builds knowledge; operations-based validates capability.",dom:2},
{t:"AAR/IP (After Action Report / Improvement Plan)",d:"AAR = what happened, what worked, what didn't. IP = specific corrective actions with owners and DEADLINES. Both required after exercises and real incidents. The IP must be tracked — it is not optional filing.",dom:2},
{t:"CPG 101 — 6-Step Planning Process",d:"(1) Form collaborative planning team (2) Understand the situation (3) Determine goals and objectives (4) Plan development (5) Plan preparation, review, and approval (6) Plan implementation and maintenance.",dom:2},
{t:"Whole Community Approach",d:"Effective EM requires active participation from: individuals, families, NGOs, private sector, faith communities, and ALL levels of government. NOT government-only. This is a foundational FEMA philosophy.",dom:2},
{t:"Community Lifelines (7)",d:"Safety & Security | Food/Water/Shelter | Health & Medical | Energy (Power & Fuel) | Communications | Transportation | Hazardous Material. Energy typically restored first as it enables all others.",dom:4},
{t:"DFAA (Canada)",d:"Disaster Financial Assistance Arrangements. Federal covers 90% of eligible costs ABOVE per-capita threshold. Province pays 100% below threshold + 10% above. For RESPONSE/RECOVERY only — NOT mitigation (that's NDMP).",dom:5},
{t:"NDMP (Canada)",d:"National Disaster Mitigation Program. Funds MITIGATION projects: flood mapping, structural mitigation, community resilience. Distinct from DFAA which funds recovery costs AFTER a disaster.",dom:3},
{t:"Phased Reentry",d:"First responders → critical personnel → residents (limited access) → general public. Each phase requires SAFETY VERIFICATION before authorization. Time elapsed alone is NOT sufficient to authorize any phase.",dom:5},
{t:"RDA vs PDA",d:"RDA (Rapid Damage Assessment) = first 24-72 hours, local/visual, identifies life-safety priorities. PDA (Preliminary Damage Assessment) = multi-government, documents damage costs, required to support DISASTER DECLARATION.",dom:5},
{t:"Long-Term Recovery Group (LTRG)",d:"Community coalition of government, NGOs, faith organizations, and private sector. Coordinates unmet needs with available resources over months/years after disaster. Cornerstone of long-term recovery.",dom:5},
{t:"Build Back Better",d:"Recovery principle: don't just restore — IMPROVE resilience. Stronger codes, relocated facilities, upgraded infrastructure. The recovery opportunity is used to reduce future risk, not simply recreate pre-disaster vulnerability.",dom:5},
{t:"CAP / NPAS / IPAWS",d:"CAP = Common Alerting Protocol (international STANDARD). NPAS = National Public Alerting System (Canada's SYSTEM using CAP-CP). IPAWS = US SYSTEM using CAP. CAP is the standard; NPAS and IPAWS are systems that USE it.",dom:6},
{t:"WEA vs Opt-In Notification",d:"WEA = cell BROADCAST to ALL capable devices in geographic area, NO registration required. Opt-in = requires prior enrollment. Different technologies, different penetration rates, different use cases.",dom:6},
{t:"CISA Cyber Essentials (Key Elements)",d:"(1) MFA everywhere — most foundational (2) Patch systems regularly (3) Back up data offline (4) Train staff against phishing (5) Know what's on your network. MFA is most commonly tested as 'most foundational.'",dom:6},
{t:"IAEM Code of Ethics (7 Principles)",d:"Awareness | Commitment | Confidentiality | Fairness | Integrity | Personal Responsibility | Respect. In ethics scenarios, INTEGRITY + FAIRNESS most commonly drive the correct answer: follow process, document, report.",dom:7},
{t:"COOP vs COG vs BCP",d:"COOP = individual agency continuity of essential functions. COG = constitutional GOVERNMENT continuity (three branches, succession). BCP = private/nonprofit equivalent of COOP. All start with a BIA.",dom:7},
{t:"CSA Z1600 (Canada)",d:"Canadian standard for Emergency and Continuity Management Programs. Canada's equivalent of NFPA 1600 / ISO 22301. Framework for comprehensive EM programs. Used in compliance assessments under DFAA and other programs.",dom:7},
{t:"Devolution (COOP)",d:"Transfer of statutory authority from primary to ALTERNATE personnel when primary staff are INCAPACITATED. Pre-planned and automatic. Distinct from normal succession planning (which is planned, not forced by incapacitation).",dom:7},
{t:"Emergency Management Act (Canada)",d:"Federal legislation (2007) defining ministerial responsibilities for EM in Canada. Establishes Public Safety Minister's role, federal-provincial coordination framework, and obligations of federal departments for EM planning.",dom:7},
{t:"Transportation of Dangerous Goods Act (Canada)",d:"Federal legislation governing handling, transportation, and importation of dangerous goods. 9 TDG classes. Emergency Response Assistance Plans (ERAPs) required for certain goods. Key EM compliance legislation.",dom:7},
{t:"NIMS Resource Typing",d:"Type 1 = MOST capable (largest, best equipped). Type 4 = least capable. Standardized typing enables precise mutual aid requests across all jurisdictions. 'Send a Type 1 swift water rescue team' means the same everywhere.",dom:4},
{t:"JIS vs JIC",d:"JIS (Joint Information System) = the STRUCTURE/CONCEPT for coordinating public information. JIC (Joint Information Center) = the PHYSICAL LOCATION where JIS functions are performed. JIS is the system; JIC is the facility.",dom:4},
{t:"SITREP (Situation Report)",d:"Factual, periodic incident status summary. Contents: overview, life-safety status, critical needs, resources deployed, actions taken, actions pending. FACTUAL ONLY — no speculation, no PR. For decision-makers.",dom:4},
{t:"Unified Command",d:"ICS structure for multi-jurisdictional/multi-agency incidents where agencies share authority. Produces ONE shared IAP, ONE incident objectives set, ONE voice to the public. Members: agency administrators with overlapping authority.",dom:4},
{t:"Span of Control",d:"Optimal = 1 supervisor to 5 subordinates (range: 3-7). If >7 direct reports, add supervisory layers. If <3, consider consolidating positions. Key ICS principle for maintaining manageable coordination.",dom:4},
{t:"Delegation of Authority",d:"Formal document from agency administrator to IC specifying: financial limit, geographic scope, legal authorities. IC cannot exceed delegation. When approaching limits, IC must PROACTIVELY notify the agency administrator.",dom:4},
{t:"EMAC (USA)",d:"Emergency Management Assistance Compact. All 50 US states + DC + territories. Enables rapid interstate resource sharing. Pre-resolves legal, liability, command authority, and reimbursement — no negotiation needed during disasters.",dom:2},
{t:"AEM vs CEM",d:"AEM = entry-level (fewer years experience). CEM = advanced (requires: documented EM experience + training hours + contributions to profession + passing exam). BOTH require active IAEM membership.",dom:8},
{t:"ICS 300 and 400 — Critical Distinction",d:"ICS 300 and ICS 400 are INSTRUCTOR-LED only. They CANNOT be completed as self-paced online courses (unlike IS-100 and IS-200). Both require in-person or instructor-facilitated delivery.",dom:2},
{t:"Functional vs Hazard-Specific Annexes",d:"Functional = what the jurisdiction DOES (mass care, public info, resource mgmt) regardless of hazard. Hazard-Specific = guidance for a PARTICULAR hazard (flood, pandemic, earthquake) building on the basic plan.",dom:2},
{t:"Access and Functional Needs (AFN)",d:"Populations needing additional assistance: people with disabilities, limited English proficiency, elderly, children, medically dependent individuals. Must be EXPLICITLY planned for — not an afterthought. Required in all EM plans.",dom:2},
{t:"CERT (Community Emergency Response Team)",d:"FEMA program training community members in basic disaster response: first aid, light search & rescue, fire suppression. Reduces demand on professional responders. Key Whole Community preparedness tool.",dom:2},
{t:"ESF #8 and #6",d:"ESF #8 = Public Health and Medical Services. ESF #6 = Mass Care, Emergency Assistance, Temporary Housing, and Human Services. Most commonly tested ESFs on AEM exam. Know all 15 ESF numbers and functions.",dom:2},
{t:"Sendai Framework — 4 Priorities",d:"(1) Understanding disaster risk (2) Strengthening DRR governance (3) Investing in DRR for resilience (4) Enhancing disaster preparedness for effective response and recovery. 2015-2030. Replaced Hyogo Framework.",dom:3},
{t:"Psychological Safety",d:"Team environment where members can speak up, ask questions, and report errors without fear of punishment. Foundation of high-performing, learning EM teams. Increasingly recognized as essential for effective emergency management.",dom:7},
{t:"RACI Matrix",d:"Responsible / Accountable / Consulted / Informed. Project management tool clarifying who owns each task. R = does the work; A = ultimately accountable; C = provides input; I = kept informed. Prevents confusion in multi-agency projects.",dom:2},
{t:"BIA → COOP Sequence",d:"BIA identifies: critical functions, disruption impacts, MTD, RTO, RPO → COOP describes: succession, alternate facilities, vital records, recovery strategies. BIA ALWAYS comes first. This sequence is non-negotiable.",dom:1}
];

const LEARN={
"1.A":{title:"Assess Risks and Benefits of Emerging Technologies",what:"EMs must continuously evaluate new technologies — AI analytics, drones, social media monitoring, IoT sensors — by weighing benefits (speed, accuracy, reach) against risks (vendor dependency, privacy, interoperability gaps, failure modes). A structured technology assessment includes a pilot, vendor due diligence, cybersecurity review, and a fallback plan.",keys:[["Technology Readiness Level (TRL)","Scale 1-9 assessing technology maturity before adoption. EM should evaluate TRL before committing to any critical platform."],["Interoperability","New technology must integrate with existing EM systems (WebEOC, CAD, alerting platforms) or it creates information silos that worsen coordination."],["Cybersecurity Risk","Emerging technologies introduce new attack surfaces. IoT devices, cloud platforms, and mobile tools all require security assessment before deployment in EM infrastructure."]],tip:"Questions often present a new technology proposal. Look for answers involving evaluation, pilot testing, and stakeholder consultation — NOT immediate full adoption."},
"1.B":{title:"Maintain Critical Infrastructure Listings",what:"CI listings are maintained inventories of facilities, systems, and assets whose disruption would have severe consequences for public health, safety, security, or the economy. EMs maintain these lists to inform planning, prioritize response, and coordinate with owners/operators. Classification is based on CONSEQUENCE of disruption — not ownership.",keys:[["Critical Infrastructure (CI)","Systems and assets so vital that their incapacitation would have a debilitating effect on security, health, safety, or economy. Sectors: energy, water, communications, transportation, health."],["Lifelines (FEMA)","7 community lifelines: Safety & Security, Food/Water/Shelter, Health & Medical, Energy, Communications, Transportation, Hazardous Material. CI listings support lifeline restoration planning."],["CI Classification Criteria","Based on severity of disruption consequence — not ownership. A private data center hosting 911 systems for 4 municipalities IS critical infrastructure."]],tip:"Know: CI classification = consequence-based, not ownership-based. Private sector facilities can and must be classified as CI if the disruption threshold is met."},
"1.C":{title:"Conduct Program Gap Analyses",what:"A gap analysis compares current capabilities against required standards, identifying shortfalls. Results drive training priorities, resource acquisition, plan updates, and budget requests. Gap analyses are tied to post-exercise Improvement Plans, THIRA results, or accreditation requirements.",keys:[["Capability Target","The desired performance level set during THIRA. Gap = Target minus Current Capability. The SPR (Stakeholder Preparedness Review) measures current levels against THIRA targets."],["Improvement Plan (IP)","Document produced after exercise or assessment identifying specific actions, responsible parties, and timelines to close identified gaps. The IP is tracked — not filed."],["PDCA Cycle","Plan-Do-Check-Act. Gap analysis occurs in the 'Check' phase. 'Act' implements improvements. The cycle then repeats."]],tip:"The PDCA cycle is directly tied to gap analysis — 'Check' identifies gaps. Questions often pair these concepts. Know the sequence: exercise → AAR → IP → track → re-exercise."},
"1.D":{title:"Conduct Business Impact Analyses",what:"A BIA identifies critical functions, the consequences of their disruption (financial, operational, legal, reputational), Maximum Tolerable Downtime, and Recovery Time Objectives. The BIA is ALWAYS completed before writing a COOP or BCP — it provides the data that drives all continuity planning decisions.",keys:[["Maximum Tolerable Downtime (MTD)","The absolute longest a function can be disrupted before consequences become unacceptable. The RTO must always be shorter than the MTD."],["Recovery Time Objective (RTO)","The TARGET time within which a function must be restored. Set based on MTD — must be shorter than MTD."],["Recovery Point Objective (RPO)","Maximum acceptable DATA LOSS measured in time (e.g., cannot lose more than 4 hours of transactions). Drives backup frequency decisions."]],tip:"BIA sequence: identify critical functions → assess disruption impact → set MTD → set RTO (shorter than MTD) → set RPO → design recovery strategies → write COOP/BCP. BIA FIRST, always."},
"1.E":{title:"Conduct Risk Assessments",what:"Risk assessment is a systematic process of identifying hazards, analyzing vulnerability and consequence, and estimating likelihood of adverse outcomes. Risk = Probability × Consequence. Risk assessments inform planning priorities, resource allocation, and mitigation investments.",keys:[["Hazard","A source of potential harm — natural (earthquake, flood) or human-caused (hazmat, cyberattack, terrorism). The 'what could happen.'"],["Vulnerability","The degree to which a community or system is susceptible to the effects of a hazard — determined by physical, social, economic, and environmental factors."],["Risk Matrix","2D grid plotting probability vs. consequence to prioritize risks. High-probability/high-consequence events require immediate attention; low-probability/extreme-consequence events drive catastrophic planning."]],tip:"Know the distinction: Hazard = the threat. Vulnerability = susceptibility. Risk = the intersection. This distinction appears frequently in AEM questions."},
"1.F":{title:"Conduct Threat and Hazard Identification and Risk Assessment (THIRA)",what:"THIRA is FEMA's 4-step community-wide risk assessment: (1) Identify threats and hazards, (2) Give context via worst-reasonable scenarios, (3) Establish capability targets, (4) Apply results to planning. In Canada, the equivalent is the HRVA (Hazard, Risk, and Vulnerability Analysis). THIRA results are paired with the Stakeholder Preparedness Review (SPR) to identify gaps.",keys:[["THIRA 4 Steps","Identify → Context → Targets → Apply. Required for BSIR grant funding. Updated every 3 years or after significant events."],["SPR (Stakeholder Preparedness Review)","Companion to THIRA — measures current capability levels against THIRA targets to identify gaps. Gap = Target (THIRA) minus Current (SPR)."],["HRVA (Canada)","Canada's THIRA equivalent. Produces a hazard risk profile ranking probability and consequence, driving provincial and municipal planning priorities."]],tip:"THIRA produces TARGETS. SPR measures CURRENT capabilities. The GAP between them drives planning investments. This sequence is directly tested."},
"2.A":{title:"Manage Emergency-Based Projects",what:"EM programs run on projects — updating plans, procuring equipment, delivering training, building exercises, implementing technology. EMs must apply project management fundamentals: defining scope, scheduling tasks, managing budgets, tracking milestones, and managing stakeholders.",keys:[["Project Charter","Formally authorizes a project, defines scope and objectives, identifies the project manager, lists key stakeholders. The starting point for any formal EM project."],["Work Breakdown Structure (WBS)","Hierarchical decomposition of total scope into smaller, manageable components. Used to assign responsibilities and estimate resources."],["RACI Matrix","Responsible/Accountable/Consulted/Informed. Clarifies who does what for each task. Prevents confusion in multi-agency EM projects."]],tip:"Project management concepts (scope, schedule, resources, stakeholders) are tested in EM contexts. Know the PDCA cycle and the WBS. Know that projects need charters, schedules, and stakeholder maps before execution."},
"2.B":{title:"Manage Continuity Programs",what:"Continuity programs ensure essential functions continue during and after disruptions. COOP = government agency continuity. COG = constitutional government continuity. BCP = private sector equivalent. All are founded on the BIA. CSA Z1600 is the Canadian standard for EM and continuity programs.",keys:[["COOP","Continuity of Operations — ensures Primary Mission-Essential Functions (PMEFs) continue during emergencies. Includes succession of authority, alternate facilities, and devolution."],["Devolution","Transfer of statutory authority from primary to ALTERNATE personnel when primary staff are INCAPACITATED. Pre-planned and automatic — distinct from normal succession."],["CSA Z1600","Canadian standard for Emergency and Continuity Management Programs — equivalent to NFPA 1600, aligned with ISO 22301. Provides the framework for comprehensive EM programs."]],tip:"Know the hierarchy: COOP (individual agency) → COG (government structure) → EOP (community-wide). The BIA is always the foundation. Know what devolution means — it's tested."},
"2.C":{title:"Maintain Emergency/Disaster Plans and Annexes",what:"EOPs are living documents requiring regular review, exercise, and update. Maintenance includes annual reviews, incorporating lessons from exercises and real events, updating contact information, and ensuring annexes remain current. CPG 101 is the gold standard guidance.",keys:[["Basic Plan","Core EOP document — describes the jurisdiction's approach, legal authorities, roles, and activation process. All annexes derive from it."],["Functional Annex","Describes how the jurisdiction performs a specific function (mass care, public info, resource management) regardless of hazard type."],["Hazard-Specific Annex","Guidance for a particular hazard (flood, pandemic, earthquake) building on the basic plan framework."]],tip:"Plans must be reviewed annually at minimum, AND after: major incidents, exercises revealing gaps, changes in hazards or resources, or staffing changes. CPG 101 calls EOPs 'living documents.'"},
"2.D":{title:"Maintain Primary EOC",what:"Maintaining the EOC means keeping equipment operational, software updated, supplies stocked, directories current, and ensuring staff know how to operate in it. EOC maintenance is an ongoing administrative responsibility — not just an incident function.",keys:[["EOC Activation Levels","Tiered activation allows scalable staffing: Level 1 = minimal monitoring, Level 3 = full activation. Levels are pre-defined based on incident complexity and resource needs."],["WebEOC","Most widely used web-based incident management system for EOCs. Virtual EOC (VEOC) capability increasingly important post-COVID."],["EOC Readiness Formula","Forms + People + Plans + Technology. All four must be functional. A gap in any one element = incomplete readiness."]],tip:"IS-2200 is the primary reference for EOC functions. Know the difference: EOC = coordination center. ICP = on-scene command post. They are SEPARATE with a clear relationship."},
"2.E":{title:"Ensure Operational Readiness of EOC",what:"Operational readiness means Forms + People + Plans + Technology all functioning together under stress. This includes training EOC staff in their roles, conducting exercises in the EOC, verifying technology works, maintaining current call-down lists, and having activation procedures ready.",keys:[["EOC Activation Checklist","Step-by-step actions to bring EOC to operational status. From notifying staff to logging into systems to verifying communications. Must be current and tested."],["Call-Down List","Organized list of personnel with backups to staff EOC at activation. Updated minimum quarterly. Must be tested in exercises."],["Position-Specific Training","Training tailored to each EOC role so individuals know their responsibilities before an event. Generic training is insufficient."]],tip:"EOC readiness requires ALL FOUR elements: Forms + People + Plans + Technology. A gap in any one = not fully ready. People readiness is as critical as technology. IS-2200 is the reference."},
"2.F":{title:"Coordinate Emergency Management Activities with Stakeholders",what:"No EM professional operates in isolation. Coordination with government agencies, NGOs, private sector, Indigenous communities, health authorities, utilities, and the public is constant — through planning committees, regular meetings, shared training, MOUs, and joint exercises.",keys:[["Emergency Support Functions (ESFs)","Organized groupings of government capabilities providing support during incidents. 15 ESFs in US NRF. Key: #6 Mass Care, #8 Public Health/Medical, #13 Public Safety."],["Liaison Officer (LOFR)","ICS Command Staff responsible for coordinating with assisting/cooperating agency representatives. The point of contact for partner organizations."],["Whole Community Approach","FEMA philosophy: effective preparedness requires active involvement of EVERYONE — individuals, NGOs, private sector, faith communities, and all government levels."]],tip:"Coordination happens BEFORE emergencies, not just during them. Questions test whether candidates include pre-event planning, MOUs, and regular communication — not just incident-period coordination."},
"2.G":{title:"Obtain Collaborative Agreements",what:"Mutual Aid Agreements (MAAs) and MOUs pre-authorize resource sharing between jurisdictions and organizations. Without pre-established agreements, resource requests can be delayed by legal, liability, or financial uncertainty. These agreements are a core preparedness activity.",keys:[["Mutual Aid Agreement (MAA)","Pre-arranged agreement between jurisdictions to provide emergency assistance in personnel, equipment, materials, and resources. Pre-resolves liability, command, and reimbursement questions."],["EMAC (USA)","Emergency Management Assistance Compact — national interstate compact enabling all 50 US states to share resources. Pre-resolves all legal and liability questions."],["Key Agreement Elements","Pre-authorization of resources, reimbursement provisions, liability protections, command authority (receiving jurisdiction directs), and termination provisions."]],tip:"Know the key MAA elements: pre-authorization, reimbursement, liability, command authority, termination. EMAC is the gold standard for US interstate mutual aid."},
"2.H":{title:"Create Emergency Checklists",what:"Checklists translate complex procedures into simple, reliable action steps. In high-stress situations, even experienced professionals make errors — checklists prevent omissions. Effective EM checklists are position-specific, action-oriented, regularly tested, and integrated with EOPs.",keys:[["Position Checklist","Role-specific list of immediate actions for an EOC or field position upon activation. Reduces cognitive load during stressful events."],["Event-Specific Checklist","Hazard-specific action list (e.g., 'Tornado Warning Received' checklist) tailored to a particular scenario."],["Quick Reference Guide (QRG)","Condensed, laminated or digital reference card with critical procedures and contact numbers for rapid use during an incident."]],tip:"Checklists are preparedness tools — created before incidents and validated through exercises. Aviation and surgical research confirm checklists reduce errors even for experts under stress."},
"2.I":{title:"Design Community Education Initiatives",what:"Public education reduces demand on emergency services, improves self-sufficiency, and saves lives. Initiatives include 72-hour kit campaigns, CERT programs, school programs, and public workshops. Programs must be culturally appropriate and explicitly address AFN populations.",keys:[["CERT","Community Emergency Response Team — FEMA program training community members in basic disaster response (first aid, light S&R, fire suppression). Reduces demand on professional responders."],["Access and Functional Needs (AFN)","Populations needing additional assistance: people with disabilities, limited English proficiency, elderly, children, medically dependent. Must be EXPLICITLY planned for — not an afterthought."],["72-Hour Preparedness","Individual/family self-sufficiency for 72+ hours post-disaster when professional responders may be overwhelmed. Some jurisdictions now promote 96-hour or 2-week preparedness."]],tip:"Education must address the WHOLE community — including AFN populations, diverse languages, and varying literacy. Exam questions test whether candidates include these considerations explicitly."},
"2.J":{title:"Design Emergency/Disaster Plans and Annexes",what:"Designing plans requires understanding risks, capabilities, and legal authorities. CPG 101 provides a 6-step process: (1) Form collaborative planning team, (2) Understand the situation, (3) Determine goals/objectives, (4) Plan development, (5) Plan preparation/review/approval, (6) Implementation and maintenance.",keys:[["Collaborative Planning Team","Multi-agency, multi-discipline team that develops the EOP together. No plan should be written by one person. Ensures all perspectives and resources are reflected."],["Planning Assumptions","Statements about conditions believed true during plan development that justify planning decisions. E.g., 'A major earthquake will disrupt communications for 72 hours.'"],["Concept of Operations (CONOPS)","The section describing who does what, in what sequence, under whose authority — the 'how' of the plan's execution."]],tip:"Design (creating new) vs. Maintain (updating existing) are different competencies. For design questions: look for answers involving a planning team, needs assessment, stakeholder input, and CPG 101 process."},
"2.K":{title:"Manage the Emergency Drill/Exercise Lifecycle",what:"HSEEP defines a progressive approach: discussion-based (seminars, workshops, tabletops, games) build knowledge and plans; operations-based (drills, functional exercises, full-scale exercises) test operational capability. The lifecycle includes: design/development, conduct, evaluation, and improvement planning.",keys:[["HSEEP","Homeland Security Exercise and Evaluation Program — the US federal framework widely used in Canada and internationally. The standard for EM exercise design and evaluation."],["Tabletop Exercise (TTX)","Discussion-based exercise walking participants through a scenario to identify plan gaps. Low cost, high value for plan validation."],["After Action Report/Improvement Plan (AAR/IP)","AAR = what happened and how did we perform. IP = specific corrective actions with owners and deadlines. Both required. IP is tracked, not filed."]],tip:"Progressive approach: Seminars → Workshops → TTX → Games → Drills → Functional → Full-Scale. Questions ask which type is appropriate for a given objective. Functional = tests EOC coordination. Full-Scale = everything deployed."},
"2.L":{title:"Develop Pre-Disaster Messaging Templates",what:"Pre-scripted templates allow rapid, consistent public communication when an incident occurs. Templates are developed during preparedness for each hazard scenario and cover: what happened, what people should do, what authorities are doing, and where to get more information.",keys:[["Pre-Scripted Message","Prepared template quickly customized at incident time. Covers the 4 Ws: What happened, What to do, Who is responding, Where to get information."],["Warning vs Watch vs Advisory","Warning = imminent, act NOW. Watch = conditions favorable, BE PREPARED. Advisory = hazardous but less severe. Terminology must be precise in all public messaging."],["Plain Language","Grade 6-8 reading level, no jargon or acronyms. FEMA requires plain language in all crisis communications."]],tip:"Templates don't replace real-time communication — they provide the pre-approved framework. Common exam mistake: choosing to write a message when the event happens rather than develop templates beforehand."},
"2.M":{title:"Perform Emergency Planning Duties",what:"Day-to-day planning duties are the backbone of the EM profession — researching hazards, convening planning teams, writing and editing plan sections, coordinating with partners, ensuring legal adoption of plans, and filing plans with higher-level authorities. Planning is never 'done.'",keys:[["Planning Cycle","Plan → Exercise → Evaluate → Improve → Re-Plan. Continuous loop. Plans updated after every major incident and exercise."],["Multi-Jurisdictional Plan","Collaboratively developed by two or more jurisdictions facing common hazards and sharing resources. More efficient than parallel plans with similar content."],["Emergency Support Functions","Organizing framework for EM response functions — ensures all critical capabilities are assigned to specific agencies with clear responsibilities."]],tip:"When prioritizing planning work: hazard-specific updates following real events take priority; routine annual reviews come next; new plan development requires full CPG 101 process."},
"2.N":{title:"Perform Project Planning Duties",what:"EM offices run multiple concurrent projects — grant-funded initiatives, equipment purchases, system implementations, training programs. Project planning means defining deliverables, schedules, budgets, resource requirements, risks, and communication plans.",keys:[["Gantt Chart","Bar chart showing project tasks plotted against time with dependencies. Most common project scheduling tool in EM project management."],["Risk Register","Log of identified project risks, probability, potential impact, and mitigation strategies. Keeps risk management proactive rather than reactive."],["Stakeholder Communication Plan","Defines who receives what project information, how often, and in what format. Essential for multi-agency EM projects."]],tip:"When an AEM exam question describes a complex multi-step initiative, the best approach almost always involves project planning tools — charter, schedule, stakeholder map — BEFORE execution."},
"2.O":{title:"Monitor Weather Conditions",what:"Weather monitoring is a continuous preparedness and early warning function. EMs monitor weather services, subscribe to alerts, interpret forecasts, and act on pre-established thresholds that trigger pre-disaster actions (pre-positioning resources, EOC standby, public advisories).",keys:[["Weather Triggers","Pre-established thresholds (e.g., wind gusts exceeding 90 km/h; river gauge at Flood Stage 2) that automatically trigger specific EM actions. Documented in the EOP."],["Environment Canada / NWS","Federal agencies providing official weather forecasts, watches, warnings, and advisories. EM offices integrate these services into alert and warning systems."],["Watch vs Warning","Watch = conditions favorable for a hazard (prepare). Warning = hazard is imminent or occurring (act now). Actions triggered by each are fundamentally different."]],tip:"Weather monitoring is PROACTIVE — EMs act on watches BEFORE the event. Questions test pre-event actions, not reactive response. Differentiate watch vs warning actions clearly."},
"2.P":{title:"Promote Stakeholder Engagement",what:"Stakeholder engagement is an ongoing relationship management function — not a one-time event. EMs must identify stakeholders, understand their interests and capacities, maintain regular communication, involve them in planning and exercises, and build the trust that makes coordination seamless during actual emergencies.",keys:[["Stakeholder Mapping","Process of identifying all parties with an interest in EM outcomes, their level of influence, and their relationship to the EM office."],["Tiered Engagement","Organizing stakeholders by frequency of contact: Tier 1 (monthly), Tier 2 (quarterly), Tier 3 (bi-annually), Tier 4 (annually). Each tier gets tailored communication."],["Pre-Event Relationships","Strong pre-event relationships directly determine speed and quality of coordination during events. Neglected relationships create coordination failures at the worst moment."]],tip:"Engagement must occur BEFORE, DURING, and AFTER emergencies. Exam questions often present neglected relationships — the correct answer involves proactive outreach, not reactive coordination."},
"2.Q":{title:"Provide Emergency Management Training",what:"EMs identify training gaps, select or develop training programs, deliver or coordinate delivery, track completion, and evaluate effectiveness. Training must be tied to identified gaps — not delivered randomly.",keys:[["Training Needs Assessment","Systematic gap identification between current knowledge/skills and required performance levels. Always the FIRST step before any training planning."],["FEMA IS Program","200+ free self-paced online courses covering all EM domains. Major source of professional development hours for AEM/CEM applications."],["Adult Learning Principles","Adults learn best when content is relevant to their work, immediately applicable, and builds on prior experience. Training must be designed accordingly."]],tip:"Training sequence: assess needs → design/select training → deliver → evaluate → reassess. Never jump straight to delivery. Training tied to THIRA gaps and exercise Improvement Plans is most defensible."},
"2.R":{title:"Provide Role-Specific Training (ICS 100, 200, 300, 400)",what:"The ICS training hierarchy ensures personnel are trained for their level of responsibility. ICS 100 (all personnel) and 200 (supervisors) are self-paced online. ICS 300 (expanding incidents) and 400 (complex incidents) are INSTRUCTOR-LED ONLY — cannot be completed as self-paced online courses.",keys:[["ICS 100","Introduction to ICS. Required for ALL EM personnel. Available self-paced online at FEMA.gov."],["ICS 300","Intermediate ICS for expanding incidents. For tactical/support roles in growing incidents. INSTRUCTOR-LED ONLY. Covers Planning P and IAP process."],["ICS 400","Advanced ICS for Command and General Staff. INSTRUCTOR-LED ONLY. For personnel serving in command roles in large, complex incidents."]],tip:"ICS 300 and 400 are INSTRUCTOR-LED — this distinction is tested. Know who needs each level. Maintain training matrices tracking currency for all EOC-designated staff."},
"2.S":{title:"Review & Apply Research Outcomes",what:"Evidence-informed EM means applying lessons from academic research, AARs, government studies, and international case studies to improve local practice. EMs must be consumers of research AND translators of that research into operational improvements.",keys:[["Evidence-Informed Practice","Using best available evidence — research, evaluation data, expert consensus — to make EM program decisions. Not just reading reports — changing practice based on evidence."],["After Action Review (AAR)","Both internal (post-exercise) and external (published post-disaster reports) AARs are sources of actionable lessons. Canada's Fort McMurray wildfire AAR is a widely referenced example."],["Sendai Framework Monitoring","UN system tracking DRR progress globally. Provides comparative lessons across countries that can be adapted to local EM practice."]],tip:"Applying research means CHANGING PRACTICE based on evidence. Questions test the process: identify relevant research → evaluate applicability → adapt → implement → evaluate outcomes. Not just reading reports."},
"3.A":{title:"Ensure Communication System Effectiveness and Interoperability",what:"Communication failures are the most frequently cited AAR finding from major incidents. Interoperability means first responders from different agencies can communicate during incidents. This requires compatible technologies, common protocols, and pre-incident testing.",keys:[["Interoperability","Ability of emergency personnel from different agencies and jurisdictions to communicate via voice, data, or video in real time. Requires planning before incidents."],["Cross-Band Repeater/Gateway","Technology that bridges incompatible radio systems (e.g., VHF police ↔ UHF fire), enabling direct communication during incidents."],["COML (Communications Unit Leader)","ICS position responsible for implementing the incident communications plan, radio assignments, and coordination of multiple communication channels."]],tip:"Interoperability is TESTED before incidents through exercises. Discovering incompatible systems during a real event is an avoidable failure. The AEM exam expects candidates to plan for cross-agency communications."},
"3.B":{title:"Implement Mitigation Protocols",what:"Implementing mitigation means executing approved projects, enforcing codes and regulations, deploying protective measures, and tracking progress. Unlike planning, implementation is operational and requires coordination with public works, utilities, zoning, and building departments.",keys:[["Mitigation Action","Specific, funded, assigned activity designed to reduce risk: elevating buildings, installing backup generators, strengthening bridges, tree-trimming programs."],["NDMP (Canada)","National Disaster Mitigation Program — federal grant funding for mitigation projects. Canada's primary mitigation investment mechanism."],["Building Code Enforcement","Enforcing construction standards that reduce structural vulnerability — earthquake-resistant construction, wind-resistant roofing, flood-proofing. Major long-term mitigation tool."]],tip:"Implementation involves BOTH structural (physical changes) and non-structural (regulations, education, warning systems) measures. Questions ask candidates to identify both types in a scenario."},
"3.C":{title:"Advocate for Hazard Mitigation Investments",what:"Mitigation requires funding, political will, and sustained commitment — all requiring effective advocacy. EMs make the business case: demonstrating BCR (FEMA research: average $6 saved per $1 invested), linking mitigation to economic resilience, and engaging elected officials with compelling narratives.",keys:[["Benefit-Cost Analysis (BCA)","Compares costs of mitigation against expected benefits (losses avoided). BCR > 1.0 = cost-effective. Required for HMGP project applications."],["Mitigation Success Stories","Documented examples where investments prevented significant losses. Used to demonstrate ROI to elected officials and the public."],["Coalition Building","Building alliances with stakeholders (fire chief, hospital administrator, chamber of commerce) who reinforce the EM resource case from their own authority."]],tip:"BCR is the language of mitigation funding. BCR > 1.0 = cost-effective. FEMA requires positive BCR for HMGP projects. For elected officials: frame mitigation as $X investment preventing $Y in future losses."},
"3.D":{title:"Research Mitigation Controls & Apply to Practice",what:"Effective mitigation requires staying current with best practices, new research, changing environmental conditions (including climate change), and lessons from disasters elsewhere. EMs research options, evaluate applicability, and translate findings into local programs.",keys:[["Nature-Based Solutions","Mitigation approaches working with natural systems — restoring wetlands to reduce flood risk, planting urban trees for heat island mitigation, living shorelines instead of hard armoring."],["Climate Adaptation","Adjustments to reduce vulnerability to current and projected climate change impacts. EM programs must incorporate climate projections into risk assessments and mitigation planning."],["Sendai Priority 1","'Understanding disaster risk' — research and evidence are essential to this first Sendai priority. Research informs all subsequent priorities."]],tip:"Research and application is a cycle: identify hazard → find evidence-based controls → adapt to local context → implement → evaluate effectiveness → update. Know Sendai Framework Priority 1."},
"3.E":{title:"Prioritize Mitigation Activities",what:"Jurisdictions face more risks than they can mitigate with available resources. Prioritization is based on: risk level (probability × impact), feasibility, cost-effectiveness, equity considerations, and community values. The local mitigation plan provides the priority framework.",keys:[["Risk Priority Matrix","Ranks hazards by probability and consequence to identify which risks deserve priority mitigation investment."],["Social Equity in Mitigation","Standard BCR calculations can systematically undervalue mitigation for low-income communities (lower property values = lower BCR). Equity adjustments are now explicitly required in FEMA guidance."],["Local Mitigation Plan","Required every 5 years for FEMA pre-disaster mitigation grant eligibility. Contains the prioritized list of mitigation actions."]],tip:"Prioritization is not just about which hazard is worst — it also considers feasibility, equity, and community acceptance. Equity is increasingly tested: BCR-only approaches can systematically disadvantage vulnerable communities."},
"3.F":{title:"Identify Mitigation Controls",what:"Mitigation controls fall into two categories: structural (physical modifications) and non-structural (policies, regulations, education, warning systems). Identifying the right controls requires hazard analysis, community context understanding, and knowledge of available programs.",keys:[["Structural Mitigation","Physical actions: retrofitting buildings, elevating structures, installing flood barriers, reinforcing bridges, building community shelters. Requires capital investment."],["Non-Structural Mitigation","Policy and process actions: zoning regulations, building codes, land use planning, early warning systems, public education programs. Often lower cost."],["Repetitive Loss Properties","Properties that have flooded repeatedly and made multiple insurance claims. Primary targets for buyout or elevation mitigation under NFIP/provincial programs."]],tip:"Always identify BOTH structural AND non-structural controls for any hazard. Exam questions test whether candidates can differentiate between them and select appropriate controls for a specific scenario."},
"4.A":{title:"Monitor External Events",what:"Situational awareness begins with continuous monitoring — weather systems, public health indicators, social media, news feeds, infrastructure alerts, and partner agency communications. EMs use formal monitoring systems, duty officer protocols, and automated alert subscriptions.",keys:[["Common Operating Picture (COP)","Shared situational awareness of ongoing and developing situations across agencies, typically maintained in WebEOC or equivalent incident management system."],["Duty Officer","Designated EM staff on call 24/7 to receive and assess incoming alerts and initiate appropriate responses. The first line of situational awareness."],["Weather Trigger Protocol","Pre-established matrix defining what EM action each type of alert or weather condition triggers — from monitoring standby to EOC activation to public warning."]],tip:"Monitoring is PROACTIVE and CONTINUOUS — not reactive. Questions test systems, protocols, and escalation thresholds. Know what a COP is and how it's maintained."},
"4.B":{title:"Monitor On-Going Operations",what:"Once an incident is underway, the EM function shifts to continuous monitoring of operational status — tracking resource deployment, monitoring task completion, identifying emerging needs, and maintaining situational awareness across all aspects of the incident.",keys:[["Incident Action Plan (IAP)","Written or oral plan containing objectives, tactical actions, and support attachments for a given operational period (typically 12-24 hours)."],["Operational Period","Time period between successive IAPs — typically 12 or 24 hours. New IAP developed at the end of each period based on progress."],["Resource Tracking","Real-time monitoring of where resources are deployed, their status (assigned/available/out-of-service), and their needs. Core EOC Operations function."]],tip:"Operations Section Chief is responsible for monitoring on-going operations. This means real-time field reports, GIS tracking, and regular leadership briefings — not reviewing plans or checking the weather forecast."},
"4.C":{title:"Provide Technical Guidance During Incidents",what:"EMs serve as SMEs during incidents, advising incident commanders, elected officials, and partner agencies on EM principles, legal authorities, resource options, and best practices. Technical guidance is ADVISORY — the EM advises but the IC commands.",keys:[["Subject Matter Expert (SME)","Individual with specialized knowledge providing expert advice during planning or operations. EMs are SMEs on EM principles and processes."],["Technical Specialist","ICS position in the Planning Section filled by an individual with special expertise needed for a specific incident."],["Incident Complexity","FEMA's 5-type classification (Type 5 = simplest, Type 1 = most complex). Helps determine appropriate ICS organizational structure."]],tip:"Technical guidance is ADVISORY. Know the difference: coordination role (EOC) vs command role (ICP) vs SME/technical guidance role. The EM may hold any of these roles simultaneously in different contexts."},
"4.D":{title:"Coordinate Incident Responses",what:"Coordination is the EOC's primary function during an incident — bringing together information, resources, and authorities from multiple agencies to support field operations. This is DISTINCT from command (which happens at the ICP). The EOC does NOT command field operations; it SUPPORTS them.",keys:[["Multi-Agency Coordination (MAC)","Process allowing all levels of government and disciplines to work together using shared processes for resource allocation, prioritization, and coordination."],["EOC vs ICP","EOC = strategic coordination, resources, policy guidance. ICP = tactical, on-scene command. SEPARATE functions with a clear relationship. THIS IS THE MOST TESTED DISTINCTION."],["MAC Group","Senior officials authorized to commit resources and make policy decisions during major incidents. Also called Policy Group or Executive Group."]],tip:"COORDINATION ≠ COMMAND. This is the single most tested concept on the AEM exam. EOC = coordination/support. ICP = on-scene command. Get this right on every question."},
"4.E":{title:"Communicate with Stakeholders",what:"During an incident, communication with stakeholders is continuous, multi-channel, and audience-specific. Different stakeholders need different information, at different intervals, in different formats. Effective communication prevents rumors, builds trust, and enables coordination.",keys:[["Joint Information System (JIS)","Structure to coordinate public information functions across multiple agencies — the CONCEPT/SYSTEM."],["Joint Information Center (JIC)","Physical location where public information staff coordinate and release consistent information — the PLACE. JIS ≠ JIC."],["Communication Schedule","Pre-defined frequency for each stakeholder type: public SITREPs every 4 hours; media briefings twice daily; elected official briefings daily; partner calls twice daily."]],tip:"JIS = the system (concept). JIC = the physical facility. This distinction is tested. Know that communication frequency and content must be tailored to each stakeholder type."},
"4.F":{title:"Prepare Situation Reports",what:"A SITREP is a structured, periodic report summarizing current incident status for decision-makers. SITREPs are factual, concise, and action-oriented. They cover: incident overview, life-safety status, critical needs, resource status, current actions, and anticipated next steps.",keys:[["SITREP Components","Incident summary (2 sentences) + life safety status + CI status + resources deployed + key actions completed + key actions pending + critical requests."],["ICS Form 209","Standardized ICS incident status summary form covering geographic extent, resources, injuries/fatalities, public information needs, and financial status."],["Operational Period SITREP","Produced at end of each operational period: what was accomplished, what wasn't, priorities for next period."]],tip:"SITREPs are FACTUAL — not speculative, not PR documents. They describe what IS happening, not what MIGHT happen. Common exam mistake: confusing SITREPs with plans or public messaging."},
"4.G":{title:"Perform Incident Management Duties",what:"Incident management encompasses directing, coordinating, and supporting response operations. This includes activating the EOC, executing the EOP, coordinating mutual aid, managing information flow, and maintaining documentation. ICS/NIMS provides the organizational framework.",keys:[["ICS 5 Functions","Command, Operations, Planning, Logistics, Finance/Administration. Operations = executes the work. Planning = develops IAPs. Logistics = provides resources. Finance/Admin = tracks costs."],["Incident Command","IC is responsible for ALL incident activities including strategy, tactics, and resource ordering/release. Has overall authority."],["Delegation of Authority","Formal document from agency administrator to IC specifying financial limits, geographic scope, legal authorities. IC cannot exceed the delegation."]],tip:"Know the 5 ICS functions and what each does. Know the Planning P. Know what the IC is responsible for. These fundamentals appear throughout the exam in different contexts."},
"4.H":{title:"Conduct Resource Management",what:"Resource management involves identifying, requesting, acquiring, tracking, and demobilizing resources. NIMS defines resource management as a core function that must be planned before incidents occur — through resource typing, credentialing, and mutual aid agreements.",keys:[["Resource Typing","Categorization of resources by capability level (Type 1 = most capable to Type 4 = least). Standardized typing enables precise mutual aid requests."],["Credentialing","Documentation verifying personnel qualifications. Ensures resources arriving under mutual aid have verified capabilities — not just claimed ones."],["Demobilization","Systematic, safe release of resources from an incident. Includes briefings, paperwork, welfare checks, and documentation. Well-managed demobilization protects future mutual aid relationships."]],tip:"Resource management is PRE-PLANNED — typing, credentialing, and MAAs done before incidents. During incidents: focus on tracking, ordering, and demobilizing. Orderly demobilization is often overlooked but tested."},
"4.I":{title:"Respond to Incidents",what:"Response encompasses the immediate actions when an incident occurs — from initial notification and EOC activation through life-safety operations, CI protection, and situation stabilization. Effective response depends ENTIRELY on preparedness — the plans, training, exercises, and relationships built beforehand.",keys:[["Initial Response","First actions post-incident: situational assessment, life-safety operations, notifications, establishing command. Speed and accuracy both critical."],["Scalable Response","Response resources and structure scale to incident complexity — from single agency to multi-jurisdictional response as needed."],["Life-Safety Priority","People first. Always. Property, environment, and economic considerations are secondary to life safety in all incidents."]],tip:"Life-safety is ALWAYS priority 1. This principle appears throughout the exam. Effective response requires preparedness — questions often test whether candidates know that response quality reflects preparedness investment."},
"4.J":{title:"Conduct Incident Debriefings",what:"Debriefings occur at multiple levels: hot debriefs (15 min, immediately after), warm debriefs (within 24-48 hours), and formal AARs (days to weeks after). They capture lessons, identify strengths, and generate improvement actions. The culture must be learning-focused, not blame-focused.",keys:[["Hot Debrief","Immediate informal debrief right after an activity — captures fresh observations before memory fades. 10-15 minutes, covers: what went well, what didn't, immediate recommendations."],["Formal AAR","Structured analysis after operations conclude, involving all stakeholders. Produces AAR and Improvement Plan (IP). May use independent facilitator for psychological safety."],["Improvement Plan","Assigns specific corrective actions to responsible parties with completion dates and success metrics. Tracked, followed up — not optional filing."]],tip:"Sequence: hot debrief (immediate) → warm debrief (days) → formal AAR (weeks) → IP (assigned, tracked). Without tracking, improvement items simply accumulate without action."},
"4.K":{title:"Serve as Subject Matter Expert During an Incident",what:"During incidents, the EM coordinator is the SME on EM principles, processes, and systems — advising the IC, EOC Director, elected officials, and partner agencies. This requires confidence in ICS principles, legal authorities, resource systems, and inter-agency processes.",keys:[["Emergency Declaration","Formal legal act by an authorized official (mayor, premier/governor, PM/president) activating emergency powers, enabling emergency funds, and triggering inter-governmental assistance."],["Incident Complexity System","Type 5 (simplest) to Type 1 (most complex). Helps determine appropriate ICS structure and resource levels."],["Technical Specialist Role","ICS Planning Section role — provides specialized expertise directly to the planning process. EMs often fill this role in agencies unfamiliar with EM processes."]],tip:"Know emergency declaration levels: local → provincial/state → federal. Know what each level enables. Know the difference between an emergency declaration and a disaster declaration."},
"4.L":{title:"Monitor Potential Service Line Disruptions",what:"Service line disruptions — power outages, water failures, road closures, communication outages — often have cascading effects. EMs monitor CI service status continuously and work with providers to anticipate, prevent, or manage disruptions.",keys:[["Cascading Effects","Secondary and tertiary impacts from an initial disruption: power outage → water treatment failure → boil water advisory → increased hospital demand."],["Lifeline Status Board","Visual display (physical or digital) showing operational status of each community lifeline: red (impaired), yellow (degraded), green (operational)."],["Critical Facility Priority","Hospitals, EOCs, water treatment plants, shelters, and fire stations must remain operational — receive priority resources during any service disruption."]],tip:"Know all 7 lifelines. Know what 'restoring' each one means operationally. Energy typically prioritized first because it enables restoration of all others."},
"4.M":{title:"Communicate with Emergency Response Community",what:"The emergency response community includes government agencies, NGOs (Red Cross, Salvation Army, VOADs), private sector partners, faith communities, healthcare providers, and volunteer organizations. Effective communication requires ongoing relationships, not just incident-period contact.",keys:[["VOADs (Voluntary Organizations Active in Disaster)","NGOs providing services during and after disasters: Red Cross, Salvation Army, Team Rubicon, Mennonite Disaster Service. Coordinate through national VOAD councils."],["Private Sector Integration","Incorporating businesses (utilities, transportation, retailers, healthcare) into EM planning and response. Leverage their resources, expertise, and supply chains."],["ESF Liaisons","Representatives from partner agencies/organizations assigned to the EOC who facilitate direct communication and resource coordination."]],tip:"The emergency response community is BROADER than government. Includes NGOs, private sector, and faith communities. Full community engagement is tested throughout the exam."},
"4.N":{title:"Manage Crisis Communications",what:"Crisis communications is the strategic communication function during emergencies — managing public information, media relations, social media, and elected official communications to maintain public trust, reduce panic, correct misinformation, and enable effective response.",keys:[["Public Information Officer (PIO)","ICS Command Staff responsible for developing and releasing incident information to public, media, and appropriate agencies. Crisis communications lead."],["Message Discipline","Consistently returning to key messages, especially under media questioning. Prevents speculation and off-message commentary that can worsen the incident."],["Emergency Info Checklist","Acknowledge the event + what is known + what actions are being taken + what people should do + where to get more information. Silence and speculation are both communication failures."]],tip:"Message discipline under pressure is the core crisis comms skill. Principle: acknowledge → inform → direct → refer. Correct misinformation IMMEDIATELY on official channels. Do not speculate."},
"4.O":{title:"Manage Emergency Response Teams",what:"Response teams require management: staffing, scheduling, briefing, welfare, and performance monitoring. Long-duration events require shift scheduling, fatigue management, and personnel support to maintain operational effectiveness.",keys:[["12-Hour Shift Maximum","NIMS guidance recommends no more than 12-hour shifts during extended operations. Fatigue management is a duty of care responsibility."],["Shift Change Briefing","Incoming and outgoing shifts overlap by 30 minutes for comprehensive situational briefing. No gaps in situational awareness."],["Demobilization Plan","Staged release of resources developed during the incident before it is needed. Includes transportation, documentation, welfare checks, and formal release briefings."]],tip:"Team management during extended operations must address: 12-hour shifts, mandatory rest, mental health support, and formal demobilization. These welfare elements are often the 'best answer' in scenario questions."},
"4.P":{title:"Coordinate Crisis Management Resources",what:"Crisis management resources include physical supplies, counseling services, food/water supply, temporary housing, transportation for vulnerable populations, and financial assistance. Coordinating these requires working with NGOs, government programs, and private sector partners.",keys:[["Crisis Counseling Program (CCP)","FEMA program providing short-term mental health crisis counseling for disaster survivors and first responders. Not long-term psychiatric care."],["Points of Distribution (PODs)","Pre-identified locations where water, food, ice, and supplies are distributed to the public. Require site selection, staffing, traffic management, and supply logistics."],["Temporary Housing Continuum","Emergency shelters (first 72 hours) → transitional housing (days to weeks) → longer-term recovery housing. Each phase requires different resources and coordination."]],tip:"Know the spectrum: shelter (immediate) → food/water (immediate) → mental health (ongoing) → housing (transitional/long-term). Different programs and agencies responsible for each phase."},
"4.Q":{title:"Lead Incident Responses",what:"When serving as IC or EOC Director, the EM provides leadership — setting strategic objectives, making decisions under uncertainty, managing the incident team, communicating with elected officials, and maintaining situational awareness. Delegate tactical decisions; maintain strategic focus.",keys:[["IC Responsibilities","Responsible for ALL incident activities — strategy, tactics, resource ordering and release. Has overall authority. Cannot exceed delegation of authority from agency administrator."],["Command vs Coordination","IC (ICP) = command = tactical decisions. EOC Director = operational control = strategic oversight and resource support. These are different roles in different locations."],["Unified Command Application","When multiple agencies/jurisdictions share authority, Unified Command allows them to work together under one IAP and one set of incident objectives."]],tip:"Leadership means setting objectives, not directing every tactical action. A good IC/EOC Director delegates, trusts their team, manages by exception, and keeps their eyes on the strategic picture."},
"4.R":{title:"Deploy Emergency Technology Tools",what:"Modern incident response relies on technology: WebEOC, GIS mapping, mass notification platforms, social media monitoring, resource tracking, and virtual EOC capabilities. Deploying these requires training, testing, and knowing when manual backup processes must be activated.",keys:[["WebEOC","Most widely-used web-based incident management system for EOC coordination. Enables real-time data sharing, resource tracking, and incident documentation."],["GIS in Response","Geographic Information Systems map evacuation routes, resource locations, damage extent, and hazard zones in real time during incidents."],["Manual Backup Systems","Physical status boards, radio communication nets, and printed directories activated when technology fails. Technology failure during disasters is expected — plan for it."]],tip:"Technology deployment must include backup manual systems. Technology fails in disasters. Exam questions about technology often have a 'what if it fails' component expecting a manual backup answer."},
"5.A":{title:"Manage Non-IT Disaster Programs",what:"Non-IT disaster programs include mass care, sheltering, debris management, temporary housing, disaster case management, and community recovery centers. These require coordination across government, NGOs, and private sector — often over months or years.",keys:[["Mass Care","Life-sustaining services for displaced individuals: shelter, feeding, emergency first aid, and family reunification."],["Disaster Case Management","Links survivors with a case manager who assesses needs, develops a recovery plan, and connects them to available services over the long-term recovery period."],["LTRG (Long-Term Recovery Group)","Community coalition coordinating unmet needs with available resources from all sectors. Weekly meetings coordinate across all programs."]],tip:"Recovery programs operate on a continuum: immediate (days) → short-term (weeks) → long-term (months to years). Know the types of programs and the organizations that typically deliver them."},
"5.B":{title:"Manage Disaster Recovery Funding",what:"Disaster recovery requires navigating complex funding systems: federal assistance programs, provincial/state grants, insurance, NGO aid, and private donations. EMs must understand eligibility criteria, application processes, cost-sharing requirements, audit obligations, and reimbursement timelines.",keys:[["DFAA (Canada)","Federal-provincial cost sharing: 90% of eligible costs above per-capita threshold. For response/RECOVERY costs only — NOT mitigation. 60-day application deadline after declaration."],["HMGP (USA)","Hazard Mitigation Grant Program — funds MITIGATION projects after a presidential disaster declaration. Requires positive BCR. NOT for recovery costs."],["Documentation Requirement","All eligible expenses must be documented with original receipts. Undocumented expenses cannot be reimbursed in audit. Documentation begins at incident onset."]],tip:"Funding timelines and documentation are critical. DFAA (Canada) = recovery. NDMP (Canada) = mitigation. HMGP (USA) = mitigation. PA (USA) = public assistance for governments/NGOs. Know each program's purpose."},
"5.C":{title:"Manage Critical Infrastructure Restoration",what:"Restoring CI — power, water, transportation, communications, healthcare — is the central organizing principle of recovery. FEMA's 7 community lifelines provide the framework for tracking and prioritizing restoration.",keys:[["Lifeline Status Board","Visual display tracking operational status of each lifeline: red (impaired) → yellow (degraded) → green (operational). Updated every 6 hours during active recovery."],["Energy Priority","Power typically restored first because it enables all other lifeline restoration — water treatment, hospitals, communications, and transportation all need power."],["Lifeline Restoration Sequence","Not rigidly sequential — multiple lifelines may need simultaneous attention. Immediate life-safety needs can override standard priority order."]],tip:"Lifelines are the ORGANIZING FRAMEWORK for recovery — not a fixed sequence. Energy is typically prioritized, but immediate life-safety (health/medical) can override. Know all 7 lifelines and what restoring each means."},
"5.D":{title:"Develop Incident-Specific Recovery Plans",what:"Each major incident requires a tailored recovery plan addressing its specific impacts, affected populations, and recovery needs. Plans are developed with affected community input, equitable resource distribution, and realistic timelines. Build Back Better is the guiding principle.",keys:[["Recovery Support Functions (RSFs)","NDRF organizational structure: Community Planning & Capacity Building, Economic, Health & Social Services, Housing, Infrastructure Systems, Natural & Cultural Resources."],["Community-Led Recovery","Centers affected residents in planning and decision-making. Produces plans that reflect community values and priorities rather than government assumptions."],["Build Back Better","Recovery principle: use the recovery opportunity to IMPROVE resilience — stronger codes, relocated facilities, upgraded infrastructure. Not just restoration."]],tip:"Recovery plans must involve the community being recovered. 'Build Back Better' means improving on pre-disaster conditions, not just restoring them. Community-led = residents shape priorities; government provides expertise and resources."},
"5.E":{title:"Prepare Scopes of Work",what:"SOWs for recovery projects define the specific work, deliverables, timeline, performance standards, and cost estimates. SOWs are required for FEMA PA projects, construction contracts, and debris management operations. Vague SOWs lead to grant denials and contract disputes.",keys:[["Scope of Work (SOW)","Formal document describing what work will be performed, by whom, to what standard, by when, and at what cost. Must be specific and verifiable."],["Debris Management Plan","Pre-event plan for managing disaster debris — collection, transportation, temporary storage, reduction, and disposal. Required for FEMA reimbursement of debris costs."],["Unit Pricing","Cost estimates must be based on established market rates, pre-event cost data, or competitive bids. Arbitrary pricing creates audit liability."]],tip:"SOWs must be SPECIFIC and VERIFIABLE. Answer: What exactly? By whom? By when? To what standard? At what cost? Vague SOWs = grant denials. Specific SOWs = reimbursable costs."},
"5.F":{title:"Coordinate Community Engagement Opportunities",what:"Recovery is done WITH communities, not TO them. EMs coordinate engagement mechanisms: community meetings, surveys, advisory committees, online engagement, and pop-up consultations. Equity requires deliberate outreach to those most affected who may face barriers to standard participation.",keys:[["Long-Term Recovery Group (LTRG)","Community-based coalition coordinating unmet needs with available resources months/years after disaster. Key mechanism for community-led recovery coordination."],["Community Resilience","Sustained ability of a community to use available resources to respond to, withstand, and recover from adverse situations."],["Equity in Engagement","Must reach ALL affected community members — especially vulnerable populations who may face barriers to standard engagement formats."]],tip:"Equity means PROACTIVE outreach — not waiting for people to show up. Elderly, disabled, limited English, and low-income survivors often face the greatest barriers to participation and have the greatest need."},
"5.G":{title:"Coordinate Reentry to Disaster Areas",what:"Reentry is the controlled, phased process allowing residents, businesses, and responders back into disaster-affected areas. It requires safety verification at each phase before authorization. Poorly managed reentry creates secondary victims.",keys:[["Phased Reentry","First responders → critical personnel → residents (limited access) → general public. Each phase requires SAFETY VERIFICATION — not just time elapsed."],["Safety Assessment","Rapid inspection of buildings and infrastructure using ATC-20 or equivalent protocols. Structural engineers and building inspectors conduct assessments."],["Chemical Spill Reentry","Requires BOTH structural safety AND hazmat clearance (air quality below health thresholds). Chemical incidents require additional clearances beyond structural."]],tip:"Reentry authorization is a government decision based on SAFETY EVIDENCE — not community demand or time elapsed. Premature reentry creates secondary casualties. Always phased, always safety-verified."},
"5.H":{title:"Coordinate Damage Assessments",what:"Damage assessment is systematic evaluation of disaster impacts on people, structures, infrastructure, and the environment. It produces data needed for disaster declarations, insurance claims, grant applications, and recovery planning. Types: Rapid Damage Assessment (immediate) and Preliminary Damage Assessment (for declaration).",keys:[["RDA (Rapid Damage Assessment)","First 24-72 hours. Local/visual. Identifies life-safety priorities and incident scale. Quick and immediate — often conducted by drone or visual survey."],["PDA (Preliminary Damage Assessment)","Multi-government (local + state/provincial + federal). Documents damage costs. Required to support a formal disaster DECLARATION REQUEST."],["PDNA (Post-Disaster Needs Assessment)","UN-developed framework for comprehensive assessment across all sectors. Used in developing countries and increasingly in developed contexts for complex disasters."]],tip:"RDA = immediate, life-safety focus, local resources. PDA = multi-government, costs documented, supports declaration. Declaration timelines are critical — PDA must be completed within legislatively set windows."},
"5.I":{title:"Coordinate After Action Programs",what:"After action programs capture lessons from real events, analyze root causes, and drive systematic improvements. Unlike post-exercise AARs, post-incident AARs must navigate political sensitivities and legal considerations. They should be learning-focused, not blame-focused.",keys:[["Hot Wash","30-minute informal debrief immediately after incident, while events are fresh. Covers: what went well, what didn't, immediate recommendations."],["Formal AAR Process","Hot wash (day 1) → section chief debrief (day 3) → full stakeholder workshop (2 weeks). Independent facilitator promotes psychological safety."],["Corrective Action Program (CAP)","Systematic tracking of all improvement items across exercises and real incidents, with owners, timelines, and success metrics."]],tip:"AARs are LEARNING tools — culture around them must be psychologically safe and improvement-focused. Process: hot wash → warm debrief → formal AAR → IP → track progress. Independent facilitation for real events promotes honesty."},
"5.J":{title:"Facilitate Access to Recovery Resources",what:"Connecting survivors to available resources continues for months/years. Resources include financial assistance, housing programs, mental health services, insurance guidance, legal aid, and community programs. Barriers to access (language, mobility, digital literacy, trust) must be actively addressed.",keys:[["Disaster Recovery Center (DRC)","Fixed or mobile facility where residents meet face-to-face with representatives from multiple agencies and NGOs to access disaster assistance programs."],["Mobile DRC","DRC visiting rural and remote communities weekly, removing transportation barrier for residents unable to travel to fixed sites."],["Multilingual Services","Staff and interpretation services in all languages represented in the affected community. Language access is a civil rights requirement for federally assisted programs."]],tip:"Access means REACHING everyone — not just those who show up. Outreach to elderly, disabled, limited English, and low-income survivors is a requirement, not an afterthought."},
"5.K":{title:"Connect Disaster Survivors to Recovery Resources",what:"Individual case management matches each survivor's unique needs to available programs, navigates bureaucracy on their behalf, and tracks their progress toward recovery. Active case management means completing applications, following up on claims, and advocating when problems arise.",keys:[["Disaster Case Management (DCM)","Time-limited process providing each survivor with a case manager to assess needs, develop a recovery plan, and connect to services over the recovery period."],["Whole-Person Recovery","Recovery needs are interconnected: physical (housing, health), economic (income, employment), and social/emotional (mental health, community connection). All must be addressed."],["Navigation","Helping survivors understand and access complex recovery programs — explaining eligibility, completing applications, following up on claims, and advocating when problems arise."]],tip:"Connecting survivors is ACTIVE case management — not passive information provision. Active = complete applications on behalf of clients, follow up, advocate. Passive = provide a pamphlet. Know the difference."},
"6.A":{title:"Manage Emergency Notification Programs",what:"Emergency notification programs provide timely, accurate, and actionable warnings to the public and partner agencies. Programs include WEA, EAS, NPAS, outdoor warning sirens, mass notification systems (MNS), and social media. EMs must ensure these systems are maintained, tested, and integrated.",keys:[["NPAS (Canada)","National Public Alerting System — broadcasts emergency alerts using CAP-CP (Common Alerting Protocol — Canadian Profile) across multiple channels simultaneously."],["WEA (Wireless Emergency Alert)","Cell broadcast technology — messages go to ALL capable devices in geographic area without registration. Used for imminent threats: tornadoes, amber alerts, tsunami."],["Opt-In MNS","Mass Notification Systems requiring prior enrollment. Higher trust, richer messaging, but lower penetration than WEA. Complementary, not replacement."]],tip:"CAP is the STANDARD. NPAS and IPAWS are SYSTEMS using CAP. WEA = no registration needed. Opt-in MNS = enrollment required. Both are needed for complete notification coverage."},
"6.B":{title:"Evaluate & Manage Technology Solutions",what:"EMs evaluate and select technology solutions for incident management, alerting, situational awareness, GIS, resource tracking, and communication. Key evaluation criteria: functionality, interoperability, reliability under degraded conditions, cost, cybersecurity posture, and user training requirements.",keys:[["Technology Assessment Framework","Define requirements → issue RFP → evaluate against criteria → pilot → select. Never skip the pilot phase for life-safety systems."],["Total Cost of Ownership (TCO)","Full lifecycle cost: procurement + implementation + training + maintenance + upgrades + eventual replacement. Not just purchase price."],["Interoperability Requirement","New technology must integrate with existing systems or it creates silos. Interoperability is a non-negotiable evaluation criterion."]],tip:"Technology selection must be systematic and requirements-based — not brand-driven or price-driven alone. Reliability under adverse conditions (degraded internet, power outages) is the non-negotiable first criterion for EM systems."},
