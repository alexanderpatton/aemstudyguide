  let pool = allQ.filter(q => {
    if (countryFilter === 'core' && q.ctry !== 'core') return false;
    if (diffFilter !== 'all' && q.diff !== diffFilter) return false;
    return true;
  });

  let selected;
  if (quizFormat === 'full') {
    selected = shuffle(pool).slice(0, 100);
  } else if (quizFormat === 'mini') {
    selected = shuffle(pool).slice(0, 20);
  } else if (quizFormat === 'domain') {
    const df = domainFilter ? pool.filter(q => q.d == domainFilter) : pool;
    selected = shuffle(df).slice(0, 25);
  } else if (quizFormat === 'weighted') {
    selected = [];
    DOMAINS.forEach(d => {
      const n = Math.max(1, Math.round(d.weight / 2));
      const dq = shuffle(pool.filter(q => q.d === d.id)).slice(0, n);
      selected.push(...dq);
    });
    selected = shuffle(selected).slice(0, 50);
  } else if (quizFormat === 'weak') {
    const weakDoms = getWeakDomains();
    const weakPool = weakDoms.length > 0 ? pool.filter(q => weakDoms.includes(q.d)) : pool;
    selected = shuffle(weakPool).slice(0, 30);
  } else if (quizFormat === 'bookmarks') {
    const bIds = Array.from(quizBookmarks);
    selected = pool.filter(q => bIds.includes(q.id));
    if (selected.length === 0) {
      document.getElementById('quizArea').innerHTML = '<p style="color:#718096;padding:20px;font-size:14px;font-family:sans-serif">No bookmarked questions yet. Bookmark questions during a quiz by clicking the 🔖 button.</p>';
      return;
    }
  }

  if (!selected || selected.length === 0) {
    document.getElementById('quizArea').innerHTML = '<p style="color:#b91c1c;padding:20px;font-size:14px;font-family:sans-serif">No questions match your filters. Try adjusting your selection.</p>';
    return;
  }

  quizQ = selected; quizIdx = 0; quizCorrect = 0;
  quizDomainScores = {};
  DOMAINS.forEach(d => { quizDomainScores[d.id] = { correct: 0, total: 0 }; });

  // Setup timer
  if (timerOpt === 'exam') {
    quizTimerActive = true;
    quizTimeLeft = selected.length * 60; // 1 min per question (exam pace)
  } else if (timerOpt === '90s') {
    quizTimerActive = 'per';
    quizTimeLeft = 90;
  } else if (timerOpt === '60s') {
    quizTimerActive = 'per';
    quizTimeLeft = 60;
  } else {
    quizTimerActive = false;
  }

  renderQuestion();
}

function renderQuestion() {
  const el = document.getElementById('quizArea');
  if (quizIdx >= quizQ.length) { renderScore(); return; }
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }

  const q = quizQ[quizIdx];
  const d = DOMAINS.find(x => x.id === q.d);
  const pct = Math.round((quizIdx / quizQ.length) * 100);
  const isBookmarked = quizBookmarks.has(q.id);

  // Per-question timer
  if (quizTimerActive === 'per') {
    quizTimeLeft = quizTimerActive === 'per' ? (quizTimeLeft || 90) : quizTimeLeft;
  }

  el.innerHTML = `
    <div class="q-prog">
      <span>${quizIdx + 1} / ${quizQ.length}</span>
      <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
      <span style="color:#1a6b3c">${quizCorrect} correct</span>
      ${quizTimerActive ? `<span id="timerDisplay" style="font-family:monospace;font-weight:700;color:#d4570a"></span>` : ''}
    </div>
    <div class="qcard">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div class="qmeta">
          <span class="qtag dom">D${q.d}: ${d ? d.name.substring(0,22)+'...' : ''}</span>
          <span class="qtag dif">${q.diff}</span>
          <span class="qtag dom" style="background:#f0fdf4;color:#166534">${q.sub}</span>
          ${q.ctry !== 'core' ? `<span class="qtag ctry">${q.ctry}</span>` : ''}
        </div>
        <button onclick="toggleBookmark(${q.id})" title="Bookmark" style="background:${isBookmarked?'#fffbeb':'#f7f8fa'};border:1px solid ${isBookmarked?'#d97706':'#e2e8f0'};border-radius:6px;padding:5px 9px;cursor:pointer;font-size:14px">🔖</button>
      </div>
      <div class="qtext">${q.q}</div>
      <div class="opts">
        ${q.opts.map((o, i) => `<button class="opt" onclick="answer(${i})" id="opt-${i}">
          <span class="opt-lt">${'ABCD'[i]}</span><span>${o}</span>
        </button>`).join('')}
      </div>
      <div class="expl" id="expl">${q.exp}</div>
    </div>`;

  if (quizTimerActive) startQuizTimer();
}

function startQuizTimer() {
  if (quizTimerActive === 'per') {
    // Per-question timer based on selected option
    const perQ = document.querySelector('input[name="timerOpt"]:checked') ?
      (document.querySelector('input[name="timerOpt"]:checked').value === '60s' ? 60 : 90) : 90;
    quizTimeLeft = perQ;
  }
  quizTimer = setInterval(() => {
    quizTimeLeft--;
    const display = document.getElementById('timerDisplay');
    if (display) {
      const mins = Math.floor(quizTimeLeft / 60);
      const secs = quizTimeLeft % 60;
      display.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
      display.style.color = quizTimeLeft < 30 ? '#b91c1c' : '#d4570a';
    }
    if (quizTimeLeft <= 0) {
      clearInterval(quizTimer);
      if (quizTimerActive === 'per') {
        // Time's up on this question — auto-advance with wrong answer
        answer(-1);
      } else {
        // Full exam timer expired — end quiz
        renderScore();
      }
    }
  }, 1000);
}

function toggleBookmark(id) {
  if (quizBookmarks.has(id)) quizBookmarks.delete(id);
  else quizBookmarks.add(id);
  const btn = document.querySelector(`button[onclick="toggleBookmark(${id})"]`);
  if (btn) {
    btn.style.background = quizBookmarks.has(id) ? '#fffbeb' : '#f7f8fa';
    btn.style.borderColor = quizBookmarks.has(id) ? '#d97706' : '#e2e8f0';
  }
}

function answer(sel) {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const q = quizQ[quizIdx];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const isRight = sel === q.ans;
  if (isRight) { quizCorrect++; quizDomainScores[q.d].correct++; }
  quizDomainScores[q.d].total++;
  if (sel >= 0) document.getElementById('opt-' + sel).classList.add(isRight ? 'correct' : 'incorrect');
  if (!isRight && q.ans >= 0) document.getElementById('opt-' + q.ans).classList.add('reveal');
  document.getElementById('expl').classList.add('show');
  setTimeout(() => { quizIdx++; renderQuestion(); }, 2800);
}

function renderScore() {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const el = document.getElementById('quizArea');
  const pct = Math.round((quizCorrect / quizQ.length) * 100);
  updateQuizBest(pct);

  // Save domain scores for weak area targeting
  const p = getProgress();
  p.domainScores = DOMAINS.map(d => {
    const s = quizDomainScores[d.id];
    return { id: d.id, pct: s.total > 0 ? Math.round(s.correct/s.total*100) : null, total: s.total };
  }).filter(d => d.total > 0);
  saveProgress(p);

  const wrong = quizQ.length - quizCorrect;
  const grade = pct >= 85 ? '🎉 Excellent! You are very well prepared.' :
    pct >= 75 ? '✅ Good work — you are on track to pass.' :
    pct >= 65 ? '📖 Getting close — review your weak domains and retry.' :
    '📚 Need more study — focus on the domains below showing red.';

  const domBreakdown = DOMAINS.map(d => {
    const s = quizDomainScores[d.id];
    if (!s || s.total === 0) return '';
    const p2 = Math.round((s.correct / s.total) * 100);
    const color = p2 >= 75 ? '#1a6b3c' : p2 >= 60 ? '#92400e' : '#b91c1c';
    const bg = p2 >= 75 ? '#e8f5ed' : p2 >= 60 ? '#fffbeb' : '#fef2f2';
    return `<div class="ds-card" style="background:${bg}">
      <div class="ds-name">D${d.id}: ${d.name.substring(0,28)}</div>
      <div class="ds-bar-bg"><div class="ds-bar" style="width:${p2}%;background:${color}"></div></div>
      <div class="ds-pct" style="color:${color}">${p2}% (${s.correct}/${s.total})</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="score-card">
      <div class="score-big">${pct}%</div>
      <div class="score-lbl">${quizCorrect} correct of ${quizQ.length} questions</div>
      <p style="font-size:15px;font-family:sans-serif;color:#1a202c;margin-top:10px">${grade}</p>
      <div class="score-row">
        <div class="sstat good"><div class="sn">${quizCorrect}</div><div class="sl">Correct</div></div>
        <div class="sstat bad"><div class="sn">${wrong}</div><div class="sl">Incorrect</div></div>
        <div class="sstat"><div class="sn">${quizQ.length}</div><div class="sl">Total</div></div>
      </div>
      ${domBreakdown ? `<div style="margin-top:22px;text-align:left">
        <div style="font-size:13px;font-weight:700;color:#0f2d4a;margin-bottom:10px">Performance by Domain</div>
        <div class="domain-score-grid">${domBreakdown}</div>
        <div style="margin-top:12px;font-size:12px;color:#718096;font-family:sans-serif">Domains below 70% will appear in your Weak Areas exam mode</div>
      </div>` : ''}
      <div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-p" onclick="renderQuizSetup();startQuiz()">Retake</button>
        <button class="btn-o" onclick="setWeakArea()">📚 Study Weak Areas</button>
        <button class="btn-o" onclick="renderQuizSetup()">Change Format</button>
        <button class="btn-o" onclick="nav('learn',null)">Review Content</button>
      </div>
    </div>`;
}

function setWeakArea() {
  renderQuizSetup();
  setTimeout(() => {
    const btn = document.getElementById('fmt-weak');
    if (btn) setFormat('weak', btn);
    startQuiz();
  }, 100);
}

// ---------- TRUE/FALSE RENDERER ----------
function renderTFQuestion(q, idx, total, correct) {
  const pct = Math.round((idx / total) * 100);
  return `
    <div class="q-prog">
      <span>${idx + 1} / ${total}</span>
      <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
      <span style="color:#1a6b3c">${correct} correct</span>
    </div>
    <div class="qcard">
      <div class="qmeta">
        <span class="qtag dom">D${q.d}: ${DOMAINS.find(x=>x.id===q.d)?.name.substring(0,22)}...</span>
        <span class="qtag dif">${q.diff}</span>
        <span class="qtag dom" style="background:#f0fdf4;color:#166534">${q.sub}</span>
        <span style="font-size:11px;background:#fdf0e8;color:#d4570a;padding:3px 8px;border-radius:4px;font-weight:700">TRUE / FALSE</span>
        ${q.src ? `<span style="font-size:10px;color:#718096;font-family:monospace">📖 ${q.src}</span>` : ''}
        <button onclick="toggleBookmark('tf_${q.id}')" title="Bookmark" style="background:#f7f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;margin-left:auto">🔖</button>
      </div>
      <div class="qtext">${q.q}</div>
      <div class="opts">
        <button class="opt" onclick="answerTF(true)" id="opt-true">
          <span class="opt-lt">T</span><span>TRUE</span>
        </button>
        <button class="opt" onclick="answerTF(false)" id="opt-false">
          <span class="opt-lt">F</span><span>FALSE</span>
        </button>
      </div>
      <div class="expl" id="expl">${q.exp}</div>
    </div>`;
}

function answerTF(selected) {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const q = quizQ[quizIdx];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  const isRight = selected === q.ans;
  if (isRight) { quizCorrect++; quizDomainScores[q.d].correct++; }
  quizDomainScores[q.d].total++;
  const selBtn = document.getElementById(selected ? 'opt-true' : 'opt-false');
  if (selBtn) selBtn.classList.add(isRight ? 'correct' : 'incorrect');
  if (!isRight) {
    const corrBtn = document.getElementById(q.ans ? 'opt-true' : 'opt-false');
    if (corrBtn) corrBtn.classList.add('reveal');
  }
  document.getElementById('expl').classList.add('show');
  setTimeout(() => { quizIdx++; renderCurrentQuestion(); }, 2800);
}

// ---------- ORDERING RENDERER ----------
var orderingState = { items: [], userOrder: [], submitted: false };

function renderOrderingQuestion(q, idx, total, correct) {
  const pct = Math.round((idx / total) * 100);
  // Shuffle items for display
  const shuffled = q.items.map((text, origIdx) => ({ text, origIdx })).sort(() => Math.random() - 0.5);
  orderingState = { items: q.items, userOrder: shuffled.map((_, i) => i), shuffled, submitted: false };

  return `
    <div class="q-prog">
      <span>${idx + 1} / ${total}</span>
      <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
      <span style="color:#1a6b3c">${correct} correct</span>
    </div>
    <div class="qcard">
      <div class="qmeta">
        <span class="qtag dom">D${q.d}: ${DOMAINS.find(x=>x.id===q.d)?.name.substring(0,22)}...</span>
        <span style="font-size:11px;background:#e8f5ed;color:#1a6b3c;padding:3px 8px;border-radius:4px;font-weight:700">ORDERING</span>
        ${q.src ? `<span style="font-size:10px;color:#718096;font-family:monospace">📖 ${q.src}</span>` : ''}
        <button onclick="toggleBookmark('ord_${q.id}')" title="Bookmark" style="background:#f7f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;margin-left:auto">🔖</button>
      </div>
      <div class="qtext">${q.q}</div>
      <div style="font-size:12px;color:#718096;font-family:sans-serif;margin-bottom:12px">Drag to reorder, or use ↑↓ buttons. Place item 1 at the top.</div>
      <div id="orderList" style="display:flex;flex-direction:column;gap:8px">
        ${shuffled.map((item, pos) => `
          <div class="order-item" id="oi-${pos}" data-pos="${pos}" style="background:#f7f8fa;border:1.5px solid #e2e8f0;border-radius:8px;padding:11px 14px;display:flex;gap:10px;align-items:center;cursor:grab">
            <span style="font-size:13px;font-weight:700;color:#d4570a;width:22px;text-align:center;flex-shrink:0">${pos+1}</span>
            <span style="font-size:14px;flex:1">${item.text}</span>
            <div style="display:flex;flex-direction:column;gap:2px">
              <button onclick="moveOrderItem(${pos},-1)" style="background:none;border:1px solid #e2e8f0;border-radius:4px;width:24px;height:20px;cursor:pointer;font-size:10px" ${pos===0?'disabled':''}>↑</button>
              <button onclick="moveOrderItem(${pos},1)" style="background:none;border:1px solid #e2e8f0;border-radius:4px;width:24px;height:20px;cursor:pointer;font-size:10px" ${pos===shuffled.length-1?'disabled':''}>↓</button>
            </div>
          </div>`).join('')}
      </div>
      <button class="btn-p" style="margin-top:14px;width:100%" onclick="submitOrdering()">Submit Order →</button>
      <div class="expl" id="expl" style="display:none">${q.exp}</div>
    </div>`;
}

function moveOrderItem(pos, dir) {
  const newPos = pos + dir;
  if (newPos < 0 || newPos >= orderingState.shuffled.length) return;
  const tmp = orderingState.shuffled[pos];
  orderingState.shuffled[pos] = orderingState.shuffled[newPos];
  orderingState.shuffled[newPos] = tmp;
  // Re-render the list
  const list = document.getElementById('orderList');
  if (!list) return;
  list.innerHTML = orderingState.shuffled.map((item, p) => `
    <div class="order-item" id="oi-${p}" data-pos="${p}" style="background:#f7f8fa;border:1.5px solid #e2e8f0;border-radius:8px;padding:11px 14px;display:flex;gap:10px;align-items:center">
      <span style="font-size:13px;font-weight:700;color:#d4570a;width:22px;text-align:center;flex-shrink:0">${p+1}</span>
      <span style="font-size:14px;flex:1">${item.text}</span>
      <div style="display:flex;flex-direction:column;gap:2px">
        <button onclick="moveOrderItem(${p},-1)" style="background:none;border:1px solid #e2e8f0;border-radius:4px;width:24px;height:20px;cursor:pointer;font-size:10px" ${p===0?'disabled':''}>↑</button>
        <button onclick="moveOrderItem(${p},1)" style="background:none;border:1px solid #e2e8f0;border-radius:4px;width:24px;height:20px;cursor:pointer;font-size:10px" ${p===orderingState.shuffled.length-1?'disabled':''}>↓</button>
      </div>
    </div>`).join('');
}

function submitOrdering() {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const q = quizQ[quizIdx];
  const userOrigIdxOrder = orderingState.shuffled.map(item => item.origIdx);
  const isRight = JSON.stringify(userOrigIdxOrder) === JSON.stringify(q.correct);
  if (isRight) { quizCorrect++; quizDomainScores[q.d].correct++; }
  quizDomainScores[q.d].total++;

  // Show correct order
  const list = document.getElementById('orderList');
  if (list) {
    list.innerHTML = q.correct.map((origIdx, pos) => {
      const userPos = userOrigIdxOrder.indexOf(origIdx);
      const wasCorrect = userPos === pos;
      return `<div style="background:${wasCorrect?'#e8f5ed':'#fef2f2'};border:1.5px solid ${wasCorrect?'#1a6b3c':'#b91c1c'};border-radius:8px;padding:11px 14px;display:flex;gap:10px;align-items:center">
        <span style="font-size:13px;font-weight:700;color:${wasCorrect?'#1a6b3c':'#b91c1c'};width:22px;text-align:center;flex-shrink:0">${pos+1}</span>
        <span style="font-size:14px;flex:1">${q.items[origIdx]}</span>
        <span style="font-size:12px;color:${wasCorrect?'#1a6b3c':'#b91c1c'}">${wasCorrect?'✓':'✗'}</span>
      </div>`;
    }).join('');
  }

  const submitBtn = document.querySelector('.qcard .btn-p');
  if (submitBtn) submitBtn.style.display = 'none';

  const expl = document.getElementById('expl');
  if (expl) { expl.style.display = 'block'; expl.classList.add('show'); }

  setTimeout(() => { quizIdx++; renderCurrentQuestion(); }, 3500);
}

// ---------- MATCHING RENDERER ----------
var matchingState = { selected: null, matches: {}, submitted: false };

function renderMatchingQuestion(q, idx, total, correct) {
  const pct = Math.round((idx / total) * 100);
  const rights = q.pairs.map(p => p.right).sort(() => Math.random() - 0.5);
  matchingState = { selected: null, matches: {}, submitted: false, rights, pairs: q.pairs };

  return `
    <div class="q-prog">
      <span>${idx + 1} / ${total}</span>
      <div class="prog-out"><div class="prog-in" style="width:${pct}%"></div></div>
      <span style="color:#1a6b3c">${correct} correct</span>
    </div>
    <div class="qcard">
      <div class="qmeta">
        <span class="qtag dom">D${q.d}: ${DOMAINS.find(x=>x.id===q.d)?.name.substring(0,22)}...</span>
        <span style="font-size:11px;background:#f0e8ff;color:#6b21a8;padding:3px 8px;border-radius:4px;font-weight:700">MATCHING</span>
        ${q.src ? `<span style="font-size:10px;color:#718096;font-family:monospace">📖 ${q.src}</span>` : ''}
        <button onclick="toggleBookmark('m_${q.id}')" title="Bookmark" style="background:#f7f8fa;border:1px solid #e2e8f0;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px;margin-left:auto">🔖</button>
      </div>
      <div class="qtext">${q.q}</div>
      <div style="font-size:12px;color:#718096;font-family:sans-serif;margin-bottom:12px">Click a left item, then click the matching right item.</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#718096;margin-bottom:8px;font-family:sans-serif">Terms / Concepts</div>
          ${q.pairs.map((p, i) => `
            <div id="left-${i}" onclick="selectLeft(${i})" style="background:#f7f8fa;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:7px;cursor:pointer;font-size:13px;font-weight:600;color:#0f2d4a;transition:.15s;min-height:44px;display:flex;align-items:center">
              ${p.left}
            </div>`).join('')}
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#718096;margin-bottom:8px;font-family:sans-serif">Definitions / Matches</div>
          ${rights.map((r, i) => `
            <div id="right-${i}" onclick="selectRight(${i})" style="background:#f7f8fa;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:7px;cursor:pointer;font-size:12px;color:#1a202c;transition:.15s;min-height:44px;display:flex;align-items:center;font-family:sans-serif">
              ${r}
            </div>`).join('')}
        </div>
      </div>
      <div id="matchStatus" style="font-size:13px;font-family:sans-serif;color:#718096;margin-top:8px;text-align:center">
        ${q.pairs.length} pairs to match
      </div>
      <button class="btn-p" id="submitMatch" style="margin-top:12px;width:100%;display:none" onclick="submitMatching()">Submit Matches →</button>
      <div class="expl" id="expl">${q.exp}</div>
    </div>`;
}

function selectLeft(idx) {
  if (matchingState.submitted) return;
  // Deselect all lefts
  document.querySelectorAll('[id^="left-"]').forEach(el => {
    if (!el.dataset.matched) el.style.borderColor = '#e2e8f0';
    el.style.background = el.dataset.matched ? el.style.background : '#f7f8fa';
  });
  matchingState.selected = idx;
  const el = document.getElementById(`left-${idx}`);
  if (el && !el.dataset.matched) {
    el.style.borderColor = '#0f2d4a';
    el.style.background = '#e8f0f8';
  }
}

function selectRight(rightIdx) {
  if (matchingState.submitted) return;
  if (matchingState.selected === null) return;
  const leftIdx = matchingState.selected;
  const leftEl = document.getElementById(`left-${leftIdx}`);
  const rightEl = document.getElementById(`right-${rightIdx}`);
  if (!leftEl || !rightEl || leftEl.dataset.matched || rightEl.dataset.matched) return;

  // Make the match
  matchingState.matches[leftIdx] = rightIdx;
  leftEl.dataset.matched = '1';
  rightEl.dataset.matched = '1';
  leftEl.style.borderColor = '#d4570a';
  leftEl.style.background = '#fdf0e8';
  rightEl.style.borderColor = '#d4570a';
  rightEl.style.background = '#fdf0e8';
  matchingState.selected = null;

  const matched = Object.keys(matchingState.matches).length;
  const total = matchingState.pairs.length;
  const statusEl = document.getElementById('matchStatus');
  if (statusEl) statusEl.textContent = `${matched} of ${total} matched`;

  if (matched === total) {
    const btn = document.getElementById('submitMatch');
    if (btn) btn.style.display = 'block';
  }
}

function submitMatching() {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const q = quizQ[quizIdx];
  let correctCount = 0;

  q.pairs.forEach((pair, leftIdx) => {
    const rightIdx = matchingState.matches[leftIdx];
    const selectedRight = matchingState.rights[rightIdx];
    const isCorrect = selectedRight === pair.right;
    if (isCorrect) correctCount++;

    const leftEl = document.getElementById(`left-${leftIdx}`);
    const rightEl = document.getElementById(`right-${rightIdx}`);
    if (leftEl) { leftEl.style.borderColor = isCorrect ? '#1a6b3c' : '#b91c1c'; leftEl.style.background = isCorrect ? '#e8f5ed' : '#fef2f2'; }
    if (rightEl) { rightEl.style.borderColor = isCorrect ? '#1a6b3c' : '#b91c1c'; rightEl.style.background = isCorrect ? '#e8f5ed' : '#fef2f2'; }
  });

  const allCorrect = correctCount === q.pairs.length;
  if (allCorrect) { quizCorrect++; quizDomainScores[q.d].correct++; }
  quizDomainScores[q.d].total++;

  const statusEl = document.getElementById('matchStatus');
  if (statusEl) statusEl.innerHTML = `<span style="color:${allCorrect?'#1a6b3c':'#b91c1c'};font-weight:700">${correctCount}/${q.pairs.length} pairs correct</span>`;

  const btn = document.getElementById('submitMatch');
  if (btn) btn.style.display = 'none';

  const expl = document.getElementById('expl');
  if (expl) expl.classList.add('show');

  setTimeout(() => { quizIdx++; renderCurrentQuestion(); }, 3800);
}

// ---------- UPDATED startQuiz to include all question types ----------
function startQuiz() {
  const countryFilter = document.getElementById('quizCountry').value;
  const diffFilter = document.getElementById('quizDiff').value;
  const domainFilter = document.getElementById('quizDomain') ? document.getElementById('quizDomain').value : '';
  const timerOpt = document.querySelector('input[name="timerOpt"]:checked')?.value || 'none';

  const useMC = document.getElementById('qt-mc')?.checked !== false;
  const useTF = document.getElementById('qt-tf')?.checked;
  const useOrdering = document.getElementById('qt-ordering')?.checked;
  const useMatching = document.getElementById('qt-matching')?.checked;

  // Build pool from selected types
  let pool = [];

  if (useMC) {
    let mcPool = allQ.filter(q => {
      if (countryFilter === 'core' && q.ctry !== 'core') return false;
      if (diffFilter !== 'all' && q.diff !== diffFilter) return false;
      return true;
    }).map(q => ({ ...q, qtype: 'mc' }));
    pool.push(...mcPool);
  }

  if (useTF) {
    let tfPool = TF_QUESTIONS.filter(q => {
      if (countryFilter === 'core' && q.ctry !== 'core') return false;
      if (diffFilter !== 'all' && q.diff !== diffFilter) return false;
      return true;
    }).map(q => ({ ...q, qtype: 'tf' }));
    pool.push(...tfPool);
  }

  if (useOrdering) {
    let ordPool = ORDERING_QUESTIONS.map(q => ({ ...q, qtype: 'ordering' }));
    pool.push(...ordPool);
  }

  if (useMatching) {
    let matchPool = MATCHING_QUESTIONS.map(q => ({ ...q, qtype: 'matching' }));
    pool.push(...matchPool);
  }

  // Domain filter for MC/TF
  if (domainFilter && quizFormat === 'domain') {
    pool = pool.filter(q => q.qtype === 'ordering' || q.qtype === 'matching' || String(q.d) === String(domainFilter));
  }

  pool = shuffle(pool);

  let selected;
  if (quizFormat === 'full') {
    // For full exam simulation - prioritize MC to mirror real exam
    if (useMC && !useTF && !useOrdering && !useMatching) {
      selected = pool.slice(0, 100);
    } else {
      selected = pool.slice(0, 100);
    }
  } else if (quizFormat === 'mini') {
    selected = pool.slice(0, 20);
  } else if (quizFormat === 'domain') {
    selected = pool.slice(0, Math.min(pool.length, 30));
  } else if (quizFormat === 'weighted') {
    selected = [];
    const mcWeighted = allQ.filter(q => countryFilter === 'all' || q.ctry === 'core').map(q => ({...q, qtype:'mc'}));
    DOMAINS.forEach(d => {
      const n = Math.max(1, Math.round(d.weight / 2));
      const dq = shuffle(mcWeighted.filter(q => q.d === d.id)).slice(0, n);
      selected.push(...dq);
    });
    if (useTF) selected.push(...shuffle(TF_QUESTIONS.map(q=>({...q,qtype:'tf'}))).slice(0,10));
    if (useOrdering) selected.push(...shuffle(ORDERING_QUESTIONS.map(q=>({...q,qtype:'ordering'}))).slice(0,5));
    if (useMatching) selected.push(...shuffle(MATCHING_QUESTIONS.map(q=>({...q,qtype:'matching'}))).slice(0,5));
    selected = shuffle(selected).slice(0, 60);
  } else if (quizFormat === 'weak') {
    const weakDoms = getWeakDomains();
    const weakPool = weakDoms.length > 0 ? pool.filter(q => !q.d || weakDoms.includes(q.d)) : pool;
    selected = shuffle(weakPool).slice(0, 35);
  } else if (quizFormat === 'bookmarks') {
    const bIds = Array.from(quizBookmarks).map(String);
    selected = pool.filter(q => bIds.includes(String(q.id)));
    if (selected.length === 0) {
      document.getElementById('quizArea').innerHTML = '<p style="color:#718096;padding:20px;font-size:14px;font-family:sans-serif">No bookmarked questions yet. Click 🔖 during any quiz to bookmark questions.</p>';
      return;
    }
  }

  if (!selected || selected.length === 0) {
    document.getElementById('quizArea').innerHTML = '<p style="color:#b91c1c;padding:20px;font-size:14px;font-family:sans-serif">No questions match your filters. Try adjusting your selection.</p>';
    return;
  }

  quizQ = selected; quizIdx = 0; quizCorrect = 0;
  quizDomainScores = {};
  DOMAINS.forEach(d => { quizDomainScores[d.id] = { correct: 0, total: 0 }; });

  // Setup timer
  if (timerOpt === 'exam') { quizTimerActive = true; quizTimeLeft = selected.length * 60; }
  else if (timerOpt === '90s' || timerOpt === '60s') { quizTimerActive = 'per'; quizTimeLeft = timerOpt === '60s' ? 60 : 90; }
  else { quizTimerActive = false; }

  renderCurrentQuestion();
}

function filterDocs() {
  const pf = document.getElementById('docFilter').value;
  const df = parseInt(document.getElementById('docDomainFilter').value);
  let docs = DOC_GUIDES;
  if (pf !== 'all') docs = docs.filter(d => d.priority === pf);
  if (df > 0) docs = docs.filter(d => d.domains.includes(df));
  document.getElementById('docCount').textContent = `${docs.length} document${docs.length !== 1 ? 's' : ''}`;
  document.getElementById('docGrid').innerHTML = docs.map(d => docCard(d)).join('');
}

function docCard(doc) {

function toggleQA(id) {

function revealAllQA(docId, count) {
  for (let i = 0; i < count; i++) {

    if (el) el.style.display = 'block';

}

function getProgress() {
  try {
    const s = localStorage.getItem('aem_progress');
    return s ? JSON.parse(s) : { docs:{}, domains:{}, fcSeen:0, quizBest:0, guide:false };
  } catch(e) { return { docs:{}, domains:{}, fcSeen:0, quizBest:0, guide:false }; }
}

function saveProgress(p) {
  try { localStorage.setItem('aem_progress', JSON.stringify(p)); } catch(e) {}
}

function markDoc(id, val) {
  const p = getProgress(); p.docs[id] = val; saveProgress(p);
  document.getElementById('p-progress') && renderProgress();
}

function markDomain(id, val) {
  const p = getProgress(); p.domains[id] = val; saveProgress(p);
  document.getElementById('p-progress') && renderProgress();
}

function clearProgress() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    try { localStorage.removeItem('aem_progress'); } catch(e) {}
    renderProgress();
  }
}

function updateQuizBest(score) {
  const p = getProgress();
  if (score > (p.quizBest || 0)) { p.quizBest = score; saveProgress(p); }
}
