{id:"tf93",d:5,sub:"5.B",q:"DFAA reimbursement requires original receipts and proper documentation for all claimed eligible costs.",ans:true,exp:"DFAA (and all federal grant programs) requires original receipts and proper documentation for all claimed costs. The federal auditor reviews claims and undocumented costs are not reimbursed. Documentation discipline begins at incident onset — not after the DFAA application is filed.",src:"DFAA Program (Public Safety Canada)",diff:"intermediate",ctry:"Canada"},
{id:"tf94",d:6,sub:"6.A",q:"Wireless Emergency Alerts (WEA) and Canada's Alert Ready system both use Cell Broadcast technology.",ans:true,exp:"Both WEA (US) and Alert Ready (Canada) use Cell Broadcast technology — sending messages to all compatible mobile devices in a geographic area without prior registration. This distinguishes them from opt-in notification systems.",src:"NPAS / Alert Ready / IPAWS Documentation",diff:"intermediate",ctry:"core"},
{id:"tf95",d:2,sub:"2.P",q:"According to FEMA's Whole Community approach, individuals and families are expected to be solely responsible for their own emergency preparedness.",ans:false,exp:"The Whole Community approach recognizes that individuals, families, government, NGOs, and private sector all share responsibility for preparedness. No single sector bears sole responsibility. The approach emphasizes building community resilience through collective participation.",src:"A Whole Community Approach to Emergency Management",diff:"beginner",ctry:"core"},
{id:"tf96",d:7,sub:"7.O",q:"The IAEM Code of Ethics principle of 'Integrity' requires being truthful and transparent, even under political pressure.",ans:true,exp:"Integrity in the IAEM Code requires being truthful, transparent, and honest — following correct processes even when political pressure pushes for shortcuts. This principle is tested in ethics scenarios where elected officials or supervisors create pressure to compromise process.",src:"IAEM Code of Ethics",diff:"beginner",ctry:"core"},
{id:"tf97",d:4,sub:"4.P",q:"Crisis Counseling Program (CCP) services are available for up to 9 months following a presidentially declared disaster.",ans:true,exp:"CCP provides short-term crisis counseling for up to 9 months, with possible extension for up to 24 months in catastrophic disasters. The program serves both disaster survivors and first responders experiencing acute stress.",src:"FEMA CCP Program",diff:"advanced",ctry:"core"},
{id:"tf98",d:5,sub:"5.D",q:"Recovery planning should be completed by government EM staff independently to ensure technical accuracy.",ans:false,exp:"Recovery planning must be COMMUNITY-LED — centering affected residents and organizations in planning and decision-making. Government expertise supports but cannot replace community voice. Plans developed without community participation consistently fail to reflect actual community priorities and produce less sustainable recovery outcomes.",src:"NDRF / Community-Led Recovery Principles",diff:"beginner",ctry:"core"},
{id:"tf99",d:3,sub:"3.C",q:"The Pre-Disaster Mitigation (PDM) grant program is only available after a presidential disaster declaration.",ans:false,exp:"PDM grants are available BEFORE disasters — that is what 'pre-disaster' means. HMGP (Hazard Mitigation Grant Program) is available AFTER a presidential disaster declaration. PDM and HMGP serve different timing needs in the mitigation investment cycle.",src:"Local Mitigation Planning Handbook / FEMA Grant Programs",diff:"intermediate",ctry:"core"},
{id:"tf100",d:2,sub:"2.E",q:"A generator that starts successfully during a routine inspection is confirmed operationally ready for extended EOC activation.",ans:false,exp:"Starting a generator only verifies that it starts — not that it can sustain load for 24-72 hours of EOC operations under demand. Load testing (running the generator under actual electrical load) is required to verify operational capacity. A generator can start reliably but fail under sustained load.",src:"IS-2200 / EOC Maintenance Practice",diff:"advanced",ctry:"core"}
];

// ============================================================
// ORDERING QUESTIONS (50 questions)
// ============================================================
const ORDERING_QUESTIONS = [
{id:"ord1",d:1,sub:"1.F",q:"Place the THIRA steps in the correct order:",items:["Apply results to planning and investments","Give context to threats and hazards (develop worst-reasonable scenarios)","Establish capability targets","Identify threats and hazards"],correct:[3,1,2,0],exp:"CPG 201 THIRA sequence: (1) Identify threats and hazards → (2) Give context → (3) Establish capability targets → (4) Apply results. This 4-step sequence is foundational and directly tested.",src:"CPG 201"},
{id:"ord2",d:2,sub:"2.J",q:"Arrange the CPG 101 EOP planning steps in the correct order:",items:["Plan implementation and maintenance","Form a collaborative planning team","Plan development","Plan preparation, review, and approval","Understand the situation","Determine goals and objectives"],correct:[1,4,5,2,3,0],exp:"CPG 101 6-step process: (1) Form team → (2) Understand situation → (3) Determine goals → (4) Plan development → (5) Preparation/review/approval → (6) Implementation and maintenance.",src:"CPG 101 v2"},
{id:"ord3",d:2,sub:"2.K",q:"Arrange these exercise types from LEAST to MOST resource-intensive (HSEEP progressive approach):",items:["Full-Scale Exercise","Tabletop Exercise","Functional Exercise","Seminar","Drill"],correct:[3,1,4,2,0],exp:"HSEEP progression from least to most resource-intensive: Seminar → Tabletop → Drill → Functional → Full-Scale. Discussion-based exercises (seminars, workshops, TTX) require far fewer resources than operations-based exercises.",src:"IS-120.C HSEEP"},
{id:"ord4",d:2,sub:"2.B",q:"Place the COOP activation phases in the correct order:",items:["Reconstitution (return to primary facility)","Alternate Operations (conduct PMEFs from alternate location)","Activation and Relocation (first 12 hours)"],correct:[2,1,0],exp:"IS-1300 COOP phases: Phase 1 Activation/Relocation (0-12 hours) → Phase 2 Alternate Operations (up to 30 days) → Phase 3 Reconstitution (return to primary).",src:"IS-1300"},
{id:"ord5",d:4,sub:"4.G",q:"Place the Planning P (ICS planning cycle) steps in the correct sequence starting from incident notification:",items:["Operations Briefing","IAP Preparation and Approval","Planning Meeting","Execute, Monitor, and Assess","IC/UC Establishment and Initial Response Briefing","Tactics Meeting"],correct:[4,5,2,1,0,3],exp:"Planning P sequence: IC/UC establishment → Tactics Meeting → Planning Meeting → IAP Preparation/Approval → Operations Briefing → Execute/Monitor/Assess → cycle repeats.",src:"IS-200.C"},
{id:"ord6",d:1,sub:"1.D",q:"Arrange the BIA-to-COOP development sequence in the correct order:",items:["Write the COOP Plan","Set Recovery Time Objectives (RTO) and Recovery Point Objectives (RPO)","Identify mission-essential functions","Design recovery strategies","Determine Maximum Tolerable Downtime (MTD)"],correct:[2,4,1,3,0],exp:"BIA-to-COOP sequence: Identify critical functions → Determine MTD → Set RTO/RPO (shorter than MTD) → Design recovery strategies → Write COOP plan.",src:"IS-1300 / FEMA BIA Guide"},
{id:"ord7",d:2,sub:"2.K",q:"Arrange the post-exercise debriefing steps in the correct order:",items:["Formal After Action Review (all stakeholders, ~2-3 weeks later)","Implement and track Improvement Plan actions","Hot Wash (immediate, 10-15 minutes)","Complete Improvement Plan with assigned actions and deadlines","Warm Debrief (key staff, within 48-72 hours)"],correct:[2,4,0,3,1],exp:"Post-exercise debrief sequence: Hot wash (immediate) → Warm debrief (days) → Formal AAR (weeks) → Improvement Plan → Track to completion.",src:"IS-120.C HSEEP"},
{id:"ord8",d:5,sub:"5.G",q:"Arrange the phased reentry sequence in the correct order (first to last allowed in):",items:["General public","First responders and utility crews","Residents (limited access to retrieve medications/critical items)","Critical personnel and essential service workers"],correct:[1,3,2,0],exp:"Standard phased reentry: First responders/utilities → Critical personnel → Limited resident access → General public. Each phase requires safety verification before authorization.",src:"EM Reentry Protocols"},
{id:"ord9",d:4,sub:"4.B",q:"Arrange the IAP (Incident Action Plan) development cycle in the correct order:",items:["Distribute IAP to incident personnel","Incident Commander approves IAP","Tactics Meeting to assign resources","Operations Briefing","Planning Meeting to review tactics and confirm assignments","Resources Unit completes resource assignments"],correct:[2,4,5,1,3,0],exp:"IAP development: Tactics Meeting → Planning Meeting → Resources Unit confirms assignments → IC approves → Operations Briefing → Distribute IAP. This sequence ensures the IAP reflects current tactical plans and has command approval before operational use.",src:"IS-200.C"},
{id:"ord10",d:3,sub:"3.E",q:"Arrange the mitigation project prioritization process in the correct order:",items:["Implement approved mitigation projects","Identify all potential mitigation actions from the risk assessment","Apply prioritization criteria (BCR, life-safety, feasibility, equity)","Score and rank projects","Update the local mitigation plan with prioritized action list"],correct:[1,2,3,4,0],exp:"Mitigation prioritization process: Identify options → Apply criteria → Score and rank → Update plan → Implement. Identifying options precedes scoring; the plan is updated before implementation begins.",src:"Local Mitigation Planning Handbook"},
{id:"ord11",d:2,sub:"2.Q",q:"Arrange the training program development steps in the correct order:",items:["Evaluate training effectiveness","Deliver training","Design or select training program","Assess training needs and identify gaps","Reassess needs for next cycle"],correct:[3,2,1,0,4],exp:"Training cycle: Assess needs → Design/select program → Deliver → Evaluate effectiveness → Reassess for next cycle. NEVER begin with delivery — the needs assessment is always first.",src:"IS-120.C / Adult Learning Principles"},
{id:"ord12",d:7,sub:"7.Q",q:"Arrange the Business Continuity Planning development sequence in the correct order:",items:["Exercise the BCP","Identify mission-essential functions through interviews","Design recovery strategies to meet RTO/RPO","Write the BCP document","Conduct the Business Impact Analysis (BIA)","Set MTD, RTO, and RPO for each essential function"],correct:[4,1,5,2,3,0],exp:"BCP sequence: Conduct BIA → Identify essential functions → Set MTD/RTO/RPO → Design recovery strategies → Write BCP → Exercise. BIA is always first; exercising validates the written plan.",src:"IS-1300 / DRI Canada Professional Practices"},
{id:"ord13",d:4,sub:"4.J",q:"Place the post-incident debriefing steps in the correct order:",items:["Complete formal After Action Report with all stakeholders","Implement corrective actions from Improvement Plan","Hot Wash with immediate responders (same day)","Escalate and track Improvement Plan items to completion","Warm Debrief with key section leaders (2-3 days later)"],correct:[2,4,0,1,3],exp:"Post-incident debrief: Same-day hot wash → 2-3 day warm debrief → Formal AAR (all stakeholders, 2-4 weeks) → Improvement Plan actions → Track to completion and verify.",src:"IS-120.C HSEEP / Post-Incident Review Best Practices"},
{id:"ord14",d:5,sub:"5.H",q:"Arrange the damage assessment sequence in the correct order:",items:["Formal disaster declaration request submitted to higher government","Preliminary Damage Assessment (PDA) conducted by multi-government team","Rapid Damage Assessment (RDA) by local EM and first responders","Document recovery resource needs in Long-Term Recovery Plan","Local government determines scale of disaster"],correct:[2,4,1,0,3],exp:"Damage assessment sequence: Local RDA (first 24-72 hours) → Local government assesses scale → Multi-government PDA → Declaration request → Recovery planning. The RDA informs whether a PDA is needed; the PDA supports the declaration.",src:"NDRF / Disaster Declaration Process"},
{id:"ord15",d:2,sub:"2.A",q:"Arrange the project planning steps in the correct order:",items:["Track milestones and adjust as needed","Execute project deliverables","Identify scope, schedule, resources, and risks","Obtain stakeholder approval","Define project objectives and form the project team"],correct:[4,2,3,1,0],exp:"Project planning: Define objectives and form team → Identify scope/schedule/resources/risks → Obtain approval → Execute → Track and adjust. Objectives must be clear before scope can be defined; approval before execution.",src:"Project Management Applied to EM"},
{id:"ord16",d:4,sub:"4.I",q:"Arrange ICS response priorities in the correct order (most important first):",items:["Environmental protection","Economic stability","Property protection","Life safety"],correct:[3,2,0,1],exp:"ICS response priorities: (1) Life safety ALWAYS first → (2) Incident stabilization → (3) Property protection → (4) Environmental protection → (5) Economic recovery. Life safety is non-negotiable as the first priority.",src:"IS-100.C / NIMS 2017"},
{id:"ord17",d:1,sub:"1.C",q:"Arrange the steps of a capability gap analysis in the correct order:",items:["Document gaps in an Improvement Plan with owners and timelines","Apply corrections and verify through re-testing","Identify current capability levels","Compare current capabilities against required targets","Determine required capability targets from THIRA"],correct:[4,2,3,0,1],exp:"Gap analysis sequence: Determine targets (THIRA) → Identify current capability (SPR) → Compare to find gaps → Document in Improvement Plan → Apply corrections → Verify through re-testing.",src:"CPG 201 / HSEEP"},
{id:"ord18",d:5,sub:"5.D",q:"Arrange the community recovery planning steps in the correct order:",items:["Formally adopt the community recovery plan","Conduct community engagement to identify recovery priorities","Implement the recovery plan and track progress","Assess disaster impacts across all Recovery Support Functions","Develop incident-specific recovery plan based on community input"],correct:[3,1,4,0,2],exp:"Recovery planning: Assess impacts → Community engagement → Develop plan based on community input → Formally adopt → Implement and track. Community engagement precedes plan development — not the reverse.",src:"NDRF 2nd Edition"},
{id:"ord19",d:8,sub:"8.H",q:"Arrange the professional development planning cycle in the correct order:",items:["Document completed activities for recertification","Identify professional development goals","Implement development activities (courses, conferences, research)","Evaluate outcomes and update goals for next cycle","Create an annual professional development plan"],correct:[1,4,2,0,3],exp:"PD planning cycle: Identify goals → Create plan → Implement activities → Document for recertification → Evaluate and update for next cycle.",src:"IAEM AEM/CEM Requirements / IS-230.E"},
{id:"ord20",d:4,sub:"4.N",q:"Arrange the crisis communication message elements in the correct order (most to least urgent):",items:["Where to get more information","What people should do (protective action)","What is being done (response actions)","What happened (incident summary)"],correct:[3,1,2,0],exp:"Crisis message sequence: What happened → What people should do (most actionable) → What is being done → Where to get more information. Protective action direction comes before describing response activities.",src:"IS-242.C Effective Communication"},
{id:"ord21",d:2,sub:"2.C",q:"Arrange the EOP review and update triggers in order of HIGHEST to LOWEST priority:",items:["Annual review cycle","Significant organizational or staffing changes","After a major real incident reveals operational gaps","After a major exercise reveals planning gaps"],correct:[2,3,1,0],exp:"Update priority: Real incident gaps (highest — real events reveal actual failures) → Exercise gaps (validated through structured testing) → Organizational changes (affects capability) → Annual review (routine maintenance). Real events always take highest priority for plan updates.",src:"CPG 101 v2"},
{id:"ord22",d:7,sub:"7.D",q:"Arrange grant application and management steps in the correct order:",items:["Submit final expenditure report and close out the grant","Receive grant award and execute grant agreement","Implement funded activities and track expenditures","Write and submit competitive grant application","Maintain records for the required retention period"],correct:[3,1,2,0,4],exp:"Grant lifecycle: Write/submit application → Receive award → Implement and track → Submit final expenditure report → Maintain records. Records retention continues after closeout — it is the final obligation.",src:"2 CFR Part 200 / Grant Management Best Practices"},
{id:"ord23",d:4,sub:"4.H",q:"Arrange the NIMS resource management steps in the correct order:",items:["Release and demobilize resources when no longer needed","Track resource status in real time","Order and mobilize resources","Identify resource needs","Identify and type available resources before incidents"],correct:[4,3,2,1,0],exp:"Resource management cycle: Type and inventory resources before incidents → Identify needs during incidents → Order and mobilize → Track status → Demobilize when complete. Pre-incident typing enables efficient ordering.",src:"NIMS 2017"},
{id:"ord24",d:3,sub:"3.B",q:"Arrange the steps for implementing a new mitigation project in the correct order:",items:["Monitor, maintain, and document project performance","Complete procurement and contract award","Conduct benefit-cost analysis to confirm eligibility","Execute construction or project work","Apply for mitigation grant funding","Identify project scope and cost estimate"],correct:[5,2,4,1,3,0],exp:"Mitigation project lifecycle: Identify scope → BCA (confirm cost-effectiveness) → Apply for funding → Procurement → Execute → Monitor and maintain. BCA must precede grant application; procurement follows award.",src:"Local Mitigation Planning Handbook / NDMP"},
{id:"ord25",d:5,sub:"5.I",q:"Arrange the after-action improvement process steps in the correct order:",items:["Verify improvement through re-testing (exercise or drill)","Identify gaps in the After Action Report","Track progress against deadlines","Assign corrective actions to responsible parties in the Improvement Plan","Implement corrective actions"],correct:[1,3,4,2,0],exp:"Improvement process: Identify gaps (AAR) → Assign actions with owners/deadlines (IP) → Track progress → Implement → Verify through re-testing. The loop is complete only when re-testing confirms the gap has been closed.",src:"IS-120.C HSEEP"},
{id:"ord26",d:6,sub:"6.C",q:"Arrange the technology implementation steps in the correct order:",items:["Go-live and transition to operational use","Configure and integrate with existing systems","User Acceptance Testing (UAT)","Train end users in their roles","Procure the technology"],correct:[4,1,2,3,0],exp:"Technology implementation: Procure → Configure/integrate → UAT → Train end users → Go-live. UAT must precede training and go-live — users test before formal training ensures they are testing real-world workflows, not just training scenarios.",src:"Technology Implementation Best Practices"},
{id:"ord27",d:7,sub:"7.C",q:"Arrange these budget tracking activities in the correct order during a fiscal year:",items:["Submit final accounts and year-end report","Track encumbrances (signed POs) against remaining budget","Receive budget allocation for the fiscal year","Pay invoices and record actual expenditures","Identify and address projected variances from budget plan"],correct:[2,1,3,4,0],exp:"Budget cycle: Receive allocation → Track encumbrances immediately when POs are signed → Record actual expenditures when invoices are paid → Address variances proactively → Submit year-end report.",src:"Public Sector Financial Management"},
{id:"ord28",d:2,sub:"2.P",q:"Arrange the stakeholder engagement planning steps in the correct order:",items:["Evaluate engagement effectiveness and update the stakeholder register","Identify all stakeholders and their interests","Maintain relationships through regular communication","Develop a stakeholder engagement plan with tailored approaches","Prioritize stakeholders by influence and interest level"],correct:[1,4,2,3,0],exp:"Stakeholder engagement: Identify stakeholders → Prioritize by influence/interest → Develop engagement plan with tailored approaches → Maintain relationships → Evaluate effectiveness. Identification precedes prioritization.",src:"IS-242.C / Whole Community Approach"},
{id:"ord29",d:4,sub:"4.O",q:"Arrange these EOC extended operations staffing actions in order of FIRST to LAST:",items:["Formal demobilization briefing before release","Develop shift schedule before activation goes beyond 12 hours","Activate peer support for staff showing fatigue signs","Brief incoming shift with full situational update","Mandatory rest period after 12-hour shift"],correct:[1,3,2,4,0],exp:"Extended operations staffing: Develop shift schedule early → Brief incoming shift → Mandatory rest after 12 hours → Activate peer support when fatigue is observed → Formal demobilization when released. Shift scheduling should begin before the first 12-hour threshold is reached.",src:"NIMS 2017 / IS-2200"},
{id:"ord30",d:8,sub:"8.C",q:"Arrange the stakeholder relationship management steps in the correct order:",items:["Re-engage stakeholders where relationship gaps are identified","Conduct annual stakeholder analysis","Maintain scheduled communication with all stakeholders","Identify all stakeholders and initial engagement approach","Evaluate relationship quality and update engagement strategies"],correct:[3,1,2,0,4],exp:"Stakeholder relationship cycle: Identify stakeholders → Annual analysis (reviews and updates register) → Maintain scheduled communication → Re-engage where gaps found → Evaluate and update strategies.",src:"IS-242.C / Professional Relationship Management"},
{id:"ord31",d:1,sub:"1.E",q:"Arrange the risk assessment steps in the correct order:",items:["Prioritize risks for planning and mitigation investment","Estimate consequence severity for each hazard","Identify all relevant threats and hazards","Calculate risk level (probability × consequence)","Estimate probability/likelihood for each hazard"],correct:[2,4,1,3,0],exp:"Risk assessment: Identify hazards → Estimate probability → Estimate consequence → Calculate risk (P × C) → Prioritize. You must identify hazards before you can assess their probability or consequence.",src:"IS-393.B / Risk Management Guide for CI"},
{id:"ord32",d:5,sub:"5.C",q:"Arrange community lifeline restoration priorities from FIRST to LAST (typical priority order):",items:["Transportation (route clearance for access)","Food, Water, and Shelter (immediate life needs)","Energy (power restoration)","Health and Medical (hospital and EMS function)","Safety and Security (responder safety and law enforcement)"],correct:[4,0,2,3,1],exp:"Typical lifeline restoration priority: Safety & Security (first — responders must be safe) → Energy (enables all others) → Health & Medical (life-safety) → Food/Water/Shelter (critical needs) → Transportation (enables access for all other restoration). Note: these are NOT fixed — immediate life-safety always takes priority.",src:"Community Lifelines Implementation Toolkit"},
{id:"ord33",d:7,sub:"7.A",q:"Arrange the succession planning steps in the correct order:",items:["Test succession plan through exercises","Develop succession map identifying backups for all critical roles","Update succession documentation when staff change","Identify critical roles that require succession planning","Train identified successors for their potential roles"],correct:[3,1,4,2,0],exp:"Succession planning: Identify critical roles → Map successors → Train successors → Update when staff change → Test through exercises. Testing validates that the succession plan actually works.",src:"IS-1300 / Succession Planning Best Practices"},
{id:"ord34",d:4,sub:"4.K",q:"Arrange emergency declaration levels from LOCAL to FEDERAL (Canadian context):",items:["Federal disaster assistance through DFAA","Provincial declaration enabling provincial resources","Local declaration by mayor/council","Formal provincial request for federal assistance"],correct:[2,1,3,0],exp:"Canadian declaration sequence: Local declaration (mayor/council) → Provincial declaration → Formal provincial request for federal assistance → DFAA activation (federal response). Each level is triggered when the lower level's capacity is overwhelmed.",src:"Emergency Management Act (Canada) / DFAA"},
{id:"ord35",d:2,sub:"2.L",q:"Arrange the pre-scripted message development steps in the correct order:",items:["Test templates through exercises and drills","Distribute approved templates to PIO and communication staff","Develop message templates for each hazard scenario and message type","Obtain legal and leadership approval for all templates","Conduct gap analysis comparing existing templates to hazard scenarios"],correct:[4,2,3,1,0],exp:"Template development: Gap analysis (what scenarios lack templates) → Develop templates → Obtain approvals → Distribute to communicators → Test through exercises. Gap analysis precedes development; approval precedes distribution.",src:"IS-242.C / Crisis Communication Best Practices"},
{id:"ord36",d:7,sub:"7.H",q:"Arrange the compliance management steps in the correct order:",items:["Submit required reports and filings before deadlines","Conduct annual compliance audit to identify gaps","Develop a compliance calendar with all deadlines","Address compliance gaps with corrective actions","Identify all applicable legislative, regulatory, and grant compliance obligations"],correct:[4,2,0,1,3],exp:"Compliance management: Identify obligations → Build compliance calendar → Submit reports/filings on time → Audit for gaps → Address gaps with corrective actions. The compliance calendar is the operational tool that prevents missed deadlines.",src:"Program Compliance Best Practices"},
{id:"ord37",d:5,sub:"5.F",q:"Arrange the community engagement process in disaster recovery from FIRST to LAST:",items:["Incorporate community priorities into the recovery plan","Evaluate engagement reach and identify underserved populations","Conduct initial community meetings and surveys","Identify all affected population groups","Develop targeted outreach for underserved groups"],correct:[3,2,1,4,0],exp:"Community engagement: Identify affected groups → Conduct initial engagement → Evaluate reach/identify gaps → Develop targeted outreach → Incorporate priorities into plan. Evaluating reach before concluding engagement reveals gaps that require targeted outreach.",src:"NDRF / Community Engagement Best Practices"},
{id:"ord38",d:6,sub:"6.D",q:"Arrange the technology training lifecycle steps in the correct order:",items:["Integrate system into all future exercises for ongoing practice","Conduct role-specific refresher training","Assess user proficiency 6 months after deployment","Deliver initial role-specific training at system deployment","Design training program based on role requirements"],correct:[4,3,2,1,0],exp:"Technology training lifecycle: Design role-based program → Deliver initial training → Assess proficiency → Conduct role-specific refreshers → Integrate into exercises permanently. Assessment drives the refresher content; exercises sustain long-term proficiency.",src:"Technology Training Best Practices"},
{id:"ord39",d:3,sub:"3.D",q:"Arrange the evidence-informed mitigation practice steps in the correct order:",items:["Adapt findings to local context and implement","Evaluate outcomes and update local practice","Identify relevant research or lessons from other jurisdictions","Assess applicability to local hazard and community context"],correct:[2,3,0,1],exp:"Evidence-informed practice cycle: Identify relevant research → Assess local applicability → Adapt and implement → Evaluate outcomes → Update practice. Research is never applied wholesale without assessing local context first.",src:"Sendai Framework Priority 1 / Evidence-Based EM Practice"},
{id:"ord40",d:8,sub:"8.I",q:"Arrange the steps for publishing a professional article in the Journal of Emergency Management:",items:["Revise based on peer review feedback","Identify a topic and conduct background research","Submit to the journal for peer review","Write the article following journal formatting requirements","Obtain any necessary organizational approvals before submission"],correct:[1,3,2,0,4],exp:"Publication process: Research topic → Write following formatting requirements → Obtain organizational approvals → Submit for peer review → Revise based on feedback → Publication.",src:"Academic Publishing Best Practices / Professional Development"},
{id:"ord41",d:4,sub:"4.A",q:"Arrange monitoring activities from CONTINUOUS to INCIDENT-TRIGGERED:",items:["Activate EOC resource tracking upon EOC activation","Monitor weather alerts and social media 24/7 via duty officer system","Issue a SITREP when an incident occurs","Review and update weather trigger protocols annually","Receive an alert and assess whether thresholds are met for action"],correct:[3,1,4,2,0],exp:"Monitoring operates at different levels: Annual protocol review (planning) → 24/7 duty officer monitoring (continuous) → Alert assessment (triggered by alert) → SITREP (triggered by incident) → EOC resource tracking (triggered by EOC activation).",src:"IS-2200 / Duty Officer Protocols"},
{id:"ord42",d:7,sub:"7.N",q:"Arrange resource inventory management activities from PLANNING to OPERATIONAL:",items:["Immediately update inventory status when resources are deployed or returned","Conduct semi-annual physical verification of all inventoried equipment","Request replacement resources when quantities fall below minimum levels","Document resources by type, quantity, location, and NIMS classification","Establish the resource inventory system and categories"],correct:[4,3,1,0,2],exp:"Inventory management: Establish the system → Document all resources with NIMS typing → Physical verification (semi-annual) → Update in real-time when status changes → Request replacements when below minimums.",src:"NIMS 2017 / Resource Management Best Practices"},
{id:"ord43",d:2,sub:"2.N",q:"Arrange these project management tools in the order they are typically created during project planning:",items:["Gantt chart (task schedule with timelines)","Work Breakdown Structure (WBS)","Risk Register (identified risks with mitigation)","Project Charter (authorization and scope)","RACI Matrix (roles and responsibilities)"],correct:[3,1,4,0,2],exp:"Project planning tool sequence: Charter (authorizes the project) → WBS (breaks down scope) → RACI (assigns responsibilities to WBS elements) → Gantt (schedules WBS elements) → Risk Register (ongoing, but initial population follows scope definition).",src:"Project Management Applied to EM"},
{id:"ord44",d:7,sub:"7.P",q:"Arrange vendor management activities from PRE-CONTRACT to POST-INCIDENT:",items:["Review SLA compliance and invoke penalty provisions for non-performance","Issue RFP and evaluate vendor responses","Negotiate SLA with performance requirements including disaster provisions","Pre-qualify vendors through background and capability assessment","Activate pre-qualified vendor during incident"],correct:[3,1,2,4,0],exp:"Vendor management: Pre-qualify (capability assessment) → Issue RFP → Negotiate SLA with disaster provisions → Activate when needed → Review SLA compliance and enforce penalties.",src:"Procurement Best Practices / Emergency Contracting"},
{id:"ord45",d:5,sub:"5.K",q:"Arrange disaster case management steps from INITIAL CONTACT to CASE CLOSURE:",items:["Verify all available assistance has been accessed and close case","Connect client to identified programs and navigate applications","Conduct initial needs assessment with the disaster survivor","Develop an individualized recovery plan with the client","Follow up on application status and advocate when problems arise"],correct:[2,3,1,4,0],exp:"Case management: Initial needs assessment → Develop individualized recovery plan → Connect to programs/navigate applications → Follow up and advocate → Verify completion and close. The recovery plan precedes specific program connections.",src:"NDRF / Disaster Case Management Best Practices"},
{id:"ord46",d:4,sub:"4.D",q:"Arrange these EOC coordination functions from MOST IMMEDIATE upon activation to LONGER-TERM:",items:["Coordinate public information through established JIS/JIC","Establish resource tracking for all deployed assets","Confirm life-safety operations are underway in the field","Develop recovery transition plan","Notify partner agencies and higher levels of government"],correct:[2,4,1,0,3],exp:"EOC activation priorities: Confirm life-safety operations → Notify partners/higher government → Establish resource tracking → Coordinate JIS/JIC public information → Transition to recovery planning (later). Life-safety confirmation is always the immediate first concern.",src:"IS-2200 / EOC Activation Protocols"},
{id:"ord47",d:1,sub:"1.B",q:"Arrange critical infrastructure identification and protection steps in the correct order:",items:["Update EOP annexes to reflect CI asset locations and owner contacts","Conduct vulnerability assessment for each CI asset","Identify all facilities and systems meeting CI criteria in the jurisdiction","Develop protective protocols for highest-vulnerability CI assets","Establish ongoing communication with CI owners and operators"],correct:[2,1,4,0,3],exp:"CI program: Identify CI assets → Assess vulnerability → Establish communication with owners → Update EOP annexes → Develop protective protocols. Identification must precede vulnerability assessment.",src:"Risk Management Guide for CI (Canada) / NIPP (US)"},
{id:"ord48",d:5,sub:"5.E",q:"Arrange debris management operations in the correct order:",items:["Close temporary debris management sites and restore land use","Initiate debris collection along priority routes","Develop and activate Debris Management Plan","Identify temporary debris management sites before an incident","Conduct environmental closeout inspection"],correct:[3,2,1,4,0],exp:"Debris management: Pre-incident site identification → Activate debris management plan → Collection on priority routes → Close sites → Environmental closeout. Sites must be identified before incidents to enable rapid activation.",src:"IS-558 Public Works and Disaster Recovery / Debris Management Best Practices"},
{id:"ord49",d:7,sub:"7.L",q:"Arrange annual report development steps in the correct order:",items:["Distribute final report to stakeholders and elected officials","Present report findings and resource requests to council","Collect performance data and outcome metrics","Write the annual report with outcomes emphasized over outputs","Review report with senior leadership before distribution"],correct:[2,3,4,0,1],exp:"Annual report: Collect data → Write with outcomes emphasis → Review with leadership → Distribute to stakeholders → Present to council. Data collection precedes writing; leadership review precedes distribution.",src:"Program Reporting Best Practices"},
{id:"ord50",d:8,sub:"8.A",q:"Arrange the steps to maintain AEM certification in the correct order:",items:["Submit recertification application before certification expiry","Document professional development activities throughout the period","Engage in subject matter service activities (teaching, writing, mentoring)","Complete required professional development hours","Receive AEM certification"],correct:[4,3,1,2,0],exp:"AEM maintenance: Receive certification → Complete required PD hours → Engage in subject matter service → Document all activities throughout → Submit recertification before expiry. Documentation must happen continuously — not retrospectively at recertification.",src:"IAEM AEM/CEM Recertification Requirements"}
];

// ============================================================
// MATCHING QUESTIONS (50 questions)
// ============================================================
const MATCHING_QUESTIONS = [
{id:"m1",d:2,sub:"2.F",q:"Match each Emergency Support Function (ESF) number to its area of responsibility:",pairs:[
  {left:"ESF #1",right:"Transportation"},
  {left:"ESF #6",right:"Mass Care, Emergency Assistance, Temporary Housing, Human Services"},
  {left:"ESF #8",right:"Public Health and Medical Services"},
  {left:"ESF #13",right:"Public Safety and Security"},
  {left:"ESF #15",right:"External Affairs (Public Information and Media)"}
],exp:"Key ESFs: #1 Transportation, #2 Communications, #3 Public Works, #6 Mass Care, #8 Public Health/Medical, #9 Search & Rescue, #10 Hazmat, #13 Public Safety, #14 Cross-Sector Business, #15 External Affairs.",src:"National Response Framework"},
{id:"m2",d:4,sub:"4.G",q:"Match each ICS management function to its PRIMARY responsibility:",pairs:[
  {left:"Operations Section",right:"Directs all tactical field activities to achieve incident objectives"},
  {left:"Planning Section",right:"Collects information, develops IAPs, and plans for future operational periods"},
  {left:"Logistics Section",right:"Provides facilities, services, and material to support incident operations"},
  {left:"Finance/Administration Section",right:"Tracks costs, manages procurement, timekeeping, and compensation claims"},
  {left:"Command",right:"Sets objectives, manages overall incident, approves IAP and resource orders"}
],exp:"ICS management functions: Command sets direction. Operations executes. Planning prepares. Logistics enables. Finance/Admin tracks costs. Each function is distinct and essential.",src:"IS-100.C / IS-200.C"},
{id:"m3",d:4,sub:"4.E",q:"Match each ICS Command Staff position to its PRIMARY function:",pairs:[
  {left:"Public Information Officer (PIO)",right:"Develops and releases incident information to public and media"},
  {left:"Safety Officer (SO)",right:"Monitors and assesses hazardous conditions; can stop unsafe operations"},
  {left:"Liaison Officer (LOFR)",right:"Point of contact for representatives from cooperating and assisting agencies"}
],exp:"Command Staff: PIO = public information. Safety Officer = responder safety (only position that can stop operations without IC approval). LOFR = inter-agency coordination.",src:"IS-100.C / NIMS 2017"},
{id:"m4",d:1,sub:"1.D",q:"Match each BIA term to its correct definition:",pairs:[
  {left:"Maximum Tolerable Downtime (MTD)",right:"The absolute longest a function can be disrupted before unacceptable consequences occur"},
  {left:"Recovery Time Objective (RTO)",right:"The target time within which a function must be restored — must be shorter than MTD"},
  {left:"Recovery Point Objective (RPO)",right:"Maximum acceptable data loss measured in time — drives backup frequency"},
  {left:"Primary Mission-Essential Function",right:"A function that must continue during any emergency — identified through the BIA"}
],exp:"BIA terms: MTD is the absolute maximum. RTO is the target (always shorter than MTD). RPO measures data loss tolerance. PMEFs are the functions that drive COOP planning.",src:"FEMA BIA Guide / IS-1300"},
{id:"m5",d:2,sub:"2.K",q:"Match each HSEEP exercise type to its PRIMARY characteristic:",pairs:[
  {left:"Seminar",right:"Discussion-led orientation to plans, policies, or procedures — no scenario"},
  {left:"Tabletop Exercise (TTX)",right:"Facilitated scenario-based discussion to validate plans and identify gaps"},
  {left:"Drill",right:"Operations-based test of a SINGLE specific operation or function"},
  {left:"Functional Exercise",right:"Multi-function EOC test without physical field deployment"},
  {left:"Full-Scale Exercise",right:"Deploys actual personnel and equipment to a simulated field environment"}
],exp:"HSEEP exercise types: Discussion-based = Seminars, Workshops, TTX, Games. Operations-based = Drills (single function), Functional (EOC, no field), Full-Scale (full deployment).",src:"IS-120.C HSEEP"},
{id:"m6",d:5,sub:"5.A",q:"Match each NDRF Recovery Support Function to its federal coordinating agency:",pairs:[
  {left:"Housing RSF",right:"FEMA / HUD"},
  {left:"Health and Social Services RSF",right:"HHS / FEMA"},
  {left:"Infrastructure Systems RSF",right:"Army Corps of Engineers / FEMA"},
  {left:"Economic RSF",right:"Commerce / SBA / FEMA"},
  {left:"Natural and Cultural Resources RSF",right:"Interior / USDA / FEMA"}
],exp:"NDRF RSF coordinating agencies reflect the primary federal expertise for each recovery function. FEMA co-coordinates most RSFs, with sector agencies taking the lead in their area of expertise.",src:"National Disaster Recovery Framework 2nd Edition"},
{id:"m7",d:4,sub:"4.L",q:"Match each Community Lifeline to an example of what its disruption would affect:",pairs:[
  {left:"Safety and Security",right:"911 call center and law enforcement dispatch"},
  {left:"Energy (Power and Fuel)",right:"Water treatment pumps and hospital power"},
  {left:"Communications",right:"911 call routing and cell network function"},
  {left:"Transportation",right:"Evacuation routes and supply delivery corridors"},
  {left:"Hazardous Material",right:"Chemical plant containment and environmental contamination response"}
],exp:"Community lifelines are interconnected — Energy disruption cascades into Water (pumps fail), Health/Medical (hospital backup generators exhaust), and Communications (cell tower backup power depletes).",src:"Community Lifelines Implementation Toolkit"},
{id:"m8",d:7,sub:"7.O",q:"Match each IAEM Code of Ethics principle to its core meaning:",pairs:[
  {left:"Integrity",right:"Be truthful, transparent, and honest — follow correct processes even under pressure"},
  {left:"Fairness",right:"Treat all persons equitably; apply consistent standards regardless of who is involved"},
  {left:"Commitment",right:"Dedicated to public safety and the public good above personal interests"},
  {left:"Personal Responsibility",right:"Accountable for your own conduct and decisions — do not shift blame"},
  {left:"Confidentiality",right:"Protect sensitive information and share only as authorized"}
],exp:"IAEM Code: 7 principles. Integrity + Fairness most commonly tested in ethics scenarios. Commitment = public good first. Personal Responsibility = accountability. Confidentiality = information security.",src:"IAEM Code of Ethics"},
{id:"m9",d:3,sub:"3.B",q:"Match each Canadian program to its PRIMARY purpose:",pairs:[
  {left:"DFAA (Disaster Financial Assistance Arrangements)",right:"Federal-provincial cost sharing for disaster response and recovery costs"},
  {left:"NDMP (National Disaster Mitigation Program)",right:"Federal grant funding for flood mapping and mitigation projects"},
  {left:"Emergency Management Act (2007)",right:"Defines federal ministerial responsibilities for EM in Canada"},
  {left:"CAP-CP",right:"Common Alerting Protocol — Canadian Profile for NPAS alerts"},
  {left:"CSA Z1600",right:"Canadian standard for Emergency and Continuity Management Programs"}
],exp:"Core Canadian EM frameworks: DFAA = recovery funding. NDMP = mitigation funding. EMA = legislation. CAP-CP = alerting standard. CSA Z1600 = program standard.",src:"Multiple Canadian EM Sources"},
{id:"m10",d:2,sub:"2.R",q:"Match each ICS training level to the personnel it is designed for:",pairs:[
  {left:"ICS 100",right:"All personnel with any emergency management or response role"},
  {left:"ICS 200",right:"Personnel who will assume a supervisory position in initial response incidents"},
  {left:"ICS 300",right:"Personnel managing or supporting expanding, multi-resource incidents (instructor-led)"},
  {left:"ICS 400",right:"Command and General Staff for complex, large-scale incidents (instructor-led)"}
],exp:"ICS training hierarchy: 100 = everyone. 200 = supervisors. 300 = expanding incidents. 400 = complex incidents/command. 300 and 400 are instructor-led ONLY — not self-paced online.",src:"FEMA ICS Course Framework"},
{id:"m11",d:4,sub:"4.H",q:"Match each NIMS resource type to its capability level:",pairs:[
  {left:"Type 1",right:"Highest capability — largest capacity, most experienced, highest specifications"},
  {left:"Type 2",right:"High capability — slightly less capacity than Type 1"},
  {left:"Type 3",right:"Moderate capability — meets minimum standards for the resource kind"},
  {left:"Type 4",right:"Lowest capability — minimum acceptable specifications"}
],exp:"NIMS resource typing: 1 = most capable, 4 = least capable. Standardized typing enables precise mutual aid requests — 'Send a Type 1 water rescue team' means the same capability everywhere.",src:"NIMS 2017"},
{id:"m12",d:5,sub:"5.B",q:"Match each disaster funding program to its correct description:",pairs:[
  {left:"DFAA (Canada)",right:"Federal covers 90% of eligible provincial costs above per-capita threshold"},
  {left:"HMGP (USA)",right:"Post-declaration federal mitigation grants requiring positive BCR"},
  {left:"Public Assistance (USA)",right:"Federal grants for government and eligible NGO response/infrastructure costs"},
  {left:"Individual Assistance (USA)",right:"Federal programs for disaster survivor housing and other personal needs"},
  {left:"NDMP (Canada)",right:"Federal grants for pre-disaster mitigation projects including flood mapping"}
],exp:"Funding programs: DFAA = Canadian recovery cost-sharing. HMGP = US post-declaration mitigation. PA = US government/NGO assistance. IA = US individual survivor help. NDMP = Canadian pre-disaster mitigation.",src:"Multiple Funding Program Sources"},
{id:"m13",d:4,sub:"4.D",q:"Match each incident management facility to its function:",pairs:[
  {left:"Incident Command Post (ICP)",right:"On-scene command location where tactical decisions are made"},
  {left:"Emergency Operations Center (EOC)",right:"Coordination center providing strategic support, resources, and policy guidance"},
  {left:"Staging Area",right:"Location where resources await assignment — managed by Staging Area Manager"},
  {left:"Base",right:"Primary location for logistical functions and administrative support"},
  {left:"Joint Information Center (JIC)",right:"Physical location where multi-agency public information staff coordinate"}
],exp:"ICS facilities: ICP = tactical command. EOC = strategic coordination. Staging = resources awaiting assignment. Base = logistics. JIC = public information coordination.",src:"NIMS 2017 / IS-100.C"},
{id:"m14",d:3,sub:"3.D",q:"Match each Sendai Framework Priority to its focus area:",pairs:[
  {left:"Priority 1",right:"Understanding disaster risk — deepening knowledge of hazards, exposure, vulnerability"},
  {left:"Priority 2",right:"Strengthening disaster risk governance to manage disaster risk"},
  {left:"Priority 3",right:"Investing in disaster risk reduction for resilience"},
  {left:"Priority 4",right:"Enhancing disaster preparedness for effective response and Build Back Better in recovery"}
],exp:"Sendai Framework 4 priorities: Understand → Govern → Invest → Prepare/Build Back Better. Priority 4 is where 'Build Back Better' originated as a formal principle in international DRR.",src:"Sendai Framework 2015-2030"},
{id:"m15",d:2,sub:"2.B",q:"Match each continuity planning concept to its definition:",pairs:[
  {left:"COOP",right:"Individual agency plan ensuring essential government functions continue during emergencies"},
  {left:"COG (Continuity of Government)",right:"Ensures constitutional government structure survives — three branches, succession, protected sites"},
  {left:"BCP (Business Continuity Plan)",right:"Private sector equivalent of COOP — ensures critical business functions continue"},
  {left:"Devolution",right:"Pre-planned automatic transfer of authority to alternates when primary staff are incapacitated"},
  {left:"Reconstitution",right:"Process of returning from alternate operations back to normal primary facility operations"}
],exp:"Continuity concepts: COOP = government agency. COG = constitutional structure. BCP = private sector. Devolution = automatic transfer when primary incapacitated. Reconstitution = return to normal.",src:"IS-1300"},
{id:"m16",d:2,sub:"2.F",q:"Match each whole community stakeholder group to an example:",pairs:[
  {left:"NGO/Voluntary Sector",right:"Red Cross, Salvation Army, community foundations"},
  {left:"Private Sector",right:"Utilities, major employers, telecommunications companies"},
  {left:"Faith Communities",right:"Churches, mosques, synagogues, temples serving as shelter and community hubs"},
  {left:"Individuals and Families",right:"The public taking personal preparedness actions and self-sufficiency measures"},
  {left:"All Levels of Government",right:"Municipal, provincial/state, and federal EM offices and agencies"}
],exp:"Whole Community = everyone. NGOs provide services. Private sector provides resources. Faith communities provide space and trust. Individuals provide self-sufficiency. Government provides coordination.",src:"A Whole Community Approach to Emergency Management"},
{id:"m17",d:6,sub:"6.A",q:"Match each alerting system to its primary technology:",pairs:[
  {left:"Alert Ready (Canada) / WEA (USA)",right:"Cell Broadcast — reaches all compatible devices without registration"},
  {left:"Opt-in MNS (Mass Notification System)",right:"SMS, email, and voice — requires prior enrollment by residents"},
  {left:"EAS (Emergency Alert System)",right:"Broadcast — interrupts radio and television with emergency messages"},
  {left:"Outdoor Warning Sirens",right:"Audio — audible outdoor warning for severe weather and civil emergencies"},
  {left:"NPAS (National Public Alerting System, Canada)",right:"Multi-channel aggregator using CAP-CP standard to distribute alerts across all channels"}
],exp:"Alerting technologies serve different populations: Cell Broadcast = all mobile users. Opt-in MNS = enrolled users. EAS = broadcast audiences. Sirens = outdoor populations. NPAS coordinates all Canadian alerting.",src:"NPAS / IPAWS / Alerting System Documentation"},
{id:"m18",d:7,sub:"7.H",q:"Match each piece of Canadian EM legislation to its primary function:",pairs:[
  {left:"Emergency Management Act (2007)",right:"Defines federal ministerial EM responsibilities and federal-provincial coordination framework"},
  {left:"Transportation of Dangerous Goods Act",right:"Governs dangerous goods handling; requires ERAPs for high-hazard materials"},
  {left:"CSA Z1600",right:"Standard for Emergency and Continuity Management Programs in Canadian organizations"},
  {left:"Provincial Emergency Management Act (e.g., Alberta EMA)",right:"Establishes municipal EM obligations including emergency plans and Director designation"}
],exp:"Canadian EM legal framework: Federal EMA = federal responsibilities. TDG Act = dangerous goods. CSA Z1600 = program standard. Provincial EMAs = municipal requirements.",src:"Multiple Canadian EM Legal Sources"},
{id:"m19",d:5,sub:"5.C",q:"Match each Community Lifeline to an example of restoration priority action:",pairs:[
  {left:"Energy",right:"Deploy temporary generators to water treatment plant and hospital"},
  {left:"Water and Wastewater",right:"Issue boil water advisory and restore treatment plant operations"},
  {left:"Health and Medical",right:"Assess hospital capacity and deploy mobile medical units if needed"},
  {left:"Food and Shelter",right:"Activate emergency shelters and establish PODs for food distribution"},
  {left:"Communications",right:"Restore 911 call routing and activate backup communications"}
],exp:"Lifeline restoration requires specific actions for each lifeline. Energy enables other lifelines. Water depends on energy. Health/Medical depends on both energy and communications.",src:"Community Lifelines Implementation Toolkit"},
{id:"m20",d:1,sub:"1.F",q:"Match each THIRA step to its primary output:",pairs:[
  {left:"Step 1: Identify Threats and Hazards",right:"A comprehensive list of the threats and hazards the community faces"},
  {left:"Step 2: Give Context",right:"Detailed worst-reasonable scenarios for each threat and hazard"},
  {left:"Step 3: Establish Capability Targets",right:"Specific performance levels needed for each core capability"},
  {left:"Step 4: Apply Results",right:"Investment decisions, planning priorities, and gap-filling strategies"}
],exp:"THIRA outputs build on each other: Hazard list → Realistic scenarios → Specific targets → Investment decisions. The gap between THIRA targets (Step 3) and SPR current capabilities drives Step 4 investment.",src:"CPG 201"},
{id:"m21",d:4,sub:"4.N",q:"Match each crisis communication term to its definition:",pairs:[
  {left:"Joint Information System (JIS)",right:"The structure and processes for coordinating public information across agencies"},
  {left:"Joint Information Center (JIC)",right:"The physical location where multi-agency public information staff coordinate"},
  {left:"Message Discipline",right:"Consistently returning to pre-approved key messages, especially under media pressure"},
  {left:"Plain Language",right:"Grade 6-8 reading level, no jargon, no acronyms — accessible to all audiences"},
  {left:"Pre-scripted Message",right:"A prepared template that can be quickly customized and released at incident onset"}
],exp:"Crisis communications: JIS = system. JIC = facility. Message discipline = staying on message. Plain language = accessible communication. Pre-scripted = prepared template.",src:"IS-242.C / NIMS 2017"},
{id:"m22",d:2,sub:"2.J",q:"Match each EOP component to its description:",pairs:[
  {left:"Basic Plan",right:"Umbrella document describing the jurisdiction's overall EM approach, authorities, and framework"},
  {left:"Functional Annex",right:"Describes how a specific function is performed regardless of hazard type"},
  {left:"Hazard-Specific Appendix",right:"Addresses unique aspects of a particular hazard, building on the Basic Plan"},
  {left:"Support Annex",right:"Provides guidance on administrative functions that support all operations"}
],exp:"EOP structure: Basic Plan = overall framework. Functional Annexes = what we do (by function). Hazard-Specific Appendices = how it differs for specific hazards. Support Annexes = administrative support.",src:"CPG 101 v2"},
{id:"m23",d:8,sub:"8.H",q:"Match each professional activity to whether it qualifies as Professional Development or Subject Matter Service:",pairs:[
  {left:"Attending an IAEM conference as a participant",right:"Professional Development"},
  {left:"Presenting a paper at an IAEM conference",right:"Subject Matter Service to the Profession"},
  {left:"Completing FEMA IS-230.E online",right:"Professional Development"},
  {left:"Mentoring an early-career EM professional",right:"Subject Matter Service to the Profession"},
  {left:"Managing a major flood incident as EOC Director",right:"Professional Experience (neither PD nor service)"}
],exp:"IAEM recertification: PD = learning activities. Service = giving back to profession. Job duties (incident management) = experience. The distinction between development and service is frequently tested.",src:"IAEM AEM/CEM Recertification Requirements"},
{id:"m24",d:4,sub:"4.G",q:"Match each ICS position to the section it belongs to:",pairs:[
  {left:"Resources Unit Leader",right:"Planning Section"},
  {left:"Staging Area Manager",right:"Operations Section"},
  {left:"Supply Unit Leader",right:"Logistics Section"},
  {left:"Time Unit Leader",right:"Finance/Administration Section"},
  {left:"Safety Officer",right:"Command Staff (reports directly to IC)"}
],exp:"ICS organizational placement: Resources Unit = Planning. Staging Area Manager = Operations. Supply Unit = Logistics. Time Unit = Finance/Admin. Safety Officer = Command Staff reporting to IC.",src:"IS-100.C / IS-200.C"},
{id:"m25",d:3,sub:"3.F",q:"Match each mitigation control type to its example:",pairs:[
  {left:"Structural mitigation",right:"Elevating a building above the 100-year floodplain"},
  {left:"Non-structural mitigation (regulatory)",right:"Zoning bylaw prohibiting new residential construction in the floodplain"},
  {left:"Non-structural mitigation (educational)",right:"Public campaign promoting 72-hour emergency kit preparedness"},
  {left:"Non-structural mitigation (warning system)",right:"Automated flood gauge triggering public alert when water level exceeds threshold"},
  {left:"Natural systems protection",right:"Restoring riparian wetlands to absorb floodwaters upstream of community"}
],exp:"Mitigation controls: Structural = physical changes. Non-structural = regulatory, educational, or warning. Natural systems = working with nature. All categories are needed for comprehensive mitigation.",src:"Local Mitigation Planning Handbook / IS-393.B"},
{id:"m26",d:7,sub:"7.D",q:"Match each grant-related term to its definition:",pairs:[
  {left:"NOFO (Notice of Funding Opportunity)",right:"Public announcement of a grant competition with eligibility criteria and application requirements"},
  {left:"Cost-share/Match",right:"Required local contribution to the total project cost — typically a percentage"},
  {left:"Encumbrance",right:"Funds reserved through a signed commitment not yet paid"},
  {left:"Performance Period",right:"The timeframe during which grant funds must be spent on eligible activities"},
  {left:"Indirect Costs",right:"Overhead costs not directly attributable to the grant project — charged as a percentage"}
],exp:"Grant terminology: NOFO = opportunity announcement. Cost-share = local match required. Encumbrance = committed but not yet paid. Performance period = spending window. Indirect costs = overhead.",src:"2 CFR Part 200 / Grant Management"},
{id:"m27",d:5,sub:"5.D",q:"Match each NDRF Recovery Support Function to its primary focus:",pairs:[
  {left:"Community Planning and Capacity Building RSF",right:"Helps communities plan, organize, and implement recovery activities"},
  {left:"Economic RSF",right:"Restores economic and business activities; supports employment recovery"},
  {left:"Housing RSF",right:"Addresses disaster survivor housing needs from emergency shelter to permanent housing"},
  {left:"Infrastructure Systems RSF",right:"Rebuilds lifelines and critical infrastructure including power, water, transportation"},
  {left:"Natural and Cultural Resources RSF",right:"Protects and restores natural environment, cultural sites, and historic properties"}
],exp:"6 NDRF RSFs each address a distinct recovery domain. Infrastructure Systems = lifelines. Housing = shelter continuum. Economic = jobs and businesses. Community Planning = organizational capacity.",src:"National Disaster Recovery Framework 2nd Edition"},
{id:"m28",d:6,sub:"6.E",q:"Match each cybersecurity measure to the threat it primarily addresses:",pairs:[
  {left:"Multi-Factor Authentication (MFA)",right:"Account compromise through stolen passwords or phishing"},
  {left:"Offline data backup",right:"Ransomware attacks that encrypt or destroy data"},
  {left:"Phishing simulation training",right:"Social engineering attacks targeting staff credentials"},
  {left:"Patch management",right:"Exploitation of known software vulnerabilities"},
  {left:"Cyber incident response plan",right:"Minimizing damage and restoring operations when a cyber incident occurs"}
],exp:"Cybersecurity measures match specific threats: MFA = credential theft. Offline backup = ransomware. Training = phishing/social engineering. Patches = vulnerability exploitation. Incident plan = response and recovery.",src:"CISA Cyber Essentials Starter Kit"},
{id:"m29",d:2,sub:"2.I",q:"Match each Access and Functional Needs (AFN) population group to a specific planning consideration:",pairs:[
  {left:"People with mobility impairments",right:"Accessible transportation routes and shelter facilities for evacuation"},
  {left:"Non-English speaking residents",right:"Multilingual public alerts, information, and shelter services"},
  {left:"Medically dependent individuals",right:"Medical needs registries and power-dependent equipment backup plans"},
  {left:"Elderly residents with limited mobility",right:"Proactive welfare check protocols and accessible DRC locations"},
  {left:"Children in schools",right:"School evacuation and reunification plans coordinated with parents"}
],exp:"AFN planning requires population-specific approaches. Mobility = accessible evacuation. Language = multilingual services. Medical dependency = power and supply continuity. Elderly = proactive outreach. Children = school protocols.",src:"IS-366.A / Whole Community Approach"},
{id:"m30",d:4,sub:"4.I",q:"Match each ICS response priority to its ranking:",pairs:[
  {left:"Life Safety",right:"First priority — always"},
  {left:"Incident Stabilization",right:"Second priority — stopping the incident from growing"},
  {left:"Property Protection",right:"Third priority"},
  {left:"Environmental Protection",right:"Fourth priority"},
  {left:"Economic Recovery",right:"Fifth priority — considered in long-term"}
],exp:"ICS response priorities in order: (1) Life Safety, (2) Incident Stabilization, (3) Property Protection, (4) Environmental Protection, (5) Economic Recovery. Life safety is ALWAYS first — this is non-negotiable in all EM frameworks.",src:"IS-100.C / NIMS 2017"},
{id:"m31",d:1,sub:"1.E",q:"Match each risk component to its definition:",pairs:[
  {left:"Hazard",right:"A source of potential harm — a natural or human-caused event with potential for damage"},
  {left:"Vulnerability",right:"The degree to which a community or system is susceptible to harm from a hazard"},
  {left:"Exposure",right:"The presence of people, infrastructure, or assets in hazard zones"},
  {left:"Risk",right:"The combination of probability and consequence — likelihood × impact"},
  {left:"Consequence",right:"The adverse impacts that would result if a hazard event occurred"}
],exp:"Risk assessment terms: Hazard = the threat. Vulnerability = susceptibility. Exposure = presence in harm's way. Consequence = what happens if the hazard occurs. Risk = probability × consequence.",src:"IS-393.B / Sendai Framework"},
{id:"m32",d:7,sub:"7.Q",q:"Match each business continuity standard to its country/context:",pairs:[
  {left:"ISO 22301",right:"International standard for Business Continuity Management Systems"},
  {left:"CSA Z1600",right:"Canadian standard for Emergency and Continuity Management Programs"},
  {left:"NFPA 1600",right:"US standard for Emergency Management and Business Continuity Programs"},
  {left:"DRI Professional Practices",right:"10 professional practices for business continuity practitioners (DRI Canada/International)"}
],exp:"Continuity standards: ISO 22301 = international. CSA Z1600 = Canada. NFPA 1600 = US. DRI Professional Practices = practitioner competency framework. All are aligned in core requirements.",src:"ISO 22301 / CSA Z1600 / NFPA 1600 / DRI Canada"},
{id:"m33",d:5,sub:"5.A",q:"Match each recovery program type to the organization that typically leads it:",pairs:[
  {left:"Emergency shelter operations",right:"Red Cross (with government coordination)"},
  {left:"Disaster case management",right:"Government social services (or contracted NGO)"},
  {left:"Home repair for low-income survivors",right:"Habitat for Humanity, Mennonite Disaster Service, or other faith-based NGOs"},
  {left:"Emergency feeding operations",right:"Salvation Army (with VOAD coordination)"},
  {left:"Long-Term Recovery Group coordination",right:"Local EM office or community foundation facilitates — member organizations provide services"}
],exp:"Recovery service delivery is typically NGO-led with government coordination: Red Cross = shelter. Salvation Army = feeding. Faith NGOs = home repair. Government = case management. EM = LTRG coordination.",src:"NDRF / VOAD Framework"},
{id:"m34",d:2,sub:"2.G",q:"Match each mutual aid agreement element to its purpose:",pairs:[
  {left:"Pre-authorization clause",right:"Enables immediate deployment without waiting for political approval during emergencies"},
  {left:"Command authority provision",right:"Establishes that the receiving jurisdiction directs the work of assisting resources"},
  {left:"Reimbursement provision",right:"Defines how and when the requesting jurisdiction pays the assisting jurisdiction's costs"},
  {left:"Liability protection",right:"Protects assisting jurisdiction personnel under the receiving jurisdiction's legal framework"},
  {left:"Resource typing requirements",right:"Specifies NIMS resource types to ensure the right capability is requested and delivered"}
],exp:"MAA elements: Pre-authorization = speed. Command authority = operational clarity. Reimbursement = financial certainty. Liability = legal protection. Typing = capability precision.",src:"NIMS 2017 / Mutual Aid Best Practices"},
{id:"m35",d:4,sub:"4.B",q:"Match each ICS Section to its role in the IAP development process:",pairs:[
  {left:"Operations Section",right:"Proposes tactics and resource needs at the Tactics Meeting"},
  {left:"Planning Section",right:"Facilitates the planning process and coordinates IAP documentation"},
  {left:"Logistics Section",right:"Confirms resource availability and support capability for the proposed tactics"},
  {left:"Finance/Administration Section",right:"Identifies financial constraints and procurement requirements for the IAP period"}
],exp:"IAP development is a team effort: Operations proposes tactics. Planning facilitates and documents. Logistics confirms support capability. Finance/Admin identifies financial constraints.",src:"IS-200.C"},
{id:"m36",d:3,sub:"3.C",q:"Match each mitigation grant program to its availability timing:",pairs:[
  {left:"HMGP (Hazard Mitigation Grant Program)",right:"Available AFTER a presidential disaster declaration in affected areas"},
  {left:"PDM (Pre-Disaster Mitigation)",right:"Available BEFORE disasters through annual competitive grant cycles"},
  {left:"NDMP (National Disaster Mitigation Program, Canada)",right:"Available BEFORE disasters — annual intake for flood mitigation and mapping projects"},
  {left:"BRIC (Building Resilient Infrastructure and Communities)",right:"Available BEFORE disasters — replaced PDM for larger infrastructure mitigation projects"}
],exp:"Mitigation funding timing: HMGP and post-disaster programs = after declaration. PDM, BRIC, NDMP = pre-disaster competitive grants. Knowing which program is available when is critical for grant planning.",src:"FEMA Mitigation Grant Programs / NDMP"},
{id:"m37",d:8,sub:"8.A",q:"Match each professional organization to its primary focus:",pairs:[
  {left:"IAEM (International Association of Emergency Managers)",right:"Professional development, certification (AEM/CEM), and standards for EM professionals globally"},
  {left:"CRHNet (Canadian Risk and Hazards Network)",right:"Connecting Canadian EM academics, practitioners, and policy-makers"},
  {left:"DRI Canada (Disaster Recovery Institute Canada)",right:"Business continuity professional development and certification"},
  {left:"IAWF (International Association of Wildland Fire)",right:"Wildland fire management professionals and researchers globally"}
],exp:"EM professional organizations: IAEM = general EM certification. CRHNet = Canadian network. DRI = business continuity focus. IAWF = wildfire specialty. Each serves a distinct professional community.",src:"Professional Organization Websites"},
{id:"m38",d:2,sub:"2.O",q:"Match each weather trigger to the appropriate EM response action:",pairs:[
  {left:"Tornado Watch issued 80km away",right:"Review trigger protocol, notify key partners for situational awareness, increase monitoring"},
  {left:"Tornado Warning issued in jurisdiction",right:"EOC activation per trigger protocol, public alert via all channels, shelter-in-place messaging"},
  {left:"Hurricane Watch (48 hours out)",right:"Begin pre-positioning resources, review evacuation plans, public awareness messaging"},
  {left:"Hurricane Warning (24 hours out)",right:"Evacuation orders for highest-risk zones, EOC to Level 2 or 3, resource mobilization"},
  {left:"All-Clear issued after tornado warning",right:"Damage assessment, reentry protocols, service restoration, public all-clear messaging"}
],exp:"Weather triggers require proportional responses. Watch = preparedness actions. Warning = protective actions/activation. Pre-landfall = resource pre-positioning. All-clear = transition to assessment.",src:"IS-230.E / Environment Canada Alert Standards"},
{id:"m39",d:7,sub:"7.N",q:"Match each resource inventory element to its requirement:",pairs:[
  {left:"NIMS resource type",right:"Must be included for all equipment and personnel in the inventory for mutual aid ordering"},
  {left:"Operational status",right:"Must be physically verified semi-annually — not just documented from records"},
  {left:"Location",right:"Must be current and specific enough to enable rapid deployment"},
  {left:"Expiration date",right:"Required for consumable supplies (food, medication, batteries) and tested regularly"},
  {left:"Maintenance record",right:"Required documentation to confirm equipment is in verified working condition"}
],exp:"Resource inventories require more than a list: typing (for mutual aid), verified status (not assumed), current location, expiration tracking (consumables), and maintenance records (equipment).",src:"NIMS 2017 / IS-2200"},
{id:"m40",d:5,sub:"5.K",q:"Match each disaster case management activity to its phase:",pairs:[
  {left:"Conduct initial intake interview and needs assessment",right:"Initial contact (first meeting with survivor)"},
  {left:"Develop individualized recovery plan with survivor",right:"Assessment and planning phase"},
  {left:"Navigate DFAA/PA application process with survivor",right:"Service connection phase"},
  {left:"Follow up on application status and advocate for appeals",right:"Ongoing support phase"},
  {left:"Verify all needs are addressed and formally close the case",right:"Case closure phase"}
],exp:"Case management phases: Intake → Assessment/planning → Service connection → Ongoing support → Closure. The case manager actively navigates complex systems at each phase, not just referring clients elsewhere.",src:"NDRF / Case Management Best Practices"},
{id:"m41",d:4,sub:"4.P",q:"Match each crisis resource to the organization that typically provides it:",pairs:[
  {left:"Emergency mental health crisis counseling",right:"FEMA Crisis Counseling Program (CCP) or provincial mental health authority"},
  {left:"Emergency shelter for displaced residents",right:"Red Cross (operations) with government coordination"},
  {left:"Emergency feeding for displaced residents",right:"Salvation Army (mobile feeding units) with VOAD coordination"},
  {left:"Emergency clothing and household items",right:"Red Cross, Salvation Army, or faith-based distribution programs"},
  {left:"Emergency financial assistance for survivors",right:"Red Cross (immediate financial assistance) and government recovery programs"}
],exp:"Crisis resource providers: Mental health = CCP/provincial authority. Shelter = Red Cross. Feeding = Salvation Army. Clothing/household = Red Cross/Salvation Army/faith groups. Financial = Red Cross/government.",src:"NDRF / VOAD Framework / CCP Program"},
{id:"m42",d:6,sub:"6.B",q:"Match each technology evaluation criterion to why it matters for EM:",pairs:[
  {left:"Offline/degraded network capability",right:"Disasters disrupt internet connectivity — system must work when needed most"},
  {left:"Interoperability with existing systems",right:"Prevents data silos that impair coordination across agencies"},
  {left:"Vendor financial stability",right:"A vendor failure means the system disappears — critical for long-term programs"},
  {left:"Cybersecurity posture",right:"EM systems hold sensitive data and if compromised could impair response"},
  {left:"End-user training requirements",right:"Complex systems with high training requirements have high failure rates under stress"}
],exp:"Technology evaluation criteria all serve operational reliability: Offline capability = availability when needed. Interoperability = coordination. Vendor stability = continuity. Cybersecurity = protection. Training = usability.",src:"IS-922.A / Technology Evaluation Best Practices"},
{id:"m43",d:2,sub:"2.C",q:"Match each EOP maintenance trigger to the appropriate update type:",pairs:[
  {left:"Annual review cycle",right:"Routine review — update contacts, verify resources, confirm stakeholder agreements"},
  {left:"After a real incident reveals operational gaps",right:"Priority update — incorporate lessons, address identified gaps immediately"},
  {left:"After an exercise reveals planning gaps",right:"Targeted update — address specific gaps identified in AAR/IP"},
  {left:"Significant changes in hazard profile",right:"Risk-based update — revise threat section and affected annexes"},
  {left:"Key staff changes",right:"Administrative update — succession lists, contact directories, role assignments"}
],exp:"EOP updates should be proportional to the trigger: Annual = routine. Real incident = priority. Exercise gaps = targeted. Hazard changes = risk-based. Staff changes = administrative.",src:"CPG 101 v2"},
{id:"m44",d:7,sub:"7.A",q:"Match each staff management activity to its purpose:",pairs:[
  {left:"Individual Development Plan (IDP)",right:"Maps each staff member's training goals, career milestones, and skill development"},
  {left:"Succession planning",right:"Identifies and develops backups for critical roles to ensure program continuity"},
  {left:"Peer support program",right:"Provides trained colleague support for occupational stress and psychological health"},
  {left:"Fatigue management protocol",right:"Limits shift hours and mandates rest to maintain performance during extended operations"},
  {left:"Performance management",right:"Sets clear expectations, provides feedback, and addresses performance gaps"}
],exp:"Staff management encompasses: Development (IDP), Continuity (succession), Wellbeing (peer support and fatigue management), and Performance (ongoing management). All are required in comprehensive EM staff programs.",src:"IS-240.C / HR Best Practices in EM"},
{id:"m45",d:3,sub:"3.A",q:"Match each communication system term to its definition:",pairs:[
  {left:"Interoperability",right:"Ability of personnel from different agencies to communicate in real time"},
  {left:"Cross-band repeater/gateway",right:"Technology bridging incompatible radio systems to enable cross-agency communication"},
  {left:"Communications Unit Leader (COML)",right:"ICS position managing the incident communications plan and radio assignments"},
  {left:"Common channel",right:"A radio frequency pre-designated for cross-agency tactical communication during incidents"},
  {left:"NIEM (National Information Exchange Model)",right:"US framework providing common data standards for information sharing across agencies"}
],exp:"Communications interoperability requires: Technical solutions (gateways, common channels) + Operational coordination (COML, NIEM standards) + Pre-incident planning and exercise.",src:"NIMS 2017 / IS-242.C"},
{id:"m46",d:5,sub:"5.G",q:"Match each reentry phase to its primary condition for authorization:",pairs:[
  {left:"Phase 1: First responders and utility crews",right:"Scene assessment confirming no immediate life-safety hazard to responders"},
  {left:"Phase 2: Critical personnel (limited access)",right:"Route safety confirmed; structural survey of specific facility types needed"},
  {left:"Phase 3: Resident limited access (retrieve medications/items)",right:"Structural assessment of routes; escort required; time-limited"},
  {left:"Phase 4: General public",right:"Full safety assessment of routes and structures; all utilities confirmed safe or advisory issued"}
],exp:"Each reentry phase requires specific safety evidence. Conditions become more stringent as more vulnerable populations are allowed in. Safety verification — not time elapsed — gates each phase.",src:"ATC-20 / Reentry Protocol Best Practices"},
{id:"m47",d:4,sub:"4.K",q:"Match each emergency declaration type to its trigger and authority:",pairs:[
  {left:"Local Declaration (Canada)",right:"Issued by mayor/council when local resources are overwhelmed or insufficient"},
  {left:"Provincial Emergency Declaration",right:"Issued by Premier/Lieutenant Governor when province-wide coordination and resources are needed"},
  {left:"Federal Declaration of Disaster",right:"Issued by Governor in Council at provincial request — triggers federal support and DFAA"},
  {left:"US Presidential Major Disaster Declaration",right:"Issued by the President at state Governor's request — triggers FEMA PA, IA, and HMGP"}
],exp:"Declaration hierarchy: Local → Provincial/State → Federal. Each level triggers additional resources and assistance programs. Declarations are always requested from below — provinces request federal; states request presidential.",src:"Emergency Management Act (Canada) / Stafford Act (USA)"},
{id:"m48",d:7,sub:"7.K",q:"Match each government correspondence type to its primary characteristics:",pairs:[
  {left:"Briefing Note",right:"1-3 pages; BLUF structure; issue, background, analysis, recommendation"},
  {left:"Situation Report (SITREP)",right:"Periodic factual summary; no speculation; covers status, actions, needs"},
  {left:"Emergency Declaration",right:"Formal legal document; cites statutory authority; signed by authorized official"},
  {left:"Annual Report",right:"Program-wide; emphasizes outcomes over outputs; includes resource request for next year"},
  {left:"Media Release",right:"Plain language; Grade 6-8; key messages; who/what/when/where/what to do"}
],exp:"Government correspondence types serve different purposes and have different formats. Briefing notes = decision support. SITREPs = operational communication. Declarations = legal instruments. Annual reports = accountability.",src:"Government Writing Best Practices"},
{id:"m49",d:2,sub:"2.N",q:"Match each project management tool to its primary use:",pairs:[
  {left:"Project Charter",right:"Formally authorizes the project and defines scope, objectives, and the project manager"},
  {left:"Work Breakdown Structure (WBS)",right:"Decomposes total scope into manageable, assignable components"},
  {left:"RACI Matrix",right:"Clarifies who is Responsible, Accountable, Consulted, and Informed for each task"},
  {left:"Gantt Chart",right:"Shows tasks on a timeline with dependencies — used for scheduling and tracking"},
  {left:"Risk Register",right:"Documents identified project risks, probability, impact, and mitigation strategies"}
],exp:"Project management tools serve different purposes: Charter = authorization. WBS = scope breakdown. RACI = role clarity. Gantt = scheduling. Risk Register = proactive risk management.",src:"Project Management Applied to EM"},
{id:"m50",d:8,sub:"8.E",q:"Match each type of professional contribution to its IAEM category:",pairs:[
  {left:"Writing an article for the Journal of Emergency Management",right:"Subject Matter Service to the Profession"},
  {left:"Attending the IAEM Annual Conference",right:"Professional Development"},
  {left:"Serving on a provincial EM advisory committee",right:"Subject Matter Service to the Profession"},
  {left:"Completing IS-120.C Introduction to Exercises",right:"Professional Development"},
  {left:"Mentoring an early-career EM professional through IAEM's mentoring program",right:"Subject Matter Service to the Profession"}
],exp:"IAEM categories: Attending/consuming = Professional Development. Contributing/serving = Subject Matter Service. The distinction matters for recertification — both categories have separate requirements.",src:"IAEM CEM/AEM Recertification Requirements"}
];


const FLASHCARDS=[
