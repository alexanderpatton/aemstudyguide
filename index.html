{id:172,d:2,sub:"2.A",q:"An EM coordinator is managing 4 concurrent projects: (1) EOP update due in 6 months, (2) mass notification system implementation due in 8 months, (3) regional exercise due in 4 months, and (4) EOC generator replacement overdue by 3 months. With limited staff capacity to address all four simultaneously, what is the CORRECT prioritization?",opts:["Address projects in deadline order: generator (overdue), exercise (4 months), EOP (6 months), MNS (8 months)","Generator replacement first (critical safety gap, already overdue), then exercise (fixed date, partners committed), then EOP update (can be compressed if needed), then MNS implementation (longest runway)","Distribute staff equally across all four projects to make simultaneous progress","Delay the generator until after the exercise"],ans:1,exp:"Priority should be: (1) Generator — already overdue, creates an active safety and readiness gap that affects all other EM functions; (2) Exercise — fixed date with partner commitments that cannot be easily moved; (3) EOP — important but has some schedule flexibility; (4) MNS — most runway. Projects with active safety gaps or fixed external commitments take priority over those with flexible timelines.",diff:"advanced",ctry:"core"},
{id:173,d:2,sub:"2.N",q:"An EM office receives approval for a $1.2M shelter system upgrade project. Three months into the 24-month project, the lead contractor submits a change order for $180,000 in 'unforeseen site conditions.' The project manager wants to approve it immediately to keep the project on schedule. What is the MOST appropriate response?",opts:["Approve immediately to maintain schedule","Review the change order against the original scope and contract provisions, verify that the claimed unforeseen conditions were not identifiable in the original site assessment, obtain a second opinion on pricing if the amount is significant, and consult legal and financial advisors before approval","Reject all change orders as a matter of policy","Split the difference and approve $90,000"],ans:1,exp:"Change orders must be evaluated against: (1) whether the claimed conditions were truly unforeseeable (not just undiscovered), (2) whether the scope change is legitimate, (3) whether the pricing is reasonable (market rates), and (4) the contract's change order provisions. Immediate approval of a $180,000 change order to maintain schedule sacrifices fiscal accountability for schedule. Legal and financial review is appropriate for a change order of this magnitude.",diff:"advanced",ctry:"core"},
// FINAL DOMAIN COVERAGE - ensuring all sub-competencies tested
{id:174,d:7,sub:"7.I",q:"An EM coordinator is designing a 10-minute presentation about wildfire risk for a city council with members who have varying technical backgrounds, including two engineers, one former teacher, one businessperson, and one retired first responder. What design approach is MOST effective?",opts:["Design for the most technical audience members to demonstrate expertise","Design for the lowest technical denominator — use only basic language","Design for the general audience using plain language and strong visuals, with one technical data point (the BCR) that the engineers and businessperson will appreciate — avoid jargon, lead with the key message, and provide a 1-page technical appendix for those who want depth","Design separate presentations for different council members"],ans:2,exp:"Mixed-expertise audiences require a plain language, visual-forward presentation that leads with the key message (BLUF) and is accessible to all. A single technical data point (BCR) provides the quantitative hook for analytically-minded members without alienating others. Technical depth goes in an appendix — available for those who want it, not forced on those who don't. Universal accessibility is the goal, with depth available on demand.",diff:"intermediate",ctry:"core"},
{id:175,d:7,sub:"7.J",q:"During a media briefing about an active dam safety concern, a journalist asks 'Should residents downstream be worried?' The EM director's MOST appropriate response is:",opts:["'There is no reason for concern at this time' — to prevent panic","'Yes, residents should be very worried' — to ensure they take action","'We are taking this situation seriously and monitoring it continuously. Residents downstream of [specific dam name] should stay informed through official channels and review their evacuation routes as a precaution. Here is the specific action we recommend...' — informative, action-focused, neither falsely reassuring nor alarmist","Decline to answer questions about resident risk"],ans:2,exp:"The journalist's question is a legitimate public safety inquiry. The response must avoid both extremes: false reassurance ('no concern') that could prevent protective action if conditions worsen, and alarm ('be very worried') that could cause panic and road congestion that impedes actual evacuation if needed. The correct answer acknowledges the situation honestly, provides specific actionable guidance, and directs residents to official information channels.",diff:"advanced",ctry:"core"},
{id:176,d:7,sub:"7.L",q:"An EM annual report lists the following performance data: '18 training sessions delivered, 3 exercises conducted, 2 plans updated, $340,000 in grants secured.' A senior administrator asks 'So what? How did our community actually get safer this year?' What is MISSING from the annual report?",opts:["More detail about the training sessions","Outcome data: increased preparedness rates, reduced response times, improved exercise scores, capability gaps closed. The administrator is correctly identifying that outputs (activities) are not the same as outcomes (impact).","Financial data about program costs","Photos from the exercises and training events"],ans:1,exp:"The administrator's question identifies the output vs outcome gap. Outputs (18 training sessions, 3 exercises) describe what was done. Outcomes describe what changed as a result: % increase in staff ICS proficiency, reduction in EOC activation time from X to Y minutes, capability gaps closed from THIRA/SPR comparison, community preparedness rates increased by Z%. Outcomes answer the administrator's question. Outputs do not.",diff:"intermediate",ctry:"core"},
{id:177,d:7,sub:"7.M",q:"An EM office is audited and asked to produce the original signed mutual aid agreement with a neighboring municipality. The agreement was signed 6 years ago and the original paper copy cannot be located. A photocopy exists. What is the risk and what should be done going forward?",opts:["The photocopy is legally equivalent to the original — no action needed","The missing original creates potential legal enforceability questions in the event of a dispute. Going forward: implement a records management system requiring digital scanning of all original agreements immediately upon signing, with secure cloud backup and a physical original in a locked file with an off-site backup copy.","Request the neighboring municipality to sign a new agreement immediately","Only agreements signed in the past 5 years are legally valid"],ans:1,exp:"Missing original documents for legally significant agreements (MAAs, MOUs) creates legal risk — particularly if the agreement is ever disputed. The immediate fix is checking whether the neighboring municipality retains the original (another copy should exist). The systemic fix is implementing proper records management: immediate scanning upon signing, secure digital backup, physical original in secured storage with off-site copy. Good records management prevents this from recurring.",diff:"advanced",ctry:"core"},
{id:178,d:7,sub:"7.P",q:"An EM office's primary debris removal contractor fails to respond within the 4-hour callout window specified in their SLA during a major windstorm. The contractor says they 'had other priorities.' What should the EM coordinator do DURING the incident and AFTER?",opts:["During: accept the delay and wait. After: do nothing.","During: activate the secondary pre-qualified contractor immediately. After: formally document the SLA breach, invoke contract penalty provisions if applicable, re-evaluate the contractor's pre-qualified status, and consider whether the contract requires updating.","During: call the contractor repeatedly. After: forgive the breach if they eventually respond.","During: wait for the contractor. After: terminate the contract immediately without review"],ans:1,exp:"During an incident, operational continuity takes priority: activate the secondary contractor immediately. After the incident: SLA breaches must be formally documented, penalty provisions invoked if contractually available, and the contractor's reliability re-evaluated for future pre-qualification. The SLA exists precisely to define consequences for non-performance. Forgiving breaches without consequences creates moral hazard — contractors learn they can miss callout windows without consequence.",diff:"advanced",ctry:"core"},
{id:179,d:7,sub:"7.N",q:"An EM annual resource inventory check reveals: (1) a communication van listed as 'operational' but hasn't been started in 14 months, (2) a cache of 500 MREs that expired 8 months ago, (3) two generators that are confirmed operational. What is the MINIMUM required action?",opts:["Update the inventory spreadsheet to reflect the findings","Start the communication van to verify operational status; dispose of and replace the expired MREs immediately; update the inventory with verified status and expiration dates for all items; schedule a recurring verification calendar for all items","Test all equipment quarterly going forward","Order replacement MREs only"],ans:1,exp:"Inventory verification is meaningless without action on the findings. Required actions: (1) physically verify the van's operational status (start it and test all systems); (2) immediately dispose of expired MREs (they cannot be used and create false readiness confidence); (3) procure replacement MREs; (4) update inventory with current, verified status and expiration dates; (5) schedule recurring physical verification to prevent this from recurring. Minimum action means addressing all three findings, not just updating spreadsheets.",diff:"intermediate",ctry:"core"},
{id:180,d:6,sub:"6.E",q:"An EM coordinator discovers that the EOC's incident management software stores all incident data — including personal information about disaster survivors — in a US-based cloud server. The EM coordinator works for a Canadian municipality. What concern does this raise?",opts:["No concern — cloud storage is cloud storage regardless of location","Data sovereignty and privacy law concerns: personal information about Canadian residents stored on US servers may be subject to US laws (including the PATRIOT Act) that allow access without Canadian legal process. This should be reviewed against PIPEDA and provincial privacy legislation before continuing.","The concern is minor — the data is encrypted","This only matters if the data is about US citizens"],ans:1,exp:"Data sovereignty is a legitimate EM concern, especially for personal information about disaster survivors (names, addresses, medical needs, family information). Cloud storage on US servers subjects Canadian personal data to US legal access provisions. EM coordinators managing personal information must understand their obligations under PIPEDA and provincial privacy laws. This should trigger a legal review and potentially require a Canadian-hosted or government cloud solution.",diff:"advanced",ctry:"Canada"},
// CROSS-DOMAIN SCENARIOS
{id:181,d:2,sub:"2.F",q:"An EM coordinator is coordinating a multi-agency pandemic response. Seventeen agencies are participating but the weekly coordination call has 11 of 17 agencies consistently absent. The coordinator continues calling weekly meetings. What is the MOST likely root cause and the MOST effective solution?",opts:["The missing agencies are uninterested in coordination — remove them from the call list","The meeting format, timing, or content may not be working for those agencies. Survey the missing agencies to identify barriers, adjust format/timing/content based on feedback, and consider whether 17 agencies in one weekly call is the right structure or whether smaller thematic working groups would be more effective.","Send formal letters to non-attending agencies citing their coordination obligations","Replace weekly meetings with monthly meetings"],ans:1,exp:"Chronic non-attendance signals a structural or design problem with the coordination mechanism, not simply lack of interest. Surveying non-attendees identifies the actual barrier. Potential issues: wrong time, too long, wrong content for their role, competing priorities. The solution might be restructuring into smaller functional groups (health cluster, logistics cluster) rather than one 17-agency call. Punitive approaches to non-attendance rarely improve coordination quality.",diff:"advanced",ctry:"core"},
{id:182,d:4,sub:"4.M",q:"During a major earthquake response, a large VOAD arrives on scene with 200 volunteers and significant resources. They have not coordinated with the EOC and begin operating independently in the impact zone. What is the MOST appropriate EOC response?",opts:["Order them to leave the area since they are not part of the official response","Ignore them — volunteer organizations are self-managing","Make contact immediately through the EOC Liaison Officer, invite the VOAD to assign a representative to the EOC, brief them on the Common Operating Picture, integrate their resources into the resource tracking system, and assign them to work areas where their capabilities are most needed","Wait for the VOAD to contact the EOC on their own"],ans:2,exp:"Uncoordinated voluntary resources — while well-intentioned — create safety risks and operational conflicts (duplicated efforts, gaps, responders in unknown locations). The correct response is immediate coordination outreach: the Liaison Officer contacts the VOAD, brings them into the COP, integrates their resources into the tracking system, and channels their energy where needed. The goal is integration, not exclusion or autonomy.",diff:"advanced",ctry:"core"},
{id:183,d:5,sub:"5.B",q:"A municipality's disaster recovery is in month 14. Three federal grants have been active simultaneously: one closes out in 30 days, one requires a mid-term report in 15 days, and one has been flagged by the auditor for inadequate documentation. Which is the HIGHEST priority?",opts:["The closeout in 30 days — money must be spent or returned","The mid-term report in 15 days — it has the closest deadline","The auditor flag — an audit finding left unaddressed can result in repayment of all funds from that grant, and the documentation issues must be resolved before they become formal findings","All three are equal priority"],ans:2,exp:"An active audit flag takes highest priority because: (1) it has the largest potential financial consequence (full grant repayment), (2) auditor issues can escalate quickly if not addressed, and (3) audit findings can affect eligibility for future grants. The 15-day mid-term report is important but a short extension may be available; the 30-day closeout has the longest runway. Addressing the audit risk first protects the largest financial exposure.",diff:"advanced",ctry:"core"},
{id:184,d:3,sub:"3.D",q:"An EM coordinator reviews climate projections for the jurisdiction showing that by 2050, 100-year flood events will occur every 25 years due to changed precipitation patterns. The current local mitigation plan uses historical flood data from 1980-2020 to define risk zones. What must be updated?",opts:["Nothing — historical data is the standard for risk assessment","Update the risk assessment to incorporate future climate projections alongside historical data, revise flood risk zone boundaries based on updated return period analysis, and reassess all mitigation projects for adequacy against future risk levels — not just historical risk.","Wait for the 5-year plan update cycle to address climate projections","Request the federal government to update national flood maps before taking local action"],ans:1,exp:"Climate change is altering historical risk relationships — using only 1980-2020 historical data produces risk assessments that underestimate future exposure. The Sendai Framework Priority 1 (Understanding disaster risk) requires incorporating climate projections into risk assessments. Mitigation investments sized for historical risk may be inadequate against 2050 conditions. The risk assessment must use both historical data and future projections to produce planning that remains valid over the plan's implementation period.",diff:"advanced",ctry:"Canada"},
{id:185,d:2,sub:"2.Q",q:"An EM coordinator delivers ICS 300 training to 24 EOC staff. Post-training assessment shows: 20 staff scored above 70%, 4 scored below 50%. Six months later during an EOC activation, 2 of the 4 low scorers are making significant ICS errors. What should have happened between the training and the activation?",opts:["Nothing — one training is sufficient for ICS competency","The 4 low scorers should have been identified for immediate remedial support, offered a re-test or additional coaching, and their readiness for their EOC role should have been assessed before the next activation. Training completion ≠ competency.","The 2 staff making errors should be removed from EOC roles permanently","Conduct retraining for all 24 staff after the activation"],ans:1,exp:"Training completion is not competency. Low post-training assessment scores are a signal requiring follow-up: remedial coaching, re-testing, and role readiness assessment before the next operational deployment. The 6-month gap between training and activation with no follow-up for identified low performers allowed a known gap to persist until it manifested operationally. Training programs must include performance gate processes for critical operational roles.",diff:"advanced",ctry:"core"},
{id:186,d:8,sub:"8.F",q:"An EM professional is approached by a colleague from a neighboring jurisdiction asking to see their jurisdiction's evacuation plans to help with their own planning. The plans contain some sensitive infrastructure information. What is the MOST appropriate response?",opts:["Share all plans freely — EM professionals should share information openly","Refuse to share any plans — all EM information is sensitive","Share the non-sensitive planning framework and general approach, redact or withhold specific sensitive infrastructure details, and suggest formal information-sharing channels (MOU, secure government network) for the sensitive portions — while also exploring whether a joint planning process might better serve both jurisdictions","Require a formal legal agreement before sharing anything"],ans:2,exp:"Peer information sharing is valuable and professionally appropriate, but sensitive infrastructure information requires appropriate handling. The correct approach: share what can be shared (planning methodology, non-sensitive content), redact sensitive details, and direct the colleague to formal secure-sharing channels for the rest. This balances the professional value of peer learning with appropriate information security. Refusing to share anything is overly restrictive; sharing everything ignores legitimate security considerations.",diff:"intermediate",ctry:"core"},
{id:187,d:4,sub:"4.P",q:"Following a major hurricane, a shelter manager reports that 200 shelter residents are showing signs of acute stress reactions — difficulty sleeping, heightened anxiety, some with apparent dissociation. The shelter currently has no mental health services. What is the MOST appropriate EOC response?",opts:["Tell shelter staff to 'keep residents busy' to distract them from stress","Acknowledge the acute stress reactions as a normal response to trauma, immediately contact the ESF #8 coordinator to request mental health crisis support deployment to the shelter, and consider activating the Crisis Counseling Program (CCP) if available in the jurisdiction","Wait to see if residents improve spontaneously over the next few days","Refer symptomatic residents to hospitals to free up shelter capacity"],ans:1,exp:"Acute stress reactions after a major disaster are expected and normal — they require professional crisis counseling support, not distraction or dismissal. ESF #8 coordinates mental health and medical services; the EOC should immediately request crisis counseling deployment to the shelter. CCP (where available) provides exactly this type of short-term crisis counseling in disaster shelter settings. Sending symptomatic residents to hospitals is inappropriate — hospitals are for medical emergencies, not acute stress.",diff:"intermediate",ctry:"core"},
{id:188,d:1,sub:"1.F",q:"A new EM coordinator inherits a THIRA that was completed 4 years ago and has not been updated since. A major earthquake occurred in the region 18 months ago, and the jurisdiction has invested in significant new emergency equipment since the THIRA was completed. What must happen before using the existing THIRA to drive planning priorities?",opts:["The THIRA can be used as-is — THIRAs are valid for 5 years","The THIRA should be updated to reflect: (1) lessons from the regional earthquake event, (2) updated capability assessments reflecting new equipment investments, and (3) any changes in hazard profile or community vulnerability since the original assessment","Only the capability targets need to be updated","A new THIRA should be completed from scratch"],ans:1,exp:"THIRAs should be updated after significant events (the regional earthquake provides direct lessons that should update the scenario context), when capabilities change significantly (new equipment changes the SPR), and when hazard profiles or vulnerabilities change. A 4-year-old THIRA with these known changes is no longer current. A full restart may be unnecessary — a targeted update addressing the earthquake lessons and revised SPR is the proportional response.",diff:"intermediate",ctry:"core"},
{id:189,d:6,sub:"6.B",q:"An EM director proposes adopting an AI-powered predictive analytics platform that claims to 'predict incidents before they happen with 94% accuracy.' Before committing, what is the MOST critical question to ask the vendor?",opts:["What is the cost?","How many jurisdictions currently use it?","What is the false positive rate and false negative rate, and what are the consequences of each type of error in emergency management contexts?","Is it compatible with WebEOC?"],ans:2,exp:"In EM, the consequences of prediction errors are asymmetric and critical: a false positive (predicted incident that doesn't occur) wastes resources and reduces credibility; a false negative (real incident not predicted) may delay response with life-safety consequences. A 94% accuracy claim without false positive/negative breakdowns is meaningless — a system could be 94% accurate by correctly predicting 'no incident' 94% of the time while missing all real incidents. The error rate question is the most operationally significant.",diff:"advanced",ctry:"core"},
{id:190,d:2,sub:"2.E",q:"An EOC activation checklist was last updated 3 years ago. Since then, the primary incident management software was replaced, the EOC phone system changed, and 6 of 12 EOC staff positions have new personnel. During a surprise activation drill, staff take 47 minutes to reach operational status instead of the 20-minute target. What is the PRIMARY cause?",opts:["Staff are not sufficiently motivated","The 20-minute target is unrealistic","The checklist is outdated and does not reflect current systems, contacts, or procedures — staff are working from incorrect instructions during the critical activation window","The drill was not announced in advance"],ans:2,exp:"An outdated activation checklist is the primary operational cause. When staff follow checklist steps referencing replaced systems and changed contacts, they discover errors in real-time during the activation — creating confusion and delay. This is a direct consequence of inadequate checklist maintenance after each organizational change. The 20-minute target may be achievable with a current, accurate checklist. Motivation and announcement timing are secondary factors.",diff:"intermediate",ctry:"core"},
{id:191,d:5,sub:"5.J",q:"A Disaster Recovery Center (DRC) has been open for 3 weeks. Data shows 1,847 visits from a population of approximately 12,000 disaster-affected households. Analysis of the visitor log shows 94% are homeowners; only 6% are renters despite renters making up approximately 35% of the affected population. What action is REQUIRED?",opts:["The DRC is performing well — 1,847 visits is significant","Close the DRC and re-open in a more accessible location","Launch targeted outreach specifically to renters: partner with landlord associations, community organizations, faith communities, and social media channels to reach renters who are underrepresented. Consider whether the DRC location, hours, or format creates barriers for renters.","Extend DRC hours to attract more visitors"],ans:2,exp:"A DRC serving 6% renters when renters represent 35% of affected households is not serving a proportionate share of those with need. Renters often have greater unmet recovery needs (no homeowner's insurance, more likely to be permanently displaced) but face more barriers to DRC access (transportation, awareness, trust in government services, language). Active outreach to close this gap is a program requirement, not optional. The data demands an immediate targeted response.",diff:"advanced",ctry:"core"},
{id:192,d:3,sub:"3.B",q:"A municipality successfully completes a major flood berm project 2 years after it was approved. Monitoring data from the first winter shows the berm is performing as designed. What ongoing obligations does the EM coordinator have regarding this mitigation investment?",opts:["None — the project is complete","Document the project completion and performance data in the Local Mitigation Plan update, establish an ongoing inspection and maintenance schedule for the berm, update the vulnerability assessment to reflect the reduced flood risk, and capture the performance data as a 'mitigation success story' for future advocacy","Conduct an annual community meeting about the berm","The project is now the responsibility of public works only"],ans:1,exp:"Mitigation implementation creates ongoing obligations: (1) document performance in the next plan update; (2) establish maintenance schedules (mitigation infrastructure requires maintenance to remain effective); (3) update the vulnerability assessment (the risk has changed); (4) capture performance data for advocacy (BCR of $X invested vs $Y in losses avoided in the first flood event). Mitigation projects are not 'done' at ribbon-cutting.",diff:"intermediate",ctry:"core"},
{id:193,d:7,sub:"7.H",q:"An EM office receives a compliance notice that their jurisdiction's local emergency plan has not been submitted to the province as required by Section 12(3) of the provincial Emergency Management Act, which mandated submission within 90 days of any major update. The plan was substantially updated 8 months ago. What is the CORRECT response?",opts:["Challenge the notice — 90 days is an unrealistic timeframe","Submit the plan to the province immediately with a cover letter acknowledging the late submission and explaining the circumstances. Review all other compliance obligations to identify any other missed deadlines.","Wait for the province to follow up again before responding","Request a formal extension retroactively"],ans:1,exp:"When a compliance deadline is missed, the correct response is immediate corrective action: submit what is required with an acknowledgment of the late submission. Challenging a clear legislative requirement creates adversarial relationship with the regulatory authority. Requesting retroactive extensions is typically not available. More importantly, the discovery of this missed obligation should trigger a comprehensive compliance audit — if one deadline was missed, others may have been too.",diff:"intermediate",ctry:"Canada"},
{id:194,d:4,sub:"4.R",q:"During a major incident, the EOC's primary internet connection fails. The backup LTE internet also fails due to network congestion. WebEOC is inaccessible. Staff begin calling their personal phones for situational updates. What does this scenario reveal and what is the systemic solution?",opts:["This is acceptable — personal phones are adequate backup","This reveals an inadequate backup communications plan. The systemic solution requires: (1) a manual status board and paper-based tracking system that can be activated immediately; (2) a dedicated radio network independent of internet; (3) pre-printed contact directories; (4) satellite internet as a tertiary backup; and (5) regular exercises of manual backup systems to maintain proficiency.","Procure a third internet connection","This is a training issue — staff should know how to use WebEOC offline"],ans:1,exp:"Technology dependency without validated manual backup is an EM system design failure. The scenario reveals: single-point-of-failure internet reliance, no exercised manual backup system, and staff defaulting to improvised solutions (personal phones) rather than pre-established backup protocols. WebEOC has no offline mode. The systemic solution is layered: manual board for tracking, dedicated radio for comms, satellite for tertiary internet, and regular manual system exercises to maintain proficiency.",diff:"advanced",ctry:"core"},
{id:195,d:8,sub:"8.E",q:"An EM coordinator is invited to join a provincial working group developing a new framework for multi-jurisdictional hazmat response coordination. The working group meets quarterly and requires reviewing draft documents between meetings. The coordinator's supervisor is skeptical about the time investment. The MOST compelling argument for participation is:",opts:["It looks good on the AEM application","Participating in standards development is a required professional activity","The coordinator's jurisdiction will benefit from being at the table when the framework is developed — shaping the framework to reflect local operational realities, building relationships with peer coordinators across the province, and gaining early knowledge of the new requirements before they become mandatory. Professional influence requires presence.","It counts as professional development hours for recertification"],ans:2,exp:"The most compelling operational argument to a skeptical supervisor is concrete jurisdiction benefit: (1) influence over framework design (it's better to shape requirements than receive them); (2) advance knowledge of new requirements enabling early preparation; (3) relationship-building with provincial coordinators who will be partners in actual hazmat incidents. The professional development hours and AEM requirements are real benefits but less persuasive to an operationally-focused supervisor.",diff:"advanced",ctry:"Canada"},
{id:196,d:2,sub:"2.D",q:"An EM coordinator conducts a monthly EOC readiness check and discovers that the EOC backup generator has not been exercised under load in 26 months (the standard requires testing every 6 months under load). The EOC Director says 'It started fine last month during the routine inspection.' Why is this response insufficient?",opts:["It is sufficient — if the generator starts it is operationally ready","Starting a generator is not the same as running it under load for an extended period. A generator can start reliably but fail under sustained load due to fuel system issues, cooling problems, or capacity limitations not revealed by a cold start check. The 26-month gap in load testing means the generator's actual operational capacity during a multi-day activation is unknown and unvalidated.","The generator needs to be replaced regardless of testing","The 6-month load testing standard is excessive"],ans:1,exp:"This is a critical distinction in generator maintenance: a cold start test verifies the generator starts, not that it can sustain load for 24-72 hours of EOC operations. Load testing reveals: fuel delivery under demand, cooling system performance under sustained output, capacity limitations, and efficiency degradation. A 26-month gap means none of these have been validated. The director's response conflates starting with sustained operational capacity.",diff:"advanced",ctry:"core"},
{id:197,d:4,sub:"4.K",q:"During a complex chemical plant fire, the Incident Commander asks the EM coordinator: 'Do we have the legal authority to force mandatory evacuation of the surrounding neighborhood?' The EM coordinator's jurisdiction has never issued a mandatory evacuation order before. What is the MOST appropriate response?",opts:["Confirm they have the authority without checking, to avoid appearing uncertain","Say 'I'll find out' and make a guess based on general knowledge","Immediately consult the EOP's legal authorities section and contact the municipal solicitor if needed, while simultaneously beginning preparation of voluntary evacuation messaging that can be deployed immediately — not delaying protective action while the legal question is resolved","Tell the IC that mandatory evacuation is always legally available in an emergency"],ans:2,exp:"Technical guidance as an SME requires accuracy. The legal authority for mandatory evacuation varies by jurisdiction and legislation — it should be confirmed through the EOP's legal authorities section or municipal counsel, not guessed. However, the legal question should not delay protective action: voluntary evacuation messaging can be deployed immediately while the legal question is resolved, serving life-safety goals without waiting. Both actions — verify legal authority AND prepare protective messaging — are required simultaneously.",diff:"advanced",ctry:"Canada"},
{id:198,d:5,sub:"5.F",q:"A wildfire destroys 320 homes in a rural area. Recovery planning meetings are scheduled in the nearest town, 45 minutes from the most affected area. Three weeks into recovery, community feedback shows that affected residents feel 'the government is making decisions without us.' What does this indicate and what should change?",opts:["Residents are simply frustrated and will adjust over time","The recovery engagement model is geographically inaccessible and likely inadequate in frequency and format for the most affected population. Move the primary engagement venue to the affected community, increase meeting frequency, add home visits for those who cannot travel, and explicitly invite affected residents into decision-making roles — not just consultation.","Hold one large community meeting to address all concerns","Increase information distribution through social media"],ans:1,exp:"'Government making decisions without us' is a clear signal that the engagement model is failing the equity and legitimacy tests of community-led recovery. A 45-minute drive is a significant barrier for displaced residents dealing with trauma and temporary housing. Moving engagement closer, increasing frequency, adding home visits, and giving residents actual decision-making power (not just consultation) are all required. Consultation-only models consistently produce this outcome — participation in decisions is required for legitimacy.",diff:"advanced",ctry:"core"},
{id:199,d:1,sub:"1.C",q:"A newly hired EM coordinator discovers the previous coordinator left no documentation of the gap analysis process, no Improvement Plan tracking, and no evidence that previous exercise findings were ever addressed. Staff recall that exercises identified 'the same problems every time' for the past 4 years. This situation MOST directly represents:",opts:["A personnel management failure by the previous coordinator","A systemic failure in the continuous improvement cycle — exercises identified gaps, but the AAR-to-IP-to-tracking loop was broken, resulting in the same gaps persisting across multiple exercise cycles without correction","A resource shortage that prevented improvements","An exercise design failure — the exercises should have tested different capabilities"],ans:1,exp:"This is a systemic continuous improvement failure. The purpose of exercises is to identify AND fix gaps — not just identify them. When the same problems appear in 4 consecutive years, the loop from identification (AAR) to action (IP) to tracking to verification (re-test) was never closed. The new EM coordinator's first priority is establishing the full PDCA cycle: document current gaps from the most recent AAR, build a tracking IP, assign owners, set deadlines, and design the next exercise to verify corrections.",diff:"advanced",ctry:"core"},
{id:200,d:7,sub:"7.O",q:"An EM coordinator is offered tickets to a major sporting event by a vendor whose contract renewal is under active review. The vendor says it is 'just a thank-you for the good working relationship.' According to the IAEM Code of Ethics, the CORRECT action is:",opts:["Accept the tickets — it is just a social gesture with no intent to influence","Accept but disclose the gift to a supervisor","Decline the tickets and report the offer to a supervisor, as accepting gifts from vendors during active contract periods creates an actual or perceived conflict of interest that violates the Fairness and Integrity principles of the Code","Accept if the value is below the jurisdiction's gift threshold"],ans:2,exp:"The IAEM Code of Ethics (Integrity + Fairness) and virtually all public sector ethics standards prohibit accepting gifts from vendors during active procurement or contract review periods. The offer creates an actual or perceived conflict of interest regardless of value. The correct action is decline AND report — reporting to a supervisor creates a record that protects the EM coordinator professionally and alerts the organization to the vendor's conduct. Accepting at any value during an active contract review is inappropriate.",diff:"advanced",ctry:"core"}
];


const QUESTIONS4=[
// DOMAIN 1 - Risk Management
{id:201,d:1,sub:"1.F",q:"According to CPG 201, THIRA capability targets should be set based on:",opts:["The jurisdiction's current resource levels","The worst reasonable scenario the jurisdiction could face for each threat or hazard","The national average capability level for similar jurisdictions","What the jurisdiction can afford to achieve in the next budget cycle"],ans:1,exp:"CPG 201 directs jurisdictions to set capability targets based on the worst reasonable scenario for each identified threat or hazard — not current resources, national averages, or budget constraints. Targets represent what is needed; the gap between targets and current capability drives investment decisions.",diff:"intermediate",ctry:"core"},
{id:202,d:1,sub:"1.E",q:"A risk assessment worksheet shows: Flood (probability 4/5, consequence 4/5), Earthquake (probability 2/5, consequence 5/5), Tornado (probability 3/5, consequence 3/5). Which hazard requires a COOP plan addressing potential total loss of primary facility?",opts:["Flood — highest combined score","Earthquake — extreme consequence makes this a catastrophic planning priority","Tornado — medium probability and consequence represents the most balanced risk","All three equally"],ans:1,exp:"Earthquake's extreme consequence (5/5) — potential total facility destruction — makes it the primary driver for COOP planning and catastrophic scenario annexes, even at lower probability. The NDRF and CPG 101 both direct that catastrophic consequence scenarios drive specific planning types regardless of probability. Flood scores high overall but doesn't threaten facility destruction at the same level.",diff:"advanced",ctry:"core"},
{id:203,d:1,sub:"1.B",q:"The National Infrastructure Protection Plan (NIPP) in the US identifies how many critical infrastructure sectors?",opts:["10","14","16","18"],ans:2,exp:"The US NIPP identifies 16 critical infrastructure sectors, each with a designated Sector Risk Management Agency (SRMA). In Canada, Public Safety Canada coordinates 10 critical infrastructure sectors. The 16 US sectors include energy, water, communications, transportation, healthcare, financial services, and others.",diff:"intermediate",ctry:"USA"},
{id:204,d:1,sub:"1.C",q:"A gap analysis following a THIRA/SPR process reveals a jurisdiction can currently evacuate 12,000 people in 12 hours against a target of 20,000. Which Improvement Plan element is MOST critical?",opts:["Setting a new, more achievable target","Assigning a responsible party, timeline, and specific resource/training action to close the 8,000-person gap","Documenting the gap in the EOP without action pending the next budget cycle","Requesting provincial/state assistance to manage all evacuations"],ans:1,exp:"Every Improvement Plan item must have: a specific corrective action, an assigned responsible party, and a completion timeline. Without these three elements, a documented gap remains an acknowledged problem with no mechanism for resolution. The gap itself is not the deliverable — the action plan to close it is.",diff:"beginner",ctry:"core"},
{id:205,d:1,sub:"1.F",q:"The Stakeholder Preparedness Review (SPR) — formerly called the State Preparedness Report — is designed to:",opts:["Report disasters to the federal government for declaration purposes","Measure current capability levels against THIRA-established targets to identify gaps","Document hazards identified in the THIRA process","Certify that a jurisdiction has completed its EOP update"],ans:1,exp:"The SPR (formerly State Preparedness Report) is the companion document to the THIRA that measures current capability levels against the targets established in the THIRA. The gap between THIRA targets and SPR current levels is what drives preparedness investment decisions under the National Preparedness System.",diff:"intermediate",ctry:"core"},
{id:206,d:1,sub:"1.D",q:"Under the FEMA Business Process Analysis and BIA User Guide, what is the recommended first step in conducting a BIA?",opts:["Set Recovery Time Objectives for all functions","Identify all mission-essential functions through interviews and workshops with organizational leadership","Calculate the financial cost of each potential disruption","Draft the COOP plan framework before beginning the BIA"],ans:1,exp:"The FEMA BPA/BIA User Guide establishes that identifying mission-essential functions through interviews and workshops is the foundational first step. You cannot assess the impact of disruption until you know what functions are essential. RTOs, financial impacts, and COOP plans all flow from this foundational identification step.",diff:"intermediate",ctry:"core"},
// DOMAIN 2 - Preparedness
{id:207,d:2,sub:"2.C",q:"CPG 101 v2 identifies which of the following as the MOST important characteristic of an effective EOP?",opts:["It is lengthy and comprehensive, covering every possible scenario","It is developed collaboratively, regularly exercised, and maintained as a living document","It is written by credentialed EM professionals only","It matches the format used by neighboring jurisdictions"],ans:1,exp:"CPG 101 v2 emphasizes that the most important characteristics of an effective EOP are: collaborative development (ensuring buy-in and accuracy), regular exercise (validating that plans work), and maintenance as a living document (keeping plans current). Length and format are secondary to these process characteristics.",diff:"beginner",ctry:"core"},
{id:208,d:2,sub:"2.K",q:"According to HSEEP, what is the PRIMARY difference between a Functional Exercise and a Full-Scale Exercise?",opts:["Functional exercises are shorter; full-scale exercises take longer","Functional exercises test EOC coordination without field deployment; full-scale exercises deploy actual personnel and equipment to the field","Functional exercises are less expensive; full-scale exercises require federal funding","Functional exercises test single functions; full-scale exercises test all functions"],ans:1,exp:"HSEEP defines: Functional Exercise = tests multiple functions simultaneously in an EOC/command environment WITHOUT deploying resources to the field. Full-Scale Exercise = deploys actual resources to a simulated field environment AND tests command coordination simultaneously. This is the defining difference between the two highest-level operations-based exercise types.",diff:"beginner",ctry:"core"},
{id:209,d:2,sub:"2.K",q:"The HSEEP After Action Report/Improvement Plan must be completed within how many days of an exercise?",opts:["30 days","60 days","90 days","120 days"],ans:2,exp:"HSEEP requires AAR/IP completion within 90 days of the exercise. This timeline balances the need for timely capture of lessons (while memories are fresh) with the time needed for thorough analysis and stakeholder input. AAR/IPs completed outside this window lose timeliness and are considered a compliance gap.",diff:"beginner",ctry:"core"},
{id:210,d:2,sub:"2.R",q:"The IS-100 course states that ICS was originally developed in response to which type of incident?",opts:["Major floods in the Mississippi River basin in the 1960s","Wildfires in southern California in the early 1970s","The 9/11 terrorist attacks in 2001","Hurricane Katrina in 2005"],ans:1,exp:"ICS was developed in the early 1970s in response to catastrophic wildfires in southern California (Operation FIRESCOPE). After-action reviews of those fires identified that the primary problems were not lack of resources or tactics but management failures: inability to communicate across agencies, unclear command authority, and no common terminology.",diff:"beginner",ctry:"core"},
{id:211,d:2,sub:"2.F",q:"The National Response Framework identifies Emergency Support Function #6 as covering:",opts:["Public Health and Medical Services","Transportation","Mass Care, Emergency Assistance, Temporary Housing, and Human Services","Search and Rescue"],ans:2,exp:"ESF #6 covers Mass Care, Emergency Assistance, Temporary Housing, and Human Services. Key agencies: Red Cross (mass care lead), FEMA (housing lead), HHS (human services). This ESF is directly relevant to shelter operations, feeding programs, and disaster case management — frequently tested on the AEM exam.",diff:"intermediate",ctry:"core"},
{id:212,d:2,sub:"2.F",q:"According to the National Response Framework, which ESF covers Public Health and Medical Services?",opts:["ESF #6","ESF #7","ESF #8","ESF #9"],ans:2,exp:"ESF #8 covers Public Health and Medical Services, led by the Department of Health and Human Services (HHS). In Canada, the equivalent function is coordinated through the Public Health Agency of Canada (PHAC). ESF #8 covers: public health surveillance, medical surge, behavioral health, mass fatality management, and veterinary services.",diff:"beginner",ctry:"core"},
{id:213,d:2,sub:"2.G",q:"Under EMAC, when a state sends personnel to assist another state, the RECEIVING state is responsible for:",opts:["Paying all costs for the assisting state's personnel","Directing and supervising the work of assisting personnel","Providing workers' compensation coverage for the assisting state's personnel","Reimbursing the assisting state within 30 days of deployment"],ans:1,exp:"Under EMAC, the receiving state directs and supervises the work of assisting personnel. The sending state retains legal and financial responsibility for its own personnel (workers' compensation, liability). The receiving state reimburses the sending state for costs. This command and liability structure is pre-established by EMAC and is why it enables rapid deployment.",diff:"advanced",ctry:"USA"},
{id:214,d:2,sub:"2.B",q:"According to IS-1300, which of the following is a Primary Mission-Essential Function (PMEF)?",opts:["Any function performed by government staff during normal operations","Functions that must be continued during any emergency — identified through the BIA as critical to the organization's mission and community safety","Functions that generate the most revenue for the organization","Functions performed by the most senior staff"],ans:1,exp:"IS-1300 defines PMEFs as the functions an organization must continue during any emergency — they are identified through the BIA process based on criticality to the organization's mission and the consequences of disruption. Not all government functions are PMEFs — the BIA filters them to only those that are truly essential.",diff:"intermediate",ctry:"core"},
{id:215,d:2,sub:"2.I",q:"The Whole Community approach to emergency management, as defined by FEMA, requires that planning processes:",opts:["Focus primarily on government agencies that have formal legal responsibilities","Include only credentialed emergency management professionals","Engage the full diversity of the community — including individuals, families, NGOs, private sector, and faith communities — in preparedness planning","Be led by federal agencies to ensure consistency"],ans:2,exp:"FEMA's Whole Community document explicitly requires engaging the full diversity of the community in planning processes — not just government agencies or credentialed professionals. The document emphasizes that effective preparedness requires the authentic participation of everyone who will be affected by and respond to emergencies.",diff:"beginner",ctry:"core"},
{id:216,d:2,sub:"2.O",q:"Environment Canada's public weather alert system uses which terminology for an imminent threat requiring immediate action?",opts:["Advisory","Watch","Warning","Statement"],ans:2,exp:"Environment Canada's alert hierarchy: Advisory = conditions may affect routine activities. Watch = conditions are favorable for a hazard. Warning = a hazard is imminent or occurring and immediate action is required. Statement/Special Weather Statement = provides additional context. 'Warning' = act now is the critical distinction.",diff:"beginner",ctry:"Canada"},
{id:217,d:2,sub:"2.D",q:"IS-2200 identifies which organizational model as the most common structure for local government EOCs?",opts:["ICS-based structure with Command and General Staff sections","Departmental/Agency structure grouping by department","Emergency Support Function (ESF) structure grouping by function","Incident-specific structure determined at activation"],ans:2,exp:"IS-2200 identifies the ESF model as the most common local government EOC organizational structure — grouping staff by emergency support function rather than by department or ICS section. The ESF model aligns local coordination with the federal NRF structure and clarifies which agency coordinates each functional area.",diff:"intermediate",ctry:"core"},
{id:218,d:2,sub:"2.E",q:"According to IS-2200, how long should EOC supply inventories support self-sufficient operations without resupply?",opts:["24 hours","48 hours","72 hours","7 days"],ans:2,exp:"IS-2200 specifies that EOC supply inventories should support 72 hours (3 days) of self-sufficient operations. This threshold is aligned with the standard emergency preparedness guidance that professional responders should be self-sufficient for 72 hours when supply chains may be disrupted.",diff:"beginner",ctry:"core"},
{id:219,d:2,sub:"2.J",q:"CPG 101 v2 identifies 'planning assumptions' as:",opts:["Educated guesses used when data is not available","Statements about conditions believed to be true that justify planning decisions and help fill data gaps","Confirmed facts that require no verification","Optional elements that can be omitted from smaller EOPs"],ans:1,exp:"CPG 101 defines planning assumptions as statements about conditions believed to be true that help justify planning decisions and fill data gaps where facts are not available. They are documented and tested through exercises. If assumptions prove wrong during an incident, the plan may need immediate adaptation.",diff:"intermediate",ctry:"core"},
{id:220,d:2,sub:"2.M",q:"A multi-jurisdictional EOP is MOST appropriate when:",opts:["Two jurisdictions share a chief administrative officer","Adjacent jurisdictions face common hazards that require coordinated response and share resources","A jurisdiction's EOP exceeds 200 pages and needs to be divided","A single jurisdiction cannot afford to develop its own EOP"],ans:1,exp:"Multi-jurisdictional EOPs are designed for situations where adjacent or overlapping jurisdictions face common hazards requiring coordinated response and share resources. They eliminate the duplication of parallel plans with similar content and build the relationships needed for seamless coordination during incidents that cross jurisdictional boundaries.",diff:"intermediate",ctry:"core"},
{id:221,d:2,sub:"2.P",q:"According to the Whole Community approach, which population group has historically been MOST underserved by traditional EM planning processes?",opts:["Property owners in high-value flood zones","Individuals with disabilities, elderly persons, non-English speakers, and other access and functional needs populations","Commercial business owners","Government employees"],ans:1,exp:"FEMA's Whole Community research and the CPG 101 guidance consistently identify individuals with disabilities, elderly persons, non-English speakers, medically dependent individuals, and other AFN populations as historically underserved by traditional EM planning. These groups face both greater risks and greater barriers to accessing preparedness information and recovery resources.",diff:"beginner",ctry:"core"},
{id:222,d:2,sub:"2.N",q:"In project management applied to EM, a RACI matrix is used to:",opts:["Rank risks by probability and consequence","Clarify who is Responsible, Accountable, Consulted, and Informed for each project task","Schedule tasks on a timeline with dependencies","Calculate the return on investment for EM projects"],ans:1,exp:"RACI = Responsible (does the work), Accountable (ultimately answerable for the outcome), Consulted (provides input), Informed (kept updated). In EM projects involving multiple agencies, the RACI matrix prevents the common problem of unclear ownership — where everyone thinks someone else is responsible.",diff:"beginner",ctry:"core"},
{id:223,d:2,sub:"2.Q",q:"The FEMA Independent Study program IS-120.C states that exercises serve which PRIMARY purpose?",opts:["To identify personnel who are not qualified for their EOC roles","To validate plans, policies, procedures, and capabilities before a real incident","To fulfill grant reporting requirements","To demonstrate program effectiveness to elected officials"],ans:1,exp:"IS-120 explicitly states that the primary purpose of exercises is to validate plans, policies, procedures, and capabilities — identifying gaps and strengths before a real incident reveals them. Personnel qualification is a secondary outcome. Grant reporting and political demonstration are legitimate but secondary benefits.",diff:"beginner",ctry:"core"},
{id:224,d:2,sub:"2.S",q:"The principle of evidence-informed emergency management requires that EM professionals:",opts:["Conduct original research before changing any program element","Apply lessons from research, AARs, and case studies to improve local practice — adapting evidence to local context rather than waiting for perfect local data","Only use research from their own country","Defer all research-based decisions to academic experts"],ans:1,exp:"Evidence-informed EM means applying available research findings to local practice, adapting the evidence to local context. It does not require original research before acting. The Fort McMurray wildfire AARs, for example, provide evidence that Canadian EMs can apply to their social media monitoring protocols without waiting for local studies.",diff:"intermediate",ctry:"core"},
{id:225,d:2,sub:"2.H",q:"According to IS-2200, EOC position checklists should be:",opts:["Generic enough to apply to any EOC position","Position-specific, action-oriented, and validated through exercises","Written by the EOC Director and kept confidential until activation","Updated only after a real incident reveals gaps"],ans:1,exp:"IS-2200 specifies that EOC checklists should be position-specific (tailored to each role), action-oriented (step-by-step actions rather than general guidance), and validated through exercises (to confirm they actually work). Generic checklists fail to provide the specific guidance staff need during high-stress activations.",diff:"intermediate",ctry:"core"},
{id:226,d:2,sub:"2.L",q:"Pre-scripted emergency messages should be written at approximately what reading level, per FEMA crisis communication standards?",opts:["Grade 3-4 level","Grade 6-8 level","Grade 10-12 level","Post-secondary level"],ans:1,exp:"FEMA crisis communication standards recommend Grade 6-8 reading level for public emergency messages. This level is accessible to the broadest audience while still conveying technical accuracy. Higher reading levels exclude significant portions of the public; lower levels may oversimplify important safety information.",diff:"intermediate",ctry:"core"},
// DOMAIN 3 - Mitigation
{id:227,d:3,sub:"3.B",q:"Under Canada's National Disaster Mitigation Program (NDMP), which type of project is eligible for federal funding?",opts:["Disaster response costs following a declared emergency","Flood mapping, flood mitigation works, and community resilience projects","Rebuilding of destroyed infrastructure after a DFAA declaration","Training and exercises for local EM staff"],ans:1,exp:"The NDMP funds pre-disaster mitigation investments: flood hazard mapping, structural flood mitigation works, and community resilience projects. It does NOT fund disaster response costs (DFAA) or training/exercises (Preparedness funds). This distinction between NDMP (mitigation) and DFAA (recovery) is frequently tested for Canadian candidates.",diff:"intermediate",ctry:"Canada"},
{id:228,d:3,sub:"3.C",q:"FEMA research on the return on investment for mitigation investments has found that on average, every $1 invested in hazard mitigation saves approximately:",opts:["$2 in future disaster costs","$4 in future disaster costs","$6 in future disaster costs","$10 in future disaster costs"],ans:2,exp:"FEMA research (including the 2019 National Institute of Building Sciences study) found that federally funded mitigation investments save approximately $6 for every $1 invested — a 6:1 return. This figure is widely cited in mitigation advocacy and is directly testable on the AEM exam. The specific $6:1 figure is from federal mitigation grant programs.",diff:"intermediate",ctry:"core"},
{id:229,d:3,sub:"3.D",q:"The Sendai Framework for Disaster Risk Reduction 2015-2030 has how many global targets?",opts:["4","5","7","10"],ans:2,exp:"The Sendai Framework has 7 global targets to be achieved by 2030, in addition to its 4 priorities for action. The 7 targets include reducing: global mortality, affected people, economic losses, damage to critical infrastructure. They also include increasing: countries with DRR strategies, international cooperation, and availability of early warning systems.",diff:"beginner",ctry:"core"},
{id:230,d:3,sub:"3.E",q:"When prioritizing mitigation actions in a local mitigation plan, the Local Mitigation Planning Handbook recommends evaluating which combination of factors?",opts:["Cost and probability only","Life-safety impact, cost-effectiveness, technical feasibility, political support, and equity","Population size affected and property value at risk","Federal grant availability and local matching capacity"],ans:1,exp:"The Local Mitigation Planning Handbook recommends a multi-criteria prioritization approach: life-safety impact, cost-effectiveness (BCR), technical feasibility, political/community support, and equity (ensuring vulnerable populations benefit). Single-factor approaches consistently produce suboptimal or inequitable results.",diff:"intermediate",ctry:"core"},
{id:231,d:3,sub:"3.F",q:"A local mitigation plan must be updated and reapproved every how many years to maintain FEMA grant eligibility?",opts:["3 years","4 years","5 years","10 years"],ans:2,exp:"The Disaster Mitigation Act of 2000 and FEMA's Local Mitigation Planning Handbook require local mitigation plans to be updated every 5 years. Jurisdictions with expired plans lose eligibility for Pre-Disaster Mitigation (PDM) and Hazard Mitigation Grant Program (HMGP) funds.",diff:"beginner",ctry:"core"},
{id:232,d:3,sub:"3.A",q:"NIMS defines communications interoperability as the ability of emergency personnel to:",opts:["Use any radio system regardless of manufacturer","Communicate with each other across agencies and jurisdictions via voice and data in real time","Share the same radio frequencies with all levels of government","Operate communications systems without external power"],ans:1,exp:"NIMS defines interoperability as the ability of emergency personnel from different agencies, jurisdictions, and disciplines to communicate with each other via voice and data in real time. This encompasses both technical compatibility (equipment) and procedural compatibility (protocols, terminology).",diff:"beginner",ctry:"core"},
{id:233,d:3,sub:"3.B",q:"Canada's 'Fire Smart' program is an example of which type of mitigation?",opts:["Structural mitigation targeting existing buildings","Non-structural mitigation through community education and defensible space programs","Emergency response enhancement","Recovery preparedness"],ans:1,exp:"Fire Smart (also called FireSmart Canada) is a non-structural mitigation program — it uses community education, home assessments, and defensible space guidance to reduce wildland-urban interface fire risk without structural modifications. This type of program is a classic example of education/awareness as a non-structural mitigation control.",diff:"intermediate",ctry:"Canada"},
{id:234,d:3,sub:"3.C",q:"A Benefit-Cost Analysis for a proposed levee project shows total construction cost of $4M and estimated avoided losses over 50 years of $14M. What is the BCR and is it eligible for HMGP funding?",opts:["BCR = 0.29 — not eligible (BCR must exceed 1.0)","BCR = 3.5 — eligible (BCR exceeds 1.0)","BCR = 3.5 — not eligible (BCR must exceed 4.0 for infrastructure projects)","BCR = 10M — eligible"],ans:1,exp:"BCR = Benefits ÷ Costs = $14M ÷ $4M = 3.5. FEMA requires BCR > 1.0 for HMGP eligibility — a BCR of 3.5 comfortably meets this threshold. There is no higher BCR requirement for infrastructure projects. A BCR of 3.5 means $3.50 in losses avoided for every $1 invested.",diff:"intermediate",ctry:"core"},
// DOMAIN 4 - Incident Response
{id:235,d:4,sub:"4.G",q:"In ICS, the Incident Commander is responsible for all of the following EXCEPT:",opts:["Approving the Incident Action Plan","Ordering and releasing resources","Personally directing all tactical field operations","Ensuring responder safety"],ans:2,exp:"The IC is responsible for strategic direction, approving the IAP, authorizing resource orders, and overall safety — but does NOT personally direct all tactical field operations. Tactical direction is delegated to the Operations Section Chief and Division/Group Supervisors. This delegation of tactical authority is a core ICS principle enabling the IC to maintain strategic oversight.",diff:"intermediate",ctry:"core"},
{id:236,d:4,sub:"4.D",q:"According to NIMS, which body is composed of senior officials authorized to commit resources and make policy decisions during a major incident?",opts:["Unified Command","Joint Information Center","Multi-Agency Coordination (MAC) Group","Emergency Support Function coordinators"],ans:2,exp:"The MAC Group (Multi-Agency Coordination Group) is composed of senior officials from multiple agencies who are authorized to commit resources and make policy decisions. This is distinct from Unified Command (which manages a specific incident) and the JIC (which coordinates public information). MAC Groups operate above the incident level.",diff:"intermediate",ctry:"core"},
{id:237,d:4,sub:"4.F",q:"The ICS Form 209 (Incident Status Summary) is used to:",opts:["Track individual resource assignments during an incident","Provide a standardized periodic summary of incident status for decision-makers and partner agencies","Document the chain of custody for evidence at a crime scene","Request additional resources through the mutual aid system"],ans:1,exp:"ICS Form 209 is the standardized Incident Status Summary — produced periodically to communicate current incident status to EOC staff, elected officials, partner agencies, and sometimes the public. It covers: geographic extent, resources deployed, injuries/fatalities, public information needs, and financial status.",diff:"intermediate",ctry:"core"},
{id:238,d:4,sub:"4.H",q:"Under NIMS, 'credentialing' refers to:",opts:["Issuing photo ID badges to all incident responders","The process of verifying and documenting personnel qualifications to ensure resources arriving under mutual aid have confirmed capabilities","Approving vendors to provide emergency services","Certifying that EOC staff have completed required ICS training"],ans:1,exp:"NIMS credentialing is specifically the process of verifying and documenting personnel qualifications to ensure that resources arriving under mutual aid have confirmed, verified capabilities — not just claimed capabilities. This is distinct from general ID badging or training certification.",diff:"intermediate",ctry:"core"},
{id:239,d:4,sub:"4.N",q:"The Emergency Information Checklist for public crisis communications requires that messages include which four elements?",opts:["What, Where, When, Why","What happened, What is being done, What people should do, Where to get more information","Who, What, When, Where","Situation, Mission, Execution, Administration"],ans:1,exp:"The standard public emergency message structure includes: (1) What happened (the event), (2) What is being done (response actions), (3) What people should do (protective actions), and (4) Where to get more information (official channels). This framework ensures messages are actionable, not just informational.",diff:"intermediate",ctry:"core"},
{id:240,d:4,sub:"4.I",q:"The National Response Framework establishes that local governments have which level of responsibility for emergency management?",opts:["Supplemental — local governments support state/provincial efforts","Primary — local governments are the first to respond and bear primary responsibility, with state/provincial and federal governments providing support when needed","Equal — all levels of government share equal responsibility","Advisory — local governments advise but states/provinces direct"],ans:1,exp:"The NRF explicitly establishes that local governments have primary responsibility for emergency management — they are typically the first to respond and bear primary responsibility for protecting their communities. State/provincial governments support when local capacity is exceeded; the federal government supports states/provinces when their capacity is exceeded. This tiered structure is fundamental.",diff:"beginner",ctry:"core"},
{id:241,d:4,sub:"4.A",q:"A Common Operating Picture (COP) in emergency management is BEST described as:",opts:["A standardized map format used by all responding agencies","A shared situational awareness of ongoing and developing situations across agencies and jurisdictions","A list of available resources that can be deployed to an incident","The incident action plan distributed to all responding units"],ans:1,exp:"A COP is the shared situational awareness maintained across agencies and jurisdictions during an incident — typically displayed through incident management systems like WebEOC. It includes: incident boundaries, resource locations, task status, weather conditions, and other relevant operational information. It enables coordinated decision-making.",diff:"beginner",ctry:"core"},
{id:242,d:4,sub:"4.P",q:"FEMA's Crisis Counseling Program (CCP) provides services for how long following a presidentially declared disaster?",opts:["30 days","60 days","Up to 9 months (with possible extension)","2 years"],ans:2,exp:"The CCP provides up to 9 months of services following a presidential disaster declaration, with possible extension for up to 24 months in catastrophic events. The program provides short-term crisis counseling — not long-term psychiatric care. This time-limited structure reflects the acute stress focus of the CCP.",diff:"advanced",ctry:"core"},
{id:243,d:4,sub:"4.Q",q:"When an Incident Commander receives a Delegation of Authority, this document should specify:",opts:["The IC's salary and benefits for the incident assignment","The scope of authority including financial limits, geographic boundaries, legal authorities, and reporting requirements","The list of resources the IC is authorized to use","The IC's personal liability protections"],ans:1,exp:"A Delegation of Authority is a formal document from the agency administrator to the IC specifying: scope of authority (what decisions the IC can make), financial limits (maximum expenditure without additional approval), geographic boundaries, legal authorities granted, and reporting requirements. Without clear delegation, the IC's authority is undefined.",diff:"intermediate",ctry:"core"},
{id:244,d:4,sub:"4.E",q:"During a major incident, which ICS Command Staff position is responsible for coordinating with representatives from cooperating and assisting agencies?",opts:["Public Information Officer","Safety Officer","Liaison Officer","Operations Section Chief"],ans:2,exp:"The Liaison Officer (LOFR) is the primary point of contact for representatives from cooperating and assisting agencies. The PIO handles public/media communication; the Safety Officer monitors hazards; the Operations Section Chief directs tactical operations. The LOFR maintains inter-agency relationships during the incident.",diff:"beginner",ctry:"core"},
{id:245,d:4,sub:"4.J",q:"A 'hot wash' debrief is BEST described as:",opts:["A formal after action review conducted 30 days after an incident","An immediate, informal debrief conducted right after an activity to capture fresh observations","A debriefing conducted only when serious problems are identified","A written report submitted to the EOC Director within 24 hours"],ans:1,exp:"A hot wash is an immediate, informal debrief — typically 10-15 minutes — conducted right after an exercise shift, operational period, or incident while events are fresh in participants' minds. It captures immediate observations that may be forgotten later. It is NOT a formal AAR, which comes later.",diff:"beginner",ctry:"core"},
{id:246,d:4,sub:"4.B",q:"During an EOC activation, the Operations Section Chief's PRIMARY responsibility is:",opts:["Developing the next Incident Action Plan","Managing all tactical operations and coordinating resources across all operational functions","Briefing the media every two hours","Maintaining financial records for the incident"],ans:1,exp:"The Operations Section Chief manages all tactical operations during an incident activation — directing operational resources, coordinating across functional areas, and briefing the IC/EOC Director on operational status. IAP development is a Planning Section function; media is PIO; financial records are Finance/Admin.",diff:"beginner",ctry:"core"},
{id:247,d:4,sub:"4.O",q:"NIMS guidance recommends a maximum shift length during extended incident operations of:",opts:["8 hours","10 hours","12 hours","16 hours"],ans:2,exp:"NIMS guidance recommends a maximum 12-hour shift during extended operations. Beyond 12 hours, cognitive performance degrades significantly, increasing the risk of errors. A 12-hour maximum with mandatory rest periods is the operational standard for extended EOC and field operations.",diff:"beginner",ctry:"core"},
{id:248,d:4,sub:"4.L",q:"When the FEMA Community Lifelines Status Board shows the Energy lifeline at 'Red' status, this indicates:",opts:["Minor disruption to power that will be resolved within hours","Severe impact to power infrastructure that significantly impairs community functions","The energy sector is working normally","Power outages affecting less than 10% of the affected area"],ans:1,exp:"Red status on the Lifelines Status Board indicates severe impact — the lifeline is significantly impaired and unable to provide adequate service to the community. Red triggers priority restoration attention. Yellow = moderate degradation (some service impaired). Green = minimal impact (functionally operational).",diff:"beginner",ctry:"core"},
{id:249,d:4,sub:"4.C",q:"An EM coordinator is asked to provide 'technical guidance' to the IC during a complex hazmat incident. This role is BEST described as:",opts:["Assuming command of the hazmat response","Providing expert advisory input on EM processes, legal authorities, and resource systems — while the IC retains command authority","Replacing the Safety Officer during the hazmat response","Directing field teams on hazmat containment procedures"],ans:1,exp:"Technical guidance is an advisory role — providing expertise to support the IC's decision-making without assuming command authority. The EM coordinator advises on EM processes, legal authorities for orders, mutual aid resources, and coordination mechanisms. The IC retains all command authority. Advisory ≠ command.",diff:"intermediate",ctry:"core"},
{id:250,d:4,sub:"4.R",q:"The Common Alerting Protocol (CAP) is BEST described as:",opts:["A Canada-specific emergency alert format","An international open standard for emergency alert messages that enables a single message to trigger alerts across multiple platforms simultaneously","A federal law requiring all jurisdictions to use compatible alerting systems","A training program for public information officers"],ans:1,exp:"CAP is an international open standard (not Canada-specific) that allows a single emergency alert message to simultaneously trigger alerts across multiple channels — WEA, EAS/Wireless broadcasting, web, social media, outdoor warning systems. NPAS (Canada) and IPAWS (US) both use CAP as their underlying standard.",diff:"intermediate",ctry:"core"},
// DOMAIN 5 - Recovery
{id:251,d:5,sub:"5.A",q:"The National Disaster Recovery Framework identifies how many Recovery Support Functions?",opts:["4","5","6","8"],ans:2,exp:"The NDRF identifies 6 Recovery Support Functions: Community Planning and Capacity Building, Economic, Health and Social Services, Housing, Infrastructure Systems, and Natural and Cultural Resources. Each RSF has a federal coordinating agency and brings together relevant stakeholders to coordinate recovery in that functional area.",diff:"beginner",ctry:"core"},
{id:252,d:5,sub:"5.B",q:"Under Canada's DFAA, which of the following costs are INELIGIBLE for reimbursement?",opts:["Emergency evacuation transportation costs","Costs for repairing essential public infrastructure beyond pre-disaster standard (betterment) not justified by code requirements","Emergency shelter operating costs","Costs of temporary restoration of essential government services"],ans:1,exp:"DFAA explicitly excludes betterment — rebuilding infrastructure to a higher standard than it was before the disaster — unless the betterment is required to meet current building codes or to prevent future losses. Other exclusions: insurance-covered costs, normal operating costs, private sector losses, and costs not directly attributable to the disaster.",diff:"advanced",ctry:"Canada"},
{id:253,d:5,sub:"5.C",q:"According to the Community Lifelines Implementation Toolkit, which lifeline encompasses hospitals, pharmacies, and behavioral health services?",opts:["Safety and Security","Food, Water, and Shelter","Health and Medical","Communications"],ans:2,exp:"The Health and Medical lifeline includes: hospitals, clinics, emergency medical services, pharmacies, behavioral/mental health services, and public health surveillance. This lifeline is critical for both life-safety response and long-term community recovery.",diff:"beginner",ctry:"core"},
{id:254,d:5,sub:"5.D",q:"The NDRF principle that recovery should improve community resilience rather than simply restore pre-disaster conditions is known as:",opts:["Community-led recovery","Disaster risk reduction","Build Back Better","Equitable recovery"],ans:2,exp:"'Build Back Better' is the NDRF (and Sendai Framework) principle that recovery is an opportunity to improve resilience — through stronger building codes, relocated facilities out of hazard zones, upgraded infrastructure. It explicitly rejects simply restoring the conditions that existed before the disaster.",diff:"beginner",ctry:"core"},
{id:255,d:5,sub:"5.E",q:"A FEMA Public Assistance (PA) project Scope of Work must include which of the following to be eligible for reimbursement?",opts:["Photographs only — written scopes are optional","Specific description of work to be performed, quantities, and cost estimates based on documented unit prices","A letter of political support from the mayor","Only the total project cost — line-item detail is not required"],ans:1,exp:"PA project eligibility requires a complete, specific SOW including: description of exactly what work will be performed, quantities (units, dimensions, volumes), and cost estimates based on documented unit prices or competitive bids. Vague or unsupported SOWs are common reasons for PA project denial or reduced reimbursement.",diff:"intermediate",ctry:"core"},
{id:256,d:5,sub:"5.F",q:"According to the NDRF, a Long-Term Recovery Group (LTRG) is BEST described as:",opts:["A federal team deployed to coordinate recovery after a presidential declaration","A community-based coalition of NGOs, government, faith organizations, and businesses that coordinates unmet needs with available resources over months to years","A temporary committee that dissolves once emergency shelters close","A subcommittee of the local emergency management committee"],ans:1,exp:"LTRGs are community-led coalitions — not federal teams — that coordinate the complex, multi-agency, multi-sector work of long-term recovery. They match unmet survivor needs with available resources from all sectors, preventing both duplication and gaps. The NDRF identifies LTRGs as the primary mechanism for community-led long-term recovery coordination.",diff:"beginner",ctry:"core"},
{id:257,d:5,sub:"5.G",q:"The ATC-20 protocol referenced in post-earthquake rapid safety assessment is used to:",opts:["Activate emergency shelters following an earthquake","Classify building safety for reentry using a placard system (Green/Yellow/Red)","Calculate structural damage costs for insurance claims","Determine federal disaster declaration eligibility"],ans:1,exp:"ATC-20 (Applied Technology Council) is the widely-used post-earthquake safety assessment protocol. Trained inspectors classify buildings using a placard system: Green = inspected/safe to enter, Yellow = restricted use, Red = unsafe/do not enter. This safety assessment determines reentry authorization for each building — not the whole area at once.",diff:"advanced",ctry:"core"},
